<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Finder Niche</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Croissant+One&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --green: #22c55e; --glass: rgba(0,0,0,0.55); --glass-border: rgba(255,255,255,0.12); --muted: rgba(255,255,255,0.55); }
    html, body { min-height: 100%; font-family: 'Inter', sans-serif; color: #fff; background: #0a0a0a; }

    /* ── BACKGROUND ── */
    #bg-layer {
      position: fixed; inset: 0; z-index: -10;
      background: #0a0a0a url('/background.png') center center / cover no-repeat;
      animation: bgDrift 18s ease-in-out infinite alternate;
      transform-origin: center;
    }
    @keyframes bgDrift {
      0%   { transform: scale(1.08) translate(0px,0px); }
      25%  { transform: scale(1.1)  translate(-12px,-8px); }
      50%  { transform: scale(1.08) translate(8px,-14px); }
      75%  { transform: scale(1.1)  translate(-6px,10px); }
      100% { transform: scale(1.08) translate(10px,6px); }
    }
    #bg-layer::after { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.55); }
    #milkyway-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: -9; pointer-events: none; }
    #shooting-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: -8; pointer-events: none; }

    .page {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 20px;
    }
    .brand {
      font-family: 'Croissant One', cursive; font-size: 1.6rem;
      color: #fff; text-decoration: none; margin-bottom: 32px;
      letter-spacing: 0.04em;
    }
    .card {
      width: 100%; max-width: 400px;
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 18px; padding: 32px 28px;
      backdrop-filter: blur(20px);
    }
    h1 { font-size: 1.2rem; font-weight: 800; margin-bottom: 6px; }
    .sub { color: var(--muted); font-size: 0.83rem; margin-bottom: 24px; line-height: 1.5; }
    .field {
      width: 100%; padding: 13px 16px; margin-bottom: 12px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; color: #fff; font-family: 'Inter', sans-serif;
      font-size: 0.9rem; outline: none; transition: border-color 0.2s;
    }
    .field:focus { border-color: var(--green); }
    .field::placeholder { color: var(--muted); }
    .btn {
      width: 100%; padding: 13px; border-radius: 10px; border: none;
      background: var(--green); color: #fff;
      font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.95rem;
      cursor: pointer; transition: all 0.2s; margin-top: 4px;
    }
    .btn:hover { background: #16a34a; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { margin-top: 14px; font-size: 0.83rem; text-align: center; min-height: 1.2em; }
    .msg.error   { color: #f87171; }
    .msg.success { color: var(--green); }
    .back { display: block; text-align: center; margin-top: 18px; color: var(--muted); font-size: 0.82rem; text-decoration: none; }
    .back:hover { color: #fff; }
  </style>
</head>
<body>
  <div id="bg-layer"></div>
  <canvas id="milkyway-canvas"></canvas>
  <canvas id="shooting-canvas"></canvas>

  <div class="page">
    <a href="/" class="brand">Finder Niche</a>
    <div class="card" id="card-forgot">
      <h1>Forgot password?</h1>
      <p class="sub">Enter your email and we'll send you a link to reset your password.</p>
      <input class="field" id="forgot-email" type="email" placeholder="Your email address" autocomplete="email" />
      <button class="btn" id="btn-forgot" onclick="sendReset()">Send reset link</button>
      <div class="msg" id="msg-forgot"></div>
      <a href="/dashboard" class="back">← Back to login</a>
    </div>

    <div class="card" id="card-reset" style="display:none;">
      <h1>New password</h1>
      <p class="sub">Choose a new password for your account.</p>
      <input class="field" id="reset-pw" type="password" placeholder="New password (6+ characters)" autocomplete="new-password" />
      <input class="field" id="reset-pw2" type="password" placeholder="Confirm new password" autocomplete="new-password" />
      <button class="btn" id="btn-reset" onclick="doReset()">Update password</button>
      <div class="msg" id="msg-reset"></div>
    </div>
  </div>

  <script>
    // Check for token in URL
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');

    if (token) {
      document.getElementById('card-forgot').style.display = 'none';
      document.getElementById('card-reset').style.display  = 'block';
    }

    async function sendReset() {
      const email = document.getElementById('forgot-email').value.trim();
      const btn   = document.getElementById('btn-forgot');
      const msg   = document.getElementById('msg-forgot');
      if (!email) { msg.textContent = 'Please enter your email.'; msg.className = 'msg error'; return; }
      btn.disabled = true; btn.textContent = 'Sending...';
      msg.textContent = ''; msg.className = 'msg';
      try {
        const r = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const d = await r.json();
        if (r.ok) {
          msg.textContent = 'If this email exists, a reset link has been sent. Check your inbox.';
          msg.className = 'msg success';
          btn.textContent = 'Sent ✓';
        } else {
          msg.textContent = d.error || 'Something went wrong.';
          msg.className = 'msg error';
          btn.disabled = false; btn.textContent = 'Send reset link';
        }
      } catch(e) {
        msg.textContent = 'Network error. Please try again.';
        msg.className = 'msg error';
        btn.disabled = false; btn.textContent = 'Send reset link';
      }
    }

    async function doReset() {
      const pw  = document.getElementById('reset-pw').value;
      const pw2 = document.getElementById('reset-pw2').value;
      const btn = document.getElementById('btn-reset');
      const msg = document.getElementById('msg-reset');
      if (!pw || !pw2)     { msg.textContent = 'Please fill both fields.'; msg.className = 'msg error'; return; }
      if (pw !== pw2)      { msg.textContent = 'Passwords do not match.';  msg.className = 'msg error'; return; }
      if (pw.length < 6)   { msg.textContent = 'Password too short (6+ chars).'; msg.className = 'msg error'; return; }
      btn.disabled = true; btn.textContent = 'Updating...';
      msg.textContent = ''; msg.className = 'msg';
      try {
        const r = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: pw })
        });
        const d = await r.json();
        if (r.ok) {
          msg.textContent = 'Password updated! Redirecting to login...';
          msg.className = 'msg success';
          setTimeout(() => window.location.href = '/dashboard', 2000);
        } else {
          msg.textContent = d.error || 'Something went wrong.';
          msg.className = 'msg error';
          btn.disabled = false; btn.textContent = 'Update password';
        }
      } catch(e) {
        msg.textContent = 'Network error. Please try again.';
        msg.className = 'msg error';
        btn.disabled = false; btn.textContent = 'Update password';
      }
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (!token) sendReset(); else doReset();
    });
  </script>

  <script>
    (function() {
      const mCanvas = document.getElementById('milkyway-canvas');
      if (mCanvas) {
        const ctx = mCanvas.getContext('2d');
        let W, H, stars = [];
        function resizeM() {
          W = mCanvas.width = window.innerWidth; H = mCanvas.height = window.innerHeight;
          stars = Array.from({length: 220}, () => ({
            x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.4+0.2,
            a: Math.random()*0.7+0.15, speed: Math.random()*0.003+0.001, phase: Math.random()*Math.PI*2
          }));
        }
        function drawM(t) {
          ctx.clearRect(0,0,W,H);
          stars.forEach(s => {
            ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255,255,255,'+(s.a*(0.6+0.4*Math.sin(t*s.speed+s.phase)))+')';
            ctx.fill();
          });
          requestAnimationFrame(drawM);
        }
        resizeM(); window.addEventListener('resize', resizeM); requestAnimationFrame(drawM);
      }
      const sCanvas = document.getElementById('shooting-canvas');
      if (sCanvas) {
        const ctx2 = sCanvas.getContext('2d'); let W2, H2, shots = [];
        function resizeS() { W2 = sCanvas.width = window.innerWidth; H2 = sCanvas.height = window.innerHeight; }
        function newShot() { return { x: Math.random()*W2*0.7, y: Math.random()*H2*0.4, len: 80+Math.random()*120, speed: 6+Math.random()*8, angle: Math.PI/4+Math.random()*0.3, alpha: 0.8+Math.random()*0.2, life: 1 }; }
        function drawS() {
          ctx2.clearRect(0,0,W2,H2);
          if (Math.random()<0.012) shots.push(newShot());
          shots = shots.filter(s=>s.life>0);
          shots.forEach(s => {
            s.x += Math.cos(s.angle)*s.speed; s.y += Math.sin(s.angle)*s.speed; s.life -= 0.022;
            const grd = ctx2.createLinearGradient(s.x,s.y, s.x-Math.cos(s.angle)*s.len, s.y-Math.sin(s.angle)*s.len);
            grd.addColorStop(0, 'rgba(255,255,255,'+(s.alpha*s.life)+')'); grd.addColorStop(1, 'rgba(255,255,255,0)');
            ctx2.beginPath(); ctx2.moveTo(s.x,s.y); ctx2.lineTo(s.x-Math.cos(s.angle)*s.len, s.y-Math.sin(s.angle)*s.len);
            ctx2.strokeStyle = grd; ctx2.lineWidth = 1.5; ctx2.stroke();
          });
          requestAnimationFrame(drawS);
        }
        resizeS(); window.addEventListener('resize', resizeS); requestAnimationFrame(drawS);
      }
    })();
  </script>
</body>
</html>
