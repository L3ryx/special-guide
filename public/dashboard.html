<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finder Niche — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Croissant+One&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #22c55e; --red: #ef4444;
      --glass: rgba(0,0,0,0.55); --glass-border: rgba(255,255,255,0.12);
      --text: #ffffff; --muted: rgba(255,255,255,0.55);
    }
    html, body { min-height: 100%; font-family: 'Inter', sans-serif; color: var(--text); background: #0a0a0a; }

      25%  { transform: scale(1.1)  translate(-12px,-8px); }
      50%  { transform: scale(1.08) translate(8px,-14px); }
      75%  { transform: scale(1.1)  translate(-6px,10px); }
      100% { transform: scale(1.08) translate(10px,6px); }
    }
    
      50%  { transform: scale(1.1) translate(-8px,-10px); }
      100% { transform: scale(1.08) translate(8px,6px); }
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
    }
    .nav-brand { font-family: 'Croissant One', cursive; font-size: 0.95rem; color: rgba(255,255,255,0.7); text-decoration: none; letter-spacing: 0.02em; }
    .btn-logout {
      padding: 8px 18px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07); color: var(--muted); font-size: 0.82rem;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-logout:hover { background: rgba(255,80,80,0.15); border-color: rgba(255,80,80,0.4); color: #f87171; }

    /* ── AUTH GATE ── */
    #auth-gate {
      max-width: 420px; margin: 80px auto; padding: 40px;
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 20px; backdrop-filter: blur(20px); text-align: center;
      display: none;
    }
    .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; border-radius: 10px; overflow: hidden; border: 1px solid var(--glass-border); }
    .auth-tab {
      flex: 1; padding: 11px; background: transparent; border: none; color: var(--muted);
      font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .auth-tab.active { background: var(--green); color: #fff; }
    .auth-field {
      width: 100%; padding: 14px 16px; margin-bottom: 12px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border);
      border-radius: 10px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.95rem;
      outline: none; transition: border-color 0.2s;
    }
    .auth-field:focus { border-color: var(--green); }
    .auth-field::placeholder { color: var(--muted); }
    .btn-auth {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      background: var(--green); color: #fff; font-family: 'Inter', sans-serif;
      font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.2s; margin-top: 4px;
    }
    .btn-auth:hover { background: #16a34a; }
    .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-error { color: #f87171; font-size: 0.82rem; margin-top: 10px; min-height: 1.2em; }

    /* ── DASHBOARD ── */
    #dashboard { display: none; }
    .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px 80px; }
    h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; }

    /* ── SHOP LIST ── */
    .shops-list { display: flex; flex-direction: column; gap: 14px; }
    @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }

    .shop-row {
      display: flex; align-items: center; gap: 14px;
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 16px; padding: 12px 14px;
      backdrop-filter: blur(16px); animation: slideUp 0.4s ease;
    }

    /* Image produit à gauche */
    .shop-thumb {
      width: 70px; height: 70px; border-radius: 10px; object-fit: cover;
      border: 1px solid var(--glass-border); flex-shrink: 0;
    }
    .shop-thumb-placeholder {
      width: 70px; height: 70px; border-radius: 10px; flex-shrink: 0;
      background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: center; font-size: 1.6rem;
    }

    /* Logo + infos + actions à droite */
    .shop-row-right { flex: 1; min-width: 0; display: flex; gap: 10px; align-items: center; }
    .shop-row-logo {
      width: 38px; height: 38px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
      border: 2px solid rgba(241,100,30,0.5);
    }
    .shop-row-logo-initial {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      background: rgba(241,100,30,0.2); border: 2px solid rgba(241,100,30,0.4);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1rem; color: #fff;
    }
    .shop-row-info { flex: 1; min-width: 0; }
    .shop-row-name { font-weight: 700; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .shop-row-btns { display: flex; gap: 7px; margin-top: 7px; align-items: center; flex-wrap: wrap; }

    .btn-visit {
      padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(241,100,30,0.35);
      background: rgba(241,100,30,0.12); color: #fb923c;
      font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.75rem;
      text-decoration: none; transition: all 0.2s; white-space: nowrap;
    }
    .btn-visit:hover { background: rgba(241,100,30,0.25); border-color: rgba(241,100,30,0.6); }
    .btn-find {
      padding: 6px 12px; border-radius: 8px; border: none;
      background: var(--green); color: #fff;
      font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.75rem;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; white-space: nowrap;
      box-shadow: 0 2px 10px rgba(34,197,94,0.3);
    }
    .btn-find:hover { background: #16a34a; }
    .btn-find:disabled { opacity:1; cursor:not-allowed; }
    .btn-find.running { animation: findPulse 0.6s ease-in-out infinite; }
    @keyframes findPulse {
      0%,100% { background:#dc2626; box-shadow:0 2px 12px rgba(220,38,38,0.5); }
      50%     { background:#ff4444; box-shadow:0 0 20px rgba(255,50,50,0.9); }
    }
    .btn-delete {
      width: 26px; height: 26px; border-radius: 50%; border: 1px solid rgba(255,80,80,0.25);
      background: rgba(255,80,80,0.07); color: #f87171; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 0.8rem;
      transition: all 0.2s; flex-shrink: 0; margin-left: auto;
    }
    .btn-delete:hover { background: rgba(255,80,80,0.2); border-color: rgba(255,80,80,0.5); }

    .shop-find-area { padding: 0 14px 12px 98px; }
    .find-status { font-size: 0.74rem; color: var(--muted); min-height: 1.1em; }
    .find-results { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
    .find-result-item {
      display: flex; gap: 10px; align-items: center;
      background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
      border-radius: 10px; padding: 8px 10px;
    }
    .fri-img { width: 44px; height: 44px; border-radius: 7px; object-fit: cover; border: 1px solid var(--glass-border); flex-shrink: 0; }
    .fri-img-placeholder { width:44px; height:44px; border-radius:7px; background:rgba(255,255,255,0.06); flex-shrink:0; }
    .fri-info { flex: 1; min-width: 0; }
    .fri-title { font-size: 0.76rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fri-links { display: flex; gap: 5px; margin-top: 4px; }
    .fri-link { font-size: 0.66rem; padding: 2px 7px; border-radius: 5px; text-decoration: none; font-weight: 600; }
    .fri-link.etsy { background: rgba(241,100,30,0.15); color: #fb923c; border: 1px solid rgba(241,100,30,0.3); }
    .fri-link.ali  { background: rgba(227,24,55,0.15);  color: #f87171; border: 1px solid rgba(227,24,55,0.3); }
    .fri-score { font-size: 0.7rem; font-weight: 700; flex-shrink: 0; }
    .fri-score.high { color: var(--green); }
    .fri-score.mid  { color: #fbbf24; }
    .fri-score.low  { color: #f87171; }

    .empty-state { text-align:center; padding:60px 20px; color:var(--muted); font-size:0.9rem; }
    .empty-state .emoji { font-size:3rem; display:block; margin-bottom:12px; }


    /* ── ACCOUNT SECTION ── */
    .account-section {
      max-width: 680px; margin: 32px auto 0; padding: 0 20px 60px;
    }
    .account-card {
      background: rgba(0,0,0,0.55); border: 1px solid var(--glass-border);
      border-radius: 18px; padding: 0; margin-bottom: 12px;
      backdrop-filter: blur(16px); overflow: hidden;
    }
    .account-card-header {
      padding: 18px 20px; font-weight: 700; font-size: 0.8rem;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
      border-bottom: 1px solid var(--glass-border);
    }
    .account-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px 20px; gap: 12px; cursor: pointer;
      transition: background 0.2s; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .account-row:last-child { border-bottom: none; }
    .account-row:hover { background: rgba(255,255,255,0.04); }
    .account-row-left { display: flex; align-items: center; gap: 12px; }
    .account-row-icon { font-size: 1.1rem; width: 22px; text-align: center; }
    .account-row-label { font-size: 0.9rem; font-weight: 500; color: #fff; }
    .account-row-sub { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .account-row-arrow { color: var(--muted); font-size: 0.85rem; flex-shrink: 0; }
    .btn-finder-niche {
      width: 100%; padding: 15px; border-radius: 14px; border: none;
      background: #f1641e; color: #fff;
      font-family: 'Inter', sans-serif; font-weight: 800; font-size: 1rem;
      cursor: pointer; letter-spacing: 0.04em;
      box-shadow: 0 4px 20px rgba(241,100,30,0.45);
      transition: all 0.2s; margin-bottom: 12px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-finder-niche:hover { background: #d9511a; transform: translateY(-1px); box-shadow: 0 6px 26px rgba(241,100,30,0.6); }
    .btn-delete-account {
      width: 100%; padding: 13px; border-radius: 12px;
      border: 1px solid rgba(239,68,68,0.25); background: rgba(239,68,68,0.06);
      color: #f87171; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.88rem;
      cursor: pointer; transition: all 0.2s; margin-top: 8px;
    }
    .btn-delete-account:hover { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.5); }

    /* Inline sub-forms */
    .account-subform {
      display: none; padding: 0 20px 16px; border-top: 1px solid rgba(255,255,255,0.06);
    }
    .account-subform.active { display: block; }
    .account-subform-field {
      width: 100%; padding: 11px 14px; margin: 10px 0 6px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 9px; color: #fff; font-family: 'Inter', sans-serif; font-size: 0.88rem;
      outline: none; transition: border-color 0.2s; box-sizing: border-box;
    }
    .account-subform-field:focus { border-color: var(--green); }
    .account-subform-field::placeholder { color: rgba(255,255,255,0.25); }
    .account-subform-btn {
      width: 100%; padding: 11px; border: none; border-radius: 9px;
      background: var(--green); color: #fff; font-family: 'Inter', sans-serif;
      font-weight: 700; font-size: 0.87rem; cursor: pointer; transition: all 0.2s; margin-top: 4px;
    }
    .account-subform-btn:hover { background: #16a34a; }
    .account-subform-msg { font-size: 0.77rem; margin-top: 7px; min-height: 1em; }
    .account-subform-msg.ok  { color: var(--green); }
    .account-subform-msg.err { color: #f87171; }

    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      padding: 12px 20px; border-radius: 10px; font-size: 0.85rem; font-weight: 600;
      animation: toastIn 0.3s ease; pointer-events: none;
    }
    .toast.success { background: rgba(34,197,94,0.9); color:#fff; }
    .toast.error   { background: rgba(239,68,68,0.9);  color:#fff; }
    @keyframes toastIn { from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;} }

    @media (max-width: 600px) {
      .shop-row { flex-wrap: wrap; }
      .shop-row-actions { width: 100%; justify-content: flex-end; }
      .shop-find-area { padding-left: 16px; }
    }
    /* ── BACKGROUND ── */
    #bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background: #0a0a0a url('/background.png') center center / cover no-repeat;
      animation: bgDrift 18s ease-in-out infinite alternate;
      transform-origin: center;
    }
    @keyframes bgDrift {
      0%   { transform: scale(1.08) translate(0px,0px); }
      25%  { transform: scale(1.1)  translate(-12px,-8px); }
      50%  { transform: scale(1.08) translate(8px,-14px); }
      75%  { transform: scale(1.1)  translate(-6px,10px); }
      100% { transform: scale(1.08) translate(10px,6px); }
    }
    #bg-layer::after { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.55); }
    #milkyway-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    #shooting-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
  </style>
</head>
<body>
  <div id="bg-layer"></div>
  <canvas id="milkyway-canvas"></canvas>
  <canvas id="shooting-canvas"></canvas>

<nav>
  <a href="/" class="nav-brand" onclick="sessionStorage.setItem('skipIntro','1')">Dashboard</a>
  <div id="nav-actions" style="display:none;gap:10px;align-items:center;">
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<!-- AUTH GATE -->
<div id="auth-gate">
  <div class="auth-tabs">
    <button class="auth-tab active" id="tab-login"    onclick="switchTab('login')">Connecting</button>
    <button class="auth-tab"        id="tab-register" onclick="switchTab('register')">Register</button>
  </div>
  <input class="auth-field" id="auth-email"    type="email"    placeholder="Email" autocomplete="email" />
  <input class="auth-field" id="auth-password" type="password" placeholder="Password" autocomplete="current-password" />
  <button class="btn-auth" id="btn-auth-submit" onclick="submitAuth()">Login</button>
  <div class="auth-error" id="auth-error"></div>
  <a id="forgot-link" href="/reset-password" style="display:block;text-align:center;margin-top:12px;color:rgba(255,255,255,0.45);font-size:0.8rem;text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='rgba(255,255,255,0.8)'" onmouseout="this.style.color='rgba(255,255,255,0.45)'">Forgot password?</a>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <!-- ACCOUNT SECTION -->
  <div class="account-section">

    <!-- Finder Niche button -->
    <button class="btn-finder-niche" onclick="window.location.href='/finder'">
      🔍 Finder Niche
    </button>

    <!-- Account settings -->
    <div class="account-card">
      <div class="account-card-header">Account</div>

      <div class="account-row" onclick="toggleAccForm('form-pw')">
        <div class="account-row-left">
          <span class="account-row-icon">🔑</span>
          <div>
            <div class="account-row-label">Change password</div>
          </div>
        </div>
        <span class="account-row-arrow">›</span>
      </div>
      <div class="account-subform" id="form-pw">
        <input class="account-subform-field" id="acc-pw-current" type="password" placeholder="Current password" />
        <input class="account-subform-field" id="acc-pw-new"     type="password" placeholder="New password (6+ chars)" />
        <button class="account-subform-btn" onclick="accChangePassword()">Update password</button>
        <div class="account-subform-msg" id="msg-pw"></div>
      </div>

      <div class="account-row" onclick="toggleAccForm('form-email')">
        <div class="account-row-left">
          <span class="account-row-icon">✉️</span>
          <div>
            <div class="account-row-label">Change email address</div>
          </div>
        </div>
        <span class="account-row-arrow">›</span>
      </div>
      <div class="account-subform" id="form-email">
        <input class="account-subform-field" id="acc-email-new"  type="email"    placeholder="New email address" />
        <input class="account-subform-field" id="acc-email-pw"   type="password" placeholder="Confirm password" />
        <button class="account-subform-btn" onclick="accChangeEmail()">Update email</button>
        <div class="account-subform-msg" id="msg-email"></div>
      </div>
    </div>

    <!-- Billing -->
    <div class="account-card">
      <div class="account-card-header">Billing</div>

      <div class="account-row" onclick="toggleAccForm('form-billing')">
        <div class="account-row-left">
          <span class="account-row-icon">💳</span>
          <div>
            <div class="account-row-label">Payment information</div>
            <div class="account-row-sub">Manage your payment method</div>
          </div>
        </div>
        <span class="account-row-arrow">›</span>
      </div>
      <div class="account-subform" id="form-billing">
        <div style="color:var(--muted);font-size:0.82rem;padding:10px 0;">Payment integration coming soon.</div>
      </div>

      <div class="account-row" onclick="toggleAccForm('form-history')">
        <div class="account-row-left">
          <span class="account-row-icon">🧾</span>
          <div>
            <div class="account-row-label">Billing history</div>
            <div class="account-row-sub">View past transactions</div>
          </div>
        </div>
        <span class="account-row-arrow">›</span>
      </div>
      <div class="account-subform" id="form-history">
        <div style="color:var(--muted);font-size:0.82rem;padding:10px 0;">No transactions yet.</div>
      </div>
    </div>

    <!-- Delete account -->
    <button class="btn-delete-account" onclick="toggleAccForm('form-delete')">🗑 Delete my account</button>
    <div class="account-subform" id="form-delete" style="background:rgba(239,68,68,0.04);border:1px solid rgba(239,68,68,0.15);border-radius:12px;padding:16px;margin-top:0;">
      <input class="account-subform-field" id="acc-del-pw" type="password" placeholder="Confirm your password" />
      <button class="account-subform-btn" style="background:#ef4444;" onclick="accDeleteAccount()">Permanently delete account</button>
      <div class="account-subform-msg" id="msg-delete"></div>
    </div>

  </div>
</div>

    </div>
  </div>
</div>

<script>
  let TOKEN = localStorage.getItem('scout_token') || null;
  let currentTab = 'login';

  window.addEventListener('DOMContentLoaded', async () => {
    if (TOKEN) {
      const ok = await verifyToken();
      if (ok) return showDashboard();
    }
    showAuthGate();
  });

  async function verifyToken() {
    try {
      const r = await apiFetch('/api/auth/me');
      if (!r.ok) { TOKEN = null; localStorage.removeItem('scout_token'); return false; }
      return true;
    } catch { return false; }
  }

  function showAuthGate() {
    document.getElementById('auth-gate').style.display = 'block';
    document.getElementById('dashboard').style.display = 'none';
  }

  async function showDashboard() {
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('nav-actions').style.display = 'flex';
  }

  // ── AUTH ──
  function switchTab(tab) {
    const forgotLink = document.getElementById('forgot-link');
    currentTab = tab;
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    if (forgotLink) forgotLink.style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('btn-auth-submit').textContent = tab === 'login' ? 'Login' : "Register";
    document.getElementById('auth-error').textContent = '';
  }

  async function submitAuth() {
    const email    = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    const errEl    = document.getElementById('auth-error');
    const btn      = document.getElementById('btn-auth-submit');
    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = 'Please fill in all fields'; return; }
    btn.disabled = true; btn.textContent = '...';
    try {
      const r = await fetch(currentTab === 'login' ? '/api/auth/login' : '/api/auth/register', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await r.json();
      if (!r.ok) { errEl.textContent = data.error || 'Erreur'; return; }
      TOKEN = data.token;
      localStorage.setItem('scout_token', TOKEN);
      showDashboard();
    } catch (e) {
      errEl.textContent = e.message;
    } finally {
      btn.disabled = false;
      btn.textContent = currentTab === 'login' ? 'Login' : "Register";
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('auth-gate').style.display !== 'none') submitAuth();
  });

  function logout() {
    TOKEN = null; localStorage.removeItem('scout_token');
    document.getElementById('nav-actions').style.display = 'none';
    showAuthGate();
  }

  function apiFetch(url, opts = {}) {
    opts.headers = opts.headers || {};
    if (TOKEN) opts.headers['Authorization'] = 'Bearer ' + TOKEN;
    return fetch(url, opts);
  }


  // ── ACCOUNT FORMS ──
  function toggleAccForm(id) {
    const el = document.getElementById(id);
    const isOpen = el.classList.contains('active');
    document.querySelectorAll('.account-subform').forEach(f => f.classList.remove('active'));
    if (!isOpen) el.classList.add('active');
  }

  async function accChangePassword() {
    const current = document.getElementById('acc-pw-current').value;
    const newPw   = document.getElementById('acc-pw-new').value;
    const msg     = document.getElementById('msg-pw');
    msg.textContent = ''; msg.className = 'account-subform-msg';
    if (!current || !newPw) { msg.textContent = 'Fill in both fields'; msg.classList.add('err'); return; }
    if (newPw.length < 6)   { msg.textContent = 'Password too short (6+ chars)'; msg.classList.add('err'); return; }
    try {
      const r = await apiFetch('/api/auth/change-password', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ currentPassword: current, newPassword: newPw }) });
      const d = await r.json();
      if (r.ok) { msg.textContent = 'Password updated ✅'; msg.classList.add('ok'); document.getElementById('acc-pw-current').value=''; document.getElementById('acc-pw-new').value=''; }
      else      { msg.textContent = d.error || 'Error'; msg.classList.add('err'); }
    } catch(e) { msg.textContent = 'Network error'; msg.classList.add('err'); }
  }

  async function accChangeEmail() {
    const newEmail = document.getElementById('acc-email-new').value.trim();
    const pw       = document.getElementById('acc-email-pw').value;
    const msg      = document.getElementById('msg-email');
    msg.textContent = ''; msg.className = 'account-subform-msg';
    if (!newEmail || !pw) { msg.textContent = 'Fill in both fields'; msg.classList.add('err'); return; }
    try {
      const r = await apiFetch('/api/auth/change-email', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ newEmail, password: pw }) });
      const d = await r.json();
      if (r.ok) { msg.textContent = 'Email updated ✅'; msg.classList.add('ok'); document.getElementById('acc-email-new').value=''; document.getElementById('acc-email-pw').value=''; }
      else      { msg.textContent = d.error || 'Error'; msg.classList.add('err'); }
    } catch(e) { msg.textContent = 'Network error'; msg.classList.add('err'); }
  }

  async function accDeleteAccount() {
    const pw  = document.getElementById('acc-del-pw').value;
    const msg = document.getElementById('msg-delete');
    msg.textContent = ''; msg.className = 'account-subform-msg';
    if (!pw) { msg.textContent = 'Enter your password to confirm'; msg.classList.add('err'); return; }
    if (!confirm('This will permanently delete your account and all saved shops. Continue?')) return;
    try {
      const r = await apiFetch('/api/auth/delete-account', { method:'DELETE', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ password: pw }) });
      const d = await r.json();
      if (r.ok) { localStorage.removeItem('scout_token'); window.location.href = '/'; }
      else      { msg.textContent = d.error || 'Error'; msg.classList.add('err'); }
    } catch(e) { msg.textContent = 'Network error'; msg.classList.add('err'); }
  }
</script>
  
  <script>
    (function() {
      // MILKY WAY
      const mCanvas = document.getElementById('milkyway-canvas');
      if (mCanvas) {
        const ctx = mCanvas.getContext('2d');
        let W, H, stars = [];
        function resizeM() {
          W = mCanvas.width = window.innerWidth;
          H = mCanvas.height = window.innerHeight;
          stars = Array.from({length: 220}, () => ({
            x: Math.random()*W, y: Math.random()*H,
            r: Math.random()*1.4+0.2,
            a: Math.random()*0.7+0.15,
            speed: Math.random()*0.003+0.001,
            phase: Math.random()*Math.PI*2
          }));
        }
        function drawM(t) {
          ctx.clearRect(0,0,W,H);
          stars.forEach(s => {
            const alpha = s.a*(0.6+0.4*Math.sin(t*s.speed+s.phase));
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255,255,255,'+alpha+')';
            ctx.fill();
          });
          requestAnimationFrame(drawM);
        }
        resizeM();
        window.addEventListener('resize', resizeM);
        requestAnimationFrame(drawM);
      }

      // SHOOTING STARS
      const sCanvas = document.getElementById('shooting-canvas');
      if (sCanvas) {
        const ctx2 = sCanvas.getContext('2d');
        let W2, H2, shots = [];
        function resizeS() { W2 = sCanvas.width = window.innerWidth; H2 = sCanvas.height = window.innerHeight; }
        function newShot() {
          return { x: Math.random()*W2*0.7, y: Math.random()*H2*0.4,
            len: 80+Math.random()*120, speed: 6+Math.random()*8,
            angle: Math.PI/4+Math.random()*0.3,
            alpha: 0.8+Math.random()*0.2, life: 1 };
        }
        function drawS() {
          ctx2.clearRect(0,0,W2,H2);
          if (Math.random()<0.012) shots.push(newShot());
          shots = shots.filter(s=>s.life>0);
          shots.forEach(s => {
            s.x += Math.cos(s.angle)*s.speed;
            s.y += Math.sin(s.angle)*s.speed;
            s.life -= 0.022;
            const grd = ctx2.createLinearGradient(s.x,s.y, s.x-Math.cos(s.angle)*s.len, s.y-Math.sin(s.angle)*s.len);
            grd.addColorStop(0, 'rgba(255,255,255,'+(s.alpha*s.life)+')');
            grd.addColorStop(1, 'rgba(255,255,255,0)');
            ctx2.beginPath();
            ctx2.moveTo(s.x,s.y);
            ctx2.lineTo(s.x-Math.cos(s.angle)*s.len, s.y-Math.sin(s.angle)*s.len);
            ctx2.strokeStyle = grd; ctx2.lineWidth = 1.5; ctx2.stroke();
          });
          requestAnimationFrame(drawS);
        }
        resizeS();
        window.addEventListener('resize', resizeS);
        requestAnimationFrame(drawS);
      }
    })();
  </script>
