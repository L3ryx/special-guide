<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finder Niche — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Croissant+One&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #22c55e; --red: #ef4444;
      --glass: rgba(0,0,0,0.55); --glass-border: rgba(255,255,255,0.12);
      --text: #ffffff; --muted: rgba(255,255,255,0.55);
    }
    html, body { min-height: 100%; font-family: 'Inter', sans-serif; color: var(--text); background: #0a0a0a; }
    #bg-layer {
      position: fixed; inset: 0; z-index: -1;
      background: #0a0a0a url('/background.png') center/cover no-repeat;
      animation: bgDrift 18s ease-in-out infinite alternate;
    }
    #bg-layer::after { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.6); }
    @keyframes bgDrift {
      0%   { transform: scale(1.08) translate(0,0); }
      50%  { transform: scale(1.1) translate(-8px,-10px); }
      100% { transform: scale(1.08) translate(8px,6px); }
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
    }
    .nav-brand { font-family: 'Croissant One', cursive; font-size: 1.5rem; color: #fff; text-decoration: none; }
    .btn-logout {
      padding: 8px 18px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07); color: var(--muted); font-size: 0.82rem;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-logout:hover { background: rgba(255,80,80,0.15); border-color: rgba(255,80,80,0.4); color: #f87171; }

    /* ── AUTH GATE ── */
    #auth-gate {
      max-width: 420px; margin: 80px auto; padding: 40px;
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 20px; backdrop-filter: blur(20px); text-align: center;
      display: none;
    }
    .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; border-radius: 10px; overflow: hidden; border: 1px solid var(--glass-border); }
    .auth-tab {
      flex: 1; padding: 11px; background: transparent; border: none; color: var(--muted);
      font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .auth-tab.active { background: var(--green); color: #fff; }
    .auth-field {
      width: 100%; padding: 14px 16px; margin-bottom: 12px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border);
      border-radius: 10px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.95rem;
      outline: none; transition: border-color 0.2s;
    }
    .auth-field:focus { border-color: var(--green); }
    .auth-field::placeholder { color: var(--muted); }
    .btn-auth {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      background: var(--green); color: #fff; font-family: 'Inter', sans-serif;
      font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.2s; margin-top: 4px;
    }
    .btn-auth:hover { background: #16a34a; }
    .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-error { color: #f87171; font-size: 0.82rem; margin-top: 10px; min-height: 1.2em; }

    /* ── DASHBOARD ── */
    #dashboard { display: none; }
    .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px 80px; }
    h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; }

    /* ── SHOP LIST ── */
    .shops-list { display: flex; flex-direction: column; gap: 14px; }
    @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }

    .shop-row {
      display: flex; align-items: center; gap: 14px;
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 16px; padding: 12px 14px;
      backdrop-filter: blur(16px); animation: slideUp 0.4s ease;
    }

    /* Image produit à gauche */
    .shop-thumb {
      width: 70px; height: 70px; border-radius: 10px; object-fit: cover;
      border: 1px solid var(--glass-border); flex-shrink: 0;
    }
    .shop-thumb-placeholder {
      width: 70px; height: 70px; border-radius: 10px; flex-shrink: 0;
      background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: center; font-size: 1.6rem;
    }

    /* Logo + infos + actions à droite */
    .shop-row-right { flex: 1; min-width: 0; display: flex; gap: 10px; align-items: center; }
    .shop-row-logo {
      width: 38px; height: 38px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
      border: 2px solid rgba(241,100,30,0.5);
    }
    .shop-row-logo-initial {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      background: rgba(241,100,30,0.2); border: 2px solid rgba(241,100,30,0.4);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1rem; color: #fff;
    }
    .shop-row-info { flex: 1; min-width: 0; }
    .shop-row-name { font-weight: 700; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .shop-row-btns { display: flex; gap: 7px; margin-top: 7px; align-items: center; flex-wrap: wrap; }

    .btn-visit {
      padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(241,100,30,0.35);
      background: rgba(241,100,30,0.12); color: #fb923c;
      font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.75rem;
      text-decoration: none; transition: all 0.2s; white-space: nowrap;
    }
    .btn-visit:hover { background: rgba(241,100,30,0.25); border-color: rgba(241,100,30,0.6); }
    .btn-find {
      padding: 6px 12px; border-radius: 8px; border: none;
      background: var(--green); color: #fff;
      font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.75rem;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; white-space: nowrap;
      box-shadow: 0 2px 10px rgba(34,197,94,0.3);
    }
    .btn-find:hover { background: #16a34a; }
    .btn-find:disabled { opacity:1; cursor:not-allowed; }
    .btn-find.running { animation: findPulse 0.6s ease-in-out infinite; }
    @keyframes findPulse {
      0%,100% { background:#dc2626; box-shadow:0 2px 12px rgba(220,38,38,0.5); }
      50%     { background:#ff4444; box-shadow:0 0 20px rgba(255,50,50,0.9); }
    }
    .btn-delete {
      width: 26px; height: 26px; border-radius: 50%; border: 1px solid rgba(255,80,80,0.25);
      background: rgba(255,80,80,0.07); color: #f87171; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 0.8rem;
      transition: all 0.2s; flex-shrink: 0; margin-left: auto;
    }
    .btn-delete:hover { background: rgba(255,80,80,0.2); border-color: rgba(255,80,80,0.5); }

    .shop-find-area { padding: 0 14px 12px 98px; }
    .find-status { font-size: 0.74rem; color: var(--muted); min-height: 1.1em; }
    .find-results { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
    .find-result-item {
      display: flex; gap: 10px; align-items: center;
      background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
      border-radius: 10px; padding: 8px 10px;
    }
    .fri-img { width: 44px; height: 44px; border-radius: 7px; object-fit: cover; border: 1px solid var(--glass-border); flex-shrink: 0; }
    .fri-img-placeholder { width:44px; height:44px; border-radius:7px; background:rgba(255,255,255,0.06); flex-shrink:0; }
    .fri-info { flex: 1; min-width: 0; }
    .fri-title { font-size: 0.76rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fri-links { display: flex; gap: 5px; margin-top: 4px; }
    .fri-link { font-size: 0.66rem; padding: 2px 7px; border-radius: 5px; text-decoration: none; font-weight: 600; }
    .fri-link.etsy { background: rgba(241,100,30,0.15); color: #fb923c; border: 1px solid rgba(241,100,30,0.3); }
    .fri-link.ali  { background: rgba(227,24,55,0.15);  color: #f87171; border: 1px solid rgba(227,24,55,0.3); }
    .fri-score { font-size: 0.7rem; font-weight: 700; flex-shrink: 0; }
    .fri-score.high { color: var(--green); }
    .fri-score.mid  { color: #fbbf24; }
    .fri-score.low  { color: #f87171; }

    .empty-state { text-align:center; padding:60px 20px; color:var(--muted); font-size:0.9rem; }
    .empty-state .emoji { font-size:3rem; display:block; margin-bottom:12px; }

    /* ── SETTINGS MODAL ── */
    #settings-overlay {
      position: fixed; inset: 0; z-index: 3000;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center;
    }
    #settings-modal {
      width: 100%; max-width: 340px; margin: 20px;
      background: rgba(12,12,12,0.95); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px; padding: 28px 24px 22px;
      backdrop-filter: blur(20px); box-shadow: 0 16px 60px rgba(0,0,0,0.6);
      animation: modalUp 0.3s ease;
    }
    @keyframes modalUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
    #settings-modal h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; color: #fff; }
    .settings-btn {
      width: 100%; padding: 13px 16px; border-radius: 10px; border: none;
      font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.92rem;
      cursor: pointer; transition: all 0.2s; text-align: left; margin-bottom: 10px;
      display: flex; align-items: center; gap: 10px;
    }
    .settings-btn.change-pw {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); color: #fff;
    }
    .settings-btn.change-pw:hover { background: rgba(255,255,255,0.13); }
    .settings-btn.delete-acc {
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); color: #f87171;
    }
    .settings-btn.delete-acc:hover { background: rgba(239,68,68,0.18); border-color: rgba(239,68,68,0.5); }
    .settings-close {
      position: absolute; top: 14px; right: 14px;
      width: 28px; height: 28px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.5);
      cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; justify-content: center;
    }
    .settings-close:hover { background: rgba(255,255,255,0.15); color: #fff; }
    #settings-modal { position: relative; }

    /* sub-form inside settings */
    .settings-subform { display: none; margin-top: 14px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 14px; }
    .settings-subform.active { display: block; }
    .settings-field {
      width: 100%; padding: 11px 14px; margin-bottom: 9px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 9px; color: #fff; font-family: 'Inter', sans-serif; font-size: 0.88rem;
      outline: none; transition: border-color 0.2s; box-sizing: border-box;
    }
    .settings-field:focus { border-color: var(--green); }
    .settings-field::placeholder { color: rgba(255,255,255,0.25); }
    .settings-confirm {
      width: 100%; padding: 11px; border: none; border-radius: 9px;
      background: var(--green); color: #fff; font-family: 'Inter', sans-serif;
      font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: all 0.2s;
    }
    .settings-confirm:hover { background: #16a34a; }
    .settings-msg { font-size: 0.78rem; margin-top: 8px; min-height: 1em; text-align: center; }
    .settings-msg.ok  { color: var(--green); }
    .settings-msg.err { color: #f87171; }

    .btn-settings {
      width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.6);
      cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .btn-settings:hover { background: rgba(255,255,255,0.15); color: #fff; }

    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      padding: 12px 20px; border-radius: 10px; font-size: 0.85rem; font-weight: 600;
      animation: toastIn 0.3s ease; pointer-events: none;
    }
    .toast.success { background: rgba(34,197,94,0.9); color:#fff; }
    .toast.error   { background: rgba(239,68,68,0.9);  color:#fff; }
    @keyframes toastIn { from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;} }

    @media (max-width: 600px) {
      .shop-row { flex-wrap: wrap; }
      .shop-row-actions { width: 100%; justify-content: flex-end; }
      .shop-find-area { padding-left: 16px; }
    }
  </style>
</head>
<body>
<div id="bg-layer"></div>

<nav>
  <a href="/" class="nav-brand" onclick="sessionStorage.setItem('skipIntro','1')">Dashboard</a>
  <div id="nav-actions" style="display:none;gap:10px;align-items:center;">
    <a href="/" style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);font-size:1rem;text-decoration:none;transition:all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.15)'" onmouseout="this.style.background='rgba(255,255,255,0.07)'">🏠</a>
    <button class="btn-settings" onclick="openSettings()" title="Settings">⚙</button>
    <button class="btn-logout" onclick="logout()">Logout</button>
    <a href="/" style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);font-size:1.1rem;text-decoration:none;transition:all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.15)'" onmouseout="this.style.background='rgba(255,255,255,0.07)'">✕</a>
  </div>
</nav>

<!-- AUTH GATE -->
<div id="auth-gate">
  <div class="auth-tabs">
    <button class="auth-tab active" id="tab-login"    onclick="switchTab('login')">Connecting</button>
    <button class="auth-tab"        id="tab-register" onclick="switchTab('register')">Register</button>
  </div>
  <input class="auth-field" id="auth-email"    type="email"    placeholder="Email" autocomplete="email" />
  <input class="auth-field" id="auth-password" type="password" placeholder="Password" autocomplete="current-password" />
  <button class="btn-auth" id="btn-auth-submit" onclick="submitAuth()">Login</button>
  <div class="auth-error" id="auth-error"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="container">
    <h1>My Shops</h1>
    <p class="subtitle" id="dash-subtitle">Loading...</p>
    <div class="shops-list" id="shops-list"></div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div id="settings-overlay" onclick="if(event.target===this)closeSettings()">
  <div id="settings-modal">
    <button class="settings-close" onclick="closeSettings()">✕</button>
    <h3>⚙ Settings</h3>

    <button class="settings-btn change-pw" onclick="toggleSubform('pw-form')">🔑 Change password</button>
    <div class="settings-subform" id="pw-form">
      <input class="settings-field" id="pw-current" type="password" placeholder="Current password" />
      <input class="settings-field" id="pw-new"     type="password" placeholder="New password (6+ chars)" />
      <button class="settings-confirm" onclick="changePassword()">Update password</button>
      <div class="settings-msg" id="pw-msg"></div>
    </div>

    <button class="settings-btn delete-acc" onclick="toggleSubform('del-form')">🗑 Delete my account</button>
    <div class="settings-subform" id="del-form">
      <input class="settings-field" id="del-pw" type="password" placeholder="Confirm your password" />
      <button class="settings-confirm" style="background:#ef4444;" onclick="deleteAccount()">Permanently delete account</button>
      <div class="settings-msg" id="del-msg"></div>
    </div>
  </div>
</div>

<script>
  let TOKEN = localStorage.getItem('scout_token') || null;
  let currentTab = 'login';

  window.addEventListener('DOMContentLoaded', async () => {
    if (TOKEN) {
      const ok = await verifyToken();
      if (ok) return showDashboard();
    }
    showAuthGate();
  });

  async function verifyToken() {
    try {
      const r = await apiFetch('/api/auth/me');
      if (!r.ok) { TOKEN = null; localStorage.removeItem('scout_token'); return false; }
      return true;
    } catch { return false; }
  }

  function showAuthGate() {
    document.getElementById('auth-gate').style.display = 'block';
    document.getElementById('dashboard').style.display = 'none';
  }

  async function showDashboard() {
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('nav-actions').style.display = 'flex';
    document.getElementById('shops-list').innerHTML = '';
    await loadShops();
  }

  // ── AUTH ──
  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('btn-auth-submit').textContent = tab === 'login' ? 'Login' : "Register";
    document.getElementById('auth-error').textContent = '';
  }

  async function submitAuth() {
    const email    = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    const errEl    = document.getElementById('auth-error');
    const btn      = document.getElementById('btn-auth-submit');
    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = 'Please fill in all fields'; return; }
    btn.disabled = true; btn.textContent = '...';
    try {
      const r = await fetch(currentTab === 'login' ? '/api/auth/login' : '/api/auth/register', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await r.json();
      if (!r.ok) { errEl.textContent = data.error || 'Erreur'; return; }
      TOKEN = data.token;
      localStorage.setItem('scout_token', TOKEN);
      showDashboard();
    } catch (e) {
      errEl.textContent = e.message;
    } finally {
      btn.disabled = false;
      btn.textContent = currentTab === 'login' ? 'Login' : "Register";
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('auth-gate').style.display !== 'none') submitAuth();
  });

  function logout() {
    TOKEN = null; localStorage.removeItem('scout_token');
    document.getElementById('nav-actions').style.display = 'none';
    showAuthGate();
  }

  function apiFetch(url, opts = {}) {
    opts.headers = opts.headers || {};
    if (TOKEN) opts.headers['Authorization'] = 'Bearer ' + TOKEN;
    return fetch(url, opts);
  }

  // ── LOAD SHOPS ──
  async function loadShops() {
    const list = document.getElementById('shops-list');
    const sub  = document.getElementById('dash-subtitle');
    list.innerHTML = '<div class="empty-state"><span class="emoji">⏳</span>Loading...</div>';
    try {
      const r     = await apiFetch('/api/shops');
      const shops = await r.json();
      sub.textContent = shops.length + ' saved shop(s)';
      if (!shops.length) {
        list.innerHTML = '<div class="empty-state"><span class="emoji">🏪</span>No saved shops yet.<br>Run a search and click ♥ to add one.</div>';
        return;
      }
      list.innerHTML = '';
      shops.forEach(shop => {
        const row = buildShopRow(shop);
        list.appendChild(row);
      });
    } catch (e) {
      list.innerHTML = '<div class="empty-state"><span class="emoji">❌</span>' + e.message + '</div>';
    }
  }

  function buildShopRow(shop) {
    const wrap = document.createElement('div');

    // Image : dernier résultat find ou avatar ou placeholder
    const imgSrc = shop.lastFind?.results?.[0]?.etsyImage || shop.shopAvatar || null;
    const imgHtml = imgSrc
      ? `<img class="shop-thumb" src="${imgSrc}" alt="" onerror="this.src=''; this.className='shop-thumb-placeholder'; this.textContent='🏪'" loading="lazy" />`
      : `<div class="shop-thumb-placeholder">🏪</div>`;

    const lastRunStr = shop.lastFind?.runAt
      ? 'Analyzed on ' + new Date(shop.lastFind.runAt).toLocaleDateString('fr-FR')
      : '';

    const hasResults = shop.lastFind?.results?.length > 0;

    wrap.innerHTML = `
      <div class="shop-row" id="shop-row-${shop._id}">
        ${imgHtml}
        <div class="shop-row-info">
          <div class="shop-row-name">${shop.shopName || shop.shopUrl?.split('/')[4] || 'Shop'}</div>
          <div class="shop-row-sub">${lastRunStr}</div>
        </div>
        <div class="shop-row-actions">
          <a class="btn-visit" href="${shop.shopUrl}" target="_blank" rel="noopener">Visit shop ↗</a>
          <button class="btn-find" id="find-btn-${shop._id}" onclick="runFind('${shop._id}')">FIND</button>
          <button class="btn-delete" onclick="deleteShop('${shop._id}')" title="Delete">✕</button>
        </div>
      </div>
      <div class="shop-find-area" id="find-area-${shop._id}">
        <div class="find-status" id="find-status-${shop._id}"></div>
        <div class="find-results" id="find-results-${shop._id}">
          ${hasResults ? renderFindResults(shop.lastFind.results) : ''}
        </div>
      </div>`;
    return wrap;
  }

  function renderFindResults(results) {
    if (!results?.length) return '';
    return results.slice(0, 8).map(r => {
      const score = r.similarity || 0;
      const cls   = score >= 75 ? 'high' : score >= 50 ? 'mid' : 'low';
      return `
        <div class="find-result-item">
          ${r.etsyImage
            ? `<img class="fri-img" src="${r.etsyImage}" alt="" onerror="this.style.display='none'" loading="lazy" />`
            : `<div class="fri-img-placeholder"></div>`}
          <div class="fri-info">
            <div class="fri-title">${r.etsyTitle || '—'}</div>
            <div class="fri-links">
              <a class="fri-link etsy" href="${r.etsyUrl}" target="_blank" rel="noopener">Etsy ↗</a>
              ${r.aliUrl ? `<a class="fri-link ali" href="${r.aliUrl}" target="_blank" rel="noopener">AliExpress ↗</a>` : ''}
            </div>
          </div>
          <div class="fri-score ${cls}">${score}%</div>
        </div>`;
    }).join('');
  }

  // ── DELETE ──
  async function deleteShop(id) {
    if (!confirm('Delete cette boutique ?')) return;
    await apiFetch('/api/shops/' + id, { method: 'DELETE' });
    const row = document.getElementById('shop-row-' + id)?.closest('div');
    if (row) row.remove();
    showToast('Shop deleted', 'success');
    const n = document.querySelectorAll('.shop-row').length;
    document.getElementById('dash-subtitle').textContent = n + ' saved shop(s)';
    if (!n) loadShops();
  }

  // ── FIND ──
  async function runFind(shopId) {
    const btn    = document.getElementById('find-btn-' + shopId);
    const status = document.getElementById('find-status-' + shopId);
    const resDiv = document.getElementById('find-results-' + shopId);
    btn.disabled = true; btn.classList.add('running'); btn.textContent = '...';
    status.textContent = 'Connecting...';
    resDiv.innerHTML = '';
    try {
      const response = await apiFetch('/api/shops/' + shopId + '/find', { method: 'POST' });
      const reader   = response.body.getReader();
      const decoder  = new TextDecoder();
      let buf = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n'); buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const ev = JSON.parse(line.slice(6));
            if (ev.step === 'scraping' || ev.step === 'searching') {
              status.textContent = ev.message;
            } else if (ev.step === 'match') {
              resDiv.innerHTML += renderFindResults([ev.result]);
            } else if (ev.step === 'complete') {
              status.textContent = '✅ ' + ev.results.length + ' match(es)';
              resDiv.innerHTML = renderFindResults(ev.results);
              showToast('Analyse terminée !', 'success');
            } else if (ev.step === 'error') {
              status.textContent = '❌ ' + ev.message;
            }
          } catch(e) {}
        }
      }
    } catch (e) {
      status.textContent = '❌ ' + e.message;
    } finally {
      btn.disabled = false; btn.classList.remove('running'); btn.textContent = 'FIND';
    }
  }

  function showToast(msg, type = 'success') {
    const t = document.createElement('div');
    t.className = 'toast ' + type; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // ── SETTINGS ──
  function openSettings() {
    document.getElementById('settings-overlay').style.display = 'flex';
    // reset subforms
    document.getElementById('pw-form').classList.remove('active');
    document.getElementById('del-form').classList.remove('active');
    document.getElementById('pw-msg').textContent = '';
    document.getElementById('del-msg').textContent = '';
  }
  function closeSettings() {
    document.getElementById('settings-overlay').style.display = 'none';
  }
  function toggleSubform(id) {
    const el = document.getElementById(id);
    const isOpen = el.classList.contains('active');
    document.querySelectorAll('.settings-subform').forEach(s => s.classList.remove('active'));
    if (!isOpen) el.classList.add('active');
  }

  async function changePassword() {
    const current = document.getElementById('pw-current').value;
    const newPw   = document.getElementById('pw-new').value;
    const msg     = document.getElementById('pw-msg');
    msg.textContent = ''; msg.className = 'settings-msg';
    if (!current || !newPw) { msg.textContent = 'Fill in both fields'; msg.classList.add('err'); return; }
    if (newPw.length < 6)   { msg.textContent = 'Password too short (6+ chars)'; msg.classList.add('err'); return; }
    try {
      const r = await apiFetch('/api/auth/change-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ currentPassword: current, newPassword: newPw })
      });
      const data = await r.json();
      if (r.ok) { msg.textContent = 'Password updated ✅'; msg.classList.add('ok'); document.getElementById('pw-current').value=''; document.getElementById('pw-new').value=''; }
      else      { msg.textContent = data.error || 'Error'; msg.classList.add('err'); }
    } catch(e) { msg.textContent = 'Network error'; msg.classList.add('err'); }
  }

  async function deleteAccount() {
    const pw  = document.getElementById('del-pw').value;
    const msg = document.getElementById('del-msg');
    msg.textContent = ''; msg.className = 'settings-msg';
    if (!pw) { msg.textContent = 'Enter your password to confirm'; msg.classList.add('err'); return; }
    if (!confirm('This will permanently delete your account and all saved shops. Continue?')) return;
    try {
      const r = await apiFetch('/api/auth/delete-account', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      });
      const data = await r.json();
      if (r.ok) { localStorage.removeItem('scout_token'); window.location.href = '/'; }
      else      { msg.textContent = data.error || 'Error'; msg.classList.add('err'); }
    } catch(e) { msg.textContent = 'Network error'; msg.classList.add('err'); }
  }
</script>
