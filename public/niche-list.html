<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Niche List</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Croissant+One&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #22c55e; --orange: #f1641e;
      --glass: rgba(0,0,0,0.55); --glass-border: rgba(255,255,255,0.12);
      --text: #ffffff; --muted: rgba(255,255,255,0.55);
    }
    #bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background: #0a0a0a url('/background.png') center center / cover no-repeat;
      animation: bgDrift 18s ease-in-out infinite alternate;
      transform-origin: center;
    }
    @keyframes bgDrift {
      0%   { transform: scale(1.08) translate(0px,0px); }
      25%  { transform: scale(1.1)  translate(-12px,-8px); }
      50%  { transform: scale(1.08) translate(8px,-14px); }
      75%  { transform: scale(1.1)  translate(-6px,10px); }
      100% { transform: scale(1.08) translate(10px,6px); }
    }
    #bg-layer::after { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.55); }
    #milkyway-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    html, body { min-height: 100%; font-family: 'Inter', sans-serif; color: var(--text); background: #0a0a0a; }

    nav {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .btn-back {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 9px; border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.7);
      font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.8rem;
      text-decoration: none; transition: all 0.2s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.13); color: #fff; }
    .nav-title { font-family: 'Croissant One', cursive; font-size: 1rem; color: rgba(255,255,255,0.7); }

    .container { max-width: 680px; margin: 0 auto; padding: 28px 20px 60px; position: relative; z-index: 10; }
    h1 { font-size: 1.4rem; font-weight: 800; margin-bottom: 6px; }

    .shops-list { display: flex; flex-direction: column; gap: 16px; }
    @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

    /* ── ANIMATED GLOW BORDER ── */
    @property --glow-angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
    @keyframes glow-spin { to { --glow-angle: 360deg; } }
    @keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }

    .shop-row-wrapper {
      position: relative; border-radius: 18px; padding: 2px;
      background: conic-gradient(from var(--glow-angle, 0deg),
        #f1641e 0%, #ff00cc 20%, #7b2fff 40%, #00cfff 60%, #00ff88 80%, #f1641e 100%);
      animation: slideUp 0.4s ease, glow-spin 4s linear infinite;
      box-shadow: 0 0 16px rgba(241,100,30,0.3), 0 0 40px rgba(120,80,255,0.15);
    }
    .shop-row {
      display: grid;
      grid-template-columns: 64px 1fr auto;
      grid-template-rows: auto auto;
      gap: 0;
      background: rgba(8,8,16,0.93);
      border-radius: 16px;
      padding: 14px 14px 14px 14px;
      backdrop-filter: blur(20px);
      align-items: center;
      min-height: 88px;
    }
    /* Avatar — colonne gauche, 2 lignes */
    .shop-avatar-cell {
      grid-column: 1; grid-row: 1 / 3;
      display: flex; align-items: center; justify-content: center;
    }
    .shop-avatar {
      width: 56px; height: 56px; border-radius: 50%; object-fit: cover;
      border: 2px solid rgba(241,100,30,0.5); flex-shrink: 0;
    }
    .shop-avatar-ph {
      width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0;
      background: rgba(241,100,30,0.1); border: 2px solid rgba(241,100,30,0.35);
      display: flex; align-items: center; justify-content: center; font-size: 1.4rem;
    }
    /* Nom — colonne centre, ligne 1 */
    .shop-row-name {
      grid-column: 2; grid-row: 1;
      font-weight: 700; font-size: 0.95rem; color: #fff;
      white-space: normal; word-break: break-word; line-height: 1.3;
      padding: 0 10px 4px 14px;
    }
    /* Bouton delete — colonne droite, ligne 1 */
    .btn-delete {
      grid-column: 3; grid-row: 1;
      width: 28px; height: 28px; border-radius: 8px;
      border: 1px solid rgba(255,80,80,0.3); background: rgba(255,80,80,0.08);
      color: #f87171; cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 0.85rem; transition: all 0.2s;
      flex-shrink: 0; align-self: start;
    }
    .btn-delete:hover { background: rgba(255,80,80,0.25); border-color: rgba(255,80,80,0.6); }
    /* Actions — colonne centre+droite, ligne 2 */
    .shop-row-actions {
      grid-column: 2 / 4; grid-row: 2;
      display: flex; align-items: center; gap: 8px;
      padding-left: 14px;
    }
    .btn-visit, .btn-clone {
      flex: 1; padding: 9px 0; border-radius: 10px;
      font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.78rem;
      text-decoration: none; transition: all 0.2s; white-space: nowrap;
      text-align: center; cursor: pointer; display: block;
    }
    .btn-visit {
      border: 1px solid rgba(241,100,30,0.5);
      background: rgba(241,100,30,0.18); color: #fb923c;
    }
    .btn-visit:hover { background: rgba(241,100,30,0.35); color: #fff; }
    .btn-clone {
      border: 1px solid rgba(59,130,246,0.5);
      background: rgba(59,130,246,0.2); color: #60a5fa;
    }
    .btn-clone:hover { background: rgba(59,130,246,0.38); color: #fff; }

    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--muted);
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .empty-state .emoji { font-size: 2.5rem; }

    .btn-etsy-login {
      padding: 8px 16px; border-radius: 10px; border: none;
      background: #f1641e; color: #fff;
      font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.82rem;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-etsy-login:hover { background: #d4551a; transform: scale(1.03); }
    .btn-etsy-login.connected { background: rgba(34,197,94,0.2); border: 1px solid rgba(34,197,94,0.4); color: #22c55e; }

    .toast-msg {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 12px 20px; border-radius: 10px; font-size: 0.88rem; font-weight: 600;
      z-index: 9999; pointer-events: none; color: #fff;
    }
  </style>
</head>
<body>
  <div id="bg-layer"></div>
  <canvas id="milkyway-canvas"></canvas>

  <nav>
    <div class="nav-left">
      <button type="button" class="btn-back" onclick="goBack()">← Back</button>
      <span class="nav-title">Dashboard</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="btn-etsy-login" id="etsy-login-btn" onclick="handleEtsyLogin()">
        🛍 Etsy Login
      </button>
      <button id="etsy-logout-nav-btn" onclick="etsyLogoutFromNicheList()" style="display:none;padding:8px 14px;border-radius:10px;border:none;background:#dc2626;color:#fff;font-family:'Inter',sans-serif;font-weight:700;font-size:0.82rem;cursor:pointer;white-space:nowrap;transition:all 0.2s;" onmouseover="this.style.background='#b91c1c'" onmouseout="this.style.background='#dc2626'">
        🚪 Etsy Logout
      </button>
    </div>
  </nav>

  <div class="container">
    <h1>My shops</h1>
    <div class="shops-list" id="shops-list"></div>
  </div>

  <script>
    let TOKEN = localStorage.getItem('scout_token') || null;

    function apiFetch(url, opts = {}) {
      opts.headers = opts.headers || {};
      TOKEN = localStorage.getItem('scout_token') || TOKEN;
      opts.headers['Authorization'] = 'Bearer ' + TOKEN;
      return fetch(url, opts);
    }

    function showToast(msg, color) {
      const t = document.createElement('div');
      t.className = 'toast-msg';
      t.textContent = msg;
      t.style.background = color || '#222';
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    async function loadShops() {
      const list = document.getElementById('shops-list');
      try {
        const r     = await apiFetch('/api/shops');
        const shops = await r.json();
        if (!shops.length) {
          list.innerHTML = '<div class="empty-state"><span class="emoji">🏪</span>No saved listings yet.<br>Save listings from your search results.</div>';
          return;
        }
        list.innerHTML = '';
        shops.forEach(shop => {
          list.appendChild(buildShopRow(shop));
        });
      } catch(e) {
        list.innerHTML = '<div class="empty-state"><span class="emoji">❌</span>' + e.message + '</div>';
      }
    }

    function buildShopRow(shop) {
      // Extraire shopName
      let shopName = shop.shopName || null;
      if (!shopName && shop.shopUrl) {
        const m = shop.shopUrl.match(/etsy\.com\/shop\/([^/?#]+)/i);
        if (m) shopName = m[1];
      }
      if (!shopName && shop.productUrl) {
        const m = shop.productUrl.match(/etsy\.com\/shop\/([^/?#]+)/i);
        if (m) shopName = m[1];
      }
      const shopUrl = shopName ? 'https://www.etsy.com/shop/' + shopName : (shop.shopUrl || '#');
      const avatarUrl = shop.shopAvatar || shop.productImage || null;

      // Wrapper animé (border glow)
      const wrapper = document.createElement('div');
      wrapper.className = 'shop-row-wrapper';
      wrapper.id = 'shop-wrapper-' + shop._id;

      const row = document.createElement('div');
      row.className = 'shop-row';
      row.id = 'shop-row-' + shop._id;

      // ── Colonne gauche : Avatar ──
      const avatarCell = document.createElement('div');
      avatarCell.className = 'shop-avatar-cell';
      const ph = document.createElement('div');
      ph.className = 'shop-avatar-ph'; ph.textContent = '🛍';
      if (avatarUrl) {
        const img = document.createElement('img');
        img.className = 'shop-avatar';
        img.src = '/proxy-image?url=' + encodeURIComponent(avatarUrl);
        img.loading = 'lazy'; img.alt = '';
        img.onerror = function() { this.style.display='none'; ph.style.display='flex'; };
        ph.style.display = 'none';
        avatarCell.appendChild(img);
      }
      avatarCell.appendChild(ph);
      row.appendChild(avatarCell);

      // ── Colonne centre ligne 1 : Nom ──
      const nameEl = document.createElement('div');
      nameEl.className = 'shop-row-name';
      nameEl.textContent = shopName || '—';
      row.appendChild(nameEl);

      // ── Colonne droite ligne 1 : Bouton supprimer (croix rouge) ──
      const delBtn = document.createElement('button');
      delBtn.className = 'btn-delete';
      delBtn.innerHTML = '✕';
      delBtn.title = 'Supprimer';
      delBtn.addEventListener('click', function() { deleteShop(shop._id, wrapper); });
      row.appendChild(delBtn);

      // ── Ligne 2 : Boutons Visit + Clone ──
      const actions = document.createElement('div');
      actions.className = 'shop-row-actions';

      const visitBtn = document.createElement('a');
      visitBtn.className = 'btn-visit';
      visitBtn.href = shopUrl; visitBtn.target = '_blank'; visitBtn.rel = 'noopener';
      visitBtn.textContent = 'Visit shop ↗';
      actions.appendChild(visitBtn);

      const cloneBtn = document.createElement('button');
      cloneBtn.className = 'btn-clone';
      cloneBtn.textContent = 'Clone 📋';
      cloneBtn.addEventListener('click', function() { cloneShop(shop, shopName, shopUrl); });
      actions.appendChild(cloneBtn);

      row.appendChild(actions);
      wrapper.appendChild(row);
      return wrapper;
    }
    function cloneShop(shop, shopName, shopUrl) {
      const cloneData = {
        shopName: shopName || shop.shopName || '—',
        shopUrl: shopUrl,
        shopAvatar: shop.shopAvatar || shop.productImage || null,
      };
      // Copy shop info to clipboard as JSON
      navigator.clipboard.writeText(JSON.stringify(cloneData, null, 2))
        .then(() => showToast('Shop data copied to clipboard!', '#3b82f6'))
        .catch(() => showToast('Clone: ' + (shopName || '—'), '#3b82f6'));
    }

    // ── ETSY LOGIN ──
    const ETSY_CLIENT_ID = 'YOUR_ETSY_CLIENT_ID'; // À remplacer par votre client ID Etsy
    const ETSY_REDIRECT_URI = 'https://www.finder-niche.com/etsy-callback';
    const ETSY_SCOPE = 'shops_r listings_r';

    function generateCodeVerifier() {
      const array = new Uint8Array(32);
      window.crypto.getRandomValues(array);
      return btoa(String.fromCharCode(...array)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
    }

    async function generateCodeChallenge(verifier) {
      const encoder = new TextEncoder();
      const data = encoder.encode(verifier);
      const hash = await window.crypto.subtle.digest('SHA-256', data);
      return btoa(String.fromCharCode(...new Uint8Array(hash))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
    }

    async function handleEtsyLogin() {
      const etsyToken = localStorage.getItem('etsy_token');
      if (etsyToken) {
        localStorage.removeItem('etsy_token');
        localStorage.removeItem('etsy_shop');
        document.getElementById('etsy-login-btn').textContent = '🛍 Etsy Login';
        document.getElementById('etsy-login-btn').classList.remove('connected');
        showToast('Etsy disconnected', '#f97316');
        return;
      }
      const verifier = generateCodeVerifier();
      const challenge = await generateCodeChallenge(verifier);
      const state = Math.random().toString(36).substring(2);
      localStorage.setItem('etsy_verifier', verifier);
      localStorage.setItem('etsy_state', state);
      const params = new URLSearchParams({
        response_type: 'code',
        redirect_uri: ETSY_REDIRECT_URI,
        scope: ETSY_SCOPE,
        client_id: ETSY_CLIENT_ID,
        state: state,
        code_challenge: challenge,
        code_challenge_method: 'S256',
      });
      window.location.href = 'https://www.etsy.com/oauth/connect?' + params.toString();
    }

    function etsyLogoutFromNicheList() {
      localStorage.removeItem('scout_token');
      localStorage.removeItem('etsy_connected');
      localStorage.removeItem('etsy_token');
      localStorage.removeItem('etsy_verifier');
      localStorage.removeItem('etsy_state');
      localStorage.removeItem('etsy_shop');
      showToast('Etsy disconnected', '#f97316');
      setTimeout(() => { window.location.href = '/finder'; }, 800);
    }

    function checkEtsyToken() {
      // Lire les params OAuth retournés par le backend
      const params = new URLSearchParams(window.location.search);
      const token   = params.get('token');
      const email   = params.get('email');
      const etsyErr = params.get('etsy_error');

      if (token && email) {
        // Stocker le token et marquer comme connecté Etsy
        localStorage.setItem('scout_token', token);
        localStorage.setItem('etsy_connected', '1');
        TOKEN = token;
        // Nettoyer l'URL
        window.history.replaceState({}, '', window.location.pathname);
        // Mettre à jour le bouton
        const btn = document.getElementById('etsy-login-btn');
        btn.innerHTML = '✅ Etsy Connected';
        btn.classList.add('connected');
        const logoutBtn = document.getElementById('etsy-logout-nav-btn');
        if (logoutBtn) logoutBtn.style.display = 'block';
        showToast('✅ Connecté : ' + decodeURIComponent(email), '#22c55e');
        return true; // token trouvé dans URL
      }

      if (etsyErr) {
        window.history.replaceState({}, '', window.location.pathname);
        const msgs = { 'no_email': 'Etsy n'a pas fourni votre email.', 'access_denied': 'Connexion annulée.' };
        showToast('❌ ' + (msgs[etsyErr] || etsyErr), '#ef4444');
        return false;
      }

      // Déjà connecté via Etsy (session existante)
      if (localStorage.getItem('etsy_connected') === '1' && TOKEN) {
        const btn = document.getElementById('etsy-login-btn');
        btn.innerHTML = '✅ Etsy Connected';
        btn.classList.add('connected');
        const logoutBtn = document.getElementById('etsy-logout-nav-btn');
        if (logoutBtn) logoutBtn.style.display = 'block';
      }
      return false;
    }

    function deleteShop(id, el) {
      if (!confirm('Delete this shop?')) return;
      apiFetch('/api/shops/' + id, { method: 'DELETE' }).then(() => {
        if (el) {
          el.style.transition = 'opacity 0.3s, transform 0.3s';
          el.style.opacity = '0';
          el.style.transform = 'scale(0.95)';
          setTimeout(() => el.remove(), 300);
        } else {
          document.getElementById('shop-wrapper-' + id)?.remove();
        }
        showToast('Shop deleted', '#ef4444');
      });
    }

    function goBack() {
      sessionStorage.setItem('skipIntro', '1');
      window.location.href = '/finder';
    }

    document.addEventListener('DOMContentLoaded', function() {
      // Vérifier d'abord si un token arrive via URL (retour OAuth)
      const params = new URLSearchParams(window.location.search);
      const urlToken = params.get('token');
      if (urlToken) {
        localStorage.setItem('scout_token', urlToken);
        TOKEN = urlToken;
      } else {
        TOKEN = localStorage.getItem('scout_token');
      }
      if (!TOKEN) { window.location.href = '/finder'; return; }
      checkEtsyToken();
      loadShops();
    });
  </script>

  <script>
    (function() {
      const mCanvas = document.getElementById('milkyway-canvas');
      if (mCanvas) {
        const ctx = mCanvas.getContext('2d');
        let W, H, stars = [];
        function resizeM() {
          W = mCanvas.width = window.innerWidth;
          H = mCanvas.height = window.innerHeight;
          stars = Array.from({length: 220}, () => ({
            x: Math.random()*W, y: Math.random()*H,
            r: Math.random()*1.4+0.2,
            a: Math.random()*0.7+0.15,
            speed: Math.random()*0.003+0.001,
            phase: Math.random()*Math.PI*2
          }));
        }
        function drawM(t) {
          ctx.clearRect(0,0,W,H);
          stars.forEach(s => {
            const alpha = s.a*(0.6+0.4*Math.sin(t*s.speed+s.phase));
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255,255,255,'+alpha+')';
            ctx.fill();
          });
          requestAnimationFrame(drawM);
        }
        resizeM();
        window.addEventListener('resize', resizeM);
        requestAnimationFrame(drawM);
      }
    })();
  </script>

</body>
</html>
