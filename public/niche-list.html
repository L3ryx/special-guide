<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Niche List</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Croissant+One&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #22c55e; --orange: #f1641e;
      --glass: rgba(0,0,0,0.55); --glass-border: rgba(255,255,255,0.12);
      --text: #ffffff; --muted: rgba(255,255,255,0.55);
    }
    #bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background: #0a0a0a url('/background.png') center center / cover no-repeat;
      animation: bgDrift 18s ease-in-out infinite alternate;
      transform-origin: center;
    }
    @keyframes bgDrift {
      0%   { transform: scale(1.08) translate(0px,0px); }
      25%  { transform: scale(1.1)  translate(-12px,-8px); }
      50%  { transform: scale(1.08) translate(8px,-14px); }
      75%  { transform: scale(1.1)  translate(-6px,10px); }
      100% { transform: scale(1.08) translate(10px,6px); }
    }
    #bg-layer::after { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.55); }
    #milkyway-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    #shooting-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
    html, body { min-height: 100%; font-family: 'Inter', sans-serif; color: var(--text); background: #0a0a0a; }

    nav {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .btn-back {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 9px; border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.7);
      font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.8rem;
      text-decoration: none; transition: all 0.2s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.13); color: #fff; }
    .nav-title { font-family: 'Croissant One', cursive; font-size: 1rem; color: rgba(255,255,255,0.7); }

    .container { max-width: 680px; margin: 0 auto; padding: 28px 20px 60px; position: relative; z-index: 10; }
    h1 { font-size: 1.4rem; font-weight: 800; margin-bottom: 6px; }

    .shops-list { display: flex; flex-direction: column; gap: 12px; }
    @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

    .shop-row {
      display: flex; align-items: center; gap: 14px;
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 16px; padding: 14px 16px;
      backdrop-filter: blur(16px); animation: slideUp 0.4s ease;
    }
    .shop-avatar {
      width: 52px; height: 52px; border-radius: 50%; object-fit: cover;
      border: 2px solid rgba(241,100,30,0.4); flex-shrink: 0;
    }
    .shop-avatar-ph {
      width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
      background: rgba(241,100,30,0.1); border: 2px solid rgba(241,100,30,0.3);
      display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
    }
    .shop-row-info { flex: 1; min-width: 0; }
    .shop-row-name { font-weight: 700; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
    .btn-visit {
      flex-shrink: 0; padding: 9px 18px; border-radius: 10px;
      border: 1px solid rgba(241,100,30,0.5);
      background: rgba(241,100,30,0.18); color: #fb923c;
      font-family: 'Croissant One', cursive; font-weight: 700; font-size: 0.8rem;
      text-decoration: none; transition: all 0.2s; white-space: nowrap;
    }
    .btn-visit:hover { background: rgba(241,100,30,0.35); color: #fff; }
    .btn-clone {
      flex-shrink: 0; padding: 9px 18px; border-radius: 10px;
      border: 1px solid rgba(59,130,246,0.5);
      background: rgba(59,130,246,0.18); color: #60a5fa;
      font-family: 'Croissant One', cursive; font-weight: 700; font-size: 0.8rem;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .btn-clone:hover { background: rgba(59,130,246,0.35); color: #fff; }
    .btn-clone:disabled { opacity: 0.45; cursor: not-allowed; }

    .shop-name-label {
      font-family: 'Croissant One', cursive;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.55);
      padding: 8px 16px 0;
      letter-spacing: 0.02em;
    }

    /* Clone Progress Modal */
    #clone-modal { position: fixed; inset: 0; z-index: 8000; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; padding: 20px; }
    #clone-modal.open { display: flex; }
    .clone-modal-box { background: rgba(10,10,10,0.97); border: 1px solid rgba(255,255,255,0.1); border-radius: 22px; padding: 28px; max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .clone-modal-title { font-family: 'Croissant One', cursive; font-size: 1.1rem; color: #fff; }
    .clone-log { display: flex; flex-direction: column; gap: 6px; max-height: 300px; overflow-y: auto; }
    .clone-log-item { font-size: 0.8rem; color: rgba(255,255,255,0.7); padding: 6px 10px; border-radius: 8px; background: rgba(255,255,255,0.04); border-left: 2px solid rgba(255,255,255,0.1); }
    .clone-log-item.published { border-left-color: #22c55e; color: #4ade80; }
    .clone-log-item.error { border-left-color: #ef4444; color: #f87171; }
    .clone-log-item.skip { border-left-color: #f97316; color: #fb923c; }
    .clone-close-btn { padding: 12px; border-radius: 10px; border: none; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); font-family: 'Croissant One', cursive; font-size: 0.9rem; cursor: pointer; }
    .clone-close-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .clone-progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.07); border-radius: 6px; overflow: hidden; }
    .clone-progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #3b82f6, #60a5fa); border-radius: 6px; transition: width 0.4s ease; }




    .btn-delete {
      position: absolute; top: -8px; right: -8px;
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid rgba(10,10,10,0.8); background: #ef4444;
      color: #fff; cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 0.7rem; font-weight: 700;
      transition: all 0.2s; z-index: 10; line-height: 1;
    }
    .btn-delete:hover { background: #dc2626; transform: scale(1.15); }
    .shop-row-wrap { position: relative; }
    .clone-results { display: none; flex-direction: row; gap: 8px; padding: 10px 16px 14px; flex-wrap: wrap; }
    .clone-results.open { display: flex; }
    .btn-result {
      flex: 1; min-width: 80px; padding: 9px 12px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.8); font-family: 'Croissant One', cursive;
      font-size: 0.78rem; cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .btn-result:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .btn-result.titre { border-color: rgba(249,115,22,0.4); color: #fb923c; }
    .btn-result.titre:hover { background: rgba(249,115,22,0.15); }
    .btn-result.description { border-color: rgba(168,85,247,0.4); color: #c084fc; }
    .btn-result.description:hover { background: rgba(168,85,247,0.15); }
    .btn-result.images { border-color: rgba(34,197,94,0.4); color: #4ade80; }
    .btn-result.images:hover { background: rgba(34,197,94,0.15); }
    .clone-result-panel {
      display: none; padding: 12px 16px; margin: 0 16px 14px;
      background: rgba(255,255,255,0.04); border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08); font-size: 0.82rem;
      color: rgba(255,255,255,0.75); line-height: 1.6; word-break: break-word;
    }
    .clone-result-panel.open { display: block; }
    .clone-images-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .clone-images-grid img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }

    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--muted);
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .empty-state .emoji { font-size: 2.5rem; }

    .toast-msg {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 12px 20px; border-radius: 10px; font-size: 0.88rem; font-weight: 600;
      z-index: 9999; pointer-events: none; color: #fff;
    }
  </style>
</head>
<body>
  <!-- CLONE PROGRESS MODAL -->
  <div id="clone-modal">
    <div class="clone-modal-box">
      <div class="clone-modal-title">🔄 Cloning shop listings...</div>
      <div class="clone-progress-bar"><div class="clone-progress-fill" id="clone-progress-fill"></div></div>
      <div class="clone-log" id="clone-log"></div>
      <button class="clone-close-btn" id="clone-close-btn" onclick="closeCloneModal()" style="display:none">Close</button>
    </div>
  </div>

  <div id="bg-layer"></div>
  <canvas id="milkyway-canvas"></canvas>
  <canvas id="shooting-canvas"></canvas>

  <nav>
    <div class="nav-left">
      <button type="button" class="btn-back" onclick="goBack()">← Back</button>
      <span class="nav-title">My List</span>
    </div>
  </nav>

  <div class="container">
    <h1>My List</h1>
    <div class="shops-list" id="shops-list"></div>
  </div>

  <script>
    let TOKEN = localStorage.getItem('scout_token') || null;

    function apiFetch(url, opts = {}) {
      opts.headers = opts.headers || {};
      TOKEN = localStorage.getItem('scout_token') || TOKEN;
      opts.headers['Authorization'] = 'Bearer ' + TOKEN;
      return fetch(url, opts);
    }

    function showToast(msg, color) {
      const t = document.createElement('div');
      t.className = 'toast-msg';
      t.textContent = msg;
      t.style.background = color || '#222';
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    async function loadShops() {
      const list = document.getElementById('shops-list');
      try {
        const r     = await apiFetch('/api/shops');
        const shops = await r.json();
        if (!shops.length) {
          list.innerHTML = '<div class="empty-state"><span class="emoji">🏪</span>No saved listings yet.<br>Save listings from your search results.</div>';
          return;
        }
        list.innerHTML = '';
        shops.forEach(shop => {
          list.appendChild(buildShopRow(shop));
        });
      } catch(e) {
        list.innerHTML = '<div class="empty-state"><span class="emoji">❌</span>' + e.message + '</div>';
      }
    }

    function buildShopRow(shop) {
      const wrap = document.createElement('div');
      wrap.id = 'shop-wrapper-' + shop._id;
      wrap.className = 'shop-row-wrap';

      // Extraire shopName depuis toutes les sources disponibles
      let shopName = shop.shopName || null;

      // Essayer d'extraire depuis shopUrl
      if (!shopName && shop.shopUrl) {
        const m = shop.shopUrl.match(/etsy\.com\/shop\/([^/?#]+)/i);
        if (m) shopName = m[1];
      }
      // Essayer d'extraire depuis productUrl
      if (!shopName && shop.productUrl) {
        const m = shop.productUrl.match(/etsy\.com\/shop\/([^/?#]+)/i);
        if (m) shopName = m[1];
      }

      // Construire shopUrl proprement
      const shopUrl = shopName
        ? 'https://www.etsy.com/shop/' + shopName
        : (shop.shopUrl || '#');

      const avatarUrl = shop.shopAvatar || shop.productImage || null;

      const row = document.createElement('div');
      row.className = 'shop-row';
      row.id = 'shop-row-' + shop._id;

      // Avatar rond
      const ph = document.createElement('div');
      ph.className = 'shop-avatar-ph'; ph.textContent = '🛍';
      if (avatarUrl) {
        const img = document.createElement('img');
        img.className = 'shop-avatar';
        img.src = '/proxy-image?url=' + encodeURIComponent(avatarUrl);
        img.loading = 'lazy'; img.alt = '';
        img.onerror = function() { this.style.display='none'; ph.style.display='flex'; };
        ph.style.display = 'none';
        row.appendChild(img);
      }
      row.appendChild(ph);

      // Bouton Visit shop
      const visitBtn = document.createElement('a');
      visitBtn.className = 'btn-visit';
      visitBtn.href = shopUrl; visitBtn.target = '_blank'; visitBtn.rel = 'noopener';
      visitBtn.textContent = 'Visit shop ↗';
      row.appendChild(visitBtn);

      // Bouton Clone
      const cloneBtn = document.createElement('button');
      cloneBtn.className = 'btn-clone';
      cloneBtn.textContent = 'Clone';
      cloneBtn.onclick = function() { cloneShop(shopName, cloneBtn, shop._id); };
      row.appendChild(cloneBtn);

      // Croix rouge suppression en haut à droite
      const delBtn = document.createElement('button');
      delBtn.className = 'btn-delete'; delBtn.textContent = '✕';
      delBtn.addEventListener('click', function() { deleteShop(shop._id); });
      // Nom de boutique affiché au-dessus des boutons
      const shopLabel = document.createElement('div');
      shopLabel.className = 'shop-name-label';
      shopLabel.textContent = shopName ? '🏪 ' + shopName : '';
      wrap.appendChild(shopLabel);

      wrap.appendChild(row);
      wrap.appendChild(delBtn);

      // Zone résultats Clone (cachée au départ)
      const resultsZone = document.createElement('div');
      resultsZone.className = 'clone-results';
      resultsZone.id = 'clone-results-' + shop._id;

      const btnTitre = document.createElement('button');
      btnTitre.className = 'btn-result titre'; btnTitre.textContent = '📝 Titre';
      btnTitre.onclick = function() { toggleResultPanel(shop._id, 'titre'); };

      const btnDesc = document.createElement('button');
      btnDesc.className = 'btn-result description'; btnDesc.textContent = '📄 Description';
      btnDesc.onclick = function() { toggleResultPanel(shop._id, 'description'); };

      const btnImgs = document.createElement('button');
      btnImgs.className = 'btn-result images'; btnImgs.textContent = '🖼 Images';
      btnImgs.onclick = function() { toggleResultPanel(shop._id, 'images'); };

      resultsZone.appendChild(btnTitre);
      resultsZone.appendChild(btnDesc);
      resultsZone.appendChild(btnImgs);
      wrap.appendChild(resultsZone);

      // Panels de contenu
      const panelTitre = document.createElement('div');
      panelTitre.className = 'clone-result-panel'; panelTitre.id = 'panel-titre-' + shop._id;
      const panelDesc = document.createElement('div');
      panelDesc.className = 'clone-result-panel'; panelDesc.id = 'panel-description-' + shop._id;
      const panelImgs = document.createElement('div');
      panelImgs.className = 'clone-result-panel'; panelImgs.id = 'panel-images-' + shop._id;
      wrap.appendChild(panelTitre);
      wrap.appendChild(panelDesc);
      wrap.appendChild(panelImgs);

      return wrap;
    }

    function toggleResultPanel(shopId, type) {
      var panel = document.getElementById('panel-' + type + '-' + shopId);
      if (!panel) return;
      var isOpen = panel.classList.contains('open');
      // Fermer tous les panels de cette boutique
      ['titre','description','images'].forEach(function(t) {
        var p = document.getElementById('panel-' + t + '-' + shopId);
        if (p) p.classList.remove('open');
      });
      if (!isOpen) panel.classList.add('open');
    }
    function deleteShop(id) {
      if (!confirm('Delete this listing?')) return;
      apiFetch('/api/shops/' + id, { method: 'DELETE' }).then(() => {
        document.getElementById('shop-wrapper-' + id)?.remove();
        showToast('Listing deleted', '#ef4444');
        loadShops();
      });
    }

    function goBack() {
      sessionStorage.setItem('skipIntro', '1');
      window.location.href = '/finder';
    }

    document.addEventListener('DOMContentLoaded', function() {
      TOKEN = localStorage.getItem('scout_token');
      if (!TOKEN) { window.location.href = '/finder'; return; }
      loadShops();
    });
  </script>

  <script>
    (function() {
      const mCanvas = document.getElementById('milkyway-canvas');
      if (mCanvas) {
        const ctx = mCanvas.getContext('2d');
        let W, H, stars = [];
        function resizeM() {
          W = mCanvas.width = window.innerWidth;
          H = mCanvas.height = window.innerHeight;
          stars = Array.from({length: 220}, () => ({
            x: Math.random()*W, y: Math.random()*H,
            r: Math.random()*1.4+0.2,
            a: Math.random()*0.7+0.15,
            speed: Math.random()*0.003+0.001,
            phase: Math.random()*Math.PI*2
          }));
        }
        function drawM(t) {
          ctx.clearRect(0,0,W,H);
          stars.forEach(s => {
            const alpha = s.a*(0.6+0.4*Math.sin(t*s.speed+s.phase));
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255,255,255,'+alpha+')';
            ctx.fill();
          });
          requestAnimationFrame(drawM);
        }
        resizeM();
        window.addEventListener('resize', resizeM);
        requestAnimationFrame(drawM);
      }

      const sCanvas = document.getElementById('shooting-canvas');
      if (sCanvas) {
        const ctx2 = sCanvas.getContext('2d');
        let W2, H2, shots = [];
        function resizeS() { W2 = sCanvas.width = window.innerWidth; H2 = sCanvas.height = window.innerHeight; }
        function newShot() {
          return { x: Math.random()*W2*0.7, y: Math.random()*H2*0.4,
            len: 80+Math.random()*120, speed: 6+Math.random()*8,
            angle: Math.PI/4+Math.random()*0.3,
            alpha: 0.8+Math.random()*0.2, life: 1 };
        }
        function drawS() {
          ctx2.clearRect(0,0,W2,H2);
          if (Math.random()<0.012) shots.push(newShot());
          shots = shots.filter(s=>s.life>0);
          shots.forEach(s => {
            s.x += Math.cos(s.angle)*s.speed;
            s.y += Math.sin(s.angle)*s.speed;
            s.life -= 0.022;
            const grd = ctx2.createLinearGradient(s.x,s.y, s.x-Math.cos(s.angle)*s.len, s.y-Math.sin(s.angle)*s.len);
            grd.addColorStop(0, 'rgba(255,255,255,'+(s.alpha*s.life)+')');
            grd.addColorStop(1, 'rgba(255,255,255,0)');
            ctx2.beginPath();
            ctx2.moveTo(s.x,s.y);
            ctx2.lineTo(s.x-Math.cos(s.angle)*s.len, s.y-Math.sin(s.angle)*s.len);
            ctx2.strokeStyle = grd; ctx2.lineWidth = 1.5; ctx2.stroke();
          });
          requestAnimationFrame(drawS);
        }
        resizeS();
        window.addEventListener('resize', resizeS);
        requestAnimationFrame(drawS);
      }
    })();

    // ── CLONE SHOP ──
    function openCloneModal() {
      document.getElementById('clone-log').innerHTML = '';
      document.getElementById('clone-progress-fill').style.width = '0%';
      document.getElementById('clone-close-btn').style.display = 'none';
      document.getElementById('clone-modal').classList.add('open');
    }
    function closeCloneModal() { document.getElementById('clone-modal').classList.remove('open'); }

    function addCloneLog(msg, type) {
      var log = document.getElementById('clone-log');
      var item = document.createElement('div');
      item.className = 'clone-log-item' + (type ? ' ' + type : '');
      item.textContent = msg;
      log.appendChild(item);
      log.scrollTop = log.scrollHeight;
    }

    async function cloneShop(shopName, btn, shopId) {
      if (!shopName) { showToast('No shop name', '#ef4444'); return; }
      btn.disabled = true;
      openCloneModal();

      var authToken = localStorage.getItem('scout_token');
      var total = 0;
      var published = 0;

      try {
        var res = await fetch('/api/shops/clone', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
          body: JSON.stringify({ shopName: shopName })
        });

        var ct = res.headers.get('content-type') || '';
        if (!ct.includes('text/event-stream')) {
          var d = await res.json();
          addCloneLog('Error: ' + (d.error || 'Unknown'), 'error');
          document.getElementById('clone-close-btn').style.display = 'block';
          btn.disabled = false;
          return;
        }

        var reader = res.body.getReader();
        var decoder = new TextDecoder();
        var buf = '';

        while (true) {
          var read = await reader.read();
          if (read.done) break;
          buf += decoder.decode(read.value, { stream: true });
          var lines = buf.split('\n'); buf = lines.pop();
          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            if (!line.startsWith('data: ')) continue;
            try {
              var ev = JSON.parse(line.slice(6));
              if (ev.step === 'found') {
                total = ev.total || 0;
                addCloneLog(ev.message);
              } else if (ev.step === 'published') {
                published++;
                addCloneLog(ev.message, 'published');
                if (total > 0) document.getElementById('clone-progress-fill').style.width = Math.round((ev.index + 1) / total * 100) + '%';
                // Stocker les résultats dans les panels
                if (shopId && ev.title) {
                  var pt = document.getElementById('panel-titre-' + shopId);
                  if (pt) { pt.textContent = ev.title; }
                }
                if (shopId && ev.description) {
                  var pd = document.getElementById('panel-description-' + shopId);
                  if (pd) { pd.textContent = ev.description; }
                }
                if (shopId && ev.images && ev.images.length > 0) {
                  var pi = document.getElementById('panel-images-' + shopId);
                  if (pi) {
                    pi.innerHTML = '';
                    var grid = document.createElement('div');
                    grid.className = 'clone-images-grid';
                    ev.images.forEach(function(url) {
                      var img = document.createElement('img');
                      img.src = url; img.loading = 'lazy';
                      grid.appendChild(img);
                    });
                    pi.appendChild(grid);
                  }
                }
              } else if (ev.step === 'skip') {
                addCloneLog(ev.message, 'skip');
              } else if (ev.step === 'error_listing' || ev.step === 'error') {
                addCloneLog(ev.message, 'error');
              } else if (ev.step === 'complete') {
                addCloneLog(ev.message + ' (' + published + ' published)', 'published');
                document.getElementById('clone-progress-fill').style.width = '100%';
                // Afficher la zone résultats sous la boutique
                if (shopId) {
                  var rz = document.getElementById('clone-results-' + shopId);
                  if (rz) rz.classList.add('open');
                }
              } else {
                addCloneLog(ev.message || ev.step);
              }
            } catch(e) {}
          }
        }
      } catch(e) { addCloneLog('Connection error: ' + e.message, 'error'); }

      document.getElementById('clone-close-btn').style.display = 'block';
      btn.disabled = false;
    }

  </script>
</body>
</html>
