<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Niche List</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Croissant+One&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #22c55e; --orange: #f1641e;
      --glass: rgba(0,0,0,0.55); --glass-border: rgba(255,255,255,0.12);
      --text: #ffffff; --muted: rgba(255,255,255,0.55);
    }
    #bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background: #0a0a0a url('/background.png') center center / cover no-repeat;
      animation: bgDrift 18s ease-in-out infinite alternate;
      transform-origin: center;
    }
    @keyframes bgDrift {
      0%   { transform: scale(1.08) translate(0px,0px); }
      25%  { transform: scale(1.1)  translate(-12px,-8px); }
      50%  { transform: scale(1.08) translate(8px,-14px); }
      75%  { transform: scale(1.1)  translate(-6px,10px); }
      100% { transform: scale(1.08) translate(10px,6px); }
    }
    #bg-layer::after { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.55); }
    #milkyway-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    #shooting-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
    html, body { min-height: 100%; font-family: 'Inter', sans-serif; color: var(--text); background: #0a0a0a; }

    nav {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .btn-back {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 9px; border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.7);
      font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.8rem;
      text-decoration: none; transition: all 0.2s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.13); color: #fff; }
    .nav-title { font-family: 'Croissant One', cursive; font-size: 1rem; color: rgba(255,255,255,0.7); }

    .container { max-width: 680px; margin: 0 auto; padding: 28px 20px 60px; position: relative; z-index: 10; }
    h1 { font-size: 1.4rem; font-weight: 800; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 24px; }

    .shops-list { display: flex; flex-direction: column; gap: 12px; }
    @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

    .shop-row {
      display: flex; align-items: center; gap: 14px;
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 16px; padding: 12px 14px;
      backdrop-filter: blur(16px); animation: slideUp 0.4s ease;
    }
    .shop-thumb {
      width: 70px; height: 70px; border-radius: 10px; object-fit: cover;
      border: 1px solid var(--glass-border); flex-shrink: 0; cursor: pointer;
    }
    .shop-thumb:hover { opacity: 0.85; }
    .shop-thumb-placeholder {
      width: 70px; height: 70px; border-radius: 10px; flex-shrink: 0;
      background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: center; font-size: 1.6rem;
    }
    .shop-row-right { flex: 1; min-width: 0; display: flex; gap: 10px; align-items: center; }
    .shop-row-logo {
      width: 38px; height: 38px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
      border: 2px solid rgba(241,100,30,0.5);
    }
    .shop-row-logo-initial {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      background: rgba(241,100,30,0.2); border: 2px solid rgba(241,100,30,0.4);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1rem; color: #fff;
    }
    .shop-row-info { flex: 1; min-width: 0; }
    .shop-row-name { font-weight: 700; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .shop-row-btns { display: flex; flex-direction: column; gap: 7px; margin-top: 7px; align-items: stretch; }
    .btn-visit {
      padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(241,100,30,0.35);
      background: rgba(241,100,30,0.12); color: #fb923c;
      font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.75rem;
      text-decoration: none; transition: all 0.2s; white-space: nowrap;
      text-align: center; display: block;
    }
    .btn-visit:hover { background: rgba(241,100,30,0.25); }
    .btn-find {
      padding: 6px 14px; border-radius: 8px; border: none;
      background: linear-gradient(135deg,#7c3aed,#a855f7); color: #fff;
      font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.75rem;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
      box-shadow: 0 2px 10px rgba(168,85,247,0.35);
      display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%;
    }
    .btn-find:hover { background: linear-gradient(135deg,#6d28d9,#9333ea); transform: translateY(-1px); }
    .btn-drop-list { padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(239,68,68,0.35); background: rgba(239,68,68,0.12); color: #f87171; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .btn-drop-list:hover { background: rgba(239,68,68,0.25); }
    .btn-find.running { background: linear-gradient(135deg,#6d28d9,#9333ea); box-shadow: 0 2px 20px rgba(168,85,247,0.6); cursor: not-allowed; }
    .btn-find .spinner {
      display: none; width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .btn-find.running .spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .comp-panel { margin-top: 14px; padding: 14px 20px; background: rgba(168,85,247,0.08); border: 1px solid rgba(168,85,247,0.25); border-radius: 14px; animation: slideUp 0.4s ease; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .comp-keyword { font-size: 0.78rem; color: rgba(255,255,255,0.5); white-space: nowrap; }
    .comp-keyword span { color: #c084fc; font-weight: 700; }
    .comp-top-row { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
    .comp-gauge-wrap { flex-shrink: 0; }
    .comp-badge-block { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .comp-badge { display: inline-block; padding: 7px 18px; border-radius: 50px; font-weight: 800; font-size: 0.95rem; letter-spacing: 0.04em; width: fit-content; }
    .comp-desc { font-size: 0.82rem; color: rgba(255,255,255,0.65); line-height: 1.5; }
    .comp-stats { display: flex; align-items: center; gap: 20px; flex: 1; }
    .comp-stat { display: flex; align-items: center; gap: 6px; }
    .comp-stat-val { font-size: 1rem; font-weight: 800; color: #fff; }
    .comp-stat-lbl { font-size: 0.72rem; color: rgba(255,255,255,0.45); }
    .comp-area { padding: 0 14px 12px 14px; }
    .comp-status { font-size: 0.74rem; color: var(--muted); min-height: 1.1em; margin-top: 8px; }
    .comp-results { margin-top: 4px; }

    .btn-delete {
      width: 26px; height: 26px; border-radius: 50%;
      border: 1px solid rgba(255,80,80,0.25); background: rgba(255,80,80,0.07);
      color: #f87171; cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 0.8rem; transition: all 0.2s;
      flex-shrink: 0; margin-left: auto;
    }
    .btn-delete:hover { background: rgba(255,80,80,0.2); border-color: rgba(255,80,80,0.5); }

    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--muted);
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .empty-state .emoji { font-size: 2.5rem; }

    .toast-msg {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 12px 20px; border-radius: 10px; font-size: 0.88rem; font-weight: 600;
      z-index: 9999; pointer-events: none; color: #fff;
    }
  </style>
</head>
<body>
  <div id="bg-layer"></div>
  <canvas id="milkyway-canvas"></canvas>
  <canvas id="shooting-canvas"></canvas>

  <nav>
    <div class="nav-left">
      <button type="button" class="btn-back" onclick="goBack()">← Back</button>
      <span class="nav-title">Dashboard</span>
    </div>
  </nav>

  <div class="container">
    <h1>My Shops</h1>
    <p class="subtitle" id="subtitle">Loading...</p>
    <div class="shops-list" id="shops-list"></div>
  </div>

  <script>
    let TOKEN = localStorage.getItem('scout_token') || null;

    function apiFetch(url, opts = {}) {
      opts.headers = opts.headers || {};
      TOKEN = localStorage.getItem('scout_token') || TOKEN;
      opts.headers['Authorization'] = 'Bearer ' + TOKEN;
      return fetch(url, opts);
    }

    function showToast(msg, color) {
      const t = document.createElement('div');
      t.className = 'toast-msg';
      t.textContent = msg;
      t.style.background = color || '#222';
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    async function loadShops() {
      const list = document.getElementById('shops-list');
      const sub  = document.getElementById('subtitle');
      try {
        const r     = await apiFetch('/api/shops');
        const shops = await r.json();
        sub.textContent = shops.length + ' saved shop(s)';
        if (!shops.length) {
          list.innerHTML = '<div class="empty-state"><span class="emoji">🏪</span>No saved shops yet.<br>Save shops from Finder Niche search results.</div>';
          return;
        }
        list.innerHTML = '';
        shops.forEach(shop => {
          console.log('[Shop]', shop.shopName, '| lastCompetition:', JSON.stringify(shop.lastCompetition));
          list.appendChild(buildShopRow(shop));
        });
      } catch(e) {
        list.innerHTML = '<div class="empty-state"><span class="emoji">❌</span>' + e.message + '</div>';
      }
    }

    function buildShopRow(shop) {
      // ✅ CORRECTION : le wrapper contient maintenant tout le HTML de la boutique
      const wrap = document.createElement('div');
      wrap.id = 'shop-wrapper-' + shop._id;

      const productImg = shop.productImage || null;
      const productUrl = shop.productUrl  || shop.shopUrl || '#';
      const thumbHtml = productImg
        ? `<a href="${productUrl}" target="_blank" rel="noopener"><img class="shop-thumb" src="${productImg}" alt="" loading="lazy" /></a>`
        : `<a href="${productUrl}" target="_blank" rel="noopener"><div class="shop-thumb-placeholder">🛍</div></a>`;

      const name = shop.shopName || shop.shopUrl?.split('/shop/')?.[1]?.split('/')?.[0] || 'Shop';
      const logoHtml = shop.shopAvatar
        ? `<img class="shop-row-logo" src="${shop.shopAvatar}" alt="" onerror="this.style.display='none'" />`
        : `<div class="shop-row-logo-initial">${name.charAt(0).toUpperCase()}</div>`;

      const hasComp = shop.lastCompetition && shop.lastCompetition.totalShops != null && shop.lastCompetition.runAt != null;
      const dropshippers = hasComp ? (shop.lastCompetition.dropshipperShops || []) : [];

      if (dropshippers.length > 0) {
        window._dropListData = window._dropListData || {};
        window._dropListData[shop._id] = dropshippers;
      }

      const dropListBtnHtml = (hasComp && dropshippers.length > 0)
        ? `<button class="btn-drop-list" onclick="showDropshipList(window._dropListData['${shop._id}'])">🛒 Drop List (${dropshippers.length})</button>`
        : '';

      const compBtnHtml = hasComp
        ? ''
        : `<button class="btn-find" id="find-btn-${shop._id}" onclick="runCompetition('${shop._id}')"><span class="spinner"></span><span class="btn-label">⚔️ Competition</span></button>`;

      // ✅ CORRECTION : innerHTML du wrapper correctement rempli
      wrap.innerHTML = `
        <div class="shop-row" id="shop-row-${shop._id}">
          ${thumbHtml}
          <div class="shop-row-right">
            ${logoHtml}
            <div class="shop-row-info">
              <div class="shop-row-name">${name}</div>
              <div class="shop-row-btns">
                <a class="btn-visit" href="${shop.shopUrl || '#'}" target="_blank" rel="noopener">🛍 Visit Shop</a>
                ${compBtnHtml}
                ${dropListBtnHtml}
              </div>
            </div>
            <button class="btn-delete" onclick="deleteShop('${shop._id}')" title="Delete">✕</button>
          </div>
        </div>
        <div class="comp-area">
          <div class="comp-status" id="comp-status-${shop._id}"></div>
          <div class="comp-results" id="comp-results-${shop._id}">
            ${hasComp ? renderCompetitionResult(shop.lastCompetition, shop._id) : ''}
          </div>
        </div>
      `;

      return wrap;
    }

    async function deleteShop(id) {
      if (!confirm('Delete this shop?')) return;
      await apiFetch('/api/shops/' + id, { method: 'DELETE' });
      document.getElementById('shop-wrapper-' + id)?.remove();
      showToast('Shop deleted', '#ef4444');
      loadShops();
    }

    async function runCompetition(shopId) {
      const btn    = document.getElementById('find-btn-' + shopId);
      const label  = btn.querySelector('.btn-label');
      const status = document.getElementById('comp-status-' + shopId);
      const resDiv = document.getElementById('comp-results-' + shopId);
      btn.disabled = true;
      btn.classList.add('running');
      label.textContent = 'Analyse...';
      status.textContent = '⚔️ Starting competition analysis...';
      resDiv.innerHTML = '';

      try {
        const token = localStorage.getItem('scout_token');
        if (!token) { window.location.href = '/finder'; return; }

        const response = await fetch('/api/shops/' + shopId + '/competition', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }
        });

        if (response.status === 401) { status.textContent = '❌ Session expired'; window.location.href = '/finder'; return; }
        if (!response.ok) {
          const d = await response.json().catch(() => ({}));
          status.textContent = '❌ Error ' + response.status + ': ' + (d.error || '');
          btn.disabled = false; btn.classList.remove('running'); label.textContent = '⚔️ Competition';
          return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n'); buf = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try {
              const ev = JSON.parse(line.slice(6));
              if (ev.step === 'status' || ev.step === 'scraping') {
                status.textContent = ev.message;
              } else if (ev.step === 'keyword') {
                status.textContent = ev.message;
              } else if (ev.step === 'complete') {
                status.textContent = '';
                resDiv.innerHTML = renderCompetitionResult(ev, shopId);
                const compBtn = document.getElementById('find-btn-' + shopId);
                if (compBtn) compBtn.remove();
                const shops = ev.dropshipperShops || [];
                if (shops.length > 0) {
                  window._dropListData = window._dropListData || {};
                  window._dropListData[shopId] = shops;
                  const btnsDiv = document.querySelector('#shop-row-' + shopId + ' .shop-row-btns');
                  if (btnsDiv && !btnsDiv.querySelector('.btn-drop-list')) {
                    const dlBtn = document.createElement('button');
                    dlBtn.className = 'btn-drop-list';
                    dlBtn.textContent = '🛒 Drop List (' + shops.length + ')';
                    dlBtn.onclick = (function(id) { return function() { showDropshipList(window._dropListData[id]); }; })(shopId);
                    btnsDiv.appendChild(dlBtn);
                  }
                }
              } else if (ev.step === 'error') {
                status.textContent = '❌ ' + ev.message;
              }
            } catch(e) {}
          }
        }
      } catch(err) { status.textContent = '❌ ' + err.message; }

      btn.disabled = false; btn.classList.remove('running'); label.textContent = '⚔️ Competition';
    }

    function renderCompetitionResult(ev, shopId) {
      // Normaliser les champs — compatibles avec l'event SSE et lastCompetition MongoDB
      var color        = ev.color || (ev.score && ev.score.color) || '#f97316';
      var saturation   = ev.saturation != null ? ev.saturation : (ev.score && ev.score.saturation != null ? ev.score.saturation : 0);
      var totalShops   = (ev.totalShops   != null && ev.totalShops   !== '') ? Number(ev.totalShops)   : 0;
      var dropshippers = (ev.dropshippers != null && ev.dropshippers !== '') ? Number(ev.dropshippers) : 0;
      var shops        = ev.dropshipperShops || [];
      var keyword      = ev.keyword || '';
      // Log debug pour diagnostiquer
      console.log('[Competition]', { totalShops, dropshippers, saturation, color, keyword, shops: shops.length });

      window._dropListData = window._dropListData || {};
      if (shopId) window._dropListData[shopId] = shops;

      var pct = totalShops > 0 ? Math.round((dropshippers / totalShops) * 100) : 0;
      var gaugeColor = pct <= 10 ? '#22c55e' : pct <= 25 ? '#86efac' : pct <= 45 ? '#fbbf24' : pct <= 65 ? '#f97316' : '#ef4444';
      var gaugeLabel = pct <= 10 ? 'Very Low' : pct <= 25 ? 'Low' : pct <= 45 ? 'Moderate' : pct <= 65 ? 'High' : 'Very High';

      var gR = 36, gCx = 48, gCy = 48;
      var gStart = 200, gEnd = 340, gSpan = gEnd - gStart;
      var gFill  = gStart + (gSpan * pct / 100);
      function gPolar(cx, cy, r, deg) {
        var rad = (deg - 90) * Math.PI / 180;
        return { x: (cx + r * Math.cos(rad)).toFixed(2), y: (cy + r * Math.sin(rad)).toFixed(2) };
      }
      function gArc(cx, cy, r, a1, a2) {
        var s = gPolar(cx, cy, r, a1), e = gPolar(cx, cy, r, a2);
        return 'M ' + s.x + ' ' + s.y + ' A ' + r + ' ' + r + ' 0 ' + ((a2-a1)>180?1:0) + ' 1 ' + e.x + ' ' + e.y;
      }
      var gTrack = gArc(gCx, gCy, gR, gStart, gEnd);
      var gPath  = pct > 0 ? gArc(gCx, gCy, gR, gStart, Math.min(gFill, gEnd)) : '';

      return '<div class="comp-panel">' +
          '<svg viewBox="0 0 96 72" width="72" height="54" style="flex-shrink:0;">' +
            '<path d="' + gTrack + '" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8" stroke-linecap="round"/>' +
            (gPath ? '<path d="' + gPath + '" fill="none" stroke="' + gaugeColor + '" stroke-width="8" stroke-linecap="round" opacity="0.9"/>' : '') +
            '<text x="' + gCx + '" y="47" text-anchor="middle" font-size="13" font-weight="800" fill="' + gaugeColor + '" font-family="Inter,sans-serif">' + pct + '%</text>' +
          '</svg>' +
          '<div style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:0;">' +
            '<div class="comp-keyword" style="margin:0;">🔑 <span>"' + (ev.keyword || '') + '"</span> — <span style="color:' + gaugeColor + ';font-weight:700;">' + gaugeLabel + '</span></div>' +
            '<div class="comp-stats" style="gap:14px;">' +
              '<div class="comp-stat"><span class="comp-stat-val">' + totalShops + '</span><span class="comp-stat-lbl"> shops</span></div>' +
              '<div style="width:1px;height:20px;background:rgba(255,255,255,0.1);"></div>' +
              '<div class="comp-stat"><span class="comp-stat-val" style="color:#f87171;">' + dropshippers + '</span><span class="comp-stat-lbl"> dropshippers</span></div>' +
            '</div>' +
          '</div>' +
          (shops.length > 0 ? '<button onclick="showDropshipList(window._dropListData[\'' + shopId + '\'])" style="flex-shrink:0;padding:6px 12px;border-radius:8px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.35);color:#f87171;font-weight:600;font-size:0.72rem;cursor:pointer;font-family:Inter,sans-serif;white-space:nowrap;">🛒 Drop List (' + dropshippers + ')</button>' : '') +
        '</div>';
    }

    function showDropshipList(shops) {
      var existing = document.getElementById('dropship-modal');
      if (existing) existing.remove();
      var rows = '';
      if (!shops || shops.length === 0) {
        rows = '<div style="color:rgba(255,255,255,0.4);text-align:center;padding:20px;">No dropshippers found</div>';
      } else {
        shops.forEach(function(s) {
          var simBadge = s.similarity ? '<span style="font-size:0.7rem;color:rgba(255,255,255,0.4);margin-left:6px;">' + s.similarity + '% match</span>' : '';
          var aliBtn   = s.aliUrl ? '<a href="' + s.aliUrl + '" target="_blank" rel="noopener" style="padding:5px 10px;border-radius:7px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#f87171;font-size:0.72rem;font-weight:600;text-decoration:none;margin-right:6px;">Ali ↗</a>' : '';
          rows += '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.07);">' +
            '<span style="color:#fff;font-weight:600;font-size:0.85rem;">' + (s.shopName || '—') + simBadge + '</span>' +
            '<div style="display:flex;gap:4px;align-items:center;">' + aliBtn +
              '<a href="' + (s.shopUrl || '#') + '" target="_blank" rel="noopener" style="padding:5px 10px;border-radius:7px;background:rgba(241,100,30,0.15);border:1px solid rgba(241,100,30,0.3);color:#fb923c;font-size:0.72rem;font-weight:600;text-decoration:none;">Etsy ↗</a>' +
            '</div></div>';
        });
      }
      var modal = document.createElement('div');
      modal.id = 'dropship-modal';
      modal.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;padding:20px;';
      modal.innerHTML = '<div style="background:#111;border:1px solid rgba(255,255,255,0.1);border-radius:16px;width:100%;max-width:480px;max-height:80vh;display:flex;flex-direction:column;">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.08);">' +
          '<span style="color:#fff;font-weight:700;font-size:1rem;">🛒 Dropshipping shops (' + shops.length + ')</span>' +
          '<button onclick="document.getElementById(&quot;dropship-modal&quot;).remove()" style="background:none;border:none;color:rgba(255,255,255,0.5);font-size:1.2rem;cursor:pointer;">✕</button>' +
        '</div><div style="overflow-y:auto;flex:1;">' + rows + '</div></div>';
      modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
      document.body.appendChild(modal);
    }

    function goBack() {
      sessionStorage.setItem('skipIntro', '1');
      window.location.href = '/finder';
    }

    document.addEventListener('DOMContentLoaded', function() {
      TOKEN = localStorage.getItem('scout_token');
      if (!TOKEN) { window.location.href = '/finder'; return; }
      loadShops();
    });
  </script>

  <script>
    (function() {
      const mCanvas = document.getElementById('milkyway-canvas');
      if (mCanvas) {
        const ctx = mCanvas.getContext('2d');
        let W, H, stars = [];
        function resizeM() {
          W = mCanvas.width = window.innerWidth;
          H = mCanvas.height = window.innerHeight;
          stars = Array.from({length: 220}, () => ({
            x: Math.random()*W, y: Math.random()*H,
            r: Math.random()*1.4+0.2,
            a: Math.random()*0.7+0.15,
            speed: Math.random()*0.003+0.001,
            phase: Math.random()*Math.PI*2
          }));
        }
        function drawM(t) {
          ctx.clearRect(0,0,W,H);
          stars.forEach(s => {
            const alpha = s.a*(0.6+0.4*Math.sin(t*s.speed+s.phase));
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255,255,255,'+alpha+')';
            ctx.fill();
          });
          requestAnimationFrame(drawM);
        }
        resizeM();
        window.addEventListener('resize', resizeM);
        requestAnimationFrame(drawM);
      }

      const sCanvas = document.getElementById('shooting-canvas');
      if (sCanvas) {
        const ctx2 = sCanvas.getContext('2d');
        let W2, H2, shots = [];
        function resizeS() { W2 = sCanvas.width = window.innerWidth; H2 = sCanvas.height = window.innerHeight; }
        function newShot() {
          return { x: Math.random()*W2*0.7, y: Math.random()*H2*0.4,
            len: 80+Math.random()*120, speed: 6+Math.random()*8,
            angle: Math.PI/4+Math.random()*0.3,
            alpha: 0.8+Math.random()*0.2, life: 1 };
        }
        function drawS() {
          ctx2.clearRect(0,0,W2,H2);
          if (Math.random()<0.012) shots.push(newShot());
          shots = shots.filter(s=>s.life>0);
          shots.forEach(s => {
            s.x += Math.cos(s.angle)*s.speed;
            s.y += Math.sin(s.angle)*s.speed;
            s.life -= 0.022;
            const grd = ctx2.createLinearGradient(s.x,s.y, s.x-Math.cos(s.angle)*s.len, s.y-Math.sin(s.angle)*s.len);
            grd.addColorStop(0, 'rgba(255,255,255,'+(s.alpha*s.life)+')');
            grd.addColorStop(1, 'rgba(255,255,255,0)');
            ctx2.beginPath();
            ctx2.moveTo(s.x,s.y);
            ctx2.lineTo(s.x-Math.cos(s.angle)*s.len, s.y-Math.sin(s.angle)*s.len);
            ctx2.strokeStyle = grd; ctx2.lineWidth = 1.5; ctx2.stroke();
          });
          requestAnimationFrame(drawS);
        }
        resizeS();
        window.addEventListener('resize', resizeS);
        requestAnimationFrame(drawS);
      }
    })();
  </script>
