<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scout</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Croissant+One&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #22c55e;
      --glass: rgba(0,0,0,0.55);
      --glass-border: rgba(255,255,255,0.12);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.55);
    }
    html, body { min-height: 100%; font-family: 'Inter', sans-serif; color: var(--text); overflow: hidden; }
    body { position: relative; }
    html.unlocked, html.unlocked body { overflow-y: auto; overflow-x: hidden; }

    #bg-layer {
      position: fixed; inset: 0; z-index: -3;
      background: #0a0a0a url('/background.png') center center / cover no-repeat;
      animation: bgDrift 18s ease-in-out infinite alternate;
      transform-origin: center;
    }
    @keyframes bgDrift {
      0%   { transform: scale(1.08) translate(0px, 0px); }
      25%  { transform: scale(1.1)  translate(-12px, -8px); }
      50%  { transform: scale(1.08) translate(8px, -14px); }
      75%  { transform: scale(1.1)  translate(-6px, 10px); }
      100% { transform: scale(1.08) translate(10px, 6px); }
    }
    #bg-layer::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.5); }

    #main-view {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      padding: 40px 20px 20px; gap: 20px;
    }
    .search-card { width: 100%; max-width: 660px; display: flex; flex-direction: column; align-items: center; gap: 18px; }
    .input-wrap { width: 100%; }
    .input-wrap input {
      width: 100%; padding: 20px 24px;
      background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px;
      color: var(--text); font-family: 'Inter', sans-serif; font-size: 1.15rem;
      outline: none; backdrop-filter: blur(16px);
      transition: border-color 0.2s, box-shadow 0.2s; text-align: center;
    }
    .input-wrap input::placeholder { color: var(--muted); }
    .input-wrap input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(34,197,94,0.15); }
    .selects-row { display: flex; gap: 10px; width: 100%; }
    .select-wrap { flex: 1; position: relative; }
    .select-wrap select {
      width: 100%; padding: 16px 40px 16px 20px;
      background: var(--glass); border: 1px solid var(--glass-border); border-radius: 14px;
      color: var(--text); font-family: 'Inter', sans-serif; font-size: 1rem;
      outline: none; appearance: none; backdrop-filter: blur(16px); cursor: pointer;
      transition: border-color 0.2s;
    }
    .select-wrap select:focus { border-color: var(--green); }
    .select-wrap option { background: #1a1a1a; color: #fff; }
    .select-wrap::after {
      content: '▾'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none; font-size: 0.8rem;
    }
    #start-btn {
      width: 100%; padding: 22px;
      background: var(--green); border: none; border-radius: 16px;
      color: #fff; font-family: 'Inter', sans-serif; font-weight: 700;
      font-size: 1.25rem; letter-spacing: 0.12em; cursor: pointer;
      transition: all 0.25s ease; position: relative; overflow: hidden;
      box-shadow: 0 4px 32px rgba(34,197,94,0.45);
    }
    #start-btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
      transform: translateX(-100%); transition: transform 0.6s ease;
    }
    #start-btn:hover::before { transform: translateX(100%); }
    #start-btn:hover { background: #16a34a; transform: translateY(-1px); box-shadow: 0 6px 32px rgba(34,197,94,0.45); }
    #start-btn:active { transform: translateY(0); }
    #start-btn:disabled { cursor: not-allowed; transform: none; }
    #start-btn.loading { animation: btnBlink 0.7s ease-in-out infinite; }
    @keyframes btnBlink {
      0%,100% { background: #dc2626; box-shadow: 0 4px 32px rgba(220,38,38,0.6); }
      50%     { background: #ff6b6b; box-shadow: 0 0 48px rgba(220,38,38,0.9); }
    }
    #start-btn.retry {
      animation: btnRetry 0.8s ease-in-out infinite;
      letter-spacing: 0.18em;
    }
    @keyframes btnRetry {
      0%,100% { background: #ca8a04; box-shadow: 0 4px 32px rgba(202,138,4,0.6); }
      50%     { background: #fbbf24; box-shadow: 0 0 48px rgba(251,191,36,0.9); color: #422006; }
    }

    /* BANDE LATÉRALE BOUTIQUE */
    .etsy-img-container { position: relative; width: 100%; }
    .shop-side-col {
      position: absolute; top: 0; left: 0; bottom: 0; width: 42px; z-index: 2;
      display: flex; flex-direction: column; align-items: center; justify-content: space-between;
      padding: 10px 0;
      background: rgba(0,0,0,0.45); border-right: 1px solid rgba(255,255,255,0.08);
      border-radius: 11px 0 0 11px;
    }
    .shop-side-btn {
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; cursor: pointer;
    }
    .shop-side-btn:hover img, .shop-side-btn:hover .side-initial { border-color: rgba(241,100,30,0.9); }
    .shop-side-btn img { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(241,100,30,0.6); }
    .side-initial {
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(241,100,30,0.3); border: 2px solid rgba(241,100,30,0.5);
      color: #fff; font-weight: 700; font-size: 0.85rem;
    }

    /* FIND BUTTON & WINNER */
    #find-wrap { display: none; flex-direction: column; align-items: center; gap: 16px; padding: 10px 0 20px; width: 100%; }
    #find-btn {
      padding: 16px 48px; background: var(--green); border: none; border-radius: 14px;
      color: #fff; font-family: 'Inter', sans-serif; font-weight: 700;
      font-size: 1.1rem; letter-spacing: 0.1em; cursor: pointer;
      transition: all 0.25s; box-shadow: 0 4px 24px rgba(34,197,94,0.4);
    }
    #find-btn:hover { background: #16a34a; transform: translateY(-1px); }
    #find-btn:disabled { opacity: 1; cursor: not-allowed; transform: none; }
    #find-btn.searching {
      animation: findBlink 0.6s ease-in-out infinite;
      cursor: not-allowed;
    }
    @keyframes findBlink {
      0%,100% { background: #dc2626; box-shadow: 0 4px 32px rgba(220,38,38,0.7), 0 0 60px rgba(220,38,38,0.4); }
      50%     { background: #ff3333; box-shadow: 0 0 48px rgba(255,50,50,1),    0 0 80px rgba(220,38,38,0.6); }
    }
    #find-status { font-size: 0.82rem; color: var(--muted); text-align: center; min-height: 1.2em; }
    #winner-card {
      display: none; width: 100%; max-width: 600px;
      background: linear-gradient(135deg, rgba(34,197,94,0.12), rgba(16,163,74,0.06));
      border: 1px solid rgba(34,197,94,0.4); border-radius: 18px; padding: 24px;
      backdrop-filter: blur(16px); animation: slideUp 0.5s ease; text-align: center;
    }
    #winner-card .winner-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.15em; color: var(--green); text-transform: uppercase; margin-bottom: 10px; }
    #winner-card .winner-name { font-size: 1.5rem; font-weight: 800; color: #fff; margin-bottom: 14px; }
    #winner-card .winner-stats { display: flex; justify-content: center; gap: 32px; flex-wrap: wrap; }
    #winner-card .winner-stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    #winner-card .winner-stat-val { font-size: 1.4rem; font-weight: 800; color: var(--green); }
    #winner-card .winner-stat-lbl { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    #winner-card .winner-revenue {
      margin-top: 20px; padding: 16px 20px;
      background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.25);
      border-radius: 12px; text-align: center;
    }
    #winner-card .revenue-amount {
      font-size: 2.2rem; font-weight: 900; color: var(--green);
      text-shadow: 0 0 20px rgba(34,197,94,0.4);
      letter-spacing: -0.02em;
    }
    #winner-card .revenue-label {
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--muted); margin-top: 4px;
    }
    #winner-card .revenue-detail {
      font-size: 0.78rem; color: rgba(255,255,255,0.45); margin-top: 6px;
    }
    #winner-card .winner-link {
      display: inline-block; margin-top: 16px; padding: 10px 28px; border-radius: 10px;
      background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.4);
      color: var(--green); font-weight: 600; text-decoration: none; font-size: 0.85rem; transition: all 0.2s;
    }
    #winner-card .winner-link:hover { background: rgba(34,197,94,0.25); }

    /* PROGRESS */
    #progress-wrap { width: 100%; max-width: 660px; display: none; flex-direction: column; gap: 12px; }
    .progress-steps { display: flex; justify-content: space-between; gap: 4px; }
    .step-dot { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; opacity: 0.3; transition: opacity 0.3s; }
    .step-dot.active { opacity: 1; }
    .step-dot.done { opacity: 0.6; }
    .step-dot .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s, box-shadow 0.3s; }
    .step-dot.active .dot { background: #f97316; box-shadow: 0 0 8px #f97316; animation: blink 0.8s infinite; }
    .step-dot.done .dot { background: var(--green); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .step-dot .step-label { font-size: 0.6rem; color: var(--muted); text-align: center; white-space: nowrap; }
    .progress-track { width: 100%; height: 10px; background: rgba(255,255,255,0.07); border-radius: 10px; overflow: visible; position: relative; }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #7c2d12, #dc2626, #f97316, #fbbf24, #fef08a);
      border-radius: 10px; position: relative; transition: width 0.5s ease;
      box-shadow: 0 0 6px #f97316, 0 0 20px #dc2626, 0 0 40px rgba(220,38,38,0.4);
    }
    .progress-fill::after {
      content: "🔥"; position: absolute; right: -14px; top: 50%; transform: translateY(-55%);
      font-size: 1.3rem; filter: drop-shadow(0 0 6px #f97316);
      animation: flicker 0.3s infinite alternate; display: none;
    }
    .progress-fill.burning::after { display: block; }
    @keyframes flicker {
      0%   { transform: translateY(-55%) scale(1) rotate(-3deg); }
      100% { transform: translateY(-60%) scale(1.08) rotate(3deg); }
    }
    .progress-msg { text-align: center; font-size: 0.78rem; color: var(--muted); min-height: 1.2em; }

    /* RESULTS */
    #results-section { position: relative; z-index: 10; padding: 0 20px 80px; display: none; }
    .results-grid { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    .results-count-bar { text-align: center; font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; }
    .match-card {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 18px; overflow: hidden; backdrop-filter: blur(20px); animation: slideUp 0.4s ease;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
    .match-body { display: grid; grid-template-columns: 1fr 1px 1fr; align-items: start; }
    .divider-line { background: var(--glass-border); align-self: stretch; }
    .product-panel { display: flex; flex-direction: column; align-items: center; padding: 16px 14px; gap: 10px; min-width: 0; box-sizing: border-box; }

    /* ELECTRIC BORDER */
    .img-wrap { position: relative; width: 100%; padding: 3px; border-radius: 14px; box-sizing: border-box; }
    .img-wrap::before {
      content: ''; position: absolute; inset: -2px; border-radius: 15px;
      background: conic-gradient(from var(--angle, 0deg), #00f0ff 0%, #0066ff 10%, transparent 20%, transparent 45%, #a855f7 50%, #00f0ff 60%, transparent 70%, transparent 90%, #0066ff 95%, #00f0ff 100%);
      animation: electric-spin 1.8s linear infinite; z-index: 0;
    }
    .img-wrap::after {
      content: ''; position: absolute; inset: -4px; border-radius: 16px;
      background: conic-gradient(from var(--angle, 0deg), #00f0ff 0%, #0066ff 10%, transparent 20%, transparent 45%, #a855f7 50%, #00f0ff 60%, transparent 70%, transparent 90%, #0066ff 95%, #00f0ff 100%);
      animation: electric-spin 1.8s linear infinite; filter: blur(8px); opacity: 0.6; z-index: 0;
    }
    @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
    @property --tx { syntax: '<length>'; initial-value: 0px; inherits: false; }
    @property --ty { syntax: '<length>'; initial-value: 0px; inherits: false; }
    @property --tr { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
    @keyframes electric-spin { 0% { --angle: 0deg; } 100% { --angle: 360deg; } }

    .img-box { position: relative; z-index: 1; width: 100%; aspect-ratio: 1/1; border-radius: 11px; overflow: hidden; background: rgba(10,10,10,0.9); }
    .img-box img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; display: block; }
    .img-box:hover img { transform: scale(1.04); }
    .prod-link {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 11px 16px; border-radius: 10px;
      font-size: 0.82rem; font-weight: 600; text-decoration: none; letter-spacing: 0.03em;
      transition: all 0.2s; box-sizing: border-box; text-align: center;
    }
    .prod-link.etsy-link { background: rgba(241,100,30,0.15); border: 1px solid rgba(241,100,30,0.3); color: #fb923c; }
    .prod-link.etsy-link:hover { background: rgba(241,100,30,0.25); border-color: rgba(241,100,30,0.6); }
    .prod-link.ali-link { background: rgba(227,24,55,0.15); border: 1px solid rgba(227,24,55,0.3); color: #f87171; }
    .prod-link.ali-link:hover { background: rgba(227,24,55,0.25); border-color: rgba(227,24,55,0.6); }
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }

    /* PRICE TAG */
    .price-tag { font-size: 0.88rem; font-weight: 700; color: #fff; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 5px 12px; width: 100%; text-align: center; }
    .price-tag.etsy-price { color: #fb923c; border-color: rgba(241,100,30,0.3); background: rgba(241,100,30,0.08); }
    .price-tag.ali-price  { color: #f87171; border-color: rgba(227,24,55,0.3);  background: rgba(227,24,55,0.08); }

    /* CANVAS — ordre de stratification :
       -3 : bg-layer (image de fond)
       -2 : milkyway-canvas (voie lactée)
       -1 : shooting-canvas (étoiles filantes) ← au-dessus du fond, sous le contenu
       10 : main-view / results-section (contenu cliquable)
    */
    #milkyway-canvas  { position: fixed; inset: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
    #shooting-canvas  { position: fixed; inset: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

    /* TITLE */
    #title-outer { width: 100%; display: flex; justify-content: center; }
    #title-wrap { position: relative; display: inline-block; padding: 36px 40px 8px; }
    #niche-title { position: relative; z-index: 101; text-align: center; user-select: none; }
    #niche-title span {
      display: inline-block; font-family: 'Croissant One', cursive;
      font-size: clamp(2.4rem, 7vw, 5rem); font-weight: 400; letter-spacing: 0.04em; color: #fff;
      text-shadow: 0 1px 0 #ccc, 0 2px 0 #c9c9c9, 0 3px 0 #bbb, 0 4px 0 #b9b9b9, 0 5px 0 #aaa, 0 6px 1px rgba(0,0,0,.1), 0 0 5px rgba(0,0,0,.1), 0 1px 3px rgba(0,0,0,.3), 0 3px 5px rgba(0,0,0,.2), 0 5px 10px rgba(0,0,0,.25), 0 10px 10px rgba(0,0,0,.2), 0 20px 20px rgba(0,0,0,.15);
      animation: wave3d 2.2s ease-in-out infinite;
    }
    #niche-title span:nth-child(1)  { animation-delay: 0.00s; }
    #niche-title span:nth-child(2)  { animation-delay: 0.07s; }
    #niche-title span:nth-child(3)  { animation-delay: 0.14s; }
    #niche-title span:nth-child(4)  { animation-delay: 0.21s; }
    #niche-title span:nth-child(5)  { animation-delay: 0.28s; }
    #niche-title span:nth-child(6)  { animation-delay: 0.35s; }
    #niche-title span:nth-child(7)  { animation-delay: 0.42s; }
    #niche-title span:nth-child(8)  { animation-delay: 0.49s; }
    #niche-title span:nth-child(9)  { animation-delay: 0.56s; }
    #niche-title span:nth-child(10) { animation-delay: 0.63s; }
    #niche-title span:nth-child(11) { animation-delay: 0.70s; }
    .title-space { display: inline-block; width: 0.35em; }
    @keyframes wave3d {
      0%, 100% { transform: translateY(0) rotateX(0deg) scale(1); }
      25% { transform: translateY(-18px) rotateX(20deg) scale(1.08); }
      50% { transform: translateY(0) rotateX(0deg) scale(1); }
    }

    /* MOBILE */
    @media (max-width: 640px) {
      #main-view { padding: 24px 14px; }
      .search-card { gap: 10px; }
      .input-wrap input { padding: 13px 16px; font-size: 0.95rem; }
      .select-wrap select { padding: 11px 30px 11px 13px; font-size: 0.82rem; }
      #start-btn { padding: 15px; font-size: 1rem; }
      .match-body { display: flex; flex-direction: row; align-items: stretch; }
      .divider-line { width: 1px; flex-shrink: 0; }
      .product-panel { flex: 1; min-width: 0; padding: 10px 6px; gap: 6px; }
      .prod-link { font-size: 0.65rem; padding: 6px 4px; border-radius: 8px; }
      .price-tag { font-size: 0.7rem; padding: 4px 6px; }
    }

    /* INTRO */
    #intro {
      position: fixed; inset: 0; z-index: 9999;
      background: #000; display: flex; align-items: center; justify-content: center;
    }
    #intro-text {
      font-family: 'Croissant One', cursive;
      font-size: clamp(2.8rem, 9vw, 6rem);
      color: #fff; letter-spacing: 0.06em; text-align: center;
      text-shadow: 0 0 40px rgba(255,255,255,0.3);
      animation: introAppear 0.8s ease forwards;
    }
    @keyframes introAppear { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    #intro-text span { display: inline-block; }
    #intro-text span.blast { animation: blast 0.6s ease forwards; }
    @keyframes blast { to { transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--tr)); opacity: 0; } }

    #bg-layer, #milkyway-canvas, #title-outer, #main-view { transition: opacity 0.7s ease; }

    /* ── AUTH MODAL ── */
    #auth-modal-overlay {
      position: fixed; inset: 0; z-index: 2000;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    #auth-modal {
      width: 100%; max-width: 320px; margin: 20px;
      background: rgba(8,8,8,0.55); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px; padding: 26px 24px 22px;
      backdrop-filter: blur(18px); animation: modalUp 0.4s ease;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      pointer-events: all;
    }
    @keyframes modalUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }
    .modal-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .modal-tab {
      flex: 1; padding: 9px; background: transparent;
      border: 1.5px solid var(--green); border-radius: 9px;
      color: var(--green); font-family: 'Inter', sans-serif;
      font-size: 0.84rem; font-weight: 700; cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .modal-tab.active { background: var(--green); color: #fff; box-shadow: 0 2px 12px rgba(34,197,94,0.4); }
    .modal-field {
      width: 100%; padding: 11px 14px; margin-bottom: 9px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 9px; color: #fff; font-family: 'Inter', sans-serif; font-size: 0.88rem;
      outline: none; transition: border-color 0.2s;
    }
    .modal-field:focus { border-color: var(--green); }
    .modal-field::placeholder { color: rgba(255,255,255,0.25); }
    .modal-submit {
      width: 100%; padding: 12px; border: none; border-radius: 9px;
      background: var(--green); color: #fff; font-family: 'Inter', sans-serif;
      font-weight: 700; font-size: 0.92rem; cursor: pointer; transition: all 0.2s; margin-top: 2px;
      box-shadow: 0 3px 16px rgba(34,197,94,0.3);
    }
    .modal-submit:hover { background: #16a34a; }
    .modal-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .modal-error { color: #f87171; font-size: 0.76rem; margin-top: 7px; min-height: 1em; text-align: center; }

    /* START btn verrouillé */
    #start-btn.locked {
      background: #dc2626 !important;
      color: #fff !important;
      box-shadow: 0 4px 24px rgba(220,38,38,0.45) !important;
      cursor: pointer !important;
      border: none;
    }
    #start-btn.locked:hover { background: #b91c1c !important; transform: translateY(-1px) !important; }

    /* ── BOUTON DASHBOARD ── */
    #dashboard-btn {
      position: fixed; top: 10px; right: 10px; z-index: 500;
      display: flex; align-items: center; gap: 5px;
      padding: 6px 12px; border-radius: 8px; border: none;
      background: var(--green); color: #fff;
      font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.72rem;

  <!-- INTRO -->
  <div id="intro">

  <div id="bg-layer"></div>
  <canvas id="milkyway-canvas"></canvas>
  <canvas id="shooting-canvas"></canvas>

  <div id="title-outer">
    <div id="title-wrap">
      <div id="niche-title"><span>N</span><span>i</span><span>c</span><span>h</span><span>e</span><span class="title-space"></span><span>F</span><span>i</span><span>n</span><span>d</span><span>e</span><span>r</span></div>
    </div>
  </div>

  <div id="main-view">
    <div class="search-card">
      <div class="input-wrap">
        <input type="text" id="keyword-input" placeholder="Enter keyword" />
      </div>
      <div class="selects-row">

            <option value="1">1 image</option>

            <option value="4">4 images</option>
            <option value="5">5 images</option>
            <option value="6">6 images</option>
            <option value="7">7 images</option>
            <option value="8">8 images</option>
            <option value="9">9 images</option>
            <option value="10" selected>10 images</option>
            <option value="15">15 images</option>
            <option value="20">20 images</option>
            <option value="25">25 images</option>
            <option value="30">30 images</option>
            <option value="40">40 images</option>
            <option value="50">50 images</option>
            <option value="75">75 images</option>
            <option value="100">100 images</option>
          </select>
        </div>
      </div>
      <button id="start-btn" onclick="startSearch()">START</button>
    </div>

    <div id="progress-wrap">

    </div>

    <section id="results-section">
      <div class="results-grid">
        <div class="results-count-bar" id="results-count"></div>

          <button id="find-btn" onclick="startFind()">🔍 Find</button>
          <div id="find-status"></div>
          <div id="winner-card"></div>
        </div>
      </div>
    </section>
  </div>

  <!-- INTRO SCRIPT — isolé, en premier -->
  <script>
    (function() {
      try {
        var ids = ['bg-layer','milkyway-canvas','title-outer','main-view','shooting-canvas'];
        ids.forEach(function(id) {
          var el = document.getElementById(id);
          if (el) { el.style.opacity = '0'; el.style.transition = 'opacity 0.7s ease'; }
        });
        setTimeout(function() {
          try {
            document.querySelectorAll('#intro-text span').forEach(function(el) {
              var a = Math.random() * Math.PI * 2;
              var d = 150 + Math.random() * 350;
              el.style.setProperty('--tx', Math.cos(a)*d + 'px');
              el.style.setProperty('--ty', Math.sin(a)*d + 'px');
              el.style.setProperty('--tr', (Math.random()*600-300) + 'deg');
              el.classList.add('blast');
            });
          } catch(e) {}
          setTimeout(function() {
            try {
              var intro = document.getElementById('intro');
              if (intro) intro.style.display = 'none';
              ids.forEach(function(id) {
                var el = document.getElementById(id);
                if (el) el.style.opacity = '1';
              });
            } catch(e) {}
          }, 650);
        }, 2000);
      } catch(e) {}
    })();
  </script>

  <script>
    // ── Pipeline steps ──
    const STEPS = [
      { key: 'scraping_etsy',    label: 'Etsy' },
      { key: 'reverse_search',   label: 'Reverse' },
      { key: 'aliexpress_found', label: 'AliExpress' },
      { key: 'comparing',        label: 'IA' },
      { key: 'finalizing',       label: 'Résultats' },
    ];

    function initProgress() {
      const container = document.getElementById('progress-steps');
      container.innerHTML = '';
      STEPS.forEach(function(step) {
        const div = document.createElement('div');
        div.className = 'step-dot';
        div.id = 'step-' + step.key;
        div.innerHTML = '<div class="dot"></div><span class="step-label">' + step.label + '</span>';
        container.appendChild(div);
      });
      setProgress(0);
      document.getElementById('progress-msg').textContent = '';
    }

    function setProgress(pct) {
      const el = document.getElementById('progress-fill');
      el.style.width = pct + '%';
      if (pct > 0 && pct < 100) el.classList.add('burning');
      else el.classList.remove('burning');
    }

    function advanceStep(stepKey, message) {
      const idx = STEPS.findIndex(function(s) { return s.key === stepKey; });
      if (idx === -1) return;
      STEPS.forEach(function(s, i) {
        const el = document.getElementById('step-' + s.key);
        if (!el) return;
        if (i < idx) el.className = 'step-dot done';
        else if (i === idx) el.className = 'step-dot active';
        else el.className = 'step-dot';
      });
      setProgress(Math.round(((idx + 1) / STEPS.length) * 100));
      document.getElementById('progress-msg').textContent = message || '';
    }

    function completeAllSteps() {
      STEPS.forEach(function(s) {
        const el = document.getElementById('step-' + s.key);
        if (el) el.className = 'step-dot done';
      });
      setProgress(100);
    }

    // ── Search ──
    let _lastResults = [];

    async function startSearch() {
      const keyword = document.getElementById('keyword-input').value.trim();
      const maxCount = parseInt(document.getElementById('count-select').value) || 10;
      const threshold = 40;

      if (!keyword) { document.getElementById('keyword-input').focus(); return; }

      const btn = document.getElementById('start-btn');
      btn.disabled = true;
      btn.textContent = 'LOADING';
      btn.classList.remove('retry');
      btn.classList.add('loading');
      document.getElementById('keyword-input').disabled = true;
      document.getElementById('count-select').disabled = true;

      document.getElementById('progress-wrap').style.display = 'flex';
      initProgress();
      document.getElementById('results-section').style.display = 'none';
      document.getElementById('results-container').innerHTML = '';
      document.getElementById('results-count').textContent = '';
      document.getElementById('find-wrap').style.display = 'none';
      document.getElementById('winner-card').style.display = 'none';
      document.getElementById('find-status').textContent = '';
      document.documentElement.classList.remove('unlocked');
      document.documentElement.style.overflow = '';
      document.body.style.overflow = '';
      window.scrollTo({ top: 0 });

      try {
        document.getElementById('progress-msg').textContent = '⏳ Connecting to server...';
        const response = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ keyword, similarityThreshold: threshold, maxCount })
        });

        const ct = response.headers.get('content-type') || '';

        if (ct.includes('text/event-stream')) {
          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buf = '';
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const lines = buf.split('\n');
            buf = lines.pop();
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              try {
                const ev = JSON.parse(line.slice(6));
                if (ev.step === 'complete') {
                  completeAllSteps();
                  document.getElementById('progress-msg').textContent = '✅ ' + (ev.results?.length || 0) + ' match(es)';
                  _lastResults = ev.results || [];
                  _lastResults.forEach(renderMatch);
                  finalize(_lastResults.length);
                } else if (ev.step === 'error') {
                  document.getElementById('progress-msg').textContent = '❌ ' + ev.message;
                  finalize(-1);
                } else {
                  advanceStep(ev.step, ev.message);
                }
              } catch(e) {}
            }
          }
        } else {
          const data = await response.json();
          document.getElementById('progress-msg').textContent = '❌ ' + (data.error || 'Server error');
          finalize(-1);
        }
      } catch(err) {
        document.getElementById('progress-msg').textContent = '❌ ' + err.message;
        document.getElementById('progress-msg').style.color = '#ff4444';
        finalize(-1);
      }

      function finalize(count) {
        btn.disabled = false;
        btn.classList.remove('loading');
        document.getElementById('keyword-input').disabled = false;
        document.getElementById('count-select').disabled = false;

        if (count === -1) {
          // Erreur — bouton jaune RETRY
          btn.classList.add('retry');
          btn.textContent = 'RETRY';
        } else {
          btn.classList.remove('retry');
          btn.textContent = 'START';
        }

        if (count === 0) {
          document.getElementById('results-container').innerHTML = '<div class="empty">No matches found. Try another keyword.</div>';
        }
        if (count >= 0) {
          if (count > 0) document.getElementById('results-count').textContent = count + ' match(es) found';
          const rs = document.getElementById('results-section');
          rs.style.display = 'block';
          if (count > 0) {
            document.getElementById('find-wrap').style.display = 'flex';
            document.getElementById('winner-card').style.display = 'none';
          }
          document.documentElement.classList.add('unlocked');
          document.documentElement.style.overflowY = 'auto';
          document.body.style.overflowY = 'auto';
          setTimeout(function() { rs.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
        }
      }
    }

    function renderMatch(m) {
      const etsy = m.etsy;
      const aliexpress = m.aliexpress;
      const etsySrc  = etsy.hostedImageUrl || etsy.image || '';
      const aliSrc   = aliexpress.image || '';
      const shopUrl  = etsy.shopUrl || (etsy.link ? etsy.link.split('/listing/')[0].replace(/\/listing\/.*/, '') : '') || '';
      // Extraire le nom depuis l'URL si shopName absent : etsy.com/shop/NomBoutique
      const _shopNameFromUrl = shopUrl ? shopUrl.split('/shop/')[1]?.split('/')[0] || shopUrl.split('/')[3] || '' : '';
      const shopName = etsy.shopName || _shopNameFromUrl || 'Shop';
      const shopAvatar = etsy.shopAvatar || '';
      const etsyPriceHtml = etsy.price ? '<div class="price-tag etsy-price">💰 ' + etsy.price + '</div>' : '';
      const aliPriceHtml  = aliexpress.price ? '<div class="price-tag ali-price">💰 ' + aliexpress.price + '</div>' : '';
      const initial = shopName.charAt(0).toUpperCase();

      const card = document.createElement('div');
      card.className = 'match-card';
      card.innerHTML =
        '<div class="match-body">' +
          '<div class="product-panel">' +
            '<div class="etsy-img-container">' +
              '<div class="shop-side-col">' +
              '<a class="shop-side-btn" href="' + shopUrl + '" target="_blank" rel="noopener" title="' + shopName + '">' +
                (shopAvatar
                  ? '<img src="' + shopAvatar + '" alt="' + shopName + '" onerror="this.style.display=\'none\'" />'
                  : '<span class="side-initial">' + initial + '</span>') +
              '</a>' +
              '<button class="btn-heart-icon" id="heart-' + encodeShopKey(shopUrl) + '" onclick="saveShop(' + JSON.stringify(JSON.stringify({shopUrl, shopName, shopAvatar})) + ', this)">♡</button>' +
            '</div>' +
              '<div class="img-wrap"><div class="img-box">' +
                (etsySrc ? '<img src="' + etsySrc + '" loading="lazy" alt="" onerror="this.style.display=\'none\'" />' : '') +
              '</div></div>' +
            '</div>' +
            etsyPriceHtml +
            '<a class="prod-link etsy-link" href="' + etsy.link + '" target="_blank" rel="noopener">🛍 Etsy ↗</a>' +
            
          '</div>' +
          '<div class="divider-line"></div>' +
          '<div class="product-panel">' +
            '<div class="img-wrap"><div class="img-box">' +
              (aliSrc ? '<img src="' + aliSrc + '" loading="lazy" alt="" onerror="this.style.display=\'none\'" />' : '') +
            '</div></div>' +
            aliPriceHtml +
            (aliexpress.link
              ? '<a class="prod-link ali-link" href="' + aliexpress.link + '" target="_blank" rel="noopener">🛒 AliExpress ↗</a>'
              : '<span class="prod-link ali-link" style="opacity:0.4;cursor:default">🛒 AliExpress</span>') +
          '</div>' +
        '</div>';
      document.getElementById('results-container').appendChild(card);
    }

    // ── FIND ──
    async function startFind() {
      const btn = document.getElementById('find-btn');
      const status = document.getElementById('find-status');
      const winnerCard = document.getElementById('winner-card');
      if (!_lastResults.length) { status.textContent = 'No results available.'; return; }

      btn.disabled = true;
      btn.classList.add('searching');
      btn.textContent = 'Analyzing...';
      status.textContent = 'Connecting...';
      winnerCard.style.display = 'none';

      function resetBtn() {
        btn.disabled = false;
        btn.classList.remove('searching');
        btn.textContent = '🔍 Find';
        btn.style.background = '';
      }

      try {
        const response = await fetch('/api/shop-stats', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ results: _lastResults })
        });
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try {
              const ev = JSON.parse(line.slice(6));
              if (ev.step === 'scraping') {
                status.textContent = '🏪 Scraping ' + ev.shopName + '... (' + (ev.index + 1) + ')';
              } else if (ev.step === 'done') {
                const st = ev.stats;
                const salesStr = st.sales != null ? st.sales.toLocaleString('fr-FR') + ' sales' : 'unknown sales';
                const dateStr  = st.createdAt ? new Date(st.createdAt).toLocaleDateString('fr-FR', { month: 'short', year: 'numeric' }) : 'unknown date';
                status.textContent = '✅ ' + ev.shopName + ' — ' + salesStr + ', created ' + dateStr;
              } else if (ev.step === 'complete') {
                resetBtn(); status.textContent = '';
                showWinner(ev.winner);
              } else if (ev.step === 'error') {
                status.textContent = '❌ ' + ev.message;
                resetBtn();
              }
            } catch(e) {}
          }
        }
      } catch(err) {
        status.textContent = '❌ ' + err.message;
        resetBtn();
      }
    }

    function showWinner(winner) {
      const card = document.getElementById('winner-card');
      if (!winner) { document.getElementById('find-status').textContent = 'Insufficient data.'; return; }
      const sales   = winner.sales != null ? winner.sales.toLocaleString('fr-FR') : '—';
      const created = winner.createdAt ? new Date(winner.createdAt) : null;
      const ageDays = created ? Math.max(Math.floor((Date.now() - created.getTime()) / 86400000), 1) : 0;
      const ageStr  = ageDays ? (ageDays < 365 ? ageDays + ' days' : Math.floor(ageDays / 365) + ' years') : '—';
      const perDay  = (winner.sales && ageDays) ? (winner.sales / ageDays).toFixed(2) : '—';
      const yearStr = created ? created.getFullYear().toString() : '—';
      const dateStr = created ? created.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' }) : '—';

      // Bénéfice brut estimé = prix moyen boutique × sales totales
      let revenueHtml = '';
      if (winner.avgPrice != null && winner.sales != null) {
        const revenue = winner.avgPrice * winner.sales;
        const revenueStr = revenue >= 1000000
          ? '$' + (revenue / 1000000).toFixed(1) + 'M'
          : revenue >= 1000
          ? '$' + (revenue / 1000).toFixed(0) + 'K'
          : '$' + revenue.toFixed(0);
        const avgPriceStr = '$' + winner.avgPrice.toFixed(2);
        revenueHtml =
          '<div class="winner-revenue">' +
            '<div class="revenue-amount">' + revenueStr + '</div>' +
            '<div class="revenue-label">Estimated revenue</div>' +
            '<div class="revenue-detail">Avg. shop price : ' + avgPriceStr + ' × ' + winner.sales.toLocaleString('fr-FR') + ' sales</div>' +
          '</div>';
      }

      card.innerHTML =
        '<div class="winner-label">🏆 Top performing shop</div>' +
        '<div class="winner-name">' + (winner.shopName || 'Boutique') + '</div>' +
        '<div class="winner-stats">' +
          '<div class="winner-stat">' +
            '<span class="winner-stat-val">' + sales + '</span>' +
            '<span class="winner-stat-lbl">Total sales</span>' +
          '</div>' +
          '<div class="winner-stat">' +
            '<span class="winner-stat-val">' + ageStr + '</span>' +
            '<span class="winner-stat-lbl">Shop age</span>' +
          '</div>' +
          '<div class="winner-stat">' +
            '<span class="winner-stat-val">' + perDay + '</span>' +
            '<span class="winner-stat-lbl">Sales / day</span>' +
          '</div>' +
          '<div class="winner-stat">' +
            '<span class="winner-stat-val">' + yearStr + '</span>' +
            '<span class="winner-stat-lbl">Founded</span>' +
          '</div>' +
        '</div>' +
        revenueHtml +
        '<div style="font-size:0.75rem;color:var(--muted);margin-top:10px;">Founded in ' + dateStr + '</div>' +
        (winner.shopUrl ? '<a class="winner-link" href="' + winner.shopUrl + '" target="_blank" rel="noopener">Visit shop ↗</a>' : '');
      card.style.display = 'block';
      setTimeout(function() { card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 100);
    }

    // ── VOIE LACTÉE ──
    (function() {
      const canvas = document.getElementById('milkyway-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let W, H, cx, cy;
      const bandAngle = Math.PI / 5;
      const bandW = 600;
      const rand = function(a, b) { return Math.random() * (b - a) + a; };
      let nebulae = [];

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
        cx = W / 2; cy = H / 2;
        buildNebulae();
      }
      window.addEventListener('resize', resize);
      resize();

      function buildNebulae() {
        nebulae = [];
        const colors = [[180,100,200],[100,120,255],[255,120,80],[80,200,255],[200,80,255]];
        for (var i = 0; i < 5; i++) {
          const col   = colors[i];
          const along = rand(-bandW * 0.4, bandW * 0.4);
          const spread = rand(-60, 60);
          nebulae.push({
            x: cx + Math.cos(bandAngle)*along - Math.sin(bandAngle)*spread,
            y: cy + Math.sin(bandAngle)*along + Math.cos(bandAngle)*spread,
            rx: rand(80, 220), ry: rand(40, 120),
            angle: bandAngle + rand(-0.3, 0.3),
            r: col[0], g: col[1], b: col[2],
            alpha: rand(0.04, 0.1), pulse: rand(0.001, 0.003), pulseDir: 1
          });
        }
      }

      var driftAngle = 0;
      function draw() {
        ctx.clearRect(0, 0, W, H);
        driftAngle += 0.00008;
        ctx.save();
        ctx.translate(W/2, H/2); ctx.rotate(driftAngle); ctx.translate(-W/2, -H/2);
        nebulae.forEach(function(n) {
          n.alpha += n.pulse * n.pulseDir;
          if (n.alpha > 0.12 || n.alpha < 0.03) n.pulseDir *= -1;
          ctx.save();
          ctx.translate(n.x, n.y); ctx.rotate(n.angle);
          const g = ctx.createRadialGradient(0,0,0,0,0,n.rx);
          g.addColorStop(0,   'rgba('+n.r+','+n.g+','+n.b+','+n.alpha+')');
          g.addColorStop(0.5, 'rgba('+n.r+','+n.g+','+n.b+','+(n.alpha*0.4)+')');
          g.addColorStop(1,   'rgba('+n.r+','+n.g+','+n.b+',0)');
          ctx.scale(1, n.ry/n.rx);
          ctx.beginPath(); ctx.arc(0,0,n.rx,0,Math.PI*2);
          ctx.fillStyle = g; ctx.fill();
          ctx.restore();
        });
        ctx.restore();
        requestAnimationFrame(draw);
      }
      draw();
    })();

    // ── ÉTOILES FILANTES ──
    (function() {
      const canvas = document.getElementById('shooting-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let W, H;
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      window.addEventListener('resize', resize); resize();
      const rand = function(a, b) { return Math.random()*(b-a)+a; };
      function mkStar() {
        const angle = rand(25,50)*Math.PI/180, spd = rand(6,16);
        return { x: rand(-100,W*0.8), y: rand(-60,H*0.4), vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, alpha: rand(0.6,1), w: rand(1,2.5), tail: rand(12,28), decay: rand(0.991,0.997) };
      }
      var stars = [mkStar(),mkStar(),mkStar(),mkStar()];
      function draw() {
        ctx.clearRect(0,0,W,H);
        if (Math.random()<0.02 && stars.length<10) stars.push(mkStar());
        stars = stars.filter(function(s) {
          const grad = ctx.createLinearGradient(s.x,s.y,s.x-s.vx*s.tail,s.y-s.vy*s.tail);
          grad.addColorStop(0,'rgba(255,255,255,'+s.alpha+')');
          grad.addColorStop(0.4,'rgba(200,220,255,'+(s.alpha*0.5)+')');
          grad.addColorStop(1,'rgba(180,200,255,0)');
          ctx.beginPath(); ctx.strokeStyle=grad; ctx.lineWidth=s.w; ctx.lineCap='round';
          ctx.moveTo(s.x,s.y); ctx.lineTo(s.x-s.vx*s.tail,s.y-s.vy*s.tail); ctx.stroke();
          ctx.beginPath(); ctx.arc(s.x,s.y,s.w*1.2,0,Math.PI*2);
          ctx.fillStyle='rgba(255,255,255,'+(s.alpha*0.8)+')'; ctx.fill();
          s.x+=s.vx; s.y+=s.vy; s.alpha*=s.decay;
          return s.x<W+200 && s.y<H+200 && s.alpha>0.03;
        });
        requestAnimationFrame(draw);
      }
      draw();
    })();

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('keyword-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') startSearch();
      });
      initAuth();
    });

    // ── AUTH ──
    let SCOUT_TOKEN = localStorage.getItem('scout_token') || null;
    let _savedShopUrls = new Set();
    let _modalTab = 'login';

    async function initAuth() {
      if (SCOUT_TOKEN) {
        try {
          const r = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + SCOUT_TOKEN } });
          if (r.ok) {
            const data = await r.json();
            onLoggedIn(data.email);
            return;
          }
        } catch(e) {}
        SCOUT_TOKEN = null;
        localStorage.removeItem('scout_token');
      }
      // Pas connecté — verrouiller START, ne PAS ouvrir la modal
      lockStart();
    }

    function onLoggedIn(email) {
      SCOUT_TOKEN = localStorage.getItem('scout_token');
      unlockStart();
      hideAuthModal();
      const label = document.getElementById('db-label');
      if (label) label.textContent = email ? email.split('@')[0] : 'Dashboard';
      initSavedShops();
    }

    function lockStart() {
      const btn = document.getElementById('start-btn');
      if (!btn) return;
      btn.textContent = 'REGISTER';
      btn.classList.add('locked');
      btn.onclick = function(e) { e.preventDefault(); showAuthModal(); };
    }

    function unlockStart() {
      const btn = document.getElementById('start-btn');
      if (!btn) return;
      btn.textContent = 'START';
      btn.classList.remove('locked');
      btn.onclick = startSearch;
    }

    function showAuthModal() {
      document.getElementById('auth-modal-overlay').style.display = 'flex';
    }

    function hideAuthModal() {
      document.getElementById('auth-modal-overlay').style.display = 'none';
    }

    // Clic en dehors = ferme seulement si déjà connecté
    document.getElementById('auth-modal-overlay').addEventListener('click', function(e) {
      if (e.target === this && SCOUT_TOKEN) hideAuthModal();
    });

    function modalSwitchTab(tab) {
      _modalTab = tab;
      document.getElementById('modal-tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('modal-tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('modal-submit-btn').textContent = tab === 'login' ? 'Login' : "Register";
      document.getElementById('modal-error').textContent = '';
    }

    async function modalSubmitAuth() {
      const email    = document.getElementById('modal-email').value.trim();
      const password = document.getElementById('modal-password').value;
      const errEl    = document.getElementById('modal-error');
      const btn      = document.getElementById('modal-submit-btn');
      errEl.textContent = '';
      if (!email || !password) { errEl.textContent = 'Please fill in all fields'; return; }
      btn.disabled = true; btn.textContent = '...';
      try {
        const endpoint = _modalTab === 'login' ? '/api/auth/login' : '/api/auth/register';
        const r = await fetch(endpoint, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await r.json();
        if (!r.ok) { errEl.textContent = data.error || 'Erreur'; return; }
        localStorage.setItem('scout_token', data.token);
        SCOUT_TOKEN = data.token;
        onLoggedIn(data.email);
      } catch(e) {
        errEl.textContent = e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = _modalTab === 'login' ? 'Login' : "Register";
      }
    }

    // Enter key dyears modal
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && document.getElementById('auth-modal-overlay').style.display !== 'none') {
        modalSubmitAuth();
      }
    });

    // ── SAVE SHOP ──
    function encodeShopKey(url) {
      return (url || '').replace(/[^a-zA-Z0-9]/g, '_').slice(0, 40);
    }

    async function initSavedShops() {
      if (!SCOUT_TOKEN) return;
      try {
        const r = await fetch('/api/shops', { headers: { 'Authorization': 'Bearer ' + SCOUT_TOKEN } });
        if (!r.ok) return;
        const shops = await r.json();
        shops.forEach(function(s) { _savedShopUrls.add(s.shopUrl); });
        updateDbCount();
      } catch(e) {}
    }

    function updateDbCount() {
      const badge = document.getElementById('db-count');
      if (!badge) return;
      const n = _savedShopUrls.size;
      badge.textContent = n;
      badge.style.display = n > 0 ? 'inline' : 'none';
    }

    async function saveShop(jsonStr, btn) {
      // Relire le token à chaque appel au cas où il a été défini après chargement
      const token = localStorage.getItem('scout_token');
      if (!token) { showAuthModal(); return; }

      let data;
      try { data = JSON.parse(jsonStr); } catch(e) { return; }

      // Si déjà sauvegardée, marquer le bouton et aller au dashboard
      if (_savedShopUrls.has(data.shopUrl)) {
        btn.classList.add('saved');
        btn.textContent = '♥';
        return;
      }

      btn.classList.add('saving');
      btn.textContent = '⏳';

      try {
        const r = await fetch('/api/shops/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify(data)
        });
        if (r.ok) {
          _savedShopUrls.add(data.shopUrl);
          btn.classList.remove('saving');
          btn.classList.add('saved');
          btn.textContent = '♥';
          updateDbCount();
        } else {
          const err = await r.json().catch(() => ({}));
          console.warn('[saveShop] error:', err);
          btn.classList.remove('saving');
          btn.textContent = '♡';
        }
      } catch(e) {
        console.warn('[saveShop] fetch error:', e.message);
        btn.classList.remove('saving');
        btn.textContent = '♡';
      }
    }
  </script>
</body>
