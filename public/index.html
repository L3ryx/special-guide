<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finder Niche</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Croissant+One&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --green: #22c55e; --glass: rgba(0,0,0,0.55); --glass-border: rgba(255,255,255,0.12); --text: #ffffff; --muted: rgba(255,255,255,0.55); }
    html, body { min-height: 100%; font-family: 'Inter', sans-serif; color: var(--text); overflow: hidden; }
    body { position: relative; }
    html.unlocked, html.unlocked body { overflow-y: auto; overflow-x: hidden; }

    #bg-layer { position: fixed; inset: 0; z-index: -3; background: #0a0a0a url('/background.png') center center / cover no-repeat; animation: bgDrift 18s ease-in-out infinite alternate; transform-origin: center; }
    @keyframes bgDrift { 0%{transform:scale(1.08)translate(0,0)} 25%{transform:scale(1.1)translate(-12px,-8px)} 50%{transform:scale(1.08)translate(8px,-14px)} 75%{transform:scale(1.1)translate(-6px,10px)} 100%{transform:scale(1.08)translate(10px,6px)} }
    #bg-layer::after { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.5); }
    #milkyway-canvas { position:fixed; inset:0; width:100%; height:100%; z-index:-2; pointer-events:none; }
    #shooting-canvas { position:fixed; inset:0; width:100%; height:100%; z-index:-1; pointer-events:none; }

    /* ── INTRO ── */
    #intro { position:fixed; inset:0; z-index:9999; background:#000; display:flex; align-items:center; justify-content:center; }
    #intro-text { font-family:'Croissant One',cursive; font-size:clamp(2.8rem,9vw,6rem); color:#fff; letter-spacing:0.06em; text-align:center; text-shadow:0 0 40px rgba(255,255,255,0.3); animation:introAppear 0.8s ease forwards; }
    @keyframes introAppear { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
    #intro-text span { display:inline-block; }
    #intro-text span.blast { animation:blast 0.6s ease forwards; }
    @keyframes blast { to{transform:translate(var(--tx),var(--ty))scale(0)rotate(var(--tr));opacity:0} }
    #bg-layer,#milkyway-canvas,#main-view { transition:opacity 0.7s ease; }

    /* ── AUTH MODAL ── */
    #auth-overlay { position:fixed; inset:0; z-index:8000; background:rgba(0,0,0,0.75); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; }
    #auth-box { width:100%; max-width:420px; margin:20px; background:rgba(15,15,15,0.95); border:1px solid rgba(255,255,255,0.12); border-radius:24px; padding:36px 32px; display:flex; flex-direction:column; gap:20px; }
    #auth-logo { text-align:center; font-family:'Croissant One',cursive; font-size:1.6rem; color:#fff; letter-spacing:0.05em; }
    #auth-subtitle { text-align:center; font-size:0.82rem; color:var(--muted); }
    .auth-tabs { display:flex; gap:8px; background:rgba(255,255,255,0.06); border-radius:12px; padding:4px; }
    .auth-tab { flex:1; padding:10px; border:none; background:transparent; color:var(--muted); font-family:'Inter',sans-serif; font-size:0.88rem; font-weight:600; border-radius:9px; cursor:pointer; transition:all 0.2s; }
    .auth-tab.active { background:rgba(255,255,255,0.12); color:#fff; }
    .auth-input { width:100%; padding:14px 18px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:#fff; font-family:'Inter',sans-serif; font-size:0.95rem; outline:none; transition:border-color 0.2s; }
    .auth-input:focus { border-color:var(--green); }
    .auth-input::placeholder { color:var(--muted); }
    #auth-submit { width:100%; padding:15px; background:var(--green); border:none; border-radius:12px; color:#fff; font-family:'Inter',sans-serif; font-weight:700; font-size:1rem; cursor:pointer; transition:all 0.2s; }
    #auth-submit:hover { background:#16a34a; }
    #auth-submit:disabled { opacity:0.6; cursor:not-allowed; }
    #auth-error { text-align:center; font-size:0.82rem; color:#f87171; min-height:1.2em; }
    #auth-forgot { text-align:center; font-size:0.8rem; color:var(--muted); cursor:pointer; text-decoration:underline; }
    #auth-forgot:hover { color:#fff; }
    #auth-forgot-form { display:none; flex-direction:column; gap:12px; }
    #auth-forgot-back { text-align:center; font-size:0.8rem; color:var(--muted); cursor:pointer; }
    #auth-forgot-back:hover { color:#fff; }
    #auth-forgot-msg { text-align:center; font-size:0.82rem; color:var(--green); min-height:1.2em; }

    /* ── USER BADGE (top right) ── */
    #user-badge { position:fixed; top:10px; right:12px; z-index:500; display:none; }
    #user-avatar-btn { width:40px; height:40px; border-radius:50%; border:2px solid rgba(59,130,246,0.6); background:rgba(59,130,246,0.18); color:#60a5fa; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; padding:0; }
    #user-avatar-btn svg { width:22px; height:22px; }
    #user-avatar-btn:hover { background:rgba(59,130,246,0.35); border-color:#60a5fa; color:#fff; }
    .user-dropdown { position:absolute; top:calc(100% + 10px); right:0; background:rgba(10,10,10,0.97); border:1px solid rgba(255,255,255,0.13); border-radius:16px; padding:8px; min-width:220px; box-shadow:0 16px 48px rgba(0,0,0,0.7); backdrop-filter:blur(20px); display:none; flex-direction:column; gap:2px; z-index:600; animation:menuPop 0.15s ease; }
    .user-dropdown.open { display:flex; }
    @keyframes menuPop { from{opacity:0;transform:translateY(-6px)scale(0.97)} to{opacity:1;transform:none} }
    .user-dropdown-email { font-size:0.73rem; color:rgba(255,255,255,0.4); padding:6px 12px 8px; word-break:break-all; }
    .user-dropdown-sep { border:none; border-top:1px solid rgba(255,255,255,0.08); margin:4px 0; }
    .user-dropdown-item { display:flex; align-items:center; gap:8px; padding:10px 14px; border-radius:10px; border:none; background:transparent; color:rgba(255,255,255,0.8); font-family:'Inter',sans-serif; font-size:0.85rem; font-weight:500; cursor:pointer; text-align:left; transition:all 0.15s; width:100%; }
    .user-dropdown-item:hover { background:rgba(255,255,255,0.09); color:#fff; }
    .user-dropdown-item.danger { color:#f87171; }
    .user-dropdown-item.danger:hover { background:rgba(248,113,113,0.1); color:#fca5a5; }
    /* Account modals */
    .acct-overlay { position:fixed; inset:0; z-index:9000; background:rgba(0,0,0,0.75); backdrop-filter:blur(8px); display:none; align-items:center; justify-content:center; }
    .acct-overlay.open { display:flex; }
    .acct-box { background:rgba(12,12,12,0.97); border:1px solid rgba(255,255,255,0.12); border-radius:20px; padding:30px 28px; width:100%; max-width:380px; margin:20px; display:flex; flex-direction:column; gap:16px; }
    .acct-box-title { font-size:1.05rem; font-weight:700; color:#fff; }
    .acct-field { width:100%; padding:13px 16px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:11px; color:#fff; font-family:'Inter',sans-serif; font-size:0.95rem; outline:none; }
    .acct-field:focus { border-color:#3b82f6; }
    .acct-field::placeholder { color:rgba(255,255,255,0.3); }
    .acct-box-btns { display:flex; gap:10px; }
    .acct-box-btn { flex:1; padding:12px; border-radius:10px; border:none; font-family:'Inter',sans-serif; font-weight:700; font-size:0.9rem; cursor:pointer; }
    .acct-box-btn.primary { background:#3b82f6; color:#fff; }
    .acct-box-btn.primary:hover { background:#2563eb; }
    .acct-box-btn.cancel { background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.6); border:1px solid rgba(255,255,255,0.1); }
    .acct-box-btn.cancel:hover { background:rgba(255,255,255,0.12); color:#fff; }
    .acct-box-msg { font-size:0.8rem; min-height:1.1em; text-align:center; }

    /* ── NICHE LIST BTN ── */
    #niche-list-btn { position:fixed; top:10px; left:12px; z-index:500; display:none; align-items:center; justify-content:center; width:40px; height:40px; border-radius:50%; border:2px solid rgba(241,100,30,0.6); background:rgba(241,100,30,0.18); color:#f87171; font-size:22px; text-decoration:none; backdrop-filter:blur(12px); transition:all 0.2s; }
    #niche-list-btn:hover { background:rgba(255,255,255,0.13); color:#fff; }
    #niche-list-btn .nl-count { background:var(--green); border-radius:50%; width:16px; height:16px; font-size:0.6rem; font-weight:700; display:none; align-items:center; justify-content:center; color:#fff; }

    /* ── TITLE ── */
    #title-outer { width:100%; display:flex; justify-content:center; }
    #title-wrap { position:relative; display:inline-block; padding:90px 40px 8px; }
    #niche-title { position:relative; z-index:101; text-align:center; user-select:none; }
    #niche-title span { display:inline-block; font-family:'Croissant One',cursive; font-size:clamp(2.4rem,7vw,5rem); font-weight:400; letter-spacing:0.04em; color:#fff; text-shadow:0 1px 0 #ccc,0 2px 0 #c9c9c9,0 3px 0 #bbb,0 4px 0 #b9b9b9,0 5px 0 #aaa,0 6px 1px rgba(0,0,0,.1),0 1px 3px rgba(0,0,0,.3),0 3px 5px rgba(0,0,0,.2),0 5px 10px rgba(0,0,0,.25),0 20px 20px rgba(0,0,0,.15); animation:wave3d 2.2s ease-in-out infinite; }
    #niche-title span:nth-child(1){animation-delay:0.00s}#niche-title span:nth-child(2){animation-delay:0.07s}#niche-title span:nth-child(3){animation-delay:0.14s}#niche-title span:nth-child(4){animation-delay:0.21s}#niche-title span:nth-child(5){animation-delay:0.28s}#niche-title span:nth-child(6){animation-delay:0.35s}#niche-title span:nth-child(7){animation-delay:0.42s}#niche-title span:nth-child(8){animation-delay:0.49s}#niche-title span:nth-child(9){animation-delay:0.56s}#niche-title span:nth-child(10){animation-delay:0.63s}#niche-title span:nth-child(11){animation-delay:0.70s}
    .title-space { display:inline-block; width:0.35em; }
    @keyframes wave3d { 0%,100%{transform:translateY(0)rotateX(0deg)scale(1)} 25%{transform:translateY(-18px)rotateX(20deg)scale(1.08)} 50%{transform:translateY(0)rotateX(0deg)scale(1)} }

    /* ── MAIN ── */
    #main-view { position:relative; z-index:10; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:80px 20px 20px; gap:20px; }
    .search-card { width:100%; max-width:660px; display:flex; flex-direction:column; align-items:center; gap:14px; }

    /* Input row: input + add btn + tags inline + trash */
    .input-row { width:100%; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .input-row input { flex:1; min-width:160px; padding:16px 20px; background:var(--glass); border:1px solid var(--glass-border); border-radius:16px; color:var(--text); font-family:'Inter',sans-serif; font-size:1.05rem; outline:none; backdrop-filter:blur(16px); transition:border-color 0.2s,box-shadow 0.2s; text-align:center; }
    .input-row input::placeholder { color:var(--muted); }
    .input-row input:focus { border-color:var(--green); box-shadow:0 0 0 3px rgba(34,197,94,0.15); }
    #add-keyword-btn { width:48px; height:48px; flex-shrink:0; background:var(--green); border:none; border-radius:14px; color:#fff; font-size:1.6rem; line-height:1; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(34,197,94,0.4); position:relative; }
    #add-keyword-btn:hover { background:#16a34a; transform:translateY(-1px); }
    #add-keyword-btn:active { transform:translateY(0); }
    #kw-count-badge { position:absolute; top:-7px; right:-7px; min-width:18px; height:18px; padding:0 4px; background:#f97316; color:#fff; font-size:0.6rem; font-weight:800; border-radius:9px; display:none; align-items:center; justify-content:center; pointer-events:none; border:2px solid #0a0a0a; }
    #keywords-list { display:none; }
    .keyword-tag { display:inline-flex; align-items:center; gap:5px; padding:7px 11px; background:rgba(34,197,94,0.12); border:1px solid rgba(34,197,94,0.35); border-radius:10px; font-size:0.82rem; font-weight:600; color:var(--green); animation:slideUp 0.2s ease; height:48px; }
    .keyword-tag .tag-text { max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .keyword-tag .tag-remove { background:none; border:none; color:rgba(255,255,255,0.35); cursor:pointer; font-size:0.95rem; line-height:1; padding:0; transition:color 0.2s; }
    .keyword-tag .tag-remove:hover { color:#f87171; }
    .keyword-tag.running { border-color:rgba(249,115,22,0.6); background:rgba(249,115,22,0.12); }
    .keyword-tag.running .tag-text { color:#f97316; }
    .keyword-tag.done { border-color:rgba(34,197,94,0.5); background:rgba(34,197,94,0.18); }
    .keyword-tag.error { border-color:rgba(239,68,68,0.5); background:rgba(239,68,68,0.1); }
    .keyword-tag.error .tag-text { color:#f87171; }
    #clear-keywords-btn { width:48px; height:48px; flex-shrink:0; background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.3); border-radius:14px; color:#f87171; font-size:1.1rem; cursor:pointer; transition:all 0.2s; display:none; align-items:center; justify-content:center; }
    #clear-keywords-btn:hover { background:rgba(239,68,68,0.25); border-color:rgba(239,68,68,0.6); }
    #dice-btn { width:100%; height:52px; min-height:52px; max-height:52px; padding:0 20px; background:linear-gradient(135deg,#1d4ed8,#3b82f6); border:none; border-radius:16px; color:#fff; font-family:'Inter',sans-serif; font-size:1rem; font-weight:700; letter-spacing:0.05em; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:10px; box-shadow:0 4px 20px rgba(59,130,246,0.35); }
    #dice-btn:hover { background:linear-gradient(135deg,#1e40af,#2563eb); transform:translateY(-1px); box-shadow:0 6px 24px rgba(59,130,246,0.5); }
    #dice-btn:active { transform:translateY(0); }
    #dice-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
    #dice-btn .dice-icon { font-size:1.3rem; transition:transform 0.3s; }
    #dice-btn.spinning .dice-icon { animation:diceSpin 0.5s ease infinite; }
    @keyframes diceSpin { 0%{transform:rotate(0deg)scale(1)} 50%{transform:rotate(180deg)scale(1.15)} 100%{transform:rotate(360deg)scale(1)} }



    #start-btn { width:100%; padding:22px; background:var(--green); border:none; border-radius:16px; color:#fff; font-family:'Inter',sans-serif; font-weight:700; font-size:1.25rem; letter-spacing:0.12em; cursor:pointer; transition:all 0.25s ease; position:relative; overflow:hidden; box-shadow:0 4px 32px rgba(34,197,94,0.45); }
    #start-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,0.15) 50%,transparent 70%); transform:translateX(-100%); transition:transform 0.6s ease; }
    #start-btn:hover::before { transform:translateX(100%); }
    #start-btn:hover { background:#16a34a; transform:translateY(-1px); }
    #start-btn:active { transform:translateY(0); }
    #start-btn:disabled { cursor:not-allowed; transform:none; }
    #start-btn.loading { animation:btnBlink 0.7s ease-in-out infinite; }
    @keyframes btnBlink { 0%,100%{background:#dc2626;box-shadow:0 4px 32px rgba(220,38,38,0.6)} 50%{background:#ff6b6b;box-shadow:0 0 48px rgba(220,38,38,0.9)} }
    #start-btn.retry { animation:btnRetry 0.8s ease-in-out infinite; letter-spacing:0.18em; }
    @keyframes btnRetry { 0%,100%{background:#ca8a04;box-shadow:0 4px 32px rgba(202,138,4,0.6)} 50%{background:#fbbf24;box-shadow:0 0 48px rgba(251,191,36,0.9);color:#422006} }

    /* ── PROGRESS ── */
    #progress-wrap { width:100%; max-width:660px; display:none; flex-direction:column; gap:12px; }
    .progress-keyword-label { text-align:center; font-size:0.8rem; color:#f97316; font-weight:600; min-height:1.2em; }
    .progress-steps { display:flex; justify-content:space-between; gap:4px; }
    .step-dot { flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; opacity:0.3; transition:opacity 0.3s; }
    .step-dot.active { opacity:1; } .step-dot.done { opacity:0.6; }
    .step-dot .dot { width:8px; height:8px; border-radius:50%; background:var(--muted); transition:background 0.3s,box-shadow 0.3s; }
    .step-dot.active .dot { background:#f97316; box-shadow:0 0 8px #f97316; animation:blink 0.8s infinite; }
    .step-dot.done .dot { background:var(--green); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .step-dot .step-label { font-size:0.6rem; color:var(--muted); text-align:center; white-space:nowrap; }
    .progress-track { width:100%; height:10px; background:rgba(255,255,255,0.07); border-radius:10px; overflow:visible; position:relative; }
    .progress-fill { height:100%; width:0%; background:linear-gradient(90deg,#7c2d12,#dc2626,#f97316,#fbbf24,#fef08a); border-radius:10px; position:relative; transition:width 0.5s ease; box-shadow:0 0 6px #f97316,0 0 20px #dc2626; }
    .progress-fill::after { content:"🔥"; position:absolute; right:-14px; top:50%; transform:translateY(-55%); font-size:1.3rem; filter:drop-shadow(0 0 6px #f97316); animation:flicker 0.3s infinite alternate; display:none; }
    .progress-fill.burning::after { display:block; }
    @keyframes flicker { 0%{transform:translateY(-55%)scale(1)rotate(-3deg)} 100%{transform:translateY(-60%)scale(1.08)rotate(3deg)} }
    .progress-msg { text-align:center; font-size:0.78rem; color:var(--muted); min-height:1.2em; }

    /* ── RESULTS ── */
    #results-section { position:relative; z-index:10; padding:0 20px 80px; display:none; }
    .results-grid { max-width:660px; margin:0 auto; display:flex; flex-direction:column; gap:12px; }
    .keyword-section-title { font-size:0.75rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:#f97316; padding:8px 0 4px; border-bottom:1px solid rgba(249,115,22,0.2); }
    .results-count-bar { text-align:center; font-size:0.8rem; color:var(--muted); margin-bottom:4px; }
    /* ── BANDEROLE CARD ── */
    @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
    @property --glow-angle { syntax:'<angle>'; initial-value:0deg; inherits:false; }
    @keyframes glow-spin { to { --glow-angle: 360deg; } }

    .match-card {
      position:relative; border-radius:14px; padding:2px;
      background:conic-gradient(from var(--glow-angle,0deg),
        #ff6b00 0%, #ff00cc 15%, #7b2fff 30%, #00cfff 45%,
        #00ff88 60%, #ffdd00 75%, #ff6b00 100%);
      animation:slideUp 0.4s ease, glow-spin 3s linear infinite;
      box-shadow:0 0 18px rgba(120,80,255,0.4), 0 0 40px rgba(0,200,255,0.15);
    }
    .match-card-inner {
      background:rgba(8,8,16,0.92);
      border-radius:12px;
      display:flex; align-items:center; gap:12px;
      padding:12px 14px;
      backdrop-filter:blur(20px);
    }
    .shop-result-avatar { width:48px; height:48px; border-radius:50%; object-fit:cover; flex-shrink:0; border:2px solid rgba(255,255,255,0.15); }
    .shop-result-avatar-ph { width:48px; height:48px; border-radius:50%; flex-shrink:0; background:rgba(255,255,255,0.05); border:2px solid rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-size:1.3rem; }
    .shop-result-info { flex:1; min-width:0; }
    .shop-result-name { font-weight:700; font-size:0.9rem; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .shop-result-tag { font-size:0.62rem; color:#a78bfa; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; margin-top:2px; }
    .btn-save-shop { width:34px; height:34px; border-radius:8px; border:none; background:rgba(255,255,255,0.07); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1rem; transition:all 0.2s; flex-shrink:0; }
    .btn-save-shop:hover { background:rgba(255,255,255,0.14); transform:scale(1.1); }
    .btn-save-shop.saved { color:#22c55e; }
    .btn-save-shop.saving { opacity:0.5; cursor:not-allowed; }
    .shop-result-btn { flex-shrink:0; padding:8px 14px; border-radius:9px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:#fff; font-family:'Inter',sans-serif; font-size:0.75rem; font-weight:700; text-decoration:none; white-space:nowrap; transition:all 0.2s; }
    .shop-result-btn:hover { background:rgba(255,255,255,0.18); }
    .empty { text-align:center; padding:40px 20px; color:var(--muted); }
    @media(max-width:640px){ #main-view{padding:70px 14px 20px} .input-row input{font-size:0.95rem;padding:14px 16px} #add-keyword-btn{width:46px;height:46px} }

        /* ── ERROR POPUP ── */
    #error-popup { position:fixed; inset:0; z-index:99999; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.7); backdrop-filter:blur(6px); padding:20px; }
    #error-popup.open { display:flex; animation:epFade 0.2s ease; }
    @keyframes epFade { from{opacity:0} to{opacity:1} }
    .ep-box { background:#0f0f0f; border:1px solid rgba(239,68,68,0.35); border-radius:20px; padding:28px 28px 22px; max-width:440px; width:100%; display:flex; flex-direction:column; gap:14px; box-shadow:0 0 0 1px rgba(239,68,68,0.1),0 20px 60px rgba(0,0,0,0.8); animation:epSlide 0.22s ease; }
    @keyframes epSlide { from{transform:translateY(12px)scale(0.97);opacity:0} to{transform:none;opacity:1} }
    .ep-header { display:flex; align-items:flex-start; gap:12px; }
    .ep-icon { width:40px; height:40px; flex-shrink:0; border-radius:50%; background:rgba(239,68,68,0.15); border:1.5px solid rgba(239,68,68,0.35); display:flex; align-items:center; justify-content:center; font-size:1.1rem; }
    .ep-title { font-size:1rem; font-weight:700; color:#fff; margin-bottom:4px; }
    .ep-api-badge { display:inline-block; padding:3px 10px; border-radius:6px; background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3); color:#f87171; font-size:0.72rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; }
    .ep-message { font-size:0.85rem; color:rgba(255,255,255,0.65); line-height:1.6; background:rgba(255,255,255,0.04); border-radius:10px; padding:12px 14px; border:1px solid rgba(255,255,255,0.07); word-break:break-word; font-family:'Menlo','Courier New',monospace; }
    .ep-hint { font-size:0.78rem; color:rgba(255,255,255,0.38); line-height:1.5; }
    .ep-close { align-self:flex-end; padding:10px 24px; border-radius:10px; border:none; background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3); color:#f87171; font-family:'Inter',sans-serif; font-weight:700; font-size:0.88rem; cursor:pointer; transition:all 0.2s; }
    .ep-close:hover { background:rgba(239,68,68,0.28); color:#fff; }

  </style>
</head>
<body>
  <!-- INTRO -->
  <!-- ERROR POPUP -->
  <div id="error-popup" onclick="closeErrorPopup(event)">
    <div class="ep-box">
      <div class="ep-header">
        <div class="ep-icon">⚠️</div>
        <div>
          <div class="ep-title">Search error</div>
          <span class="ep-api-badge" id="ep-api-badge" style="display:none"></span>
        </div>
      </div>
      <div class="ep-message" id="ep-message">An error occurred.</div>
      <div class="ep-hint" id="ep-hint"></div>
      <button class="ep-close" onclick="closeErrorPopupBtn()">Close</button>
    </div>
  </div>

  <div id="intro"><div id="intro-text"><span>F</span><span>i</span><span>n</span><span>d</span><span>e</span><span>r</span><span>&nbsp;</span><span>N</span><span>i</span><span>c</span><span>h</span><span>e</span></div></div>
  <div id="bg-layer"></div>
  <canvas id="milkyway-canvas"></canvas>
  <canvas id="shooting-canvas"></canvas>

  <!-- AUTH MODAL -->
  <div id="auth-overlay" style="display:none;">
    <div id="auth-box">
      <div id="auth-logo">Finder Niche</div>
      <div id="auth-subtitle">Sign in to access the tool</div>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="authSwitchTab('login')">Login</button>
        <button class="auth-tab" onclick="authSwitchTab('register')">Register</button>
      </div>
      <div id="auth-main-form" style="display:flex;flex-direction:column;gap:12px;">
        <input class="auth-input" id="auth-email" type="email" placeholder="Email" />
        <input class="auth-input" id="auth-password" type="password" placeholder="Password" />
        <div id="auth-error"></div>
        <button id="auth-submit" onclick="authSubmit()">Login</button>
        <div id="auth-forgot" onclick="showForgot()">Forgot password?</div>
      </div>
      <div id="auth-forgot-form">
        <input class="auth-input" id="forgot-email" type="email" placeholder="Your email" />
        <div id="auth-forgot-msg"></div>
        <button id="auth-submit" style="width:100%;padding:15px;background:var(--green);border:none;border-radius:12px;color:#fff;font-family:Inter,sans-serif;font-weight:700;font-size:1rem;cursor:pointer;" onclick="sendForgot()">Send reset link</button>
        <div id="auth-forgot-back" onclick="hideForgot()">← Back to login</div>
      </div>
    </div>
  </div>

  <!-- FIXED BUTTONS -->
  <a id="niche-list-btn" href="/niche-list">❤️<span class="nl-count" id="nl-count" style="position:absolute;top:-4px;right:-4px;">0</span></a>
  <div id="user-badge">
    <button id="user-avatar-btn" onclick="toggleUserDropdown()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    </button>
    <div class="user-dropdown" id="user-dropdown">
      <div class="user-dropdown-email" id="user-email-display">—</div>
      <hr class="user-dropdown-sep"/>
      <button class="user-dropdown-item" onclick="openAcctModal('email')">✉️ Change email</button>
      <button class="user-dropdown-item" onclick="openAcctModal('password')">🔑 Change password</button>
      <hr class="user-dropdown-sep"/>
      <button class="user-dropdown-item" onclick="logout()">🚪 Log out</button>
      <button class="user-dropdown-item danger" onclick="deleteAccount()">🗑 Delete account</button>
    </div>
  </div>
  <!-- Account modals -->
  <div class="acct-overlay" id="acct-modal-email">
    <div class="acct-box">
      <div class="acct-box-title">✉️ Change email</div>
      <input class="acct-field" id="acct-new-email" type="email" placeholder="New email address"/>
      <input class="acct-field" id="acct-email-pwd" type="password" placeholder="Current password"/>
      <div class="acct-box-msg" id="acct-email-msg"></div>
      <div class="acct-box-btns">
        <button class="acct-box-btn cancel" onclick="closeAcctModals()">Cancel</button>
        <button class="acct-box-btn primary" onclick="submitChangeEmail()">Save</button>
      </div>
    </div>
  </div>
  <div class="acct-overlay" id="acct-modal-password">
    <div class="acct-box">
      <div class="acct-box-title">🔑 Change password</div>
      <input class="acct-field" id="acct-old-pwd" type="password" placeholder="Current password"/>
      <input class="acct-field" id="acct-new-pwd" type="password" placeholder="New password"/>
      <div class="acct-box-msg" id="acct-pwd-msg"></div>
      <div class="acct-box-btns">
        <button class="acct-box-btn cancel" onclick="closeAcctModals()">Cancel</button>
        <button class="acct-box-btn primary" onclick="submitChangePassword()">Save</button>
      </div>
    </div>
  </div>

  <!-- TITLE -->
  <div id="title-outer"><div id="title-wrap"><div id="niche-title"><span>F</span><span>i</span><span>n</span><span>d</span><span>e</span><span>r</span><span class="title-space"></span><span>N</span><span>i</span><span>c</span><span>h</span><span>e</span></div></div></div>

  <div id="main-view">
    <div class="search-card">
      <div style="width:100%;display:flex;flex-direction:column;gap:8px;">
        <div style="display:flex;gap:8px;width:100%;">
          <input type="text" id="keyword-input" placeholder="Enter keyword"
            style="flex:1;padding:16px 20px;background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;color:var(--text);font-family:'Inter',sans-serif;font-size:1.05rem;outline:none;backdrop-filter:blur(16px);transition:border-color 0.2s,box-shadow 0.2s;text-align:center;" />
          <button id="add-keyword-btn" onclick="addKeyword()" title="Add keyword" style="width:48px;flex-shrink:0;">+<span id="kw-count-badge"></span></button>
        </div>
        <div id="keywords-list" style="display:none;width:100%;"></div>
        <div style="display:flex;gap:8px;width:calc(100% - 56px);">
          <button id="dice-btn" onclick="rollNiche()" style="flex:1;"><span class="dice-icon">🎲</span>Generate</button>
          <button id="clear-keywords-btn" onclick="clearKeywords()" style="width:48px;flex-shrink:0;visibility:hidden;">🗑</button>
        </div>
      </div>
      <button id="start-btn" onclick="startSearch()">START</button>
    </div>

    <div id="progress-wrap">
      <div class="progress-keyword-label" id="progress-keyword-label"></div>
      <div class="progress-steps" id="progress-steps"></div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-msg" id="progress-msg"></div>
    </div>

    <section id="results-section">
      <div class="results-grid">
        <div class="results-count-bar" id="results-count" style="display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;"></div>
        <div id="results-container"></div>

      </div>
    </section>
  </div>

  <!-- INTRO SCRIPT -->
  <script>
    // ── AUTH ──
    let SCOUT_TOKEN = localStorage.getItem('scout_token') || null;
    let _currentUser = null;

    function showDropList(shops) {
      var existing = document.getElementById('drop-list-modal');
      if (existing) existing.remove();
      var rows = '';
      if (!shops || !shops.length) {
        rows = '<div style="color:rgba(255,255,255,0.4);text-align:center;padding:20px;">No dropshippers found</div>';
      } else {
        shops.forEach(function(s) {
          rows += '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.07);">' +
            '<span style="color:#fff;font-weight:600;font-size:0.9rem;">' + (s.shopName || '—') + '</span>' +
            '<a href="' + (s.shopUrl || '#') + '" target="_blank" rel="noopener" style="padding:6px 14px;border-radius:8px;background:rgba(241,100,30,0.15);border:1px solid rgba(241,100,30,0.3);color:#fb923c;font-size:0.78rem;font-weight:600;text-decoration:none;">Visit ↗</a>' +
          '</div>';
        });
      }
      var modal = document.createElement('div');
      modal.id = 'drop-list-modal';
      modal.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;padding:20px;';
      modal.innerHTML =
        '<div style="background:#111;border:1px solid rgba(255,255,255,0.1);border-radius:16px;width:100%;max-width:480px;max-height:80vh;display:flex;flex-direction:column;">' +
          '<div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.08);">' +
            '<span style="color:#fff;font-weight:700;font-size:1rem;">🛒 Dropshipping shops (' + shops.length + ')</span>' +
            '<button onclick="document.getElementById(&quot;drop-list-modal&quot;).remove()" style="background:none;border:none;color:rgba(255,255,255,0.5);font-size:1.2rem;cursor:pointer;">✕</button>' +
          '</div>' +
          '<div style="overflow-y:auto;flex:1;">' + rows + '</div>' +
        '</div>';
      modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
      document.body.appendChild(modal);
    }
    let _authTab = 'login';

    function checkAuth() {
      // First check if server is alive — redirect to loading page if cold starting
      fetch('/api/health', { cache: 'no-store' })
        .then(function(r) {
          if (!r.ok) throw new Error('not ready');
          // Server is up — now check auth
          if (!SCOUT_TOKEN) { showAuthModal(); return; }
          return fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + SCOUT_TOKEN } });
        })
        .then(function(r) {
          if (!r) return; // no token case
          if (!r.ok) { SCOUT_TOKEN = null; localStorage.removeItem('scout_token'); showAuthModal(); return; }
          return r.json();
        })
        .then(function(d) {
          if (d) onLoggedIn(d.email);
        })
        .catch(function() {
          // Server not responding — go to loading page
          window.location.href = '/loading';
        });
    }

    function showAuthModal() {
      document.getElementById('auth-overlay').style.display = 'flex';
    }
    function hideAuthModal() {
      document.getElementById('auth-overlay').style.display = 'none';
    }

    function authSwitchTab(tab) {
      _authTab = tab;
      document.querySelectorAll('.auth-tab').forEach(function(b) { b.classList.toggle('active', b.textContent.toLowerCase() === tab); });
      document.getElementById('auth-submit').textContent = tab === 'login' ? 'Login' : 'Register';
      document.getElementById('auth-error').textContent = '';
    }

    async function authSubmit() {
      const email = document.getElementById('auth-email').value.trim();
      const password = document.getElementById('auth-password').value;
      const errEl = document.getElementById('auth-error');
      const btn = document.getElementById('auth-submit');
      if (!email || !password) { errEl.textContent = 'Fill in all fields'; return; }
      btn.disabled = true; btn.textContent = '...';
      try {
        const r = await fetch('/api/auth/' + _authTab, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await r.json();
        if (!r.ok) { errEl.textContent = data.error || 'Error'; return; }
        localStorage.setItem('scout_token', data.token);
        SCOUT_TOKEN = data.token;
        onLoggedIn(data.email);
      } catch(e) { errEl.textContent = e.message; }
      finally { btn.disabled = false; btn.textContent = _authTab === 'login' ? 'Login' : 'Register'; }
    }

    function onLoggedIn(email) {
      _currentUser = email;
      hideAuthModal();
      document.getElementById('user-email-display').textContent = email || '—';
      document.getElementById('user-badge').style.display = 'flex';
      document.getElementById('niche-list-btn').style.display = 'flex';
      initSavedShops();
    }

    // ── ERROR POPUP ──
    const API_HINTS = {
      'SCRAPINGBEE':     'Check your SCRAPINGBEE_KEY in Render → Environment Variables. Credits may be exhausted.',
      'SERPER':          'Check your SERPER_API_KEY in Render → Environment Variables. Free plan limit may be reached (1000 req/month).',
      'IMGBB':           'Check your IMGBB_API_KEY in Render → Environment Variables.',
      'SCRAPEAPI':       'Check your SCRAPEAPI_KEY in Render → Environment Variables.',
      'MONGODB':         'MongoDB connection failed. Check MONGODB_URI in Render → Environment Variables.',
      '401':             'API authentication failed — the key is invalid or expired.',
      '429':             'Rate limit or quota exceeded on this API.',
      '403':             'Access forbidden — the API key may not have the required permissions.',
      '500':             'Internal server error. Check Render logs for details.',
      'ECONNREFUSED':    'Connection refused — the service may be down.',
      'ETIMEDOUT':       'Request timed out — the external service took too long to respond.',
      'ENOTFOUND':       'DNS lookup failed — check your internet connection or the API URL.',
    };

    function detectApiFromMessage(msg) {
      const m = msg.toUpperCase();
      if (m.includes('SCRAPINGBEE') || m.includes('SCRAPING BEE')) return 'ScrapingBee';
      if (m.includes('SERPER')) return 'Serper';
      if (m.includes('IMGBB')) return 'ImgBB';
      if (m.includes('SCRAPEAPI')) return 'ScrapeAPI';
      if (m.includes('MONGODB') || m.includes('MONGO')) return 'MongoDB';
      if (m.includes('ALIEXPRESS')) return 'AliExpress';
      if (m.includes('ETSY')) return 'Etsy';
      return null;
    }

    function getHintForMessage(msg) {
      const m = msg.toUpperCase();
      for (const [key, hint] of Object.entries(API_HINTS)) {
        if (m.includes(key)) return hint;
      }
      return 'Check the Render logs for more details.';
    }

    function showErrorPopup(rawMsg) {
      const msg = (rawMsg || 'An unknown error occurred.').replace(/^❌\s*/, '');
      const api = detectApiFromMessage(msg);
      const hint = getHintForMessage(msg);

      const badge = document.getElementById('ep-api-badge');
      if (api) { badge.textContent = api; badge.style.display = 'inline-block'; }
      else { badge.style.display = 'none'; }

      document.getElementById('ep-message').textContent = msg;
      document.getElementById('ep-hint').textContent = hint;
      document.getElementById('error-popup').classList.add('open');
    }

    function closeErrorPopup(e) {
      if (e.target === document.getElementById('error-popup')) closeErrorPopupBtn();
    }
    function closeErrorPopupBtn() {
      document.getElementById('error-popup').classList.remove('open');
    }

    function toggleUserDropdown() {
      document.getElementById('user-dropdown').classList.toggle('open');
    }
    document.addEventListener('click', function(e) {
      const btn = document.getElementById('user-avatar-btn');
      const dd = document.getElementById('user-dropdown');
      if (btn && dd && !btn.contains(e.target) && !dd.contains(e.target)) dd.classList.remove('open');
    });

    function logout() {
      localStorage.removeItem('scout_token');
      SCOUT_TOKEN = null; _currentUser = null;
      document.getElementById('user-badge').style.display = 'none';
      document.getElementById('niche-list-btn').style.display = 'none';
      document.getElementById('user-dropdown').classList.remove('open');
      showAuthModal();
    }

    async function deleteAccount() {
      if (!confirm('⚠️ Delete your account and all saved data? This cannot be undone.')) return;
      const password = prompt('Enter your password to confirm:');
      if (!password) return;
      try {
        const r = await fetch('/api/auth/delete-account', {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + SCOUT_TOKEN, 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        if (r.ok) { logout(); }
        else { const d = await r.json().catch(()=>({})); showToast('Error: ' + (d.error || r.status), '#ef4444'); }
      } catch(e) { showToast('Error: ' + e.message, '#ef4444'); }
    }

    function openAcctModal(type) {
      document.getElementById('user-dropdown').classList.remove('open');
      document.getElementById('acct-modal-' + type).classList.add('open');
      document.getElementById(type === 'email' ? 'acct-email-msg' : 'acct-pwd-msg').textContent = '';
    }
    function closeAcctModals() {
      document.querySelectorAll('.acct-overlay').forEach(m => m.classList.remove('open'));
    }
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('.acct-overlay').forEach(function(el) {
        el.addEventListener('click', function(e) { if (e.target === el) closeAcctModals(); });
      });
    });

    // ── INTRO / SKIP INTRO ──
    (function(){
      var ids = ['bg-layer','milkyway-canvas','main-view'];

      function showApp() {
        var intro = document.getElementById('intro');
        if (intro) intro.style.display = 'none';
        ids.forEach(function(id){ var el=document.getElementById(id); if(el) el.style.opacity='1'; });
        checkAuth();
      }

      // Always make sure bg and main-view are visible regardless
      ids.forEach(function(id){ var el=document.getElementById(id); if(el) el.style.opacity='0'; });

      if (sessionStorage.getItem('skipIntro')) {
        sessionStorage.removeItem('skipIntro');
        showApp();
        return;
      }

      // Animate intro text then show app
      setTimeout(function(){
        document.querySelectorAll('#intro-text span').forEach(function(el){
          var a=Math.random()*Math.PI*2, d=150+Math.random()*350;
          el.style.setProperty('--tx', Math.cos(a)*d+'px');
          el.style.setProperty('--ty', Math.sin(a)*d+'px');
          el.style.setProperty('--tr', (Math.random()*600-300)+'deg');
          el.classList.add('blast');
        });
        setTimeout(showApp, 650);
      }, 2200);

      // Hard fallback — force show after 4s no matter what
      setTimeout(showApp, 4000);
    })();

    async function submitChangeEmail() {
      const email = document.getElementById('acct-new-email').value.trim();
      const password = document.getElementById('acct-email-pwd').value;
      const msg = document.getElementById('acct-email-msg');
      if (!email || !password) { msg.style.color='#f87171'; msg.textContent='Fill in all fields'; return; }
      try {
        const r = await fetch('/api/auth/change-email', {
          method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+SCOUT_TOKEN},
          body: JSON.stringify({ email, password })
        });
        const d = await r.json();
        if (r.ok) { msg.style.color='#22c55e'; msg.textContent='Email updated!'; document.getElementById('user-email-display').textContent = email; setTimeout(closeAcctModals, 1200); }
        else { msg.style.color='#f87171'; msg.textContent = d.error || 'Error'; }
      } catch(e) { msg.style.color='#f87171'; msg.textContent = e.message; }
    }

    async function submitChangePassword() {
      const oldPwd = document.getElementById('acct-old-pwd').value;
      const newPwd = document.getElementById('acct-new-pwd').value;
      const msg = document.getElementById('acct-pwd-msg');
      if (!oldPwd || !newPwd) { msg.style.color='#f87171'; msg.textContent='Fill in all fields'; return; }
      try {
        const r = await fetch('/api/auth/change-password', {
          method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+SCOUT_TOKEN},
          body: JSON.stringify({ oldPassword: oldPwd, newPassword: newPwd })
        });
        const d = await r.json();
        if (r.ok) { msg.style.color='#22c55e'; msg.textContent='Password updated!'; setTimeout(closeAcctModals, 1200); }
        else { msg.style.color='#f87171'; msg.textContent = d.error || 'Error'; }
      } catch(e) { msg.style.color='#f87171'; msg.textContent = e.message; }
    }

    function showForgot() {
      document.getElementById('auth-main-form').style.display = 'none';
      document.getElementById('auth-forgot-form').style.display = 'flex';
      document.getElementById('auth-forgot-form').style.flexDirection = 'column';
      document.getElementById('auth-forgot-form').style.gap = '12px';
    }
    function hideForgot() {
      document.getElementById('auth-forgot-form').style.display = 'none';
      document.getElementById('auth-main-form').style.display = 'flex';
    }
    async function sendForgot() {
      const email = document.getElementById('forgot-email').value.trim();
      const msg = document.getElementById('auth-forgot-msg');
      if (!email) { msg.textContent = 'Enter your email'; msg.style.color = '#f87171'; return; }
      try {
        const r = await fetch('/api/auth/forgot-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) });
        const d = await r.json();
        msg.style.color = r.ok ? '#22c55e' : '#f87171';
        msg.textContent = r.ok ? 'Reset link sent! Check your email.' : (d.error || 'Error');
      } catch(e) { msg.style.color = '#f87171'; msg.textContent = e.message; }
    }

    // Enter key on auth inputs
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && document.getElementById('auth-overlay').style.display !== 'none') {
        if (document.getElementById('auth-forgot-form').style.display !== 'none') sendForgot();
        else authSubmit();
      }
    });

    // ── KEYWORDS ──
    let _keywords = [];

    function addKeyword() {
      const input = document.getElementById('keyword-input');
      const val = input.value.trim();
      if (!val) { input.focus(); return; }
      if (_keywords.includes(val)) { input.value = ''; input.focus(); return; }
      _keywords.push(val);
      renderKeywords();
      input.value = '';
      input.focus();
    }

    function removeKeyword(kw) {
      _keywords = _keywords.filter(function(k) { return k !== kw; });
      renderKeywords();
    }

    function renderKeywords() {
      // Hidden tags for status tracking during search
      const list = document.getElementById('keywords-list');
      list.innerHTML = '';
      _keywords.forEach(function(kw) {
        const tag = document.createElement('div');
        tag.className = 'keyword-tag';
        tag.id = 'tag-' + encodeKw(kw);
        list.appendChild(tag);
      });
      // Counter badge on + button
      const badge = document.getElementById('kw-count-badge');
      if (badge) {
        badge.textContent = _keywords.length;
        badge.style.display = _keywords.length > 0 ? 'inline-flex' : 'none';
      }
      // Trash button
      const trash = document.getElementById('clear-keywords-btn');
      if (trash) trash.style.visibility = _keywords.length > 0 ? 'visible' : 'hidden';
    }

    async function rollNiche() {
      const btn = document.getElementById('dice-btn');
      if (!btn || btn.disabled) return;
      btn.disabled = true;
      btn.classList.add('spinning');
      try {
        const res = await fetch('/api/niche-keyword', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (localStorage.getItem('scout_token') || '') }
        });
        const data = await res.json();
        const kw = (data.keyword || '').trim();
        if (kw) {
          document.getElementById('keyword-input').value = kw;
          document.getElementById('keyword-input').focus();
        }
      } catch(e) {
        showToast('Gemini error: ' + e.message, '#ef4444');
      }
      btn.disabled = false;
      btn.classList.remove('spinning');
    }

    function clearKeywords() {
      _keywords = [];
      renderKeywords();
    }

    function encodeKw(kw) { return kw.replace(/[^a-zA-Z0-9]/g,'_').slice(0,30); }
    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('keyword-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') addKeyword();
      });
    });

    // ── PROGRESS ──
    const STEPS = [
      { key: 'scraping',  label: 'Scraping' },
      { key: 'analyzing', label: 'Analyzing' },
      { key: 'match',     label: 'Dropshippers' },
    ];

    function initProgress(keyword) {
      document.getElementById('progress-keyword-label').textContent = keyword ? '🔍 ' + keyword : '';
      const c = document.getElementById('progress-steps');
      c.innerHTML = '';
      STEPS.forEach(function(s) {
        const d = document.createElement('div');
        d.className = 'step-dot'; d.id = 'step-' + s.key;
        d.innerHTML = '<div class="dot"></div><span class="step-label">' + s.label + '</span>';
        c.appendChild(d);
      });
      setProgress(0);
      document.getElementById('progress-msg').textContent = '';
    }

    function setProgress(p) {
      const el = document.getElementById('progress-fill');
      el.style.width = p + '%';
      if (p > 0 && p < 100) el.classList.add('burning'); else el.classList.remove('burning');
    }

    function advanceStep(k, msg) {
      const idx = STEPS.findIndex(function(s) { return s.key === k; });
      if (idx === -1) return;
      STEPS.forEach(function(s, i) {
        const el = document.getElementById('step-' + s.key); if (!el) return;
        if (i < idx) el.className = 'step-dot done';
        else if (i === idx) el.className = 'step-dot active';
        else el.className = 'step-dot';
      });
      setProgress(Math.round(((idx + 1) / STEPS.length) * 100));
      document.getElementById('progress-msg').textContent = msg || '';
    }

    function completeAllSteps() {
      STEPS.forEach(function(s) { const el = document.getElementById('step-' + s.key); if (el) el.className = 'step-dot done'; });
      setProgress(100);
    }

    // ── SEARCH ──
    let _allResults = [];
    let _dropshipperShops = [];
    let _searching = false;

    async function startSearch() {
      if (_searching) return;

      // Si pas de mots dans la liste, utilise le champ
      const inputVal = document.getElementById('keyword-input').value.trim();
      if (_keywords.length === 0 && inputVal) {
        _keywords.push(inputVal);
        renderKeywords();
        document.getElementById('keyword-input').value = '';
      }
      if (_keywords.length === 0) { document.getElementById('keyword-input').focus(); return; }

      _searching = true;
      _allResults = [];
      _dropshipperShops = [];
      window._shopDataMap = {};

      const btn = document.getElementById('start-btn');
      btn.disabled = true; btn.textContent = 'LOADING'; btn.classList.remove('retry'); btn.classList.add('loading');
      document.getElementById('keyword-input').disabled = true;

      document.getElementById('progress-wrap').style.display = 'flex';
      document.getElementById('results-section').style.display = 'none';
      document.getElementById('results-container').innerHTML = '';
      document.getElementById('results-count').textContent = '';

      document.documentElement.classList.remove('unlocked');
      window.scrollTo({ top: 0 });

      let totalMatches = 0;
      let hasError = false;

      // Marquer tous les tags comme "en attente"
      _keywords.forEach(function(kw) {
        const tag = document.getElementById('tag-' + encodeKw(kw));
        if (tag) tag.className = 'keyword-tag';
      });

      for (let ki = 0; ki < _keywords.length; ki++) {
        const keyword = _keywords[ki];
        const tag = document.getElementById('tag-' + encodeKw(keyword));
        if (tag) tag.className = 'keyword-tag running';

        initProgress(keyword + ' (' + (ki + 1) + '/' + _keywords.length + ')');

        // Section titre dans les résultats
        if (_keywords.length > 1) {
          const sec = document.createElement('div');
          sec.className = 'keyword-section-title';
          sec.textContent = '🔍 ' + keyword;
          document.getElementById('results-container').appendChild(sec);
        }

        try {
          document.getElementById('progress-msg').textContent = '⏳ Connecting...';
          const response = await fetch('/api/search-dropship', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ keyword })
          });

          const ct = response.headers.get('content-type') || '';
          if (!ct.includes('text/event-stream')) {
            const data = await response.json();
            const errMsg = data.error || 'Server error';
            document.getElementById('progress-msg').textContent = '❌ ' + errMsg;
            showErrorPopup(errMsg);
            if (tag) tag.className = 'keyword-tag error';
            hasError = true; continue;
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buf = '';
          let kwResults = [];

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const lines = buf.split('\n'); buf = lines.pop();
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              try {
                const ev = JSON.parse(line.slice(6));
                if (ev.step === 'complete') {
                  completeAllSteps();
                  const found = (ev.dropshippers || []).length;
                  document.getElementById('progress-msg').textContent = '✅ ' + found + ' dropshipper(s) found';
                  if (tag) tag.className = 'keyword-tag done';
                  totalMatches += found;
                } else if (ev.step === 'match') {
                  if (ev.shop) {
                    renderShopResult(ev.shop);
                    totalMatches++;
                    document.getElementById('results-section').style.display = 'block';
                    document.documentElement.classList.add('unlocked');
                    document.documentElement.style.overflowY = 'auto';
                    document.body.style.overflowY = 'auto';
                  }
                  advanceStep('match', ev.message);
                } else if (ev.step === 'error') {
                  document.getElementById('progress-msg').textContent = '❌ ' + ev.message;
                  showErrorPopup(ev.message);
                  if (tag) tag.className = 'keyword-tag error';
                  hasError = true;
                } else {
                  advanceStep(ev.step, ev.message);
                }              } catch(e) {}
            }
          }
        } catch(err) {
          document.getElementById('progress-msg').textContent = '❌ ' + err.message;
          showErrorPopup(err.message);
          if (tag) tag.className = 'keyword-tag error';
          hasError = true;
        }

        // Montre les résultats au fur et à mesure
        if (totalMatches > 0) {
          document.getElementById('results-section').style.display = 'block';
          document.documentElement.classList.add('unlocked');
          document.documentElement.style.overflowY = 'auto';
          document.body.style.overflowY = 'auto';
        }
      }

      // Fin
      _searching = false;
      btn.disabled = false; btn.classList.remove('loading');
      document.getElementById('keyword-input').disabled = false;
      clearKeywords(); // clear keywords after search completes

      if (hasError && totalMatches === 0) {
        btn.classList.add('retry'); btn.textContent = 'RETRY';
      } else {
        btn.classList.remove('retry'); btn.textContent = 'START';
      }

      if (totalMatches === 0 && !hasError) {
        document.getElementById('results-container').innerHTML += '<div class="empty">Aucune correspondance trouvée.</div>';
        document.getElementById('results-section').style.display = 'block';
      }

      var countBar = document.getElementById('results-count');
      countBar.innerHTML = '';
      if (totalMatches > 0) {
        var countSpan = document.createElement('span');
        countSpan.textContent = totalMatches + ' match(es) found';
        countBar.appendChild(countSpan);
      }


      if (totalMatches > 0) {

        setTimeout(function() { document.getElementById('results-section').scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
      }
    }

    // ── RENDER SHOP RESULT ──
    window._shopDataMap = {};
    function encodeShopKey(u) { return (u || '').replace(/[^a-zA-Z0-9]/g,'_').slice(0,40); }

    function renderShopResult(shop) {
      const productUrl = shop.listingUrl || shop.shopUrl || '#';
      const idx = Object.keys(window._shopDataMap).length;
      window._shopDataMap[idx] = { productUrl, productImage: shop.shopImage || null };

      const card = document.createElement('div');
      card.className = 'match-card';
      const inner = document.createElement('div');
      inner.className = 'match-card-inner';

      // Bouton ❤️ en premier (à gauche)
      const heartBtn = document.createElement('button');
      heartBtn.className = 'btn-save-shop' + (_savedShopUrls.has(productUrl) ? ' saved' : '');
      heartBtn.id = 'heart-' + encodeShopKey(productUrl);
      heartBtn.textContent = _savedShopUrls.has(productUrl) ? '✔' : '❤️';
      heartBtn.onclick = function() { saveShop(idx, this); };
      inner.appendChild(heartBtn);

      // Avatar boutique rond, chargé via proxy
      const avatarUrl = shop.shopAvatar || shop.shopImage || null;
      const ph = document.createElement('div');
      ph.className = 'shop-result-avatar-ph'; ph.textContent = '🛍';
      if (avatarUrl) {
        const img = document.createElement('img');
        img.className = 'shop-result-avatar'; img.loading = 'lazy';
        img.src = '/proxy-image?url=' + encodeURIComponent(avatarUrl);
        img.onerror = function() { this.style.display='none'; ph.style.display='flex'; };
        ph.style.display = 'none';
        inner.appendChild(img);
      }
      inner.appendChild(ph);

      // Infos boutique
      const info = document.createElement('div');
      info.className = 'shop-result-info';
      const nameEl = document.createElement('div'); nameEl.className = 'shop-result-name'; nameEl.textContent = shop.shopName || '—';
      const tagEl  = document.createElement('div'); tagEl.className  = 'shop-result-tag';  tagEl.textContent  = '🛒 Dropshipping confirmed';
      info.appendChild(nameEl); info.appendChild(tagEl);
      inner.appendChild(info);

      // Bouton Visit shop
      const visitBtn = document.createElement('a');
      visitBtn.href = shop.shopUrl || '#'; visitBtn.target = '_blank'; visitBtn.rel = 'noopener';
      visitBtn.className = 'shop-result-btn'; visitBtn.textContent = 'Visit shop ↗';
      inner.appendChild(visitBtn);

      card.appendChild(inner);
      document.getElementById('results-container').appendChild(card);
    }

    // ── FIND ──


    // ── SAVE SHOP ──
    let _savedShopUrls = new Set();

    async function initSavedShops() {
      if (!SCOUT_TOKEN) return;
      try {
        const r = await fetch('/api/shops', { headers: { 'Authorization': 'Bearer ' + SCOUT_TOKEN } });
        if (!r.ok) return;
        const shops = await r.json();
        shops.forEach(function(s) { _savedShopUrls.add(s.shopUrl); });
        updateNlCount();
      } catch(e) {}
    }

    function updateNlCount() {
      const badge = document.getElementById('nl-count');
      if (!badge) return;
      const n = _savedShopUrls.size;
      badge.textContent = n;
      badge.style.display = n > 0 ? 'inline-flex' : 'none';
    }

    function showToast(msg, color) {
      const t = document.createElement('div');
      t.textContent = msg;
      t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:' + (color || '#222') + ';color:#fff;padding:12px 20px;border-radius:10px;font-size:0.9rem;font-weight:600;z-index:99999;pointer-events:none;';
      document.body.appendChild(t); setTimeout(function() { t.remove(); }, 3000);
    }

    async function saveShop(idx, btn) {
      const token = localStorage.getItem('scout_token');
      if (!token) { showAuthModal(); return; }
      const data = window._shopDataMap && window._shopDataMap[idx];
      if (!data) { showToast('Shop data not found', '#ef4444'); return; }
      if (_savedShopUrls.has(data.shopUrl)) { btn.classList.add('saved'); btn.textContent = '✔'; showToast('Already saved!', '#22c55e'); return; }
      btn.classList.add('saving'); btn.textContent = '⏳';
      try {
        const r = await fetch('/api/shops/save', {
          method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ shopUrl: data.shopUrl, shopName: data.shopName, shopAvatar: data.shopAvatar, productImage: data.productImage, productUrl: data.productUrl })
        });
        if (r.ok) {
          _savedShopUrls.add(data.shopUrl); btn.classList.remove('saving'); btn.classList.add('saved'); btn.textContent = '✔';
          updateNlCount(); showToast('Saved! ❤️', '#22c55e');
        } else {
          const json = await r.json().catch(() => ({})); btn.classList.remove('saving'); btn.textContent = '❤️';
          showToast('Error: ' + (json.error || r.status), '#ef4444');
        }
      } catch(e) { btn.classList.remove('saving'); btn.textContent = '❤️'; showToast(e.message, '#ef4444'); }
    }

    // ── MILKY WAY ──
    (function(){const canvas=document.getElementById('milkyway-canvas');if(!canvas)return;const ctx=canvas.getContext('2d');let W,H,cx,cy;const bandAngle=Math.PI/5,bandW=600,rand=function(a,b){return Math.random()*(b-a)+a;};let nebulae=[];function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;cx=W/2;cy=H/2;buildNebulae();}window.addEventListener('resize',resize);resize();function buildNebulae(){nebulae=[];const colors=[[180,100,200],[100,120,255],[255,120,80],[80,200,255],[200,80,255]];for(var i=0;i<5;i++){const col=colors[i],along=rand(-bandW*0.4,bandW*0.4),spread=rand(-60,60);nebulae.push({x:cx+Math.cos(bandAngle)*along-Math.sin(bandAngle)*spread,y:cy+Math.sin(bandAngle)*along+Math.cos(bandAngle)*spread,rx:rand(80,220),ry:rand(40,120),angle:bandAngle+rand(-0.3,0.3),r:col[0],g:col[1],b:col[2],alpha:rand(0.04,0.1),pulse:rand(0.001,0.003),pulseDir:1});}}var driftAngle=0;function draw(){ctx.clearRect(0,0,W,H);driftAngle+=0.00008;ctx.save();ctx.translate(W/2,H/2);ctx.rotate(driftAngle);ctx.translate(-W/2,-H/2);nebulae.forEach(function(n){n.alpha+=n.pulse*n.pulseDir;if(n.alpha>0.12||n.alpha<0.03)n.pulseDir*=-1;ctx.save();ctx.translate(n.x,n.y);ctx.rotate(n.angle);const g=ctx.createRadialGradient(0,0,0,0,0,n.rx);g.addColorStop(0,'rgba('+n.r+','+n.g+','+n.b+','+n.alpha+')');g.addColorStop(0.5,'rgba('+n.r+','+n.g+','+n.b+','+(n.alpha*0.4)+')');g.addColorStop(1,'rgba('+n.r+','+n.g+','+n.b+',0)');ctx.scale(1,n.ry/n.rx);ctx.beginPath();ctx.arc(0,0,n.rx,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();ctx.restore();});ctx.restore();requestAnimationFrame(draw);}draw();})();

    // ── SHOOTING STARS ──
    (function(){const canvas=document.getElementById('shooting-canvas');if(!canvas)return;const ctx=canvas.getContext('2d');let W,H;function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}window.addEventListener('resize',resize);resize();const rand=function(a,b){return Math.random()*(b-a)+a;};function mkStar(){const angle=rand(25,50)*Math.PI/180,spd=rand(6,16);return{x:rand(-100,W*0.8),y:rand(-60,H*0.4),vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,alpha:rand(0.6,1),w:rand(1,2.5),tail:rand(12,28),decay:rand(0.991,0.997)};}var stars=[mkStar(),mkStar(),mkStar(),mkStar()];function draw(){ctx.clearRect(0,0,W,H);if(Math.random()<0.02&&stars.length<10)stars.push(mkStar());stars=stars.filter(function(s){const grad=ctx.createLinearGradient(s.x,s.y,s.x-s.vx*s.tail,s.y-s.vy*s.tail);grad.addColorStop(0,'rgba(255,255,255,'+s.alpha+')');grad.addColorStop(0.4,'rgba(200,220,255,'+(s.alpha*0.5)+')');grad.addColorStop(1,'rgba(180,200,255,0)');ctx.beginPath();ctx.strokeStyle=grad;ctx.lineWidth=s.w;ctx.lineCap='round';ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-s.vx*s.tail,s.y-s.vy*s.tail);ctx.stroke();ctx.beginPath();ctx.arc(s.x,s.y,s.w*1.2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+(s.alpha*0.8)+')';ctx.fill();s.x+=s.vx;s.y+=s.vy;s.alpha*=s.decay;return s.x<W+200&&s.y<H+200&&s.alpha>0.03;});requestAnimationFrame(draw);}draw();})();
  </script>
