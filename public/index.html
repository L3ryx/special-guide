<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Croissant+One&family=Lobster&display=swap" rel="stylesheet" />
  <title>Finder Niche</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --green: #22c55e; --glass: rgba(0,0,0,0.55); --glass-border: rgba(255,255,255,0.12); --text: #ffffff; --muted: rgba(255,255,255,0.55); }
    html, body { min-height: 100%; font-family: 'Croissant One', cursive; color: var(--text); overflow: hidden; }
    body { position: relative; }
    html.unlocked, html.unlocked body { overflow-y: auto; overflow-x: hidden; }

    #bg-layer { position: fixed; inset: 0; z-index: -3; background: #0a0a0a url('/background.png') center center / cover no-repeat; animation: bgDrift 18s ease-in-out infinite alternate; transform-origin: center; will-change: transform; }
    @keyframes bgDrift { 0%{transform:scale(1.08)translate(0,0)} 25%{transform:scale(1.1)translate(-12px,-8px)} 50%{transform:scale(1.08)translate(8px,-14px)} 75%{transform:scale(1.1)translate(-6px,10px)} 100%{transform:scale(1.08)translate(10px,6px)} }
    #bg-layer::after { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.5); }
    #milkyway-canvas { position:fixed; inset:0; width:100%; height:100%; z-index:-2; pointer-events:none; }


    /* ── INTRO ── */
    #intro { position:fixed; inset:0; z-index:9999; background:#000; display:flex; align-items:center; justify-content:center; }
    #intro-text { font-family:'Croissant One',cursive; font-size:clamp(2.8rem,9vw,6rem); color:#f97316; letter-spacing:0.06em; text-align:center; text-shadow:0 0 40px rgba(249,115,22,0.5); animation:introAppear 0.8s ease forwards; }
    @keyframes introAppear { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
    #intro-text span { display:inline-block; }
    #intro-text span.blast { animation:blast 0.6s ease forwards; }
    @keyframes blast { to{transform:translate(var(--tx),var(--ty))scale(0)rotate(var(--tr));opacity:0} }
    #bg-layer,#milkyway-canvas,#main-view { transition:opacity 0.7s ease; }

    /* ── AUTH MODAL ── */
    #auth-overlay { position:fixed; inset:0; z-index:8000; background:rgba(0,0,0,0.75); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; }
    #auth-box { width:100%; max-width:420px; margin:20px; background:rgba(15,15,15,0.95); border:1px solid rgba(255,255,255,0.12); border-radius:24px; padding:36px 32px; display:flex; flex-direction:column; gap:20px; }
    #auth-logo { text-align:center; }
    #logo-letters { display:flex; align-items:center; justify-content:center; gap:-7px; }
    .logo-letter { height:40px; width:auto; display:inline-block; transition:transform 0.25s ease; transform:scale(1); }
    .logo-letter.pop { transform:scale(1.55); }
    .logo-space { display:inline-block; width:14px; }
    #auth-subtitle { text-align:center; font-size:0.82rem; color:var(--muted); }
    .auth-tabs { display:flex; gap:8px; background:rgba(255,255,255,0.06); border-radius:12px; padding:4px; }
    .auth-tab { flex:1; padding:10px; border:none; background:transparent; color:var(--muted); font-family:'Croissant One',cursive; font-size:0.88rem; font-weight:600; border-radius:9px; cursor:pointer; transition:all 0.2s; }
    .auth-tab.active { background:rgba(255,255,255,0.12); color:#fff; }
    .auth-input { width:100%; padding:14px 18px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:#fff; font-family:'Croissant One',cursive; font-size:0.95rem; outline:none; transition:border-color 0.2s; }
    .auth-input:focus { border-color:var(--green); }
    .auth-input::placeholder { color:var(--muted); }
    #auth-submit { width:100%; padding:15px; background:#f97316; border:none; border-radius:12px; color:#fff; font-family:'Croissant One',cursive; font-weight:700; font-size:1rem; cursor:pointer; transition:all 0.2s; }
    #auth-submit:hover { background:#ea6c0a; }
    #auth-submit:disabled { opacity:0.6; cursor:not-allowed; }
    #auth-error { text-align:center; font-size:0.82rem; color:#f87171; min-height:1.2em; }
    #auth-forgot { text-align:center; font-size:0.8rem; color:var(--muted); cursor:pointer; text-decoration:underline; }
    #auth-forgot:hover { color:#fff; }
    #auth-forgot-form { display:none; flex-direction:column; gap:12px; }
    #auth-forgot-back { text-align:center; font-size:0.8rem; color:var(--muted); cursor:pointer; }
    #auth-forgot-back:hover { color:#fff; }
    #auth-forgot-msg { text-align:center; font-size:0.82rem; color:var(--green); min-height:1.2em; }



    /* ── TITLE outer hide/show ── */
    #title-outer { transition: opacity 0.35s ease, transform 0.35s ease; }
    #title-outer.hidden { opacity:0; pointer-events:none; transform:translateY(-10px); }
    /* ── TOP BUTTONS hide during search ── */
    #niche-list-btn { transition: opacity 0.3s ease; }
    #niche-list-btn.hidden { opacity:0; pointer-events:none; }
    #user-badge { transition: opacity 0.3s ease; }
    #user-badge.hidden { opacity:0; pointer-events:none; }

    /* ── USER BADGE (top right) ── */
    #user-badge { position:fixed; top:10px; right:12px; z-index:500; display:none; align-items:center; gap:8px; }
    #online-indicator { display:flex; align-items:center; gap:5px; background:rgba(0,0,0,0.35); border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:4px 10px 4px 7px; }
    #online-dot { width:9px; height:9px; border-radius:50%; background:#22c55e; box-shadow:0 0 6px rgba(34,197,94,0.8); flex-shrink:0; animation:pulse-dot 2s ease-in-out infinite; }
    #online-count { font-size:0.75rem; font-weight:700; color:rgba(255,255,255,0.85); font-family:'Croissant One',cursive; }
    @keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
    #user-avatar-btn { background:none; border:none; cursor:pointer; font-size:1.7rem; line-height:1; padding:4px; display:flex; align-items:center; justify-content:center; transition:transform 0.15s; }
    #user-avatar-btn:hover { transform:scale(1.25); }
    .user-dropdown { position:absolute; top:calc(100% + 10px); right:0; background:rgba(10,10,10,0.97); border:1px solid rgba(255,255,255,0.13); border-radius:16px; padding:8px; min-width:220px; box-shadow:0 16px 48px rgba(0,0,0,0.7); backdrop-filter:blur(20px); display:none; flex-direction:column; gap:2px; z-index:600; animation:menuPop 0.15s ease; }
    .user-dropdown.open { display:flex; }
    @keyframes menuPop { from{opacity:0;transform:translateY(-6px)scale(0.97)} to{opacity:1;transform:none} }
    .user-dropdown-email { font-size:0.73rem; color:rgba(255,255,255,0.4); padding:6px 12px 8px; word-break:break-all; }
    .user-dropdown-sep { border:none; border-top:1px solid rgba(255,255,255,0.08); margin:4px 0; }
    .user-dropdown-item { display:flex; align-items:center; gap:8px; padding:10px 14px; border-radius:10px; border:none; background:transparent; color:rgba(255,255,255,0.8); font-family:'Croissant One',cursive; font-size:0.85rem; font-weight:500; cursor:pointer; text-align:left; transition:all 0.15s; width:100%; }
    .user-dropdown-item:hover { background:rgba(255,255,255,0.09); color:#fff; }
    .user-dropdown-item.danger { color:#f87171; }
    .user-dropdown-item.danger:hover { background:rgba(248,113,113,0.1); color:#fca5a5; }
    /* Account modals */
    .acct-overlay { position:fixed; inset:0; z-index:9000; background:rgba(0,0,0,0.75); backdrop-filter:blur(8px); display:none; align-items:center; justify-content:center; }
    .acct-overlay.open { display:flex; }
    .acct-box { background:rgba(12,12,12,0.97); border:1px solid rgba(255,255,255,0.12); border-radius:20px; padding:30px 28px; width:100%; max-width:380px; margin:20px; display:flex; flex-direction:column; gap:16px; }
    .acct-box-title { font-size:1.05rem; font-weight:700; color:#fff; }
    .acct-field { width:100%; padding:13px 16px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:11px; color:#fff; font-family:'Croissant One',cursive; font-size:0.95rem; outline:none; }
    .acct-field:focus { border-color:#3b82f6; }
    .acct-field::placeholder { color:rgba(255,255,255,0.3); }
    .acct-box-btns { display:flex; gap:10px; }
    .acct-box-btn { flex:1; padding:12px; border-radius:10px; border:none; font-family:'Croissant One',cursive; font-weight:700; font-size:0.9rem; cursor:pointer; }
    .acct-box-btn.primary { background:#3b82f6; color:#fff; }
    .acct-box-btn.primary:hover { background:#2563eb; }
    .acct-box-btn.cancel { background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.6); border:1px solid rgba(255,255,255,0.1); }
    .acct-box-btn.cancel:hover { background:rgba(255,255,255,0.12); color:#fff; }
    .acct-box-msg { font-size:0.8rem; min-height:1.1em; text-align:center; }

    /* ── NICHE LIST BTN ── */
    #niche-list-btn { position:fixed; top:10px; left:12px; z-index:500; display:none; align-items:center; justify-content:center; background:none; border:none; cursor:pointer; font-size:1.7rem; line-height:1; padding:4px; text-decoration:none; transition:transform 0.15s; }
    #niche-list-btn:hover { transform:scale(1.25); }
    #niche-list-btn .nl-count { background:var(--green); border-radius:50%; width:16px; height:16px; font-size:0.6rem; font-weight:700; display:none; align-items:center; justify-content:center; color:#fff; position:absolute; top:-2px; right:-2px; }

    /* ── TITLE ── */
    #title-outer { width:100%; display:flex; justify-content:center; }
    #title-wrap { position:relative; display:inline-block; padding:10px 40px 4px; }
    #niche-title { position:relative; z-index:101; text-align:center; user-select:none; display:flex; flex-direction:column; align-items:center; gap:4px; }
    #main-logo-letters { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; }
    #finder-img { max-width:clamp(220px,40vw,480px); width:100%; height:auto; display:block; transform-origin:center center; animation: heartbeat-finder 3.2s ease-in-out infinite; }
    #niche-img  { max-width:clamp(140px,26vw,300px); width:100%; height:auto; display:block; transform-origin:center center; animation: heartbeat-niche  3.2s ease-in-out infinite; }
    /* finder bat 2× puis niche bat 2× — cycle 3.2s */
    /* finder: bat à 0% et 18% | niche: bat à 40% et 58% */
    @keyframes heartbeat-finder {
      0%   { transform: scale(1); }
      8%   { transform: scale(1.12); }
      16%  { transform: scale(1); }
      24%  { transform: scale(1.12); }
      32%  { transform: scale(1); }
      100% { transform: scale(1); }
    }
    @keyframes heartbeat-niche {
      0%   { transform: scale(1); }
      32%  { transform: scale(1); }
      40%  { transform: scale(1.10); }
      48%  { transform: scale(1); }
      56%  { transform: scale(1.10); }
      64%  { transform: scale(1); }
      100% { transform: scale(1); }
    }
    .main-logo-letter.pop { transform:scale(1.5); }
    @keyframes wave3d { 0%,100%{transform:translateY(0)rotateX(0deg)scale(1)} 25%{transform:translateY(-18px)rotateX(20deg)scale(1.08)} 50%{transform:translateY(0)rotateX(0deg)scale(1)} }

    /* ── MAIN ── */
    #main-view { position:relative; z-index:10; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:60px 20px 20px; gap:10px; }
    .search-card { width:100%; max-width:660px; display:flex; flex-direction:column; align-items:center; gap:14px; }

    /* Input row: input + add btn + tags inline + trash */
    .input-row { width:100%; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .input-row input, #keyword-input { flex:1; min-width:160px; padding:16px 20px; background:var(--glass); border:1px solid var(--glass-border); border-radius:16px; color:var(--text); font-family:'Croissant One',cursive; font-size:1.05rem; outline:none; backdrop-filter:blur(16px); transition:border-color 0.2s,box-shadow 0.2s; text-align:center; }
    .input-row input::placeholder, #keyword-input::placeholder { color:var(--muted); }
    .input-row input:focus, #keyword-input:focus { border-color:var(--green); box-shadow:0 0 0 3px rgba(34,197,94,0.15); }
    #add-keyword-btn { width:48px; height:48px; flex-shrink:0; background:var(--green); border:none; border-radius:14px; color:#fff; font-size:1.6rem; line-height:1; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(34,197,94,0.4); position:relative; }
    #add-keyword-btn:hover { background:#16a34a; transform:translateY(-1px); }
    #add-keyword-btn:active { transform:translateY(0); }
    #kw-count-badge { position:absolute; top:-7px; right:-7px; min-width:18px; height:18px; padding:0 4px; background:#f97316; color:#fff; font-size:0.6rem; font-weight:800; border-radius:9px; display:none; align-items:center; justify-content:center; pointer-events:none; border:2px solid #0a0a0a; }
    #keywords-list { display:none; }
    .keyword-tag { display:inline-flex; align-items:center; gap:5px; padding:7px 11px; background:rgba(34,197,94,0.12); border:1px solid rgba(34,197,94,0.35); border-radius:10px; font-size:0.82rem; font-weight:600; color:var(--green); animation:slideUp 0.2s ease; height:48px; }
    .keyword-tag .tag-text { max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .keyword-tag .tag-remove { background:none; border:none; color:rgba(255,255,255,0.35); cursor:pointer; font-size:0.95rem; line-height:1; padding:0; transition:color 0.2s; }
    .keyword-tag .tag-remove:hover { color:#f87171; }
    .keyword-tag.running { border-color:rgba(249,115,22,0.6); background:rgba(249,115,22,0.12); }
    .keyword-tag.running .tag-text { color:#f97316; }
    .keyword-tag.done { border-color:rgba(34,197,94,0.5); background:rgba(34,197,94,0.18); }
    .keyword-tag.error { border-color:rgba(239,68,68,0.5); background:rgba(239,68,68,0.1); }
    .keyword-tag.error .tag-text { color:#f87171; }
    #clear-keywords-btn { width:48px; height:48px; flex-shrink:0; background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.3); border-radius:14px; color:#f87171; font-size:1.1rem; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; visibility:hidden; }
    #clear-keywords-btn:hover { background:rgba(239,68,68,0.25); border-color:rgba(239,68,68,0.6); }
    /* Auto search toggle */
    #pages-row { width:80%; align-self:center; display:flex; align-items:center; justify-content:space-between; padding:0; background:none; border:none; border-radius:0; backdrop-filter:none; height:27px; margin-top:6px; }
    #pages-label { color:#ccc; font-size:13px; font-weight:500; white-space:nowrap; }
    #pages-select { background:#1a1a2e; color:#e0e0e0; border:1px solid rgba(255,255,255,0.15); border-radius:6px; padding:2px 8px; font-size:13px; cursor:pointer; outline:none; }
    #pages-select:focus { border-color:rgba(255,255,255,0.35); }
    /* Mode toggle */
    #mode-toggle-row { width:80%; align-self:center; display:flex; align-items:stretch; justify-content:center; gap:0; margin-bottom:4px; border-radius:10px; overflow:hidden; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.03); }
    .mode-tab { flex:1; padding:9px 0; background:transparent; color:rgba(255,255,255,0.4); font-family:'Croissant One',cursive; font-size:0.78rem; font-weight:600; border:none; cursor:pointer; transition:background 0.2s, color 0.2s; letter-spacing:0.04em; display:block; width:100%; }
    .mode-tab.active { background:rgba(249,115,22,0.28); color:#f97316; border:2px solid rgba(249,115,22,0.6); }
    .mode-tab:not(.active) { border:2px solid transparent; }
    .mode-tab:hover:not(.active) { background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.7); }
    #category-select { width:80%; align-self:center; background:#1a1a2e; color:#e0e0e0; border:1px solid rgba(255,255,255,0.15); border-radius:10px; padding:10px 14px; font-size:0.9rem; cursor:pointer; outline:none; display:none; }
    #category-select:focus { border-color:#f97316; }    
#start-btn { box-shadow:none !important; border:none; padding:0; height:3.5rem; width:65% !important; align-self:center; margin-top:8px; }
    #start-btn:disabled { cursor:not-allowed; opacity:0.6; }
    #stop-btn { display:none; height:3.5rem; width:65%; align-self:center; margin-top:18px; padding:0; border:none; border-radius:5rem; background:#dc2626; color:#fff; font-family:'Croissant One',cursive; font-size:1.2rem; font-weight:700; letter-spacing:0.15em; cursor:pointer; box-shadow:0 6px 32px rgba(220,38,38,0.55); transition:background 0.2s, transform 0.2s; }
    #stop-btn:hover { background:#b91c1c; transform:scale(1.03); }

    /* ── SPINNER LOADER POUR BOUTON ── */
    .btn-spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── STEALTHWORM BUTTON ── */
    .sw-btn {
      display: flex; justify-content: center; align-items: center;
      width: 100%; overflow: hidden; height: 3.5rem;
      background-size: 300% 300%; cursor: pointer;
      backdrop-filter: blur(1rem); border-radius: 5rem;
      transition: 0.5s; animation: gradient_301 5s ease infinite;
      border: double 4px transparent;
      background-image: linear-gradient(#212121, #212121),
        linear-gradient(137.48deg, #ffdb3b 10%, #fe53bb 45%, #8f51ea 67%, #0044ff 87%);
      background-origin: border-box; background-clip: content-box, border-box;
      font-family: 'Croissant One', cursive; font-size: 1.3rem;
      font-weight: bold; letter-spacing: 3px; color: #ffffff;
      text-shadow: 0 0 4px white; position: relative;
    }
    .sw-btn:hover { transform: scale(1.05); }
    .sw-btn:active {
      border: double 4px #fe53bb;
      background-image: linear-gradient(#212121, #212121),
        linear-gradient(137.48deg, #ffdb3b 10%, #fe53bb 45%, #8f51ea 67%, #0044ff 87%);
      background-origin: border-box; background-clip: content-box, border-box;
      animation: none;
    }
    .sw-btn #container-stars { position: absolute; z-index: -1; width: 100%; height: 100%; overflow: hidden; transition: 0.5s; backdrop-filter: blur(1rem); border-radius: 5rem; }
    .sw-btn:hover #container-stars { z-index: 1; background-color: #212121; }
    .sw-btn #glow { position: absolute; display: flex; width: 12rem; }
    .sw-btn .circle { width: 100%; height: 30px; filter: blur(2rem); animation: pulse_3011 4s infinite; z-index: -1; }
    .sw-btn .circle:nth-of-type(1) { background: rgba(254,83,186,0.636); }
    .sw-btn .circle:nth-of-type(2) { background: rgba(142,81,234,0.704); }
    .sw-btn:active .circle { background: #fe53bb; }
    .sw-btn #stars { position: relative; background: transparent; width: 200rem; height: 200rem; }
    .sw-btn #stars::after { content: ""; position: absolute; top: -10rem; left: -100rem; width: 100%; height: 100%; animation: animStarRotate 90s linear infinite; background-image: radial-gradient(#ffffff 1px, transparent 1%); background-size: 50px 50px; }
    .sw-btn #stars::before { content: ""; position: absolute; top: 0; left: -50%; width: 170%; height: 500%; animation: animStar 60s linear infinite; background-image: radial-gradient(#ffffff 1px, transparent 1%); background-size: 50px 50px; opacity: 0.5; }
    @keyframes animStar { from{transform:translateY(0)} to{transform:translateY(-135rem)} }
    @keyframes animStarRotate { from{transform:rotate(360deg)} to{transform:rotate(0)} }
    @keyframes gradient_301 { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    @keyframes pulse_3011 { 0%{transform:scale(0.75);box-shadow:0 0 0 0 rgba(0,0,0,0.7)} 70%{transform:scale(1);box-shadow:0 0 0 10px rgba(0,0,0,0)} 100%{transform:scale(0.75);box-shadow:0 0 0 0 rgba(0,0,0,0)} }

    /* ── PROGRESS ── */
    #loading-spinner { display:none !important; }
    /* Progress inline sous le bouton search */
    #progress-wrap { width:65%; align-self:center; display:none; flex-direction:column; align-items:center; gap:16px; margin-top:12px; }
    #stop-btn { margin-top:4px; padding:14px 0; border-radius:14px; border:none; background:#dc2626; color:#fff; font-family:'Croissant One',cursive; font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; letter-spacing:0.1em; box-shadow:0 6px 32px rgba(220,38,38,0.55); width:65%; }
    #stop-btn:hover { background:#b91c1c; transform:scale(1.03); box-shadow:0 10px 40px rgba(220,38,38,0.7); }
    #current-keyword-label { font-size:0.82rem; color:var(--muted); font-weight:600; letter-spacing:0.06em; text-align:center; min-height:1.1em; }
    .progress-keyword-label { text-align:center; font-size:0.8rem; color:#f97316; font-weight:600; min-height:1.2em; }
    .step-dot { display:flex; align-items:center; justify-content:center; opacity:0.25; transition:opacity 0.3s, transform 0.3s, filter 0.3s; font-size:1.3rem; line-height:1; filter:grayscale(1); }
    .step-dot.active { opacity:1; filter:grayscale(0); transform:scale(1.25); animation:stepPop 0.6s ease infinite alternate; }
    .step-dot.done { opacity:0.7; filter:grayscale(0); transform:scale(1); }
    .steps-row { display:flex; flex-direction:row; justify-content:center; align-items:center; width:100%; margin-top:8px; gap:18px; }

  <script>
    // ── LOGO ANIMATION ──
    (function() {
      function animateGroup(selector) {
        const letters = document.querySelectorAll(selector);
        if (!letters.length) return;
        let i = 0;
        function next() {
          letters.forEach(function(l) { l.classList.remove('pop'); });
          if (i < letters.length) {
            letters[i].classList.add('pop');
            i++;
            setTimeout(next, 350);
          } else {
            i = 0;
            setTimeout(next, 600);
          }
        }
        next();
      }
      function startAnimations() {
        animateGroup('.logo-letter');       // modal auth
        // titre principal : animation CSS heartbeat sur #finder-img et #niche-img
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', startAnimations);
      } else {
        startAnimations();
      }
    })();

    // ── AUTH ──
    let SCOUT_TOKEN = localStorage.getItem('scout_token') || null;
    let _currentUser = null;

    // ── Gestion du retour OAuth Etsy ──
    (function handleOAuthReturn() {
      const params = new URLSearchParams(window.location.search);
      const token   = params.get('token');
      const email   = params.get('email');
      const etsyErr = params.get('etsy_error');
      if (token) {
        localStorage.setItem('scout_token', token);
        localStorage.setItem('etsy_connected', '1');
        SCOUT_TOKEN = token;
        window.history.replaceState({}, '', window.location.pathname);
        // Toujours afficher l'email du compte, pas celui d'Etsy
        fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + SCOUT_TOKEN } })
          .then(function(r) { return r.json(); })
          .then(function(d) { if (d && d.email) onLoggedIn(d.email); });
      } else if (etsyErr) {
        window.history.replaceState({}, '', window.location.pathname);
        setTimeout(function() {
          const errEl = document.getElementById('auth-error');
          if (errEl) {
            const msgs = { 'no_email': 'Etsy did not provide your email.', 'access_denied': 'Etsy login cancelled.' };
            errEl.textContent = msgs[etsyErr] || ('Etsy error: ' + etsyErr);
          }
        }, 500);
      }
    })();


    let _authTab = 'register';

    function checkAuth() {
      const timeout = new Promise(function(_, reject) {
        setTimeout(function() { reject(new Error('timeout')); }, 4000);
      });

      Promise.race([fetch('/api/health', { cache: 'no-store' }), timeout])
        .then(function(r) {
          if (!r.ok) throw new Error('not ready');
          if (!SCOUT_TOKEN) { showAuthModal(); return; }
          return fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + SCOUT_TOKEN } });
        })
        .then(function(r) {
          if (!r) return;
          if (!r.ok) { SCOUT_TOKEN = null; localStorage.removeItem('scout_token'); showAuthModal(); return; }
          return r.json();
        })
        .then(function(d) {
          if (d) onLoggedIn(d.email);
        })
        .catch(function() {
          showAuthModal();
        });
    }

    function showAuthModal() {
      document.getElementById('auth-overlay').style.display = 'flex';
    }
    function hideAuthModal() {
      document.getElementById('auth-overlay').style.display = 'none';
    }

    function authSwitchTab(tab) {
      _authTab = tab;
      document.querySelectorAll('.auth-tab').forEach(function(b) { b.classList.toggle('active', b.textContent.toLowerCase() === tab); });
      document.getElementById('auth-submit').textContent = tab === 'login' ? 'Login' : 'Register';
      document.getElementById('auth-error').textContent = '';
    }

    async function authSubmit() {
      const email = document.getElementById('auth-email').value.trim();
      const password = document.getElementById('auth-password').value;
      const errEl = document.getElementById('auth-error');
      const btn = document.getElementById('auth-submit');
      if (!email || !password) { errEl.textContent = 'Fill in all fields'; return; }
      btn.disabled = true; btn.textContent = '...';
      try {
        const r = await fetch('/api/auth/' + _authTab, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await r.json();
        if (!r.ok) { errEl.textContent = data.error || 'Error'; return; }
        localStorage.setItem('scout_token', data.token);
        SCOUT_TOKEN = data.token;
        onLoggedIn(data.email);
      } catch(e) { errEl.textContent = e.message; }
      finally { btn.disabled = false; btn.textContent = _authTab === 'login' ? 'Login' : 'Register'; }
    }

    function onLoggedIn(email) {
      _currentUser = email;
      hideAuthModal();
      document.getElementById('user-email-display').textContent = email || '—';
      document.getElementById('user-badge').style.display = 'flex';
      document.getElementById('niche-list-btn').style.display = 'flex';
      initSavedShops();
      loadAutoState();

      // Synchroniser le compteur d'annonces avec le menu déroulant
      var pagesSelect = document.getElementById('pages-select');
      function updateListingCounterLabel() {

    function detectApiFromMessage(msg) {
      const m = msg.toUpperCase();
      if (m.includes('SERPER')) return 'Serper';
      if (m.includes('IMGBB')) return 'ImgBB';
      if (m.includes('SCRAPEAPI')) return 'ScrapeAPI';
      if (m.includes('MONGODB') || m.includes('MONGO')) return 'MongoDB';
      if (m.includes('ALIEXPRESS')) return 'AliExpress';
      if (m.includes('ETSY')) return 'Etsy';
      return null;
    }

    function getHintForMessage(msg) {
      const m = msg.toUpperCase();
      for (const [key, hint] of Object.entries(API_HINTS)) {
        if (m.includes(key)) return hint;
      }
      return 'Check the Render logs for more details.';
    }

    // ── PROGRESS ──
    const STEPS = [
      { key: 'scraping',  label: 'Scraping' },
      { key: 'analyzing', label: 'Analyzing' },
      { key: 'match',     label: 'Dropshippers' },
    ];

    function initProgress(keyword) {
      resetProgress();
      document.getElementById('progress-msg').textContent = '';
      var kl = document.getElementById('progress-keyword-label');
      if (kl) kl.textContent = keyword || '';
    }

    var _progressCurrent = 0;
    var _progressTarget  = 0;
    var _progressRaf     = null;
    var _totalShops   = 0;
    var _startTime    = 0;
    var _estimated    = false;
    var _estimatedMs  = 0;

    function _animateProgress() {
      var el = document.getElementById('progress-fill');
      if (!el) return;
      var speed;
      if (_estimated && _estimatedMs > 0) {
        speed = (85 / (_estimatedMs / 16.67));
        speed = Math.max(0.005, Math.min(speed, 0.5));
      } else {
        speed = 0.006;
      }
      if (_progressCurrent < _progressTarget) {
        _progressCurrent = Math.min(_progressTarget, _progressCurrent + 0.4);
      } else {
        _progressCurrent = Math.min(94, _progressCurrent + speed);
      }
      el.style.width = _progressCurrent.toFixed(2) + '%';
      if (_progressCurrent > 1 && _progressCurrent < 99) el.classList.add('burning');
      else el.classList.remove('burning');
      if (_progressCurrent < 100) {
        _progressRaf = requestAnimationFrame(_animateProgress);
      }
    }

    function setProgress(target) {
      _progressTarget = target;
      if (!_progressRaf) _progressRaf = requestAnimationFrame(_animateProgress);
    }

    function resetProgress() {
      if (_progressRaf) { cancelAnimationFrame(_progressRaf); _progressRaf = null; }
      _progressCurrent = 0; _progressTarget = 0;
      _totalShops = 0; _startTime = 0; _estimated = false; _estimatedMs = 0;
      var el = document.getElementById('progress-fill');
      if (el) { el.style.width = '0%'; el.classList.remove('burning'); }
      ['connecting','scraping','analyzing','match','complete'].forEach(function(s) {
        var d = document.getElementById('step-' + s);
        if (d) { d.classList.remove('active','done'); }
      });
      // Reset du compteur d'annonces
      var counter = document.getElementById('listing-counter');
      if (counter) {
        var total = parseInt(document.getElementById('pages-select')?.value || '10', 10);
        counter.textContent = '0 / ' + total + ' annonces analysées';
      }
    }

    function syncProgressFromAnalyzing(total, done) {
      if (!_estimated && total > 0 && done >= 1) {
        var elapsed = Date.now() - _startTime;
        _estimatedMs = (elapsed / done) * total;
        _estimated = true;
      }
      if (total > 0) {
        var pct = 10 + Math.round((done / total) * 82);
        _progressTarget = Math.max(_progressCurrent, pct);
      }
      // Mise à jour du compteur d'annonces analysées
      var counter = document.getElementById('listing-counter');
      if (counter && total > 0) {
        counter.textContent = done + ' / ' + total + ' annonces analysées';
      }
    }

    function _activateStepDot(key) {
      var order = ['connecting','scraping','analyzing','match','complete'];
      var idx = order.indexOf(key);
      order.forEach(function(s, i) {
        var d = document.getElementById('step-' + s);
        if (!d) return;
        d.classList.remove('active','done');
        if (i < idx) d.classList.add('done');
        else if (i === idx) d.classList.add('active');
      });
    }

    function advanceStep(k, msg) {
      if (msg) document.getElementById('progress-msg').textContent = msg;
      if (k === 'scraping') {
        setProgress(10); _activateStepDot('scraping');
      } else if (k === 'analyzing') {
        if (!_startTime) { _startTime = Date.now(); setProgress(12); }
        _activateStepDot('analyzing');
      } else if (k === 'match') {
        _progressTarget = Math.min(94, _progressTarget + 1);
        _activateStepDot('match');
      }
      if (!_progressRaf) _progressRaf = requestAnimationFrame(_animateProgress);
    }

    function completeAllSteps() {
      _progressTarget = 100;
      _progressCurrent = Math.min(99, _progressCurrent);
      if (!_progressRaf) _progressRaf = requestAnimationFrame(_animateProgress);
      _activateStepDot('complete');
    }

    // --- START SEARCH ---
    async function startSearch() {
      if (_searching) return;

      if (_searchMode === 'category') {
        await startCategorySearch();
        return;
      }

      // Mode mot-clé (comportement d'origine)
      const inputVal = document.getElementById('keyword-input').value.trim();
      _keywords = [];
      if (inputVal) {
        _keywords.push(inputVal);
        renderKeywords();
        document.getElementById('keyword-input').value = '';
      }
      if (_keywords.length === 0) { document.getElementById('keyword-input').focus(); return; }

      _searching = true;
      _stopRequested = false;
      _sessionId = Date.now().toString(36) + Math.random().toString(36).slice(2);
      window._shopDataMap = {};

      if (_restoreTimer) { clearTimeout(_restoreTimer); _restoreTimer = null; }
      setStopMode();
      
      const kwInput = document.getElementById('keyword-input');
      if (kwInput) kwInput.disabled = true;

      resetProgress();
      document.getElementById('progress-wrap').style.display = 'flex';
      document.getElementById('results-section').style.display = 'none';
      document.getElementById('results-container').innerHTML = '';
      document.getElementById('results-count').textContent = '';

      document.documentElement.classList.remove('unlocked');
      window.scrollTo({ top: 0 });

      let totalMatches = 0;
      let hasError = false;

      _keywords.forEach(function(kw) {
        const tag = document.getElementById('tag-' + encodeKw(kw));
        if (tag) tag.className = 'keyword-tag';
      });

      for (let ki = 0; ki < _keywords.length; ki++) {
        const keyword = _keywords[ki];
        const tag = document.getElementById('tag-' + encodeKw(keyword));
        if (tag) tag.className = 'keyword-tag running';

        initProgress(keyword + ' (' + (ki + 1) + '/' + _keywords.length + ')');
        document.getElementById('progress-wrap').style.display = 'flex';
        const currentLabel = document.getElementById('progress-keyword-label');
        if (currentLabel) currentLabel.textContent = keyword;
        setProgress(5);

        if (_keywords.length > 1) {
          const sec = document.createElement('div');
          sec.className = 'keyword-section-title';
          sec.textContent = '🔍 ' + keyword;
          document.getElementById('results-container').appendChild(sec);
        }

        try {
          document.getElementById('progress-msg').textContent = '⏳ Connecting...';
          _activateStepDot('connecting');
          const response = await fetch('/api/search-dropship', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              ...(SCOUT_TOKEN ? { 'Authorization': 'Bearer ' + SCOUT_TOKEN } : {})
            },
            body: JSON.stringify({ keyword, sessionId: _sessionId, pages: parseInt(document.getElementById('pages-select')?.value || '5', 10) })
          });

          const ct = response.headers.get('content-type') || '';
          if (!ct.includes('text/event-stream')) {
            const data = await response.json().catch(()=>({}));
            const errMsg = data.error || 'Server error';
            document.getElementById('progress-msg').textContent = '❌ ' + errMsg;
            showErrorPopup(errMsg);
            if (tag) tag.className = 'keyword-tag error';
            hasError = true;
            setRetryMode();
            continue;
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buf = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const lines = buf.split('\n'); buf = lines.pop();
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              try {
                const ev = JSON.parse(line.slice(6));
                if (_stopRequested) { reader.cancel(); break; }
                if (ev.step === 'complete') {
                  completeAllSteps();
                  if (tag) tag.className = 'keyword-tag done';
                } else if (ev.step === 'match') {
                  if (ev.shop) {
                    renderShopResult(ev.shop, keyword);
                    totalMatches++;
                    document.getElementById('results-section').style.display = 'block';
                    document.documentElement.classList.add('unlocked');
                    document.documentElement.style.overflowY = 'auto';
                    document.body.style.overflowY = 'auto';
                  }
                  advanceStep('match', ev.message);
                } else if (ev.step === 'analyzing' && ev.total && ev.done !== undefined) {
                  syncProgressFromAnalyzing(ev.total, ev.done);
                  advanceStep('analyzing', ev.message);
                } else if (ev.step === 'error') {
                  document.getElementById('progress-msg').textContent = '❌ ' + ev.message;
                  showErrorPopup(ev.message);
                  if (tag) tag.className = 'keyword-tag error';
                  hasError = true;
                  setRetryMode();
                } else {
                  advanceStep(ev.step, ev.message);
                }
              } catch(e) {
                // ignore parse errors
              }
            }
          }
        } catch(err) {
          if (_stopRequested) break;
          const msg = (err.message || '').toLowerCase();
          if (msg.includes('network') || msg.includes('fetch') || msg.includes('failed')) {
            break;
          }
          document.getElementById('progress-msg').textContent = '❌ ' + err.message;
          showErrorPopup(err.message);
          if (tag) tag.className = 'keyword-tag error';
          hasError = true;
          setRetryMode();
        }

        if (totalMatches > 0) {
          document.getElementById('results-section').style.display = 'block';
          document.documentElement.classList.add('unlocked');
          document.documentElement.style.overflowY = 'auto';
          document.body.style.overflowY = 'auto';
        }
        if (_stopRequested) break;
      }

      var countBar = document.getElementById('results-count');
      countBar.innerHTML = '';

      if (totalMatches > 0) {
        setTimeout(function() { document.getElementById('results-section').scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
      }

      if (!_stopRequested) {
        restoreUI();
        clearKeywords();
        if (hasError && totalMatches === 0) {
          const btn2 = document.getElementById('start-btn');
          btn2.classList.add('retry'); btn2.textContent = 'RETRY';
        }
      }

      if (totalMatches === 0 && !hasError && !_stopRequested) {
        document.getElementById('results-container').innerHTML += '<div class="empty">No results found.</div>';
        document.getElementById('results-section').style.display = 'block';
      }
    }

    // ── CATEGORY SEARCH (route /search-from-ali) ──
    async function startCategorySearch() {
      _searching = true;
      _stopRequested = false;
      _sessionId = Date.now().toString(36) + Math.random().toString(36).slice(2);
      window._shopDataMap = {};

      if (_restoreTimer) { clearTimeout(_restoreTimer); _restoreTimer = null; }
      setStopMode();

      resetProgress();
      document.getElementById('progress-wrap').style.display = 'flex';
      document.getElementById('results-section').style.display = 'none';
      document.getElementById('results-container').innerHTML = '';
      document.getElementById('results-count').textContent = '';
      document.documentElement.classList.remove('unlocked');
      window.scrollTo({ top: 0 });

      const catSelect = document.getElementById('category-select');
      const category = catSelect ? catSelect.value : null;
      const catLabel = catSelect ? catSelect.options[catSelect.selectedIndex].text : category;

      const currentLabel = document.getElementById('progress-keyword-label');
      if (currentLabel) currentLabel.textContent = '📦 ' + catLabel;

      let totalMatches = 0;
      let hasError = false;

      try {
        document.getElementById('progress-msg').textContent = '⏳ Connecting...';
        _activateStepDot('connecting');

        const response = await fetch('/api/search-from-ali', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(SCOUT_TOKEN ? { 'Authorization': 'Bearer ' + SCOUT_TOKEN } : {})
          },
          body: JSON.stringify({ category, sessionId: _sessionId, productsPerCategory: parseInt(document.getElementById('pages-select')?.value || '10', 10) })
        });

        const ct = response.headers.get('content-type') || '';
        if (!ct.includes('text/event-stream')) {
          const data = await response.json().catch(() => ({}));
          const errMsg = data.error || 'Server error';
          document.getElementById('progress-msg').textContent = '❌ ' + errMsg;
          hasError = true;
          setRetryMode();
          _searching = false;
          return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n'); buf = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try {
              const ev = JSON.parse(line.slice(6));
              if (_stopRequested) { reader.cancel(); break; }

              if (ev.step === 'complete') {
                completeAllSteps();
              } else if (ev.step === 'match') {
                if (ev.shop) {
                  renderShopResult(ev.shop, ev.shop.category || category);
                  totalMatches++;
                  document.getElementById('results-section').style.display = 'block';
                  document.documentElement.classList.add('unlocked');
                  document.documentElement.style.overflowY = 'auto';
                  document.body.style.overflowY = 'auto';
                }
                advanceStep('match', ev.message);
              } else if (ev.step === 'category') {
                const lbl = document.getElementById('progress-keyword-label');
                if (lbl) lbl.textContent = ev.message;
                _activateStepDot('scraping');
                advanceStep('scraping', ev.message);
              } else if (ev.step === 'products') {
                advanceStep('analyzing', ev.message);
              } else if (ev.step === 'analyzing') {
                _activateStepDot('analyzing');
                advanceStep('analyzing', ev.message);
              } else if (ev.step === 'error') {
                document.getElementById('progress-msg').textContent = '❌ ' + ev.message;
                hasError = true;
                setRetryMode();
              } else {
                advanceStep(ev.step, ev.message);
              }
            } catch(e) { /* ignore parse errors */ }
          }
        }
      } catch(err) {
        if (!_stopRequested) {
          document.getElementById('progress-msg').textContent = '❌ ' + err.message;
          hasError = true;
          setRetryMode();
        }
      }

      if (totalMatches > 0) {
        setTimeout(function() { document.getElementById('results-section').scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
      }

      if (!_stopRequested && !hasError) restoreUI();
      if (totalMatches === 0 && !hasError && !_stopRequested) {
        document.getElementById('results-container').innerHTML += '<div class="empty">No results found.</div>';
        document.getElementById('results-section').style.display = 'block';
      }
      _searching = false;
    }
    window._shopDataMap = {};
    function encodeShopKey(u) { return (u || '').replace(/[^a-zA-Z0-9]/g,'_').slice(0,40); }

    function renderShopResult(shop, keyword) {
      const idx = Object.keys(window._shopDataMap).length;
      // Build the best possible shop URL from available data
      const shopUrl = shop.shopName
        ? 'https://www.etsy.com/shop/' + shop.shopName
        : (shop.shopUrl && shop.shopUrl !== '#' ? shop.shopUrl
          : (shop.listingUrl && shop.listingUrl !== '#' ? shop.listingUrl : null));
      const productUrl = shopUrl || shop.listingUrl || shop.shopUrl || null;
      window._shopDataMap[idx] = {
        shopName:     shop.shopName || null,
        shopUrl:      shopUrl || null,
        shopAvatar:   shop.shopAvatar || shop.shopImage || null,
        productImage: shop.shopImage || null,
        productUrl:   productUrl || null,
        keyword:      keyword || null,
      };

      const card = document.createElement('div');
      card.className = 'match-card';
      const inner = document.createElement('div');
      inner.className = 'match-card-inner';

      const heartBtn = document.createElement('button');
      heartBtn.className = 'btn-save-shop' + (shopUrl && _savedShopUrls.has(shopUrl) ? ' saved' : '');
      heartBtn.id = 'heart-' + encodeShopKey(shopUrl || '');
      heartBtn.textContent = (shopUrl && _savedShopUrls.has(shopUrl)) ? '✔' : '❤️';
      heartBtn.onclick = function() { saveShop(idx, this); };
      inner.appendChild(heartBtn);

      const avatarUrl = shop.shopAvatar || shop.shopImage || null;
      const ph = document.createElement('div');
      ph.className = 'shop-result-avatar-ph'; ph.textContent = '🛍';
      if (avatarUrl) {
        const img = document.createElement('img');
        img.className = 'shop-result-avatar'; img.loading = 'lazy';
        img.src = '/proxy-image?url=' + encodeURIComponent(avatarUrl);
        img.onerror = function() { this.style.display='none'; ph.style.display='flex'; };
        ph.style.display = 'none';
        inner.appendChild(img);
      }
      inner.appendChild(ph);

      const info = document.createElement('div');
      info.className = 'shop-result-info';
      const nameEl = document.createElement('div'); nameEl.className = 'shop-result-name'; nameEl.textContent = shop.shopName || '—';
      const tagEl  = document.createElement('div'); tagEl.className  = 'shop-result-tag';  tagEl.textContent  = '🛒 Dropshipping confirmed';
      info.appendChild(nameEl); info.appendChild(tagEl);
      inner.appendChild(info);

      const visitBtn = document.createElement('a');
      if (shopUrl) {
        visitBtn.href = shopUrl; visitBtn.target = '_blank'; visitBtn.rel = 'noopener';
      } else {
        visitBtn.href = '#'; visitBtn.onclick = function(e){ e.preventDefault(); showToast('URL not found', '#ef4444'); };
      }
      visitBtn.className = 'shop-result-btn'; visitBtn.textContent = 'Visit shop ↗';
      inner.appendChild(visitBtn);

      card.appendChild(inner);
      document.getElementById('results-container').appendChild(card);
    }

    // ── SAVE SHOP ──
    let _savedShopUrls = new Set();

    async function initSavedShops() {
      if (!SCOUT_TOKEN) return;
      try {
        const r = await fetch('/api/shops', { headers: { 'Authorization': 'Bearer ' + SCOUT_TOKEN } });
        if (!r.ok) return;
        const shops = await r.json();
        shops.forEach(function(s) { if (s.shopUrl) _savedShopUrls.add(s.shopUrl); });
        updateNlCount();
      } catch(e) {}
    }

    function updateNlCount() {
      const badge = document.getElementById('nl-count');
      if (!badge) return;
      const n = _savedShopUrls.size;
      badge.textContent = n;
      badge.style.display = n > 0 ? 'inline-flex' : 'none';
    }

    function showToast(msg, color) {
      const t = document.createElement('div');
      t.textContent = msg;
      t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:' + (color || '#222') + ';color:#fff;padding:12px 20px;border-radius:10px;font-size:0.9rem;font-weight:600;z-index:99999;pointer-events:none;';
      document.body.appendChild(t); setTimeout(function() { t.remove(); }, 3000);
    }

    async function saveShop(idx, btn) {
      const token = localStorage.getItem('scout_token');
      if (!token) { showAuthModal(); return; }
      const data = window._shopDataMap && window._shopDataMap[idx];
      if (!data) { showToast('Shop data not found', '#ef4444'); return; }
      // Fallback: use productUrl if shopUrl is missing
      if (!data.shopUrl && data.productUrl) data.shopUrl = data.productUrl;
      if (data.shopUrl && _savedShopUrls.has(data.shopUrl)) { btn.classList.add('saved'); btn.textContent = '✔'; showToast('Already saved!', '#22c55e'); return; }
      if (!data.shopUrl || data.shopUrl === '#') { showToast('No URL found for this shop', '#ef4444'); return; }
      btn.classList.add('saving'); btn.textContent = '⏳';
      try {
        const r = await fetch('/api/shops/save', {
          method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ shopUrl: data.shopUrl, shopName: data.shopName, shopAvatar: data.shopAvatar, productImage: data.productImage, productUrl: data.productUrl, keyword: data.keyword || null })
        });
        if (r.ok) {
          _savedShopUrls.add(data.shopUrl); btn.classList.remove('saving'); btn.classList.add('saved'); btn.textContent = '✔';
          updateNlCount(); showToast('Saved! ❤️', '#22c55e');
        } else {
          const json = await r.json().catch(() => ({})); btn.classList.remove('saving'); btn.textContent = '❤️';
          showToast('Error: ' + (json.error || r.status), '#ef4444');
        }
      } catch(e) { btn.classList.remove('saving'); btn.textContent = '❤️'; showToast(e.message, '#ef4444'); }
    }

    // ── MILKY WAY ──
    (function(){const canvas=document.getElementById('milkyway-canvas');if(!canvas)return;const ctx=canvas.getContext('2d');let W,H,cx,cy;const bandAngle=Math.PI/5,bandW=600,rand=function(a,b){return Math.random()*(b-a)+a;};let nebulae=[];function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;cx=W/2;cy=H/2;buildNebulae();}window.addEventListener('resize',resize);resize();function buildNebulae(){nebulae=[];const colors=[[180,100,200],[100,120,255],[255,120,80],[80,200,255],[200,80,255]];for(var i=0;i<5;i++){const col=colors[i],along=rand(-bandW*0.4,bandW*0.4),spread=rand(-60,60);nebulae.push({x:cx+Math.cos(bandAngle)*along-Math.sin(bandAngle)*spread,y:cy+Math.sin(bandAngle)*along+Math.cos(bandAngle)*spread,rx:rand(80,220),ry:rand(40,120),angle:bandAngle+rand(-0.3,0.3),r:col[0],g:col[1],b:col[2],alpha:rand(0.04,0.1),pulse:rand(0.001,0.003),pulseDir:1});}}var driftAngle=0;function draw(){ctx.clearRect(0,0,W,H);driftAngle+=0.00008;ctx.save();ctx.translate(W/2,H/2);ctx.rotate(driftAngle);ctx.translate(-W/2,-H/2);nebulae.forEach(function(n){n.alpha+=n.pulse*n.pulseDir;if(n.alpha>0.12||n.alpha<0.03)n.pulseDir*=-1;ctx.save();ctx.translate(n.x,n.y);ctx.rotate(n.angle);const g=ctx.createRadialGradient(0,0,0,0,0,n.rx);g.addColorStop(0,'rgba('+n.r+','+n.g+','+n.b+','+n.alpha+')');g.addColorStop(0.5,'rgba('+n.r+','+n.g+','+n.b+','+(n.alpha*0.4)+')');g.addColorStop(1,'rgba('+n.r+','+n.g+','+n.b+',0)');ctx.scale(1,n.ry/n.rx);ctx.beginPath();ctx.arc(0,0,n.rx,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();ctx.restore();});ctx.restore();requestAnimationFrame(draw);}draw();})();

  </script>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    (function() {
      try {
        var _socket = io();
        _socket.on('online_count', function(n) {
          var el = document.getElementById('online-count');
          if (el) el.textContent = n;
        });
      } catch(e) {
        // socket.io not available, fallback to polling
        setInterval(function() {
          fetch('/api/online-count').then(function(r){ return r.json(); }).then(function(d){
            var el = document.getElementById('online-count');
            if (el) el.textContent = d.count || 1;
          }).catch(function(){});
        }, 10000);
      }
    })();
  </script>
