<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finder Niche</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Croissant+One&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --green: #22c55e; --glass: rgba(0,0,0,0.55); --glass-border: rgba(255,255,255,0.12); --text: #ffffff; --muted: rgba(255,255,255,0.55); }
    html, body { min-height: 100%; font-family: 'Inter', sans-serif; color: var(--text); overflow: hidden; }
    body { position: relative; }
    html.unlocked, html.unlocked body { overflow-y: auto; overflow-x: hidden; }
    #bg-layer { position: fixed; inset: 0; z-index: -3; background: #0a0a0a url('/background.png') center center / cover no-repeat; animation: bgDrift 18s ease-in-out infinite alternate; transform-origin: center; }
    @keyframes bgDrift { 0%{transform:scale(1.08)translate(0,0)} 25%{transform:scale(1.1)translate(-12px,-8px)} 50%{transform:scale(1.08)translate(8px,-14px)} 75%{transform:scale(1.1)translate(-6px,10px)} 100%{transform:scale(1.08)translate(10px,6px)} }
    #bg-layer::after { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.5); }
    #main-view { position:relative; z-index:10; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:80px 20px 20px; gap:20px; }
    .search-card { width:100%; max-width:660px; display:flex; flex-direction:column; align-items:center; gap:18px; }
    .input-wrap { width:100%; }
    .input-wrap input { width:100%; padding:20px 24px; background:var(--glass); border:1px solid var(--glass-border); border-radius:16px; color:var(--text); font-family:'Inter',sans-serif; font-size:1.15rem; outline:none; backdrop-filter:blur(16px); transition:border-color 0.2s,box-shadow 0.2s; text-align:center; }
    .input-wrap input::placeholder { color:var(--muted); }
    .input-wrap input:focus { border-color:var(--green); box-shadow:0 0 0 3px rgba(34,197,94,0.15); }
    .selects-row { display:flex; gap:10px; width:100%; }
    .select-wrap { flex:1; position:relative; }
    .select-wrap select { width:100%; padding:16px 40px 16px 20px; background:var(--glass); border:1px solid var(--glass-border); border-radius:14px; color:var(--text); font-family:'Inter',sans-serif; font-size:1rem; outline:none; appearance:none; backdrop-filter:blur(16px); cursor:pointer; transition:border-color 0.2s; }
    .select-wrap select:focus { border-color:var(--green); }
    .select-wrap option { background:#1a1a1a; color:#fff; }
    .select-wrap::after { content:'▾'; position:absolute; right:12px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; font-size:0.8rem; }
    #start-btn { width:100%; padding:22px; background:var(--green); border:none; border-radius:16px; color:#fff; font-family:'Inter',sans-serif; font-weight:700; font-size:1.25rem; letter-spacing:0.12em; cursor:pointer; transition:all 0.25s ease; position:relative; overflow:hidden; box-shadow:0 4px 32px rgba(34,197,94,0.45); }
    #start-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,0.15) 50%,transparent 70%); transform:translateX(-100%); transition:transform 0.6s ease; }
    #start-btn:hover::before { transform:translateX(100%); }
    #start-btn:hover { background:#16a34a; transform:translateY(-1px); box-shadow:0 6px 32px rgba(34,197,94,0.45); }
    #start-btn:active { transform:translateY(0); }
    #start-btn:disabled { cursor:not-allowed; transform:none; }
    #start-btn.loading { animation:btnBlink 0.7s ease-in-out infinite; }
    @keyframes btnBlink { 0%,100%{background:#dc2626;box-shadow:0 4px 32px rgba(220,38,38,0.6)} 50%{background:#ff6b6b;box-shadow:0 0 48px rgba(220,38,38,0.9)} }
    #start-btn.retry { animation:btnRetry 0.8s ease-in-out infinite; letter-spacing:0.18em; }
    @keyframes btnRetry { 0%,100%{background:#ca8a04;box-shadow:0 4px 32px rgba(202,138,4,0.6)} 50%{background:#fbbf24;box-shadow:0 0 48px rgba(251,191,36,0.9);color:#422006} }
    .etsy-img-container { position:relative; width:100%; }
    .shop-side-col { position:absolute; top:0; left:0; bottom:0; width:42px; z-index:2; display:flex; flex-direction:column; align-items:center; justify-content:space-between; padding:10px 0; background:rgba(0,0,0,0.45); border-right:1px solid rgba(255,255,255,0.08); border-radius:11px 0 0 11px; }
    .shop-side-btn { display:flex; align-items:center; justify-content:center; text-decoration:none; transition:opacity 0.2s; cursor:pointer; }
    .shop-side-btn:hover { opacity:0.8; }
    .shop-side-btn img { width:26px; height:26px; border-radius:50%; object-fit:cover; border:2px solid rgba(241,100,30,0.6); }
    .side-initial { display:flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:50%; background:rgba(241,100,30,0.3); border:2px solid rgba(241,100,30,0.5); color:#fff; font-weight:700; font-size:0.8rem; }
    .btn-heart-icon { width:26px; height:26px; border-radius:50%; border:none; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#facc15; font-size:1.1rem; transition:all 0.2s; padding:0; }
    .btn-heart-icon:hover { transform:scale(1.25); color:#eab308; }
    .btn-heart-icon.saved { color:#22c55e; transform:scale(1.1); }
    .btn-heart-icon.saving { opacity:0.5; cursor:not-allowed; }
    #find-wrap { display:none; flex-direction:column; align-items:center; gap:16px; padding:10px 0 20px; width:100%; }
    #find-btn { padding:16px 48px; background:var(--green); border:none; border-radius:14px; color:#fff; font-family:'Inter',sans-serif; font-weight:700; font-size:1.1rem; letter-spacing:0.1em; cursor:pointer; transition:all 0.25s; box-shadow:0 4px 24px rgba(34,197,94,0.4); }
    #find-btn:hover { background:#16a34a; transform:translateY(-1px); }
    #find-btn:disabled { opacity:1; cursor:not-allowed; transform:none; }
    #find-btn.searching { animation:findBlink 0.6s ease-in-out infinite; cursor:not-allowed; }
    @keyframes findBlink { 0%,100%{background:#dc2626;box-shadow:0 4px 32px rgba(220,38,38,0.7),0 0 60px rgba(220,38,38,0.4)} 50%{background:#ff3333;box-shadow:0 0 48px rgba(255,50,50,1),0 0 80px rgba(220,38,38,0.6)} }
    #find-status { font-size:0.82rem; color:var(--muted); text-align:center; min-height:1.2em; }
    #winner-card { display:none; width:100%; max-width:600px; background:linear-gradient(135deg,rgba(34,197,94,0.12),rgba(16,163,74,0.06)); border:1px solid rgba(34,197,94,0.4); border-radius:18px; padding:24px; backdrop-filter:blur(16px); animation:slideUp 0.5s ease; text-align:center; }
    #winner-card .winner-label { font-size:0.75rem; font-weight:700; letter-spacing:0.15em; color:var(--green); text-transform:uppercase; margin-bottom:10px; }
    #winner-card .winner-name { font-size:1.5rem; font-weight:800; color:#fff; margin-bottom:14px; }
    #winner-card .winner-stats { display:flex; justify-content:center; gap:32px; flex-wrap:wrap; }
    #winner-card .winner-stat { display:flex; flex-direction:column; align-items:center; gap:4px; }
    #winner-card .winner-stat-val { font-size:1.4rem; font-weight:800; color:var(--green); }
    #winner-card .winner-stat-lbl { font-size:0.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; }
    #winner-card .winner-revenue { margin-top:20px; padding:16px 20px; background:rgba(34,197,94,0.08); border:1px solid rgba(34,197,94,0.25); border-radius:12px; }
    #winner-card .revenue-amount { font-size:2.2rem; font-weight:900; color:var(--green); text-shadow:0 0 20px rgba(34,197,94,0.4); letter-spacing:-0.02em; }
    #winner-card .revenue-label { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--muted); margin-top:4px; }
    #winner-card .revenue-detail { font-size:0.78rem; color:rgba(255,255,255,0.45); margin-top:6px; }
    #winner-card .winner-link { display:inline-block; margin-top:16px; padding:10px 28px; border-radius:10px; background:rgba(34,197,94,0.15); border:1px solid rgba(34,197,94,0.4); color:var(--green); font-weight:600; text-decoration:none; font-size:0.85rem; transition:all 0.2s; }
    #winner-card .winner-link:hover { background:rgba(34,197,94,0.25); }
    #progress-wrap { width:100%; max-width:660px; display:none; flex-direction:column; gap:12px; }
    .progress-steps { display:flex; justify-content:space-between; gap:4px; }
    .step-dot { flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; opacity:0.3; transition:opacity 0.3s; }
    .step-dot.active { opacity:1; }
    .step-dot.done { opacity:0.6; }
    .step-dot .dot { width:8px; height:8px; border-radius:50%; background:var(--muted); transition:background 0.3s,box-shadow 0.3s; }
    .step-dot.active .dot { background:#f97316; box-shadow:0 0 8px #f97316; animation:blink 0.8s infinite; }
    .step-dot.done .dot { background:var(--green); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .step-dot .step-label { font-size:0.6rem; color:var(--muted); text-align:center; white-space:nowrap; }
    .progress-track { width:100%; height:10px; background:rgba(255,255,255,0.07); border-radius:10px; overflow:visible; position:relative; }
    .progress-fill { height:100%; width:0%; background:linear-gradient(90deg,#7c2d12,#dc2626,#f97316,#fbbf24,#fef08a); border-radius:10px; position:relative; transition:width 0.5s ease; box-shadow:0 0 6px #f97316,0 0 20px #dc2626,0 0 40px rgba(220,38,38,0.4); }
    .progress-fill::after { content:"🔥"; position:absolute; right:-14px; top:50%; transform:translateY(-55%); font-size:1.3rem; filter:drop-shadow(0 0 6px #f97316); animation:flicker 0.3s infinite alternate; display:none; }
    .progress-fill.burning::after { display:block; }
    @keyframes flicker { 0%{transform:translateY(-55%)scale(1)rotate(-3deg)} 100%{transform:translateY(-60%)scale(1.08)rotate(3deg)} }
    .progress-msg { text-align:center; font-size:0.78rem; color:var(--muted); min-height:1.2em; }
    #results-section { position:relative; z-index:10; padding:0 20px 80px; display:none; }
    .results-grid { max-width:1100px; margin:0 auto; display:flex; flex-direction:column; gap:20px; }
    .results-count-bar { text-align:center; font-size:0.8rem; color:var(--muted); margin-bottom:4px; }
    .match-card { background:var(--glass); border:1px solid var(--glass-border); border-radius:18px; overflow:hidden; backdrop-filter:blur(20px); animation:slideUp 0.4s ease; }
    @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
    .match-body { display:grid; grid-template-columns:1fr 1px 1fr; align-items:start; }
    .divider-line { background:var(--glass-border); align-self:stretch; }
    .product-panel { display:flex; flex-direction:column; align-items:center; padding:16px 14px; gap:10px; min-width:0; box-sizing:border-box; }
    .img-wrap { position:relative; width:100%; padding:3px; border-radius:14px; box-sizing:border-box; }
    .img-wrap::before { content:''; position:absolute; inset:-2px; border-radius:15px; background:conic-gradient(from var(--angle,0deg),#00f0ff 0%,#0066ff 10%,transparent 20%,transparent 45%,#a855f7 50%,#00f0ff 60%,transparent 70%,transparent 90%,#0066ff 95%,#00f0ff 100%); animation:electric-spin 1.8s linear infinite; z-index:0; }
    .img-wrap::after { content:''; position:absolute; inset:-4px; border-radius:16px; background:conic-gradient(from var(--angle,0deg),#00f0ff 0%,#0066ff 10%,transparent 20%,transparent 45%,#a855f7 50%,#00f0ff 60%,transparent 70%,transparent 90%,#0066ff 95%,#00f0ff 100%); animation:electric-spin 1.8s linear infinite; filter:blur(8px); opacity:0.6; z-index:0; }
    @property --angle { syntax:'<angle>'; initial-value:0deg; inherits:false; }
    @keyframes electric-spin { 0%{--angle:0deg} 100%{--angle:360deg} }
    .img-box { position:relative; z-index:1; width:100%; aspect-ratio:1/1; border-radius:11px; overflow:hidden; background:rgba(10,10,10,0.9); }
    .img-box img { width:100%; height:100%; object-fit:cover; transition:transform 0.4s; display:block; }
    .img-box:hover img { transform:scale(1.04); }
    .prod-link { display:flex; align-items:center; justify-content:center; gap:6px; width:100%; padding:11px 16px; border-radius:10px; font-size:0.82rem; font-weight:600; text-decoration:none; letter-spacing:0.03em; transition:all 0.2s; box-sizing:border-box; text-align:center; }
    .prod-link.etsy-link { background:rgba(241,100,30,0.15); border:1px solid rgba(241,100,30,0.3); color:#fb923c; }
    .prod-link.etsy-link:hover { background:rgba(241,100,30,0.25); border-color:rgba(241,100,30,0.6); }
    .prod-link.ali-link { background:rgba(227,24,55,0.15); border:1px solid rgba(227,24,55,0.3); color:#f87171; }
    .prod-link.ali-link:hover { background:rgba(227,24,55,0.25); border-color:rgba(227,24,55,0.6); }
    .empty { text-align:center; padding:60px 20px; color:var(--muted); }
    .price-tag { font-size:0.88rem; font-weight:700; border-radius:8px; padding:5px 12px; width:100%; text-align:center; }
    .price-tag.etsy-price { color:#fb923c; border:1px solid rgba(241,100,30,0.3); background:rgba(241,100,30,0.08); }
    .price-tag.ali-price  { color:#f87171; border:1px solid rgba(227,24,55,0.3);  background:rgba(227,24,55,0.08); }
    #milkyway-canvas { position:fixed; inset:0; width:100%; height:100%; z-index:-2; pointer-events:none; }
    #shooting-canvas { position:fixed; inset:0; width:100%; height:100%; z-index:-1; pointer-events:none; }
    #title-outer { width:100%; display:flex; justify-content:center; }
    #title-wrap { position:relative; display:inline-block; padding:90px 40px 8px; }
    #niche-title { position:relative; z-index:101; text-align:center; user-select:none; }
    #niche-title span { display:inline-block; font-family:'Croissant One',cursive; font-size:clamp(2.4rem,7vw,5rem); font-weight:400; letter-spacing:0.04em; color:#fff; text-shadow:0 1px 0 #ccc,0 2px 0 #c9c9c9,0 3px 0 #bbb,0 4px 0 #b9b9b9,0 5px 0 #aaa,0 6px 1px rgba(0,0,0,.1),0 0 5px rgba(0,0,0,.1),0 1px 3px rgba(0,0,0,.3),0 3px 5px rgba(0,0,0,.2),0 5px 10px rgba(0,0,0,.25),0 10px 10px rgba(0,0,0,.2),0 20px 20px rgba(0,0,0,.15); animation:wave3d 2.2s ease-in-out infinite; }
    #niche-title span:nth-child(1){animation-delay:0.00s}#niche-title span:nth-child(2){animation-delay:0.07s}#niche-title span:nth-child(3){animation-delay:0.14s}#niche-title span:nth-child(4){animation-delay:0.21s}#niche-title span:nth-child(5){animation-delay:0.28s}#niche-title span:nth-child(6){animation-delay:0.35s}#niche-title span:nth-child(7){animation-delay:0.42s}#niche-title span:nth-child(8){animation-delay:0.49s}#niche-title span:nth-child(9){animation-delay:0.56s}#niche-title span:nth-child(10){animation-delay:0.63s}#niche-title span:nth-child(11){animation-delay:0.70s}
    .title-space { display:inline-block; width:0.35em; }
    @keyframes wave3d { 0%,100%{transform:translateY(0)rotateX(0deg)scale(1)} 25%{transform:translateY(-18px)rotateX(20deg)scale(1.08)} 50%{transform:translateY(0)rotateX(0deg)scale(1)} }
    #dashboard-btn { position:fixed; top:10px; right:12px; z-index:500; display:flex; align-items:center; gap:6px; padding:7px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.18); background:rgba(0,0,0,0.55); color:rgba(255,255,255,0.8); font-size:0.82rem; font-weight:600; font-family:'Inter',sans-serif; text-decoration:none; backdrop-filter:blur(12px); transition:all 0.2s; white-space:nowrap; width:130px; justify-content:center; }
    #dashboard-btn:hover { background:rgba(255,255,255,0.13); color:#fff; border-color:rgba(255,255,255,0.35); }
    #dashboard-btn .db-count { position:absolute; top:-4px; right:-4px; background:var(--green); border-radius:50%; width:16px; height:16px; font-size:0.6rem; font-weight:700; display:none; align-items:center; justify-content:center; color:#fff; }
    .btn-home-top { position:fixed; top:10px; left:12px; z-index:500; display:flex; align-items:center; gap:6px; padding:7px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.18); background:rgba(0,0,0,0.55); color:rgba(255,255,255,0.8); font-family:'Inter',sans-serif; font-weight:600; font-size:0.82rem; text-decoration:none; backdrop-filter:blur(12px); transition:all 0.2s; width:130px; justify-content:center; }
    .btn-home-top:hover { background:rgba(255,255,255,0.13); color:#fff; border-color:rgba(255,255,255,0.35); }
    @media(max-width:640px){#main-view{padding:24px 14px}.search-card{gap:10px}.input-wrap input{padding:13px 16px;font-size:0.95rem}.select-wrap select{padding:11px 30px 11px 13px;font-size:0.82rem}#start-btn{padding:15px;font-size:1rem}.match-body{display:flex;flex-direction:row;align-items:stretch}.divider-line{width:1px;flex-shrink:0}.product-panel{flex:1;min-width:0;padding:10px 6px;gap:6px}.prod-link{font-size:0.65rem;padding:6px 4px;border-radius:8px}.price-tag{font-size:0.7rem;padding:4px 6px}}
  </style>
</head>
<body>
</div>
  <div id="bg-layer"></div>
  <canvas id="milkyway-canvas"></canvas>
  <canvas id="shooting-canvas"></canvas>
  <a href="/dashboard" class="btn-home-top"><span style="font-size:0.82rem;">🏠</span> Dashboard</a>
  <a id="dashboard-btn" href="/niche-list" title="Saved shops"><span style="color:#f87171;font-size:0.82rem;">♥</span><span>Niche List</span><span class="db-count" id="db-count">0</span></a>
  <div id="title-outer"><div id="title-wrap"><div id="niche-title"><span>F</span><span>i</span><span>n</span><span>d</span><span>e</span><span>r</span><span class="title-space"></span><span>N</span><span>i</span><span>c</span><span>h</span><span>e</span></div></div></div>
  <div id="main-view">
    <div class="search-card">
      <div class="input-wrap"><input type="text" id="keyword-input" placeholder="Enter keyword" /></div>
      <div class="selects-row"><div class="select-wrap"><select id="count-select"><option value="1">1 image</option><option value="2">2 images</option><option value="3">3 images</option><option value="4">4 images</option><option value="5">5 images</option><option value="6">6 images</option><option value="7">7 images</option><option value="8">8 images</option><option value="9">9 images</option><option value="10" selected>10 images</option><option value="15">15 images</option><option value="20">20 images</option><option value="25">25 images</option><option value="30">30 images</option><option value="40">40 images</option><option value="50">50 images</option><option value="75">75 images</option><option value="100">100 images</option></select></div></div>
      <button id="start-btn" onclick="startSearch()">START</button>
    </div>
    <div id="progress-wrap">
      <div class="progress-steps" id="progress-steps"></div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-msg" id="progress-msg"></div>
    </div>
    <section id="results-section">
      <div class="results-grid">
        <div class="results-count-bar" id="results-count"></div>
        <div id="results-container"></div>
        <div id="find-wrap"><button id="find-btn" onclick="startFind()">🔍 Find</button><div id="find-status"></div><div id="winner-card"></div></div>
      </div>
    </section>
  </div>

  <script>
    const STEPS=[{key:'scraping_etsy',label:'Etsy'},{key:'reverse_search',label:'Reverse'},{key:'aliexpress_found',label:'AliExpress'},{key:'comparing',label:'IA'},{key:'finalizing',label:'Résultats'}];
    function initProgress(){const c=document.getElementById('progress-steps');c.innerHTML='';STEPS.forEach(function(s){const d=document.createElement('div');d.className='step-dot';d.id='step-'+s.key;d.innerHTML='<div class="dot"></div><span class="step-label">'+s.label+'</span>';c.appendChild(d);});setProgress(0);document.getElementById('progress-msg').textContent='';}
    function setProgress(p){const el=document.getElementById('progress-fill');el.style.width=p+'%';if(p>0&&p<100)el.classList.add('burning');else el.classList.remove('burning');}
    function advanceStep(k,msg){const idx=STEPS.findIndex(function(s){return s.key===k;});if(idx===-1)return;STEPS.forEach(function(s,i){const el=document.getElementById('step-'+s.key);if(!el)return;if(i<idx)el.className='step-dot done';else if(i===idx)el.className='step-dot active';else el.className='step-dot';});setProgress(Math.round(((idx+1)/STEPS.length)*100));document.getElementById('progress-msg').textContent=msg||'';}
    function completeAllSteps(){STEPS.forEach(function(s){const el=document.getElementById('step-'+s.key);if(el)el.className='step-dot done';});setProgress(100);}

    let _lastResults=[];
    async function startSearch(){
      const keyword=document.getElementById('keyword-input').value.trim();
      const maxCount=parseInt(document.getElementById('count-select').value)||10;
      if(!keyword){document.getElementById('keyword-input').focus();return;}
      const btn=document.getElementById('start-btn');
      btn.disabled=true;btn.textContent='LOADING';btn.classList.remove('retry');btn.classList.add('loading');
      document.getElementById('keyword-input').disabled=true;document.getElementById('count-select').disabled=true;
      document.getElementById('progress-wrap').style.display='flex';initProgress();
      document.getElementById('results-section').style.display='none';document.getElementById('results-container').innerHTML='';
      document.getElementById('results-count').textContent='';document.getElementById('find-wrap').style.display='none';
      document.getElementById('winner-card').style.display='none';document.getElementById('find-status').textContent='';
      document.documentElement.classList.remove('unlocked');document.documentElement.style.overflow='';document.body.style.overflow='';window.scrollTo({top:0});
      try{
        document.getElementById('progress-msg').textContent='⏳ Connexion au serveur...';
        const response=await fetch('/api/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keyword,similarityThreshold:40,maxCount})});
        const ct=response.headers.get('content-type')||'';
        if(ct.includes('text/event-stream')){
          const reader=response.body.getReader();const decoder=new TextDecoder();let buf='';
          while(true){const{done,value}=await reader.read();if(done)break;buf+=decoder.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop();for(const line of lines){if(!line.startsWith('data: '))continue;try{const ev=JSON.parse(line.slice(6));if(ev.step==='complete'){completeAllSteps();document.getElementById('progress-msg').textContent='✅ '+(ev.results?.length||0)+' correspondance(s)';_lastResults=ev.results||[];_lastResults.forEach(renderMatch);finalize(_lastResults.length);}else if(ev.step==='error'){document.getElementById('progress-msg').textContent='❌ '+ev.message;finalize(-1);}else{advanceStep(ev.step,ev.message);}}catch(e){}}}
        }else{const data=await response.json();document.getElementById('progress-msg').textContent='❌ '+(data.error||'Erreur serveur');finalize(-1);}
      }catch(err){document.getElementById('progress-msg').textContent='❌ '+err.message;finalize(-1);}
      function finalize(count){
        btn.disabled=false;btn.classList.remove('loading');
        document.getElementById('keyword-input').disabled=false;document.getElementById('count-select').disabled=false;
        if(count===-1){btn.classList.add('retry');btn.textContent='RETRY';}else{btn.classList.remove('retry');btn.textContent='START';}
        if(count===0)document.getElementById('results-container').innerHTML='<div class="empty">Aucune correspondance. Essayez un autre mot-clé.</div>';
        if(count>=0){if(count>0)document.getElementById('results-count').textContent=count+' correspondance(s) trouvée(s)';const rs=document.getElementById('results-section');rs.style.display='block';if(count>0){document.getElementById('find-wrap').style.display='flex';document.getElementById('winner-card').style.display='none';}document.documentElement.classList.add('unlocked');document.documentElement.style.overflowY='auto';document.body.style.overflowY='auto';setTimeout(function(){rs.scrollIntoView({behavior:'smooth',block:'start'});},100);}
      }
    }

    window._shopDataMap={};
    function encodeShopKey(u){return(u||'').replace(/[^a-zA-Z0-9]/g,'_').slice(0,40);}
    function renderMatch(m){
      const etsy=m.etsy,ali=m.aliexpress;
      const etsySrc=etsy.hostedImageUrl||etsy.image||'',aliSrc=ali.image||'';
      const shopUrl=etsy.shopUrl||(etsy.link?etsy.link.split('/listing/')[0]:'')||'';
      const shopName=etsy.shopName||shopUrl.split('/shop/')[1]?.split('/')[0]||'Shop';
      const shopAvatar=etsy.shopAvatar||'';
      const idx=Object.keys(window._shopDataMap).length;
      window._shopDataMap[idx]={shopUrl,shopName,shopAvatar,productImage:etsySrc,productUrl:etsy.link||''};
      const initial=shopName.charAt(0).toUpperCase();
      const card=document.createElement('div');card.className='match-card';
      card.innerHTML='<div class="match-body"><div class="product-panel"><div class="etsy-img-container"><div class="shop-side-col"><a class="shop-side-btn" href="'+shopUrl+'" target="_blank" rel="noopener" title="'+shopName+'">'+(shopAvatar?'<img src="'+shopAvatar+'" alt="'+shopName+'" onerror="this.style.display=\'none\'" />':'<span class="side-initial">'+initial+'</span>')+'</a><button class="btn-heart-icon" id="heart-'+encodeShopKey(shopUrl)+'" onclick="saveShop('+idx+',this)">★</button></div><div class="img-wrap"><div class="img-box">'+(etsySrc?'<img src="'+etsySrc+'" loading="lazy" alt="" onerror="this.style.display=\'none\'" />':'')+'</div></div></div>'+(etsy.price?'<div class="price-tag etsy-price">💰 '+etsy.price+'</div>':'')+'<a class="prod-link etsy-link" href="'+etsy.link+'" target="_blank" rel="noopener">🛍 Etsy ↗</a></div><div class="divider-line"></div><div class="product-panel"><div class="img-wrap"><div class="img-box">'+(aliSrc?'<img src="'+aliSrc+'" loading="lazy" alt="" onerror="this.style.display=\'none\'" />':'')+'</div></div>'+(ali.price?'<div class="price-tag ali-price">💰 '+ali.price+'</div>':'')+(ali.link?'<a class="prod-link ali-link" href="'+ali.link+'" target="_blank" rel="noopener">🛒 AliExpress ↗</a>':'<span class="prod-link ali-link" style="opacity:0.4;cursor:default">🛒 AliExpress</span>')+'</div></div>';
      document.getElementById('results-container').appendChild(card);
      if(_savedShopUrls.has(shopUrl)){const hb=document.getElementById('heart-'+encodeShopKey(shopUrl));if(hb){hb.classList.add('saved');hb.textContent='✔';}}
    }

    async function startFind(){
      const btn=document.getElementById('find-btn'),status=document.getElementById('find-status'),winnerCard=document.getElementById('winner-card');
      if(!_lastResults.length){status.textContent='Aucun résultat disponible.';return;}
      btn.disabled=true;btn.classList.add('searching');btn.textContent='Analyse...';status.textContent='Connexion...';winnerCard.style.display='none';
      function resetBtn(){btn.disabled=false;btn.classList.remove('searching');btn.textContent='🔍 Find';btn.style.background='';}
      try{
        const response=await fetch('/api/shop-stats',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({results:_lastResults})});
        const reader=response.body.getReader(),decoder=new TextDecoder();let buf='';
        while(true){const{done,value}=await reader.read();if(done)break;buf+=decoder.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop();for(const line of lines){if(!line.startsWith('data: '))continue;try{const ev=JSON.parse(line.slice(6));if(ev.step==='scraping'){status.textContent='🏪 Scraping '+ev.shopName+'... ('+(ev.index+1)+')';}else if(ev.step==='done'){const st=ev.stats;status.textContent='✅ '+ev.shopName+' — '+(st.sales!=null?st.sales.toLocaleString('fr-FR')+' ventes':'?');}else if(ev.step==='complete'){resetBtn();status.textContent='';showWinner(ev.winner);}else if(ev.step==='error'){status.textContent='❌ '+ev.message;resetBtn();}}catch(e){}}}
      }catch(err){status.textContent='❌ '+err.message;resetBtn();}
    }

    function showWinner(w){
      const card=document.getElementById('winner-card');if(!w){document.getElementById('find-status').textContent='Données insuffisantes.';return;}
      const sales=w.sales!=null?w.sales.toLocaleString('fr-FR'):'—';const created=w.createdAt?new Date(w.createdAt):null;
      const ageDays=created?Math.max(Math.floor((Date.now()-created.getTime())/86400000),1):0;
      const ageStr=ageDays?(ageDays<365?ageDays+' jours':Math.floor(ageDays/365)+' ans'):'—';
      const perDay=(w.sales&&ageDays)?(w.sales/ageDays).toFixed(2):'—';
      const yearStr=created?created.getFullYear().toString():'—';const dateStr=created?created.toLocaleDateString('fr-FR',{month:'long',year:'numeric'}):'—';
      let revHtml='';if(w.avgPrice!=null&&w.sales!=null){const rev=w.avgPrice*w.sales;const revStr=rev>=1000000?'$'+(rev/1000000).toFixed(1)+'M':rev>=1000?'$'+(rev/1000).toFixed(0)+'K':'$'+rev.toFixed(0);revHtml='<div class="winner-revenue"><div class="revenue-amount">'+revStr+'</div><div class="revenue-label">Chiffre d\'affaires estimé</div><div class="revenue-detail">$'+w.avgPrice.toFixed(2)+' × '+w.sales.toLocaleString('fr-FR')+' ventes</div></div>';}
      card.innerHTML='<div class="winner-label">🏆 Boutique la plus performante</div><div class="winner-name">'+(w.shopName||'Boutique')+'</div><div class="winner-stats"><div class="winner-stat"><span class="winner-stat-val">'+sales+'</span><span class="winner-stat-lbl">Ventes totales</span></div><div class="winner-stat"><span class="winner-stat-val">'+ageStr+'</span><span class="winner-stat-lbl">Âge boutique</span></div><div class="winner-stat"><span class="winner-stat-val">'+perDay+'</span><span class="winner-stat-lbl">Ventes / jour</span></div><div class="winner-stat"><span class="winner-stat-val">'+yearStr+'</span><span class="winner-stat-lbl">Année création</span></div></div>'+revHtml+'<div style="font-size:0.75rem;color:var(--muted);margin-top:10px;">Créée en '+dateStr+'</div>'+(w.shopUrl?'<a class="winner-link" href="'+w.shopUrl+'" target="_blank" rel="noopener">Voir la boutique ↗</a>':'');
      card.style.display='block';setTimeout(function(){card.scrollIntoView({behavior:'smooth',block:'nearest'});},100);
    }

    (function(){const canvas=document.getElementById('milkyway-canvas');if(!canvas)return;const ctx=canvas.getContext('2d');let W,H,cx,cy;const bandAngle=Math.PI/5,bandW=600,rand=function(a,b){return Math.random()*(b-a)+a;};let nebulae=[];function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;cx=W/2;cy=H/2;buildNebulae();}window.addEventListener('resize',resize);resize();function buildNebulae(){nebulae=[];const colors=[[180,100,200],[100,120,255],[255,120,80],[80,200,255],[200,80,255]];for(var i=0;i<5;i++){const col=colors[i],along=rand(-bandW*0.4,bandW*0.4),spread=rand(-60,60);nebulae.push({x:cx+Math.cos(bandAngle)*along-Math.sin(bandAngle)*spread,y:cy+Math.sin(bandAngle)*along+Math.cos(bandAngle)*spread,rx:rand(80,220),ry:rand(40,120),angle:bandAngle+rand(-0.3,0.3),r:col[0],g:col[1],b:col[2],alpha:rand(0.04,0.1),pulse:rand(0.001,0.003),pulseDir:1});}}var driftAngle=0;function draw(){ctx.clearRect(0,0,W,H);driftAngle+=0.00008;ctx.save();ctx.translate(W/2,H/2);ctx.rotate(driftAngle);ctx.translate(-W/2,-H/2);nebulae.forEach(function(n){n.alpha+=n.pulse*n.pulseDir;if(n.alpha>0.12||n.alpha<0.03)n.pulseDir*=-1;ctx.save();ctx.translate(n.x,n.y);ctx.rotate(n.angle);const g=ctx.createRadialGradient(0,0,0,0,0,n.rx);g.addColorStop(0,'rgba('+n.r+','+n.g+','+n.b+','+n.alpha+')');g.addColorStop(0.5,'rgba('+n.r+','+n.g+','+n.b+','+(n.alpha*0.4)+')');g.addColorStop(1,'rgba('+n.r+','+n.g+','+n.b+',0)');ctx.scale(1,n.ry/n.rx);ctx.beginPath();ctx.arc(0,0,n.rx,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();ctx.restore();});ctx.restore();requestAnimationFrame(draw);}draw();})();

    (function(){const canvas=document.getElementById('shooting-canvas');if(!canvas)return;const ctx=canvas.getContext('2d');let W,H;function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}window.addEventListener('resize',resize);resize();const rand=function(a,b){return Math.random()*(b-a)+a;};function mkStar(){const angle=rand(25,50)*Math.PI/180,spd=rand(6,16);return{x:rand(-100,W*0.8),y:rand(-60,H*0.4),vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,alpha:rand(0.6,1),w:rand(1,2.5),tail:rand(12,28),decay:rand(0.991,0.997)};}var stars=[mkStar(),mkStar(),mkStar(),mkStar()];function draw(){ctx.clearRect(0,0,W,H);if(Math.random()<0.02&&stars.length<10)stars.push(mkStar());stars=stars.filter(function(s){const grad=ctx.createLinearGradient(s.x,s.y,s.x-s.vx*s.tail,s.y-s.vy*s.tail);grad.addColorStop(0,'rgba(255,255,255,'+s.alpha+')');grad.addColorStop(0.4,'rgba(200,220,255,'+(s.alpha*0.5)+')');grad.addColorStop(1,'rgba(180,200,255,0)');ctx.beginPath();ctx.strokeStyle=grad;ctx.lineWidth=s.w;ctx.lineCap='round';ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-s.vx*s.tail,s.y-s.vy*s.tail);ctx.stroke();ctx.beginPath();ctx.arc(s.x,s.y,s.w*1.2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+(s.alpha*0.8)+')';ctx.fill();s.x+=s.vx;s.y+=s.vy;s.alpha*=s.decay;return s.x<W+200&&s.y<H+200&&s.alpha>0.03;});requestAnimationFrame(draw);}draw();})();

    let SCOUT_TOKEN=localStorage.getItem('scout_token')||null;
    let _savedShopUrls=new Set();
    document.addEventListener('DOMContentLoaded',function(){
      document.getElementById('keyword-input').addEventListener('keydown',function(e){if(e.key==='Enter')startSearch();});
      if(!SCOUT_TOKEN){window.location.href='/dashboard';return;}
      fetch('/api/auth/me',{headers:{'Authorization':'Bearer '+SCOUT_TOKEN}}).then(function(r){if(!r.ok){localStorage.removeItem('scout_token');window.location.href='/dashboard';return;}initSavedShops();}).catch(function(){window.location.href='/dashboard';});
    });
    async function initSavedShops(){if(!SCOUT_TOKEN)return;try{const r=await fetch('/api/shops',{headers:{'Authorization':'Bearer '+SCOUT_TOKEN}});if(!r.ok)return;const shops=await r.json();shops.forEach(function(s){_savedShopUrls.add(s.shopUrl);});updateDbCount();}catch(e){}}
    function updateDbCount(){const badge=document.getElementById('db-count');if(!badge)return;const n=_savedShopUrls.size;badge.textContent=n;badge.style.display=n>0?'inline-flex':'none';}
    function showToast(msg,color){const t=document.createElement('div');t.textContent=msg;t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:'+(color||'#222')+';color:#fff;padding:12px 20px;border-radius:10px;font-size:0.9rem;font-weight:600;z-index:99999;pointer-events:none;';document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
    async function saveShop(idx,btn){const token=localStorage.getItem('scout_token');if(!token){window.location.href='/dashboard';return;}const data=window._shopDataMap&&window._shopDataMap[idx];if(!data){showToast('Shop data not found','#ef4444');return;}if(_savedShopUrls.has(data.shopUrl)){btn.classList.add('saved');btn.textContent='✔';showToast('Already saved!','#22c55e');return;}btn.classList.add('saving');btn.textContent='⏳';try{const r=await fetch('/api/shops/save',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({shopUrl:data.shopUrl||'',shopName:data.shopName||'',shopAvatar:data.shopAvatar||'',productImage:data.productImage||'',productUrl:data.productUrl||''})});if(r.ok){_savedShopUrls.add(data.shopUrl);btn.classList.remove('saving');btn.classList.add('saved');btn.textContent='✔';updateDbCount();showToast('Saved! ♥','#22c55e');}else{const json=await r.json().catch(()=>({}));btn.classList.remove('saving');btn.textContent='★';showToast('Error: '+(json.error||r.status),'#ef4444');}}catch(e){btn.classList.remove('saving');btn.textContent='★';showToast(e.message,'#ef4444');}}
  </script>
