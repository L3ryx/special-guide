<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scout</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #22c55e;
      --glass: rgba(0,0,0,0.55);
      --glass-border: rgba(255,255,255,0.12);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.55);
    }

    html, body { height: 100%; font-family: 'Inter', sans-serif; color: var(--text); overflow-x: hidden; }

    #bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background: #0a0a0a url('/background.png') center/cover no-repeat;
    }
    #bg-layer::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.45); }

    /* ── MAIN ── */
    #main-view {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 20px; gap: 20px;
    }

    .search-card {
      width: 100%; max-width: 520px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }

    /* keyword */
    .input-wrap { width: 100%; }
    .input-wrap input {
      width: 100%; padding: 16px 20px;
      background: var(--glass); border: 1px solid var(--glass-border); border-radius: 14px;
      color: var(--text); font-family: 'Inter', sans-serif; font-size: 1rem;
      outline: none; backdrop-filter: blur(16px);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrap input::placeholder { color: var(--muted); }
    .input-wrap input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(34,197,94,0.15); }

    /* selects */
    .selects-row { display: flex; gap: 10px; width: 100%; }
    .select-wrap { flex: 1; position: relative; }
    .select-wrap select {
      width: 100%; padding: 13px 36px 13px 16px;
      background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px;
      color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.88rem;
      outline: none; appearance: none; backdrop-filter: blur(16px); cursor: pointer;
      transition: border-color 0.2s;
    }
    .select-wrap select:focus { border-color: var(--green); }
    .select-wrap option { background: #1a1a1a; color: #fff; }
    .select-wrap::after {
      content: '▾'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none; font-size: 0.8rem;
    }

    /* START button */
    #start-btn {
      width: 100%; padding: 18px;
      background: var(--green); border: none; border-radius: 14px;
      color: #fff; font-family: 'Inter', sans-serif; font-weight: 700;
      font-size: 1.1rem; letter-spacing: 0.1em; cursor: pointer;
      transition: all 0.25s ease; position: relative; overflow: hidden;
      box-shadow: 0 4px 24px rgba(34,197,94,0.4);
    }
    #start-btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
      transform: translateX(-100%); transition: transform 0.6s ease;
    }
    #start-btn:hover::before { transform: translateX(100%); }
    #start-btn:hover { background: #16a34a; transform: translateY(-1px); box-shadow: 0 6px 32px rgba(34,197,94,0.45); }
    #start-btn:active { transform: translateY(0); }
    #start-btn:disabled { background: rgba(34,197,94,0.3); box-shadow: none; cursor: not-allowed; transform: none; }

    /* ── PROGRESS ── */
    #progress-wrap {
      width: 100%; max-width: 520px;
      display: none; flex-direction: column; gap: 12px;
    }

    .progress-steps { display: flex; justify-content: space-between; gap: 4px; }

    .step-dot {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px;
      opacity: 0.3; transition: opacity 0.3s;
    }
    .step-dot.active { opacity: 1; }
    .step-dot.done { opacity: 0.6; }

    .step-dot .dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--muted);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .step-dot.active .dot { background: #f97316; box-shadow: 0 0 8px #f97316; animation: blink 0.8s infinite; }
    .step-dot.done .dot { background: var(--green); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .step-dot .step-label { font-size: 0.6rem; color: var(--muted); text-align: center; white-space: nowrap; }

    /* FLAME progress bar */
    .progress-track {
      width: 100%; height: 10px;
      background: rgba(255,255,255,0.07); border-radius: 10px;
      overflow: visible; position: relative;
    }

    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #7c2d12, #dc2626, #f97316, #fbbf24, #fef08a);
      border-radius: 10px; position: relative;
      transition: width 0.5s ease;
      box-shadow: 0 0 6px #f97316, 0 0 20px #dc2626, 0 0 40px rgba(220,38,38,0.4);
    }

    .progress-fill::after {
      content: "🔥";
      position: absolute; right: -14px; top: 50%; transform: translateY(-55%);
      font-size: 1.3rem; filter: drop-shadow(0 0 6px #f97316);
      animation: flicker 0.3s infinite alternate;
      display: none;
    }
    .progress-fill.burning::after { display: block; }

    @keyframes flicker {
      0%   { transform: translateY(-55%) scale(1) rotate(-3deg); }
      100% { transform: translateY(-60%) scale(1.08) rotate(3deg); }
    }

    .progress-msg { text-align: center; font-size: 0.78rem; color: var(--muted); min-height: 1.2em; }

    /* ── RESULTS ── */
    #results-section { position: relative; z-index: 10; padding: 0 20px 80px; display: none; }

    .results-grid { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

    .results-count-bar { text-align: center; font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; }

    .match-card {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 18px; overflow: hidden; backdrop-filter: blur(20px);
      animation: slideUp 0.4s ease;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

    .match-header {
      display: flex; align-items: center; justify-content: center; gap: 14px;
      padding: 10px 24px; border-bottom: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.02);
    }
    .score-num { font-weight: 800; font-size: 1.2rem; }
    .score-bar-track { width: 120px; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 2px; }

    .match-body { display: grid; grid-template-columns: 1fr 1px 1fr; }
    .divider-line { background: var(--glass-border); align-self: stretch; }

    .product-panel { display: flex; flex-direction: column; align-items: center; padding: 24px 20px 20px; gap: 14px; }

    .img-box {
      width: 100%; max-width: 320px; aspect-ratio: 1/1;
      border-radius: 12px; overflow: hidden; background: rgba(255,255,255,0.04);
    }
    .img-box img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; display: block; }
    .img-box:hover img { transform: scale(1.04); }

    .prod-link {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; max-width: 320px; padding: 11px 16px; border-radius: 10px;
      font-size: 0.82rem; font-weight: 600; text-decoration: none; letter-spacing: 0.03em;
      transition: all 0.2s;
    }
    .prod-link.etsy-link { background: rgba(241,100,30,0.15); border: 1px solid rgba(241,100,30,0.3); color: #fb923c; }
    .prod-link.etsy-link:hover { background: rgba(241,100,30,0.25); border-color: rgba(241,100,30,0.6); }
    .prod-link.ali-link { background: rgba(227,24,55,0.15); border: 1px solid rgba(227,24,55,0.3); color: #f87171; }
    .prod-link.ali-link:hover { background: rgba(227,24,55,0.25); border-color: rgba(227,24,55,0.6); }

    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }

    @media (max-width: 600px) {
      .match-body { grid-template-columns: 1fr; }
      .divider-line { display: none; }
    }
  </style>
</head>
<body>

  <div id="bg-layer"></div>

  <div id="main-view">
    <div class="search-card">
      <div class="input-wrap">
        <input type="text" id="keyword-input" placeholder="Keyword (e.g. custom neon sign...)" />
      </div>
      <div class="selects-row">
        <div class="select-wrap" id="count-wrap"></div>
        <div class="select-wrap" id="threshold-wrap"></div>
      </div>
      <button id="start-btn" onclick="startSearch()">START</button>
    </div>

    <div id="progress-wrap">
      <div class="progress-steps" id="progress-steps"></div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-msg" id="progress-msg"></div>
    </div>
  </div>

  <section id="results-section">
    <div class="results-grid">
      <div class="results-count-bar" id="results-count"></div>
      <div id="results-container"></div>
    </div>
  </section>

  <script>
    // ── Build selects ──
    (function() {
      // Nombre d'images : 1–100
      const countSel = document.createElement('select');
      countSel.id = 'count-select';
      for (let i = 1; i <= 100; i++) {
        const o = document.createElement('option');
        o.value = i;
        o.textContent = i + ' image' + (i > 1 ? 's' : '');
        if (i === 10) o.selected = true;
        countSel.appendChild(o);
      }
      document.getElementById('count-wrap').appendChild(countSel);

      // Seuil similarité — fixé à 40% par défaut
      const simSel = document.createElement('select');
      simSel.id = 'threshold-select';
      for (let i = 0; i <= 100; i++) {
        const o = document.createElement('option');
        o.value = i;
        o.textContent = i + '% similarité';
        if (i === 40) o.selected = true;
        simSel.appendChild(o);
      }
      document.getElementById('threshold-wrap').appendChild(simSel);
    })();

    // ── Pipeline steps ──
    const STEPS = [
      { key: 'scraping_etsy',    label: 'Etsy' },
      { key: 'reverse_search',   label: 'Reverse' },
      { key: 'aliexpress_found', label: 'AliExpress' },
      { key: 'comparing',        label: 'IA' },
      { key: 'finalizing',       label: 'Résultats' },
    ];

    function initProgress() {
      const container = document.getElementById('progress-steps');
      container.innerHTML = '';
      STEPS.forEach(s => {
        const div = document.createElement('div');
        div.className = 'step-dot';
        div.id = 'step-' + s.key;
        div.innerHTML = `<div class="dot"></div><span class="step-label">${s.label}</span>`;
        container.appendChild(div);
      });
      setProgress(0);
      document.getElementById('progress-msg').textContent = '';
    }

    function setProgress(pct) {
      const el = document.getElementById('progress-fill');
      el.style.width = pct + '%';
      if (pct > 0 && pct < 100) el.classList.add('burning');
      else el.classList.remove('burning');
    }

    function advanceStep(stepKey, message) {
      const idx = STEPS.findIndex(s => s.key === stepKey);
      if (idx === -1) return;
      STEPS.forEach((s, i) => {
        const el = document.getElementById('step-' + s.key);
        if (!el) return;
        if (i < idx) el.className = 'step-dot done';
        else if (i === idx) el.className = 'step-dot active';
        else el.className = 'step-dot';
      });
      setProgress(Math.round(((idx + 1) / STEPS.length) * 100));
      document.getElementById('progress-msg').textContent = message || '';
    }

    function completeAllSteps() {
      STEPS.forEach(s => {
        const el = document.getElementById('step-' + s.key);
        if (el) el.className = 'step-dot done';
      });
      setProgress(100);
    }

    // ── Search ──
    async function startSearch() {
      const keyword = document.getElementById('keyword-input').value.trim();
      const maxCount = parseInt(document.getElementById('count-select').value) || 10;
      const threshold = parseInt(document.getElementById('threshold-select').value) || 40;

      if (!keyword) { document.getElementById('keyword-input').focus(); return; }

      const btn = document.getElementById('start-btn');
      btn.disabled = true;
      btn.textContent = '...';

      document.getElementById('progress-wrap').style.display = 'flex';
      initProgress();
      document.getElementById('results-section').style.display = 'none';
      document.getElementById('results-container').innerHTML = '';
      document.getElementById('results-count').textContent = '';

      try {
        const response = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ keyword, similarityThreshold: threshold, maxCount })
        });

        const ct = response.headers.get('content-type') || '';

        if (ct.includes('text/event-stream')) {
          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buf = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const lines = buf.split('\n');
            buf = lines.pop();

            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              try {
                const ev = JSON.parse(line.slice(6));
                if (ev.step === 'complete') {
                  completeAllSteps();
                  document.getElementById('progress-msg').textContent = '✅ ' + (ev.results?.length || 0) + ' correspondance(s)';
                  (ev.results || []).forEach(renderMatch);
                  finalize(ev.results?.length || 0);
                } else if (ev.step === 'error') {
                  document.getElementById('progress-msg').textContent = '❌ ' + ev.message;
                  finalize(-1);
                } else {
                  advanceStep(ev.step, ev.message);
                }
              } catch {}
            }
          }
        } else {
          const data = await response.json();
          document.getElementById('progress-msg').textContent = '❌ ' + (data.error || 'Erreur');
          finalize(-1);
        }
      } catch (err) {
        document.getElementById('progress-msg').textContent = '❌ ' + err.message;
        finalize(-1);
      }

      function finalize(count) {
        btn.disabled = false;
        btn.textContent = 'START';
        const rs = document.getElementById('results-section');
        rs.style.display = 'block';
        if (count > 0) {
          document.getElementById('results-count').textContent = count + ' correspondance(s) trouvée(s)';
          rs.scrollIntoView({ behavior: 'smooth' });
        } else if (count === 0) {
          document.getElementById('results-container').innerHTML = '<div class="empty">Aucune correspondance. Essayez un autre mot-clé ou baissez le seuil.</div>';
        }
      }
    }

    // ── Render match ──
    function renderMatch(m) {
      const { etsy, aliexpress, similarity } = m;
      const color = similarity >= 85 ? '#22c55e' : similarity >= 70 ? '#f59e0b' : '#f97316';
      const card = document.createElement('div');
      card.className = 'match-card';
      card.innerHTML = `
        <div class="match-header">
          <span class="score-num" style="color:${color}">${similarity}%</span>
          <div class="score-bar-track">
            <div class="score-bar-fill" style="width:${similarity}%;background:${color}"></div>
          </div>
        </div>
        <div class="match-body">
          <div class="product-panel">
            <div class="img-box">
              ${etsy.image ? `<img src="${etsy.hostedImageUrl || etsy.image}" loading="lazy" onerror="this.style.display='none'" />` : ''}
            </div>
            <a class="prod-link etsy-link" href="${etsy.link}" target="_blank" rel="noopener">🛍 Voir sur Etsy ↗</a>
          </div>
          <div class="divider-line"></div>
          <div class="product-panel">
            <div class="img-box">
              ${aliexpress.image ? `<img src="${aliexpress.image}" loading="lazy" onerror="this.style.display='none'" />` : ''}
            </div>
            <a class="prod-link ali-link" href="${aliexpress.link}" target="_blank" rel="noopener">🛒 Voir sur AliExpress ↗</a>
          </div>
        </div>`;
      document.getElementById('results-container').appendChild(card);
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('keyword-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') startSearch();
      });
    });
  </script>
</body>
</html>
