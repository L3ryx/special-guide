<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finder Niche</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Croissant+One&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --green: #22c55e; --glass: rgba(0,0,0,0.55); --glass-border: rgba(255,255,255,0.12); --text: #ffffff; --muted: rgba(255,255,255,0.55); }
    html, body { min-height: 100%; font-family: 'Inter', sans-serif; color: var(--text); overflow: hidden; }
    body { position: relative; }
    html.unlocked, html.unlocked body { overflow-y: auto; overflow-x: hidden; }

    #bg-layer { position: fixed; inset: 0; z-index: -3; background: #0a0a0a url('/background.png') center center / cover no-repeat; animation: bgDrift 18s ease-in-out infinite alternate; transform-origin: center; }
    @keyframes bgDrift { 0%{transform:scale(1.08)translate(0,0)} 25%{transform:scale(1.1)translate(-12px,-8px)} 50%{transform:scale(1.08)translate(8px,-14px)} 75%{transform:scale(1.1)translate(-6px,10px)} 100%{transform:scale(1.08)translate(10px,6px)} }
    #bg-layer::after { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.5); }
    #milkyway-canvas { position:fixed; inset:0; width:100%; height:100%; z-index:-2; pointer-events:none; }
    #shooting-canvas { position:fixed; inset:0; width:100%; height:100%; z-index:-1; pointer-events:none; }

    /* ── INTRO ── */
    #intro { position:fixed; inset:0; z-index:9999; background:#000; display:flex; align-items:center; justify-content:center; }
    #intro-text { font-family:'Croissant One',cursive; font-size:clamp(2.8rem,9vw,6rem); color:#fff; letter-spacing:0.06em; text-align:center; text-shadow:0 0 40px rgba(255,255,255,0.3); animation:introAppear 0.8s ease forwards; }
    @keyframes introAppear { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
    #intro-text span { display:inline-block; }
    #intro-text span.blast { animation:blast 0.6s ease forwards; }
    @keyframes blast { to{transform:translate(var(--tx),var(--ty))scale(0)rotate(var(--tr));opacity:0} }
    #bg-layer,#milkyway-canvas,#main-view { transition:opacity 0.7s ease; }

    /* ── AUTH MODAL ── */
    #auth-overlay { position:fixed; inset:0; z-index:8000; background:rgba(0,0,0,0.75); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; }
    #auth-box { width:100%; max-width:420px; margin:20px; background:rgba(15,15,15,0.95); border:1px solid rgba(255,255,255,0.12); border-radius:24px; padding:36px 32px; display:flex; flex-direction:column; gap:20px; }
    #auth-logo { text-align:center; font-family:'Croissant One',cursive; font-size:1.6rem; color:#fff; letter-spacing:0.05em; }
    #auth-subtitle { text-align:center; font-size:0.82rem; color:var(--muted); }
    .auth-tabs { display:flex; gap:8px; background:rgba(255,255,255,0.06); border-radius:12px; padding:4px; }
    .auth-tab { flex:1; padding:10px; border:none; background:transparent; color:var(--muted); font-family:'Inter',sans-serif; font-size:0.88rem; font-weight:600; border-radius:9px; cursor:pointer; transition:all 0.2s; }
    .auth-tab.active { background:rgba(255,255,255,0.12); color:#fff; }
    .auth-input { width:100%; padding:14px 18px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:#fff; font-family:'Inter',sans-serif; font-size:0.95rem; outline:none; transition:border-color 0.2s; }
    .auth-input:focus { border-color:var(--green); }
    .auth-input::placeholder { color:var(--muted); }
    #auth-submit { width:100%; padding:15px; background:var(--green); border:none; border-radius:12px; color:#fff; font-family:'Inter',sans-serif; font-weight:700; font-size:1rem; cursor:pointer; transition:all 0.2s; }
    #auth-submit:hover { background:#16a34a; }
    #auth-submit:disabled { opacity:0.6; cursor:not-allowed; }
    #auth-error { text-align:center; font-size:0.82rem; color:#f87171; min-height:1.2em; }
    #auth-forgot { text-align:center; font-size:0.8rem; color:var(--muted); cursor:pointer; text-decoration:underline; }
    #auth-forgot:hover { color:#fff; }
    #auth-forgot-form { display:none; flex-direction:column; gap:12px; }
    #auth-forgot-back { text-align:center; font-size:0.8rem; color:var(--muted); cursor:pointer; }
    #auth-forgot-back:hover { color:#fff; }
    #auth-forgot-msg { text-align:center; font-size:0.82rem; color:var(--green); min-height:1.2em; }

    /* ── USER BADGE (top right) ── */
    #user-badge { position:fixed; top:10px; right:12px; z-index:500; display:none; align-items:center; gap:8px; padding:7px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.18); background:rgba(0,0,0,0.55); backdrop-filter:blur(12px); }
    #user-badge .user-email { font-size:0.78rem; color:rgba(255,255,255,0.7); max-width:140px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    #user-badge .btn-logout { background:none; border:none; color:#f87171; font-size:0.75rem; cursor:pointer; font-family:'Inter',sans-serif; padding:0; }
    #user-badge .btn-logout:hover { color:#fff; }

    /* ── NICHE LIST BTN ── */
    #niche-list-btn { position:fixed; top:10px; left:12px; z-index:500; display:none; align-items:center; gap:6px; padding:7px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.18); background:rgba(0,0,0,0.55); color:rgba(255,255,255,0.8); font-size:0.82rem; font-weight:600; font-family:'Inter',sans-serif; text-decoration:none; backdrop-filter:blur(12px); transition:all 0.2s; }
    #niche-list-btn:hover { background:rgba(255,255,255,0.13); color:#fff; }
    #niche-list-btn .nl-count { background:var(--green); border-radius:50%; width:16px; height:16px; font-size:0.6rem; font-weight:700; display:none; align-items:center; justify-content:center; color:#fff; }

    /* ── TITLE ── */
    #title-outer { width:100%; display:flex; justify-content:center; }
    #title-wrap { position:relative; display:inline-block; padding:90px 40px 8px; }
    #niche-title { position:relative; z-index:101; text-align:center; user-select:none; }
    #niche-title span { display:inline-block; font-family:'Croissant One',cursive; font-size:clamp(2.4rem,7vw,5rem); font-weight:400; letter-spacing:0.04em; color:#fff; text-shadow:0 1px 0 #ccc,0 2px 0 #c9c9c9,0 3px 0 #bbb,0 4px 0 #b9b9b9,0 5px 0 #aaa,0 6px 1px rgba(0,0,0,.1),0 1px 3px rgba(0,0,0,.3),0 3px 5px rgba(0,0,0,.2),0 5px 10px rgba(0,0,0,.25),0 20px 20px rgba(0,0,0,.15); animation:wave3d 2.2s ease-in-out infinite; }
    #niche-title span:nth-child(1){animation-delay:0.00s}#niche-title span:nth-child(2){animation-delay:0.07s}#niche-title span:nth-child(3){animation-delay:0.14s}#niche-title span:nth-child(4){animation-delay:0.21s}#niche-title span:nth-child(5){animation-delay:0.28s}#niche-title span:nth-child(6){animation-delay:0.35s}#niche-title span:nth-child(7){animation-delay:0.42s}#niche-title span:nth-child(8){animation-delay:0.49s}#niche-title span:nth-child(9){animation-delay:0.56s}#niche-title span:nth-child(10){animation-delay:0.63s}#niche-title span:nth-child(11){animation-delay:0.70s}
    .title-space { display:inline-block; width:0.35em; }
    @keyframes wave3d { 0%,100%{transform:translateY(0)rotateX(0deg)scale(1)} 25%{transform:translateY(-18px)rotateX(20deg)scale(1.08)} 50%{transform:translateY(0)rotateX(0deg)scale(1)} }

    /* ── MAIN ── */
    #main-view { position:relative; z-index:10; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:80px 20px 20px; gap:20px; }
    .search-card { width:100%; max-width:660px; display:flex; flex-direction:column; align-items:center; gap:14px; }

    /* Input row: input + add btn + tags inline + trash */
    .input-row { width:100%; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .input-row input { flex:1; min-width:160px; padding:16px 20px; background:var(--glass); border:1px solid var(--glass-border); border-radius:16px; color:var(--text); font-family:'Inter',sans-serif; font-size:1.05rem; outline:none; backdrop-filter:blur(16px); transition:border-color 0.2s,box-shadow 0.2s; text-align:center; }
    .input-row input::placeholder { color:var(--muted); }
    .input-row input:focus { border-color:var(--green); box-shadow:0 0 0 3px rgba(34,197,94,0.15); }
    #add-keyword-btn { width:48px; height:48px; flex-shrink:0; background:var(--green); border:none; border-radius:14px; color:#fff; font-size:1.6rem; line-height:1; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(34,197,94,0.4); }
    #add-keyword-btn:hover { background:#16a34a; transform:translateY(-1px); }
    #add-keyword-btn:active { transform:translateY(0); }
    #keywords-list { display:contents; }
    .keyword-tag { display:inline-flex; align-items:center; gap:5px; padding:7px 11px; background:rgba(34,197,94,0.12); border:1px solid rgba(34,197,94,0.35); border-radius:10px; font-size:0.82rem; font-weight:600; color:var(--green); animation:slideUp 0.2s ease; height:48px; }
    .keyword-tag .tag-text { max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .keyword-tag .tag-remove { background:none; border:none; color:rgba(255,255,255,0.35); cursor:pointer; font-size:0.95rem; line-height:1; padding:0; transition:color 0.2s; }
    .keyword-tag .tag-remove:hover { color:#f87171; }
    .keyword-tag.running { border-color:rgba(249,115,22,0.6); background:rgba(249,115,22,0.12); }
    .keyword-tag.running .tag-text { color:#f97316; }
    .keyword-tag.done { border-color:rgba(34,197,94,0.5); background:rgba(34,197,94,0.18); }
    .keyword-tag.error { border-color:rgba(239,68,68,0.5); background:rgba(239,68,68,0.1); }
    .keyword-tag.error .tag-text { color:#f87171; }
    #clear-keywords-btn { width:48px; height:48px; flex-shrink:0; background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.3); border-radius:14px; color:#f87171; font-size:1.1rem; cursor:pointer; transition:all 0.2s; display:none; align-items:center; justify-content:center; }
    #clear-keywords-btn:hover { background:rgba(239,68,68,0.25); border-color:rgba(239,68,68,0.6); }

    .selects-row { display:flex; gap:10px; width:100%; }
    .select-wrap { flex:1; position:relative; }
    .select-wrap select { width:100%; padding:16px 40px 16px 20px; background:var(--glass); border:1px solid var(--glass-border); border-radius:14px; color:var(--text); font-family:'Inter',sans-serif; font-size:1rem; outline:none; appearance:none; backdrop-filter:blur(16px); cursor:pointer; transition:border-color 0.2s; }
    .select-wrap select:focus { border-color:var(--green); }
    .select-wrap option { background:#1a1a1a; color:#fff; }
    .select-wrap::after { content:'▾'; position:absolute; right:12px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; font-size:0.8rem; }

    #start-btn { width:100%; padding:22px; background:var(--green); border:none; border-radius:16px; color:#fff; font-family:'Inter',sans-serif; font-weight:700; font-size:1.25rem; letter-spacing:0.12em; cursor:pointer; transition:all 0.25s ease; position:relative; overflow:hidden; box-shadow:0 4px 32px rgba(34,197,94,0.45); }
    #start-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,0.15) 50%,transparent 70%); transform:translateX(-100%); transition:transform 0.6s ease; }
    #start-btn:hover::before { transform:translateX(100%); }
    #start-btn:hover { background:#16a34a; transform:translateY(-1px); }
    #start-btn:active { transform:translateY(0); }
    #start-btn:disabled { cursor:not-allowed; transform:none; }
    #start-btn.loading { animation:btnBlink 0.7s ease-in-out infinite; }
    @keyframes btnBlink { 0%,100%{background:#dc2626;box-shadow:0 4px 32px rgba(220,38,38,0.6)} 50%{background:#ff6b6b;box-shadow:0 0 48px rgba(220,38,38,0.9)} }
    #start-btn.retry { animation:btnRetry 0.8s ease-in-out infinite; letter-spacing:0.18em; }
    @keyframes btnRetry { 0%,100%{background:#ca8a04;box-shadow:0 4px 32px rgba(202,138,4,0.6)} 50%{background:#fbbf24;box-shadow:0 0 48px rgba(251,191,36,0.9);color:#422006} }

    /* ── PROGRESS ── */
    #progress-wrap { width:100%; max-width:660px; display:none; flex-direction:column; gap:12px; }
    .progress-keyword-label { text-align:center; font-size:0.8rem; color:#f97316; font-weight:600; min-height:1.2em; }
    .progress-steps { display:flex; justify-content:space-between; gap:4px; }
    .step-dot { flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; opacity:0.3; transition:opacity 0.3s; }
    .step-dot.active { opacity:1; } .step-dot.done { opacity:0.6; }
    .step-dot .dot { width:8px; height:8px; border-radius:50%; background:var(--muted); transition:background 0.3s,box-shadow 0.3s; }
    .step-dot.active .dot { background:#f97316; box-shadow:0 0 8px #f97316; animation:blink 0.8s infinite; }
    .step-dot.done .dot { background:var(--green); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .step-dot .step-label { font-size:0.6rem; color:var(--muted); text-align:center; white-space:nowrap; }
    .progress-track { width:100%; height:10px; background:rgba(255,255,255,0.07); border-radius:10px; overflow:visible; position:relative; }
    .progress-fill { height:100%; width:0%; background:linear-gradient(90deg,#7c2d12,#dc2626,#f97316,#fbbf24,#fef08a); border-radius:10px; position:relative; transition:width 0.5s ease; box-shadow:0 0 6px #f97316,0 0 20px #dc2626; }
    .progress-fill::after { content:"🔥"; position:absolute; right:-14px; top:50%; transform:translateY(-55%); font-size:1.3rem; filter:drop-shadow(0 0 6px #f97316); animation:flicker 0.3s infinite alternate; display:none; }
    .progress-fill.burning::after { display:block; }
    @keyframes flicker { 0%{transform:translateY(-55%)scale(1)rotate(-3deg)} 100%{transform:translateY(-60%)scale(1.08)rotate(3deg)} }
    .progress-msg { text-align:center; font-size:0.78rem; color:var(--muted); min-height:1.2em; }

    /* ── RESULTS ── */
    #results-section { position:relative; z-index:10; padding:0 20px 80px; display:none; }
    .results-grid { max-width:1100px; margin:0 auto; display:flex; flex-direction:column; gap:20px; }
    .keyword-section-title { font-size:0.75rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:#f97316; padding:8px 0 4px; border-bottom:1px solid rgba(249,115,22,0.2); }
    .results-count-bar { text-align:center; font-size:0.8rem; color:var(--muted); margin-bottom:4px; }
    .match-card { background:var(--glass); border:1px solid var(--glass-border); border-radius:18px; overflow:hidden; backdrop-filter:blur(20px); animation:slideUp 0.4s ease; }
    @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
    .match-body { display:grid; grid-template-columns:1fr 1px 1fr; align-items:start; }
    .divider-line { background:var(--glass-border); align-self:stretch; }
    .product-panel { display:flex; flex-direction:column; align-items:center; padding:16px 14px; gap:10px; min-width:0; box-sizing:border-box; }

    /* electric border */
    .img-wrap { position:relative; width:100%; padding:3px; border-radius:14px; box-sizing:border-box; }
    .img-wrap::before { content:''; position:absolute; inset:-2px; border-radius:15px; background:conic-gradient(from var(--angle,0deg),#00f0ff 0%,#0066ff 10%,transparent 20%,transparent 45%,#a855f7 50%,#00f0ff 60%,transparent 70%,transparent 90%,#0066ff 95%,#00f0ff 100%); animation:electric-spin 1.8s linear infinite; z-index:0; }
    .img-wrap::after { content:''; position:absolute; inset:-4px; border-radius:16px; background:conic-gradient(from var(--angle,0deg),#00f0ff 0%,#0066ff 10%,transparent 20%,transparent 45%,#a855f7 50%,#00f0ff 60%,transparent 70%,transparent 90%,#0066ff 95%,#00f0ff 100%); animation:electric-spin 1.8s linear infinite; filter:blur(8px); opacity:0.6; z-index:0; }
    @property --angle { syntax:'<angle>'; initial-value:0deg; inherits:false; }
    @keyframes electric-spin { 0%{--angle:0deg} 100%{--angle:360deg} }
    .img-box { position:relative; z-index:1; width:100%; aspect-ratio:1/1; border-radius:11px; overflow:hidden; background:rgba(10,10,10,0.9); }
    .img-box img { width:100%; height:100%; object-fit:cover; transition:transform 0.4s; display:block; }
    .img-box:hover img { transform:scale(1.04); }

    /* shop side col */
    .etsy-img-container { position:relative; width:100%; }
    .shop-side-col { position:absolute; top:0; left:0; bottom:0; width:42px; z-index:2; display:flex; flex-direction:column; align-items:center; justify-content:space-between; padding:10px 0; background:rgba(0,0,0,0.45); border-right:1px solid rgba(255,255,255,0.08); border-radius:11px 0 0 11px; }
    .shop-side-btn { display:flex; align-items:center; justify-content:center; text-decoration:none; }
    .shop-side-btn img { width:26px; height:26px; border-radius:50%; object-fit:cover; border:2px solid rgba(241,100,30,0.6); }
    .side-initial { display:flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:50%; background:rgba(241,100,30,0.3); border:2px solid rgba(241,100,30,0.5); color:#fff; font-weight:700; font-size:0.8rem; }
    .btn-heart-icon { width:26px; height:26px; border-radius:50%; border:none; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#facc15; font-size:1.1rem; transition:all 0.2s; padding:0; }
    .btn-heart-icon:hover { transform:scale(1.25); }
    .btn-heart-icon.saved { color:#22c55e; }
    .btn-heart-icon.saving { opacity:0.5; cursor:not-allowed; }

    .prod-link { display:flex; align-items:center; justify-content:center; gap:6px; width:100%; padding:11px 16px; border-radius:10px; font-size:0.82rem; font-weight:600; text-decoration:none; transition:all 0.2s; box-sizing:border-box; text-align:center; }
    .prod-link.etsy-link { background:rgba(241,100,30,0.15); border:1px solid rgba(241,100,30,0.3); color:#fb923c; }
    .prod-link.etsy-link:hover { background:rgba(241,100,30,0.25); }
    .prod-link.ali-link { background:rgba(227,24,55,0.15); border:1px solid rgba(227,24,55,0.3); color:#f87171; }
    .prod-link.ali-link:hover { background:rgba(227,24,55,0.25); }
    .price-tag { font-size:0.88rem; font-weight:700; border-radius:8px; padding:5px 12px; width:100%; text-align:center; }
    .price-tag.etsy-price { color:#fb923c; border:1px solid rgba(241,100,30,0.3); background:rgba(241,100,30,0.08); }
    .price-tag.ali-price  { color:#f87171; border:1px solid rgba(227,24,55,0.3); background:rgba(227,24,55,0.08); }
    .empty { text-align:center; padding:40px 20px; color:var(--muted); }

    /* FIND */
    #find-wrap { display:none; flex-direction:column; align-items:center; gap:16px; padding:10px 0 20px; width:100%; }
    #find-btn { padding:16px 48px; background:var(--green); border:none; border-radius:14px; color:#fff; font-family:'Inter',sans-serif; font-weight:700; font-size:1.1rem; letter-spacing:0.1em; cursor:pointer; transition:all 0.25s; box-shadow:0 4px 24px rgba(34,197,94,0.4); }
    #find-btn:hover { background:#16a34a; transform:translateY(-1px); }
    #find-btn.searching { animation:findBlink 0.6s ease-in-out infinite; cursor:not-allowed; }
    @keyframes findBlink { 0%,100%{background:#dc2626;box-shadow:0 4px 32px rgba(220,38,38,0.7)} 50%{background:#ff3333;box-shadow:0 0 48px rgba(255,50,50,1)} }
    #find-status { font-size:0.82rem; color:var(--muted); text-align:center; }
    #winner-card { display:none; width:100%; max-width:600px; background:linear-gradient(135deg,rgba(34,197,94,0.12),rgba(16,163,74,0.06)); border:1px solid rgba(34,197,94,0.4); border-radius:18px; padding:24px; backdrop-filter:blur(16px); text-align:center; }
    #winner-card .winner-label { font-size:0.75rem; font-weight:700; letter-spacing:0.15em; color:var(--green); text-transform:uppercase; margin-bottom:10px; }
    #winner-card .winner-name { font-size:1.5rem; font-weight:800; color:#fff; margin-bottom:14px; }
    #winner-card .winner-stats { display:flex; justify-content:center; gap:32px; flex-wrap:wrap; }
    #winner-card .winner-stat { display:flex; flex-direction:column; align-items:center; gap:4px; }
    #winner-card .winner-stat-val { font-size:1.4rem; font-weight:800; color:var(--green); }
    #winner-card .winner-stat-lbl { font-size:0.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; }
    #winner-card .winner-revenue { margin-top:20px; padding:16px 20px; background:rgba(34,197,94,0.08); border:1px solid rgba(34,197,94,0.25); border-radius:12px; }
    #winner-card .revenue-amount { font-size:2.2rem; font-weight:900; color:var(--green); }
    #winner-card .revenue-label { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--muted); margin-top:4px; }
    #winner-card .revenue-detail { font-size:0.78rem; color:rgba(255,255,255,0.45); margin-top:6px; }
    #winner-card .winner-link { display:inline-block; margin-top:16px; padding:10px 28px; border-radius:10px; background:rgba(34,197,94,0.15); border:1px solid rgba(34,197,94,0.4); color:var(--green); font-weight:600; text-decoration:none; font-size:0.85rem; transition:all 0.2s; }

    @media(max-width:640px){#main-view{padding:70px 14px 20px}.input-row input{font-size:0.95rem;padding:14px 16px}#add-keyword-btn{width:46px;height:46px}.match-body{display:flex;flex-direction:row}.divider-line{width:1px;flex-shrink:0}.product-panel{flex:1;min-width:0;padding:10px 6px;gap:6px}.prod-link{font-size:0.65rem;padding:6px 4px}.price-tag{font-size:0.7rem;padding:4px 6px}}
  </style>
</head>
<body>
  <!-- INTRO -->
  <div id="intro"><div id="intro-text"><span>F</span><span>i</span><span>n</span><span>d</span><span>e</span><span>r</span><span>&nbsp;</span><span>N</span><span>i</span><span>c</span><span>h</span><span>e</span></div></div>
  <div id="bg-layer"></div>
  <canvas id="milkyway-canvas"></canvas>
  <canvas id="shooting-canvas"></canvas>

  <!-- AUTH MODAL -->
  <div id="auth-overlay" style="display:none;">
    <div id="auth-box">
      <div id="auth-logo">Finder Niche</div>
      <div id="auth-subtitle">Connecte-toi pour accéder à l'outil</div>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="authSwitchTab('login')">Login</button>
        <button class="auth-tab" onclick="authSwitchTab('register')">Register</button>
      </div>
      <div id="auth-main-form" style="display:flex;flex-direction:column;gap:12px;">
        <input class="auth-input" id="auth-email" type="email" placeholder="Email" />
        <input class="auth-input" id="auth-password" type="password" placeholder="Password" />
        <div id="auth-error"></div>
        <button id="auth-submit" onclick="authSubmit()">Login</button>
        <div id="auth-forgot" onclick="showForgot()">Forgot password?</div>
      </div>
      <div id="auth-forgot-form">
        <input class="auth-input" id="forgot-email" type="email" placeholder="Your email" />
        <div id="auth-forgot-msg"></div>
        <button id="auth-submit" style="width:100%;padding:15px;background:var(--green);border:none;border-radius:12px;color:#fff;font-family:Inter,sans-serif;font-weight:700;font-size:1rem;cursor:pointer;" onclick="sendForgot()">Send reset link</button>
        <div id="auth-forgot-back" onclick="hideForgot()">← Back to login</div>
      </div>
    </div>
  </div>

  <!-- FIXED BUTTONS -->
  <a id="niche-list-btn" href="/niche-list"><span style="color:#f87171;">♥</span><span>Niche List</span><span class="nl-count" id="nl-count">0</span></a>
  <div id="user-badge"><span class="user-email" id="user-email-display"></span><button class="btn-logout" onclick="logout()">Logout</button></div>

  <!-- TITLE -->
  <div id="title-outer"><div id="title-wrap"><div id="niche-title"><span>F</span><span>i</span><span>n</span><span>d</span><span>e</span><span>r</span><span class="title-space"></span><span>N</span><span>i</span><span>c</span><span>h</span><span>e</span></div></div></div>

  <div id="main-view">
    <div class="search-card">
      <!-- Input + tags + add + trash, all inline -->
      <div class="input-row">
        <input type="text" id="keyword-input" placeholder="Enter keyword" />
        <div id="keywords-list"></div>
        <button id="add-keyword-btn" onclick="addKeyword()" title="Add keyword">+</button>
        <button id="clear-keywords-btn" onclick="clearKeywords()" title="Clear all keywords">🗑</button>
      </div>
      <!-- Number of images -->
      <div class="selects-row">
        <div class="select-wrap">
          <select id="count-select">
            <option value="1">1 image</option><option value="2">2 images</option><option value="3">3 images</option>
            <option value="5">5 images</option><option value="10" selected>10 images</option>
            <option value="15">15 images</option><option value="20">20 images</option>
            <option value="30">30 images</option><option value="50">50 images</option><option value="100">100 images</option>
          </select>
        </div>
      </div>
      <button id="start-btn" onclick="startSearch()">START</button>
    </div>

    <div id="progress-wrap">
      <div class="progress-keyword-label" id="progress-keyword-label"></div>
      <div class="progress-steps" id="progress-steps"></div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-msg" id="progress-msg"></div>
    </div>

    <section id="results-section">
      <div class="results-grid">
        <div class="results-count-bar" id="results-count"></div>
        <div id="results-container"></div>
        <div id="find-wrap">
          <button id="find-btn" onclick="startFind()">🔍 Find</button>
          <div id="find-status"></div>
          <div id="winner-card"></div>
        </div>
      </div>
    </section>
  </div>

  <!-- INTRO SCRIPT -->
  <script>
    (function(){
      var ids=['bg-layer','milkyway-canvas','main-view'];
      ids.forEach(function(id){var el=document.getElementById(id);if(el){el.style.opacity='0';}});
      setTimeout(function(){
        document.querySelectorAll('#intro-text span').forEach(function(el){
          var a=Math.random()*Math.PI*2,d=150+Math.random()*350;
          el.style.setProperty('--tx',Math.cos(a)*d+'px');
          el.style.setProperty('--ty',Math.sin(a)*d+'px');
          el.style.setProperty('--tr',(Math.random()*600-300)+'deg');
          el.classList.add('blast');
        });
        setTimeout(function(){
          document.getElementById('intro').style.display='none';
          ids.forEach(function(id){var el=document.getElementById(id);if(el)el.style.opacity='1';});
          checkAuth();
        },650);
      },2200);
    })();
  </script>

  <script>
    // ── AUTH ──
    let SCOUT_TOKEN = localStorage.getItem('scout_token') || null;
    let _currentUser = null;
    let _authTab = 'login';

    function checkAuth() {
      if (!SCOUT_TOKEN) { showAuthModal(); return; }
      fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + SCOUT_TOKEN } })
        .then(function(r) {
          if (!r.ok) { SCOUT_TOKEN = null; localStorage.removeItem('scout_token'); showAuthModal(); return; }
          return r.json();
        }).then(function(d) {
          if (d) onLoggedIn(d.email);
        }).catch(function() { showAuthModal(); });
    }

    function showAuthModal() {
      document.getElementById('auth-overlay').style.display = 'flex';
    }
    function hideAuthModal() {
      document.getElementById('auth-overlay').style.display = 'none';
    }

    function authSwitchTab(tab) {
      _authTab = tab;
      document.querySelectorAll('.auth-tab').forEach(function(b) { b.classList.toggle('active', b.textContent.toLowerCase() === tab); });
      document.getElementById('auth-submit').textContent = tab === 'login' ? 'Login' : 'Register';
      document.getElementById('auth-error').textContent = '';
    }

    async function authSubmit() {
      const email = document.getElementById('auth-email').value.trim();
      const password = document.getElementById('auth-password').value;
      const errEl = document.getElementById('auth-error');
      const btn = document.getElementById('auth-submit');
      if (!email || !password) { errEl.textContent = 'Fill in all fields'; return; }
      btn.disabled = true; btn.textContent = '...';
      try {
        const r = await fetch('/api/auth/' + _authTab, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await r.json();
        if (!r.ok) { errEl.textContent = data.error || 'Error'; return; }
        localStorage.setItem('scout_token', data.token);
        SCOUT_TOKEN = data.token;
        onLoggedIn(data.email);
      } catch(e) { errEl.textContent = e.message; }
      finally { btn.disabled = false; btn.textContent = _authTab === 'login' ? 'Login' : 'Register'; }
    }

    function onLoggedIn(email) {
      _currentUser = email;
      hideAuthModal();
      document.getElementById('user-email-display').textContent = email;
      document.getElementById('user-badge').style.display = 'flex';
      document.getElementById('niche-list-btn').style.display = 'flex';
      initSavedShops();
    }

    function logout() {
      localStorage.removeItem('scout_token');
      SCOUT_TOKEN = null; _currentUser = null;
      document.getElementById('user-badge').style.display = 'none';
      document.getElementById('niche-list-btn').style.display = 'none';
      showAuthModal();
    }

    function showForgot() {
      document.getElementById('auth-main-form').style.display = 'none';
      document.getElementById('auth-forgot-form').style.display = 'flex';
      document.getElementById('auth-forgot-form').style.flexDirection = 'column';
      document.getElementById('auth-forgot-form').style.gap = '12px';
    }
    function hideForgot() {
      document.getElementById('auth-forgot-form').style.display = 'none';
      document.getElementById('auth-main-form').style.display = 'flex';
    }
    async function sendForgot() {
      const email = document.getElementById('forgot-email').value.trim();
      const msg = document.getElementById('auth-forgot-msg');
      if (!email) { msg.textContent = 'Enter your email'; msg.style.color = '#f87171'; return; }
      try {
        const r = await fetch('/api/auth/forgot-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) });
        const d = await r.json();
        msg.style.color = r.ok ? '#22c55e' : '#f87171';
        msg.textContent = r.ok ? 'Reset link sent! Check your email.' : (d.error || 'Error');
      } catch(e) { msg.style.color = '#f87171'; msg.textContent = e.message; }
    }

    // Enter key on auth inputs
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && document.getElementById('auth-overlay').style.display !== 'none') {
        if (document.getElementById('auth-forgot-form').style.display !== 'none') sendForgot();
        else authSubmit();
      }
    });

    // ── KEYWORDS ──
    let _keywords = [];

    function addKeyword() {
      const input = document.getElementById('keyword-input');
      const val = input.value.trim();
      if (!val) { input.focus(); return; }
      if (_keywords.includes(val)) { input.value = ''; input.focus(); return; }
      _keywords.push(val);
      renderKeywords();
      input.value = '';
      input.focus();
    }

    function removeKeyword(kw) {
      _keywords = _keywords.filter(function(k) { return k !== kw; });
      renderKeywords();
    }

    function renderKeywords() {
      const list = document.getElementById('keywords-list');
      list.innerHTML = '';
      _keywords.forEach(function(kw) {
        const tag = document.createElement('div');
        tag.className = 'keyword-tag';
        tag.id = 'tag-' + encodeKw(kw);
        tag.innerHTML = '<span class="tag-text">' + escHtml(kw) + '</span><button class="tag-remove" onclick="removeKeyword(\'' + escHtml(kw).replace(/'/g,"&#39;") + '\')" title="Remove">×</button>';
        list.appendChild(tag);
      });
    }

    function encodeKw(kw) { return kw.replace(/[^a-zA-Z0-9]/g,'_').slice(0,30); }
    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('keyword-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') addKeyword();
      });
    });

    // ── PROGRESS ──
    const STEPS = [
      { key: 'scraping_etsy', label: 'Etsy' },
      { key: 'reverse_search', label: 'Reverse' },
      { key: 'aliexpress_found', label: 'AliExpress' },
      { key: 'comparing', label: 'IA' },
      { key: 'finalizing', label: 'Résultats' },
    ];

    function initProgress(keyword) {
      document.getElementById('progress-keyword-label').textContent = keyword ? '🔍 ' + keyword : '';
      const c = document.getElementById('progress-steps');
      c.innerHTML = '';
      STEPS.forEach(function(s) {
        const d = document.createElement('div');
        d.className = 'step-dot'; d.id = 'step-' + s.key;
        d.innerHTML = '<div class="dot"></div><span class="step-label">' + s.label + '</span>';
        c.appendChild(d);
      });
      setProgress(0);
      document.getElementById('progress-msg').textContent = '';
    }

    function setProgress(p) {
      const el = document.getElementById('progress-fill');
      el.style.width = p + '%';
      if (p > 0 && p < 100) el.classList.add('burning'); else el.classList.remove('burning');
    }

    function advanceStep(k, msg) {
      const idx = STEPS.findIndex(function(s) { return s.key === k; });
      if (idx === -1) return;
      STEPS.forEach(function(s, i) {
        const el = document.getElementById('step-' + s.key); if (!el) return;
        if (i < idx) el.className = 'step-dot done';
        else if (i === idx) el.className = 'step-dot active';
        else el.className = 'step-dot';
      });
      setProgress(Math.round(((idx + 1) / STEPS.length) * 100));
      document.getElementById('progress-msg').textContent = msg || '';
    }

    function completeAllSteps() {
      STEPS.forEach(function(s) { const el = document.getElementById('step-' + s.key); if (el) el.className = 'step-dot done'; });
      setProgress(100);
    }

    // ── SEARCH ──
    let _allResults = [];
    let _searching = false;

    async function startSearch() {
      if (_searching) return;

      // Si pas de mots dans la liste, utilise le champ
      const inputVal = document.getElementById('keyword-input').value.trim();
      if (_keywords.length === 0 && inputVal) {
        _keywords.push(inputVal);
        renderKeywords();
        document.getElementById('keyword-input').value = '';
      }
      if (_keywords.length === 0) { document.getElementById('keyword-input').focus(); return; }

      _searching = true;
      _allResults = [];
      window._shopDataMap = {};

      const btn = document.getElementById('start-btn');
      btn.disabled = true; btn.textContent = 'LOADING'; btn.classList.remove('retry'); btn.classList.add('loading');
      document.getElementById('keyword-input').disabled = true;
      document.getElementById('count-select').disabled = true;

      document.getElementById('progress-wrap').style.display = 'flex';
      document.getElementById('results-section').style.display = 'none';
      document.getElementById('results-container').innerHTML = '';
      document.getElementById('results-count').textContent = '';
      document.getElementById('find-wrap').style.display = 'none';
      document.getElementById('winner-card').style.display = 'none';
      document.getElementById('find-status').textContent = '';
      document.documentElement.classList.remove('unlocked');
      window.scrollTo({ top: 0 });

      const maxCount = parseInt(document.getElementById('count-select').value) || 10;
      let totalMatches = 0;
      let hasError = false;

      // Marquer tous les tags comme "en attente"
      _keywords.forEach(function(kw) {
        const tag = document.getElementById('tag-' + encodeKw(kw));
        if (tag) tag.className = 'keyword-tag';
      });

      for (let ki = 0; ki < _keywords.length; ki++) {
        const keyword = _keywords[ki];
        const tag = document.getElementById('tag-' + encodeKw(keyword));
        if (tag) tag.className = 'keyword-tag running';

        initProgress(keyword + ' (' + (ki + 1) + '/' + _keywords.length + ')');

        // Section titre dans les résultats
        if (_keywords.length > 1) {
          const sec = document.createElement('div');
          sec.className = 'keyword-section-title';
          sec.textContent = '🔍 ' + keyword;
          document.getElementById('results-container').appendChild(sec);
        }

        try {
          document.getElementById('progress-msg').textContent = '⏳ Connecting...';
          const response = await fetch('/api/search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ keyword, similarityThreshold: 40, maxCount })
          });

          const ct = response.headers.get('content-type') || '';
          if (!ct.includes('text/event-stream')) {
            const data = await response.json();
            document.getElementById('progress-msg').textContent = '❌ ' + (data.error || 'Erreur serveur');
            if (tag) tag.className = 'keyword-tag error';
            hasError = true; continue;
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buf = '';
          let kwResults = [];

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const lines = buf.split('\n'); buf = lines.pop();
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              try {
                const ev = JSON.parse(line.slice(6));
                if (ev.step === 'complete') {
                  completeAllSteps();
                  kwResults = ev.results || [];
                  kwResults.forEach(renderMatch);
                  _allResults = _allResults.concat(kwResults);
                  totalMatches += kwResults.length;
                  document.getElementById('progress-msg').textContent = '✅ ' + kwResults.length + ' match(es) found';
                  if (tag) tag.className = 'keyword-tag done';
                } else if (ev.step === 'error') {
                  document.getElementById('progress-msg').textContent = '❌ ' + ev.message;
                  if (tag) tag.className = 'keyword-tag error';
                  hasError = true;
                } else {
                  advanceStep(ev.step, ev.message);
                }
              } catch(e) {}
            }
          }
        } catch(err) {
          document.getElementById('progress-msg').textContent = '❌ ' + err.message;
          if (tag) tag.className = 'keyword-tag error';
          hasError = true;
        }

        // Montre les résultats au fur et à mesure
        if (totalMatches > 0) {
          document.getElementById('results-section').style.display = 'block';
          document.documentElement.classList.add('unlocked');
          document.documentElement.style.overflowY = 'auto';
          document.body.style.overflowY = 'auto';
        }
      }

      // Fin
      _searching = false;
      btn.disabled = false; btn.classList.remove('loading');
      document.getElementById('keyword-input').disabled = false;
      document.getElementById('count-select').disabled = false;

      if (hasError && totalMatches === 0) {
        btn.classList.add('retry'); btn.textContent = 'RETRY';
      } else {
        btn.classList.remove('retry'); btn.textContent = 'START';
      }

      if (totalMatches === 0 && !hasError) {
        document.getElementById('results-container').innerHTML += '<div class="empty">Aucune correspondance trouvée.</div>';
        document.getElementById('results-section').style.display = 'block';
      }

      document.getElementById('results-count').textContent = totalMatches > 0 ? totalMatches + ' match(es) found' : '';

      if (totalMatches > 0) {
        document.getElementById('find-wrap').style.display = 'flex';
        setTimeout(function() { document.getElementById('results-section').scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
      }
    }

    // ── RENDER MATCH ──
    window._shopDataMap = {};

    function encodeShopKey(u) { return (u || '').replace(/[^a-zA-Z0-9]/g,'_').slice(0,40); }

    function renderMatch(m) {
      const etsy = m.etsy, ali = m.aliexpress;
      const etsySrc = etsy.hostedImageUrl || etsy.image || '';
      const aliSrc  = ali.image || '';
      const shopUrl = etsy.shopUrl || (etsy.link ? etsy.link.split('/listing/')[0] : '') || '';
      const shopName = etsy.shopName || shopUrl.split('/shop/')[1]?.split('/')[0] || 'Shop';
      const shopAvatar = etsy.shopAvatar || '';
      const idx = Object.keys(window._shopDataMap).length;
      window._shopDataMap[idx] = { shopUrl, shopName, shopAvatar, productImage: etsySrc, productUrl: etsy.link || '' };
      const initial = shopName.charAt(0).toUpperCase();

      const card = document.createElement('div');
      card.className = 'match-card';
      card.innerHTML =
        '<div class="match-body"><div class="product-panel"><div class="etsy-img-container">' +
        '<div class="shop-side-col">' +
          '<a class="shop-side-btn" href="' + shopUrl + '" target="_blank" rel="noopener">' +
            (shopAvatar ? '<img src="' + shopAvatar + '" onerror="this.style.display=\'none\'" />' : '<span class="side-initial">' + initial + '</span>') +
          '</a>' +
          '<button class="btn-heart-icon" id="heart-' + encodeShopKey(shopUrl) + '" onclick="saveShop(' + idx + ',this)">★</button>' +
        '</div>' +
        '<div class="img-wrap"><div class="img-box">' + (etsySrc ? '<img src="' + etsySrc + '" loading="lazy" onerror="this.style.display=\'none\'" />' : '') + '</div></div>' +
        '</div>' +
        (etsy.price ? '<div class="price-tag etsy-price">💰 ' + etsy.price + '</div>' : '') +
        '<a class="prod-link etsy-link" href="' + etsy.link + '" target="_blank" rel="noopener">🛍 Etsy ↗</a>' +
        '</div><div class="divider-line"></div><div class="product-panel">' +
        '<div class="img-wrap"><div class="img-box">' + (aliSrc ? '<img src="' + aliSrc + '" loading="lazy" onerror="this.style.display=\'none\'" />' : '') + '</div></div>' +
        (ali.price ? '<div class="price-tag ali-price">💰 ' + ali.price + '</div>' : '') +
        (ali.link ? '<a class="prod-link ali-link" href="' + ali.link + '" target="_blank" rel="noopener">🛒 AliExpress ↗</a>' : '<span class="prod-link ali-link" style="opacity:0.4;cursor:default">🛒 AliExpress</span>') +
        '</div></div>';
      document.getElementById('results-container').appendChild(card);

      if (_savedShopUrls.has(shopUrl)) {
        const hb = document.getElementById('heart-' + encodeShopKey(shopUrl));
        if (hb) { hb.classList.add('saved'); hb.textContent = '✔'; }
      }
    }

    // ── FIND ──
    let _lastResults = [];
    // Use _allResults as source for find
    async function startFind() {
      _lastResults = _allResults;
      const btn = document.getElementById('find-btn');
      const status = document.getElementById('find-status');
      const winnerCard = document.getElementById('winner-card');
      if (!_lastResults.length) { status.textContent = 'No results.'; return; }
      btn.disabled = true; btn.classList.add('searching'); btn.textContent = 'Analyse...';
      status.textContent = 'Connecting...'; winnerCard.style.display = 'none';
      function resetBtn() { btn.disabled = false; btn.classList.remove('searching'); btn.textContent = '🔍 Find'; }
      try {
        const response = await fetch('/api/shop-stats', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ results: _lastResults }) });
        const reader = response.body.getReader(), decoder = new TextDecoder(); let buf = '';
        while (true) {
          const { done, value } = await reader.read(); if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n'); buf = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try {
              const ev = JSON.parse(line.slice(6));
              if (ev.step === 'scraping') { const tot = ev.total || _lastResults.length; status.innerHTML = '<span style="color:#fff;font-weight:700;">' + ev.shopName + '</span> <span style="color:var(--muted);font-size:0.75rem;">(' + (ev.index + 1) + ' / ' + tot + ')</span> <span style="color:var(--muted);">— scanning...</span>'; }
              else if (ev.step === 'done') { status.innerHTML = '<span style="color:#22c55e;font-weight:700;">✓ ' + ev.shopName + '</span> <span style="color:var(--muted);font-size:0.75rem;">— ' + (ev.stats?.sales != null ? ev.stats.sales.toLocaleString('en-US') + ' sales' : 'no data') + '</span>'; }
              else if (ev.step === 'complete') { resetBtn(); status.textContent = ''; showWinner(ev.winner); }
              else if (ev.step === 'error') { status.textContent = '❌ ' + ev.message; resetBtn(); }
            } catch(e) {}
          }
        }
      } catch(err) { status.textContent = '❌ ' + err.message; resetBtn(); }
    }

    function showWinner(w) {
      const card = document.getElementById('winner-card');
      if (!w) { document.getElementById('find-status').textContent = 'Insufficient data.'; return; }
      const sales = w.sales != null ? w.sales.toLocaleString('fr-FR') : '—';
      const created = w.createdAt ? new Date(w.createdAt) : null;
      const ageDays = created ? Math.max(Math.floor((Date.now() - created.getTime()) / 86400000), 1) : 0;
      const ageStr = ageDays ? (ageDays < 365 ? ageDays + ' j' : Math.floor(ageDays / 365) + ' ans') : '—';
      const perDay = (w.sales && ageDays) ? (w.sales / ageDays).toFixed(2) : '—';
      const yearStr = created ? created.getFullYear().toString() : '—';
      const dateStr = created ? created.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' }) : '—';
      let revHtml = '';
      if (w.avgPrice != null && w.sales != null) {
        const rev = w.avgPrice * w.sales;
        const revStr = rev >= 1e6 ? '$' + (rev / 1e6).toFixed(1) + 'M' : rev >= 1000 ? '$' + (rev / 1000).toFixed(0) + 'K' : '$' + rev.toFixed(0);
        revHtml = '<div class="winner-revenue"><div class="revenue-amount">' + revStr + '</div><div class="revenue-label">CA estimé</div><div class="revenue-detail">$' + w.avgPrice.toFixed(2) + ' × ' + w.sales.toLocaleString('fr-FR') + ' ventes</div></div>';
      }
      const winnerShopIdx = Object.keys(window._shopDataMap).length;
      window._shopDataMap[winnerShopIdx] = { shopUrl: w.shopUrl || '', shopName: w.shopName || '', shopAvatar: '', productImage: '', productUrl: w.shopUrl || '' };
      card.innerHTML = '<div class="winner-label">🏆 Top Performing Shop</div><div class="winner-name">' + (w.shopName || 'Shop') + '</div><div class="winner-stats"><div class="winner-stat"><span class="winner-stat-val">' + sales + '</span><span class="winner-stat-lbl">Sales</span></div><div class="winner-stat"><span class="winner-stat-val">' + ageStr + '</span><span class="winner-stat-lbl">Age</span></div><div class="winner-stat"><span class="winner-stat-val">' + perDay + '</span><span class="winner-stat-lbl">/ day</span></div><div class="winner-stat"><span class="winner-stat-val">' + yearStr + '</span><span class="winner-stat-lbl">Created</span></div></div>' + revHtml + '<div style="font-size:0.75rem;color:var(--muted);margin-top:10px;">Created ' + dateStr + '</div><div style="display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap;">' + (w.shopUrl ? '<a class="winner-link" href="' + w.shopUrl + '" target="_blank" rel="noopener">View shop ↗</a>' : '') + '<button id="winner-save-btn" onclick="saveShop(' + winnerShopIdx + ',this)" style="padding:10px 22px;border-radius:10px;background:rgba(250,204,21,0.15);border:1px solid rgba(250,204,21,0.4);color:#facc15;font-weight:600;font-size:0.85rem;cursor:pointer;font-family:Inter,sans-serif;transition:all 0.2s;">★ Add to Niche List</button></div>';
      card.style.display = 'block';
      setTimeout(function() { card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 100);
    }

    // ── SAVE SHOP ──
    let _savedShopUrls = new Set();

    async function initSavedShops() {
      if (!SCOUT_TOKEN) return;
      try {
        const r = await fetch('/api/shops', { headers: { 'Authorization': 'Bearer ' + SCOUT_TOKEN } });
        if (!r.ok) return;
        const shops = await r.json();
        shops.forEach(function(s) { _savedShopUrls.add(s.shopUrl); });
        updateNlCount();
      } catch(e) {}
    }

    function updateNlCount() {
      const badge = document.getElementById('nl-count');
      if (!badge) return;
      const n = _savedShopUrls.size;
      badge.textContent = n;
      badge.style.display = n > 0 ? 'inline-flex' : 'none';
    }

    function showToast(msg, color) {
      const t = document.createElement('div');
      t.textContent = msg;
      t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:' + (color || '#222') + ';color:#fff;padding:12px 20px;border-radius:10px;font-size:0.9rem;font-weight:600;z-index:99999;pointer-events:none;';
      document.body.appendChild(t); setTimeout(function() { t.remove(); }, 3000);
    }

    async function saveShop(idx, btn) {
      const token = localStorage.getItem('scout_token');
      if (!token) { showAuthModal(); return; }
      const data = window._shopDataMap && window._shopDataMap[idx];
      if (!data) { showToast('Shop data not found', '#ef4444'); return; }
      if (_savedShopUrls.has(data.shopUrl)) { btn.classList.add('saved'); btn.textContent = '✔'; showToast('Already saved!', '#22c55e'); return; }
      btn.classList.add('saving'); btn.textContent = '⏳';
      try {
        const r = await fetch('/api/shops/save', {
          method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ shopUrl: data.shopUrl, shopName: data.shopName, shopAvatar: data.shopAvatar, productImage: data.productImage, productUrl: data.productUrl })
        });
        if (r.ok) {
          _savedShopUrls.add(data.shopUrl); btn.classList.remove('saving'); btn.classList.add('saved'); btn.textContent = '✔';
          updateNlCount(); showToast('Saved! ♥', '#22c55e');
        } else {
          const json = await r.json().catch(() => ({})); btn.classList.remove('saving'); btn.textContent = '★';
          showToast('Error: ' + (json.error || r.status), '#ef4444');
        }
      } catch(e) { btn.classList.remove('saving'); btn.textContent = '★'; showToast(e.message, '#ef4444'); }
    }

    // ── MILKY WAY ──
    (function(){const canvas=document.getElementById('milkyway-canvas');if(!canvas)return;const ctx=canvas.getContext('2d');let W,H,cx,cy;const bandAngle=Math.PI/5,bandW=600,rand=function(a,b){return Math.random()*(b-a)+a;};let nebulae=[];function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;cx=W/2;cy=H/2;buildNebulae();}window.addEventListener('resize',resize);resize();function buildNebulae(){nebulae=[];const colors=[[180,100,200],[100,120,255],[255,120,80],[80,200,255],[200,80,255]];for(var i=0;i<5;i++){const col=colors[i],along=rand(-bandW*0.4,bandW*0.4),spread=rand(-60,60);nebulae.push({x:cx+Math.cos(bandAngle)*along-Math.sin(bandAngle)*spread,y:cy+Math.sin(bandAngle)*along+Math.cos(bandAngle)*spread,rx:rand(80,220),ry:rand(40,120),angle:bandAngle+rand(-0.3,0.3),r:col[0],g:col[1],b:col[2],alpha:rand(0.04,0.1),pulse:rand(0.001,0.003),pulseDir:1});}}var driftAngle=0;function draw(){ctx.clearRect(0,0,W,H);driftAngle+=0.00008;ctx.save();ctx.translate(W/2,H/2);ctx.rotate(driftAngle);ctx.translate(-W/2,-H/2);nebulae.forEach(function(n){n.alpha+=n.pulse*n.pulseDir;if(n.alpha>0.12||n.alpha<0.03)n.pulseDir*=-1;ctx.save();ctx.translate(n.x,n.y);ctx.rotate(n.angle);const g=ctx.createRadialGradient(0,0,0,0,0,n.rx);g.addColorStop(0,'rgba('+n.r+','+n.g+','+n.b+','+n.alpha+')');g.addColorStop(0.5,'rgba('+n.r+','+n.g+','+n.b+','+(n.alpha*0.4)+')');g.addColorStop(1,'rgba('+n.r+','+n.g+','+n.b+',0)');ctx.scale(1,n.ry/n.rx);ctx.beginPath();ctx.arc(0,0,n.rx,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();ctx.restore();});ctx.restore();requestAnimationFrame(draw);}draw();})();

    // ── SHOOTING STARS ──
    (function(){const canvas=document.getElementById('shooting-canvas');if(!canvas)return;const ctx=canvas.getContext('2d');let W,H;function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}window.addEventListener('resize',resize);resize();const rand=function(a,b){return Math.random()*(b-a)+a;};function mkStar(){const angle=rand(25,50)*Math.PI/180,spd=rand(6,16);return{x:rand(-100,W*0.8),y:rand(-60,H*0.4),vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,alpha:rand(0.6,1),w:rand(1,2.5),tail:rand(12,28),decay:rand(0.991,0.997)};}var stars=[mkStar(),mkStar(),mkStar(),mkStar()];function draw(){ctx.clearRect(0,0,W,H);if(Math.random()<0.02&&stars.length<10)stars.push(mkStar());stars=stars.filter(function(s){const grad=ctx.createLinearGradient(s.x,s.y,s.x-s.vx*s.tail,s.y-s.vy*s.tail);grad.addColorStop(0,'rgba(255,255,255,'+s.alpha+')');grad.addColorStop(0.4,'rgba(200,220,255,'+(s.alpha*0.5)+')');grad.addColorStop(1,'rgba(180,200,255,0)');ctx.beginPath();ctx.strokeStyle=grad;ctx.lineWidth=s.w;ctx.lineCap='round';ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-s.vx*s.tail,s.y-s.vy*s.tail);ctx.stroke();ctx.beginPath();ctx.arc(s.x,s.y,s.w*1.2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+(s.alpha*0.8)+')';ctx.fill();s.x+=s.vx;s.y+=s.vy;s.alpha*=s.decay;return s.x<W+200&&s.y<H+200&&s.alpha>0.03;});requestAnimationFrame(draw);}draw();})();
  </script>
</body>
