<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scout</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #22c55e;
      --green-dark: #16a34a;
      --green-glow: rgba(34,197,94,0.4);
      --glass: rgba(0,0,0,0.55);
      --glass-border: rgba(255,255,255,0.12);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.55);
      --etsy: #f1641e;
      --ali: #e31837;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── BACKGROUND ── */
    #bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: #0a0a0a url('/background.png') center/cover no-repeat;
    }

    #bg-layer::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
    }

    

    /* ── MAIN LAYOUT ── */
    #main-view {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      gap: 18px;
    }

    /* ── SEARCH CARD ── */
    .search-card {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    /* keyword input */
    .input-wrap {
      width: 100%;
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      padding: 16px 20px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      outline: none;
      backdrop-filter: blur(16px);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrap input::placeholder { color: var(--muted); }
    .input-wrap input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(34,197,94,0.15);
    }

    /* selects row */
    .selects-row {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .select-wrap {
      flex: 1;
      position: relative;
    }

    .select-wrap select {
      width: 100%;
      padding: 13px 36px 13px 16px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      outline: none;
      appearance: none;
      backdrop-filter: blur(16px);
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .select-wrap select:focus { border-color: var(--green); }

    .select-wrap option { background: #1a1a1a; color: #fff; }

    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 0.8rem;
    }

    /* similarity row */
    .sim-row {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .sim-row .select-wrap { flex: 1; }

    /* START button */
    #start-btn {
      width: 100%;
      padding: 18px;
      background: var(--green);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 24px var(--green-glow);
    }

    #start-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.6s ease;
    }

    #start-btn:hover::before { transform: translateX(100%); }
    #start-btn:hover { background: #16a34a; box-shadow: 0 6px 32px var(--green-glow); transform: translateY(-1px); }
    #start-btn:active { transform: translateY(0); }
    #start-btn:disabled {
      background: rgba(34,197,94,0.3);
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    /* ── PROGRESS BAR ── */
    #progress-wrap {
      width: 100%;
      max-width: 520px;
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    .progress-track {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--green), #86efac);
      border-radius: 3px;
      transition: width 0.5s ease;
      box-shadow: 0 0 10px var(--green-glow);
    }

    .progress-steps {
      display: flex;
      justify-content: space-between;
      gap: 4px;
    }

    .step-dot {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      opacity: 0.35;
      transition: opacity 0.3s;
    }

    .step-dot.active { opacity: 1; }
    .step-dot.done { opacity: 0.7; }

    .step-dot .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s, box-shadow 0.3s;
    }

    .step-dot.active .dot {
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: blink 1s infinite;
    }

    .step-dot.done .dot { background: var(--green); }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .step-dot .step-label {
      font-size: 0.6rem;
      color: var(--muted);
      text-align: center;
      white-space: nowrap;
    }

    .progress-msg {
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      min-height: 1.2em;
    }

    /* ── RESULTS ── */
    #results-section {
      position: relative;
      z-index: 10;
      padding: 0 20px 60px;
      display: none;
    }

    .results-grid {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .results-count-bar {
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    /* match card */
    .match-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(16px);
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: none; }
    }

    .match-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--glass-border);
    }

    .score-pill {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .score-num {
      font-weight: 700;
      font-size: 1.3rem;
    }

    .score-bar-track {
      width: 100px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 2px;
    }

    .reasoning-text {
      font-size: 0.72rem;
      color: var(--muted);
      font-style: italic;
      max-width: 360px;
      text-align: right;
    }

    .match-body {
      display: grid;
      grid-template-columns: 1fr 40px 1fr;
    }

    .product-panel { padding: 20px; }
    .product-panel.left { border-right: 1px solid var(--glass-border); }

    .platform-badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 3px 10px;
      border-radius: 4px;
      margin-bottom: 12px;
    }

    .platform-badge.etsy { background: rgba(241,100,30,0.2); color: #f97316; }
    .platform-badge.ali { background: rgba(227,24,55,0.2); color: #f87171; }

    .img-box {
      width: 100%;
      aspect-ratio: 1;
      max-width: 220px;
      border-radius: 10px;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
      margin-bottom: 12px;
    }

    .img-box img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }

    .img-box:hover img { transform: scale(1.05); }

    .prod-title {
      font-size: 0.8rem;
      line-height: 1.5;
      color: rgba(255,255,255,0.8);
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .prod-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      color: var(--green);
      text-decoration: none;
      border: 1px solid rgba(34,197,94,0.3);
      padding: 5px 12px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .prod-link:hover { background: rgba(34,197,94,0.1); }

    .vs-col {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.15em;
    }

    /* empty state */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    /* status dot top right */
    #status-indicator {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      font-size: 0.7rem;
      color: var(--muted);
      backdrop-filter: blur(10px);
      cursor: pointer;
    }

    #status-indicator .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
    }

    #status-indicator .dot.ready { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 2s infinite; }
    #status-indicator .dot.error { background: #f87171; }

    @media (max-width: 600px) {
      .match-body { grid-template-columns: 1fr; }
      .product-panel.left { border-right: none; border-bottom: 1px solid var(--glass-border); }
      .vs-col { display: none; }
    }
  </style>
</head>
<body>

  <!-- Background layer -->
  <div id="bg-layer"></div>

  <!-- Status indicator -->
  <div id="status-indicator" onclick="checkHealth()">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">...</span>
  </div>

  <!-- Main centered UI -->
  <div id="main-view">
    <div class="search-card">

      <!-- Keyword -->
      <div class="input-wrap">
        <input type="text" id="keyword-input" placeholder="Keyword (e.g. custom neon sign...)" />
      </div>

      <!-- Dropdowns row -->
      <div class="selects-row">
        <div class="select-wrap" id="count-wrap">
          <!-- filled by JS -->
        </div>
        <div class="select-wrap" id="threshold-wrap">
          <!-- filled by JS -->
        </div>
      </div>

      <!-- START -->
      <button id="start-btn" onclick="startSearch()">START</button>

    </div>

    <!-- Progress bar -->
    <div id="progress-wrap">
      <div class="progress-steps" id="progress-steps"></div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-msg" id="progress-msg"></div>
    </div>

  </div>

  <!-- Results -->
  <section id="results-section">
    <div class="results-grid">
      <div class="results-count-bar" id="results-count"></div>
      <div id="results-container"></div>
    </div>
  </section>

  <script>
    // ── Build selects ──
    (function buildSelects() {
      // Count select (1–100)
      const countSel = document.createElement('select');
      countSel.id = 'count-select';
      for (let i = 1; i <= 100; i++) {
        const o = document.createElement('option');
        o.value = i; o.textContent = i + (i === 10 ? ' résultats (défaut)' : ' résultat' + (i > 1 ? 's' : ''));
        if (i === 10) o.selected = true;
        countSel.appendChild(o);
      }
      document.getElementById('count-wrap').appendChild(countSel);

      // Similarity threshold select (0–100 %)
      const simSel = document.createElement('select');
      simSel.id = 'threshold-select';
      for (let i = 0; i <= 100; i++) {
        const o = document.createElement('option');
        o.value = i; o.textContent = i + '% similarité';
        if (i === 60) o.selected = true;
        simSel.appendChild(o);
      }
      document.getElementById('threshold-wrap').appendChild(simSel);
    })();

    // ── Pipeline steps definition ──
    const STEPS = [
      { key: 'scraping_etsy',    label: 'Etsy' },
      { key: 'uploading_images', label: 'ImgBB' },
      { key: 'reverse_search',   label: 'Reverse' },
      { key: 'aliexpress_found', label: 'AliExpress' },
      { key: 'comparing',        label: 'IA' },
      { key: 'finalizing',       label: 'Résultats' },
    ];

    let currentStepIdx = -1;

    function initProgress() {
      currentStepIdx = -1;
      const container = document.getElementById('progress-steps');
      container.innerHTML = '';
      STEPS.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = 'step-dot';
        div.id = 'step-' + s.key;
        div.innerHTML = `<div class="dot"></div><span class="step-label">${s.label}</span>`;
        container.appendChild(div);
      });
      setProgress(0);
      document.getElementById('progress-msg').textContent = '';
    }

    function setProgress(pct) {
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    function advanceStep(stepKey, message) {
      const idx = STEPS.findIndex(s => s.key === stepKey);
      if (idx === -1) return;

      // Mark previous steps done
      for (let i = 0; i < idx; i++) {
        const el = document.getElementById('step-' + STEPS[i].key);
        if (el) { el.className = 'step-dot done'; }
      }

      // Mark current active
      const el = document.getElementById('step-' + STEPS[idx].key);
      if (el) { el.className = 'step-dot active'; }

      currentStepIdx = idx;
      const pct = Math.round(((idx + 1) / STEPS.length) * 100);
      setProgress(pct);
      document.getElementById('progress-msg').textContent = message || '';
    }

    function completeAllSteps() {
      STEPS.forEach(s => {
        const el = document.getElementById('step-' + s.key);
        if (el) el.className = 'step-dot done';
      });
      setProgress(100);
    }

    // ── Health check ──
    async function checkHealth() {
      try {
        const res = await fetch('/api/health');
        const data = await res.json();
        const dot = document.getElementById('status-dot');
        const txt = document.getElementById('status-text');
        if (data.status === 'ready') {
          dot.className = 'dot ready';
          txt.textContent = 'Ready';
        } else {
          dot.className = 'dot error';
          const missing = Object.entries(data.keys).filter(([,v]) => !v).map(([k]) => k).length;
          txt.textContent = missing + ' key(s) missing';
        }
        window._healthData = data;
      } catch {
        document.getElementById('status-dot').className = 'dot error';
        document.getElementById('status-text').textContent = 'Offline';
      }
    }

    // ── Search ──
    async function startSearch() {
      const keyword = document.getElementById('keyword-input').value.trim();
      const maxCount = parseInt(document.getElementById('count-select').value) || 10;
      const threshold = parseInt(document.getElementById('threshold-select').value) || 60;

      if (!keyword) { document.getElementById('keyword-input').focus(); return; }

      const btn = document.getElementById('start-btn');
      btn.disabled = true;
      btn.textContent = '...';

      // Show progress
      const pw = document.getElementById('progress-wrap');
      pw.style.display = 'flex';
      initProgress();

      // Reset results
      document.getElementById('results-section').style.display = 'none';
      document.getElementById('results-container').innerHTML = '';
      document.getElementById('results-count').textContent = '';

      try {
        const response = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ keyword, similarityThreshold: threshold, maxCount })
        });

        const ct = response.headers.get('content-type') || '';

        if (ct.includes('text/event-stream')) {
          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buf = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const lines = buf.split('\n');
            buf = lines.pop();

            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              try {
                const ev = JSON.parse(line.slice(6));
                if (ev.step === 'complete') {
                  completeAllSteps();
                  document.getElementById('progress-msg').textContent = '✅ ' + (ev.results?.length || 0) + ' correspondance(s)';
                  (ev.results || []).forEach(renderMatch);
                  finalize(ev.results?.length || 0);
                } else if (ev.step === 'error') {
                  document.getElementById('progress-msg').textContent = '❌ ' + ev.message;
                  finalize(-1);
                } else {
                  advanceStep(ev.step, ev.message);
                }
              } catch {}
            }
          }
        } else {
          const data = await response.json();
          document.getElementById('progress-msg').textContent = '❌ ' + (data.error || 'Erreur');
          finalize(-1);
        }
      } catch (err) {
        document.getElementById('progress-msg').textContent = '❌ ' + err.message;
        finalize(-1);
      }

      function finalize(count) {
        btn.disabled = false;
        btn.textContent = 'START';
        const rs = document.getElementById('results-section');
        rs.style.display = 'block';
        if (count > 0) {
          document.getElementById('results-count').textContent = count + ' correspondance(s) trouvée(s)';
          rs.scrollIntoView({ behavior: 'smooth' });
        } else if (count === 0) {
          document.getElementById('results-container').innerHTML = '<div class="empty">Aucune correspondance. Essayez un autre mot-clé ou baissez le seuil.</div>';
        }
      }
    }

    // ── Render match card ──
    function getColor(s) {
      if (s >= 85) return '#22c55e';
      if (s >= 70) return '#f59e0b';
      return '#f97316';
    }

    function renderMatch(m) {
      const { etsy, aliexpress, similarity, reasoning } = m;
      const color = getColor(similarity);
      const card = document.createElement('div');
      card.className = 'match-card';
      card.innerHTML = `
        <div class="match-header">
          <div class="score-pill">
            <span class="score-num" style="color:${color}">${similarity}%</span>
            <div class="score-bar-track">
              <div class="score-bar-fill" style="width:${similarity}%;background:${color}"></div>
            </div>
          </div>
          <div class="reasoning-text">${reasoning || ''}</div>
        </div>
        <div class="match-body">
          <div class="product-panel left">
            <span class="platform-badge etsy">ETSY</span>
            <div class="img-box">
              ${etsy.image ? `<img src="${etsy.hostedImageUrl || etsy.image}" loading="lazy" onerror="this.style.display='none'" />` : ''}
            </div>
            <div class="prod-title">${etsy.title || ''}</div>
            <a class="prod-link" href="${etsy.link}" target="_blank" rel="noopener">Voir sur Etsy ↗</a>
          </div>
          <div class="vs-col">VS</div>
          <div class="product-panel">
            <span class="platform-badge ali">ALIEXPRESS</span>
            <div class="img-box">
              ${aliexpress.image ? `<img src="${aliexpress.image}" loading="lazy" onerror="this.style.display='none'" />` : ''}
            </div>
            <div class="prod-title">${aliexpress.title || ''}</div>
            <a class="prod-link" href="${aliexpress.link}" target="_blank" rel="noopener">Voir sur AliExpress ↗</a>
          </div>
        </div>`;
      document.getElementById('results-container').appendChild(card);
    }

    // ── Init ──
    document.addEventListener('DOMContentLoaded', () => {
      checkHealth();
      document.getElementById('keyword-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') startSearch();
      });
    });
  </script>
</body>
</html>
