<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finder Niche</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Croissant+One&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:  #22c55e;
      --orange: #f1641e;
      --glass:  rgba(0,0,0,0.55);
      --glass-border: rgba(255,255,255,0.12);
      --text:   #ffffff;
      --muted:  rgba(255,255,255,0.55);
    }

    html, body {
      height: 100%; font-family: 'Inter', sans-serif;
      color: var(--text); overflow: hidden; background: #0a0a0a;
    }

    /* ── BACKGROUND ── */
#bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background: #0a0a0a url('/background.png') center center / cover no-repeat;
      animation: bgDrift 18s ease-in-out infinite alternate;
      transform-origin: center;
    }
      25%  { transform: scale(1.1)  translate(-12px,-8px); }
      50%  { transform: scale(1.08) translate(8px,-14px); }
      75%  { transform: scale(1.1)  translate(-6px,10px); }
      100% { transform: scale(1.08) translate(10px,6px); }
    }
    #bg-layer::after { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.55); }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: flex-end;
      padding: 10px 20px;
    }
    .btn-login {
      padding: 8px 20px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.85); font-family: 'Inter', sans-serif;
      font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
      backdrop-filter: blur(10px);
    }
    .btn-login:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.35); color: #fff; }

    /* ── MAIN LAYOUT ── */
    main {
      position: relative; z-index: 10;
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start; gap: 0;
      padding: 18px 20px 20px;
    }

    /* ── TITLE ── */
    #title-outer { width: 100%; display: flex; justify-content: center; margin-bottom: 60px; }
    #title-wrap  { position: relative; display: inline-block; padding: 20px 40px 8px; }
    #niche-title { position: relative; z-index: 101; text-align: center; user-select: none; }
    #niche-title {
      white-space: nowrap;
    }
    #niche-title span {
      display: inline-block; font-family: 'Croissant One', cursive;
      font-size: clamp(1.4rem, 3.5vw, 2.6rem); font-weight: 400; letter-spacing: 0.04em; color: #fff;
      text-shadow: 0 1px 0 #ccc, 0 2px 0 #c9c9c9, 0 3px 0 #bbb, 0 4px 0 #b9b9b9,
                   0 5px 0 #aaa, 0 6px 1px rgba(0,0,0,.1), 0 0 5px rgba(0,0,0,.1),
                   0 1px 3px rgba(0,0,0,.3), 0 3px 5px rgba(0,0,0,.2),
                   0 5px 10px rgba(0,0,0,.25), 0 10px 10px rgba(0,0,0,.2), 0 20px 20px rgba(0,0,0,.15);
      animation: wave3d 2.2s ease-in-out infinite;
    }
    #niche-title span:nth-child(1)  { animation-delay: 0.00s; }
    #niche-title span:nth-child(2)  { animation-delay: 0.07s; }
    #niche-title span:nth-child(3)  { animation-delay: 0.14s; }
    #niche-title span:nth-child(4)  { animation-delay: 0.21s; }
    #niche-title span:nth-child(5)  { animation-delay: 0.28s; }
    #niche-title span:nth-child(6)  { animation-delay: 0.35s; }
    #niche-title span:nth-child(7)  { animation-delay: 0.42s; }
    #niche-title span:nth-child(8)  { animation-delay: 0.49s; }
    #niche-title span:nth-child(9)  { animation-delay: 0.56s; }
    #niche-title span:nth-child(10) { animation-delay: 0.63s; }
    #niche-title span:nth-child(11) { animation-delay: 0.70s; }
    .title-space { display: inline-block; width: 0.35em; }

    @keyframes wave3d {
      0%, 100% { transform: translateY(0) rotateX(0deg) scale(1); }
      25%       { transform: translateY(-18px) rotateX(20deg) scale(1.08); }
      50%       { transform: translateY(-6px) rotateX(-5deg) scale(1.02); }
      75%       { transform: translateY(-12px) rotateX(12deg) scale(1.05); }
    }

    /* ── PRODUCT CARDS ── */
    .products-row {
      display: flex; flex-direction: row; gap: 28px; justify-content: center;
      align-items: stretch; margin-bottom: 0;
    }

    .product-card {
      display: flex; flex-direction: column; align-items: center; justify-content: space-between; gap: 18px;
      background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 22px; padding: 32px 0 28px;
      backdrop-filter: blur(16px);
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      cursor: default; width: 200px; flex-shrink: 0;
    }
    .product-card:hover {
      transform: translateY(-5px);
      border-color: rgba(241,100,30,0.45);
      box-shadow: 0 12px 40px rgba(241,100,30,0.15);
    }

    .product-icon {
      font-size: 2.8rem; line-height: 1;
      filter: drop-shadow(0 2px 8px rgba(241,100,30,0.4));
    }

    .btn-product {
      padding: 13px 0; border-radius: 12px; border: none;
      background: var(--orange); color: #fff;
      font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.92rem;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.04em;
      box-shadow: 0 4px 16px rgba(241,100,30,0.4);
      text-decoration: none; display: block; width: 140px; text-align: center;
    }
    .btn-product:hover { background: #d9511a; transform: translateY(-1px); box-shadow: 0 6px 22px rgba(241,100,30,0.55); }
    .btn-product:active { transform: translateY(0); }


    .modal-close {
      position: absolute; top: 16px; right: 16px;
      width: 32px; height: 32px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.5);
      cursor: pointer; font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .modal-close:hover { background: rgba(255,255,255,0.15); color: #fff; }

    /* ── AUTH MODAL ── */
    #auth-overlay {
      position: fixed; inset: 0; z-index: 600;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(10px);
      display: none; align-items: center; justify-content: center;
    }
    #auth-modal {
      width: 100%; max-width: 360px; margin: 20px;
      background: rgba(8,8,12,0.97); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 32px 28px;
      backdrop-filter: blur(24px); box-shadow: 0 24px 80px rgba(0,0,0,0.7);
      animation: modalUp 0.3s ease; position: relative;
    }
    .modal-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .modal-tab {
      flex: 1; padding: 9px; border-radius: 9px; border: 1.5px solid var(--green);
      color: var(--green); font-family: 'Inter', sans-serif; font-weight: 600;
      font-size: 0.88rem; cursor: pointer; background: transparent; transition: all 0.2s;
    }
    .modal-tab.active { background: var(--green); color: #fff; box-shadow: 0 2px 12px rgba(34,197,94,0.4); }
    .auth-field {
      width: 100%; padding: 12px 14px; margin-bottom: 12px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; color: #fff; font-family: 'Inter', sans-serif; font-size: 0.9rem;
      outline: none; transition: border-color 0.2s;
    }
    .auth-field:focus { border-color: var(--green); }
    .auth-field::placeholder { color: rgba(255,255,255,0.25); }
    .btn-auth {
      width: 100%; padding: 13px; border: none; border-radius: 10px;
      background: var(--green); color: #fff; font-family: 'Inter', sans-serif;
      font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all 0.2s;
      box-shadow: 0 3px 14px rgba(34,197,94,0.4); margin-top: 4px;
    }
    .btn-auth:hover { background: #16a34a; }
    .auth-msg { font-size: 0.78rem; margin-top: 10px; text-align: center; min-height: 1em; color: #f87171; }
    .auth-msg.ok { color: var(--green); }

    @media (max-width: 480px) {
      .products-row { gap: 14px; }
      .product-card { width: 150px; padding: 26px 0 22px; }
      .btn-product  { width: 116px; font-size: 0.82rem; }
    }
    /* INTRO */
    #intro {
      position: fixed; inset: 0; z-index: 9999;
      background: #000; display: flex; align-items: center; justify-content: center;
    }
    #intro-text {
      font-family: 'Croissant One', cursive;
      font-size: clamp(2.8rem, 9vw, 6rem);
      color: #fff; letter-spacing: 0.06em; text-align: center;
      text-shadow: 0 0 40px rgba(255,255,255,0.3);
      animation: introAppear 0.8s ease forwards;
    }
    @keyframes introAppear { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    #intro-text span { display: inline-block; }
    #intro-text span.blast { animation: blast 0.6s ease forwards; }
    @keyframes blast { to { transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--tr)); opacity: 0; } }
    #landing-content { transition: opacity 0.7s ease; }
  </style>
</head>
<body>

  <!-- INTRO -->
  <div id="intro">
    <div id="intro-text">
      <span>F</span><span>i</span><span>n</span><span>d</span><span>e</span><span>r</span><span>&nbsp;</span><span>N</span><span>i</span><span>c</span><span>h</span><span>e</span>
    </div>
  </div>

    <div id="bg-layer"></div>
  <canvas id="milkyway-canvas"></canvas>
  <canvas id="shooting-canvas"></canvas>

  <div id="landing-content" style="opacity:0">
  <nav>
    <button class="btn-login" onclick="openAuth()">Login</button>
  </nav>

  <main>
    <!-- Title -->
    <div id="title-outer">
      <div id="title-wrap">
        <div id="niche-title">
          <span>F</span><span>i</span><span>n</span><span>d</span><span>e</span><span>r</span><span class="title-space"></span><span>N</span><span>i</span><span>c</span><span>h</span><span>e</span>
        </div>
      </div>
    </div>

    <!-- Product cards -->
    <div class="products-row">
      <div class="product-card">
        <div class="product-icon">🏪</div>
        <a class="btn-product" href="/shop-pricing" onclick="sessionStorage.setItem('skipIntro','1')">Shop</a>
      </div>
      <div class="product-card">
        <div class="product-icon">🔍</div>
        <a class="btn-product" href="/finder-pricing" onclick="sessionStorage.setItem('skipIntro','1')">Finder Niche</a>
      </div>
    </div>

  </main>

          <div class="plan-name">Shop</div>
          <div class="plan-desc">Save your favorite Etsy shops, analyze their stats and find the best products to source.</div>
          <div class="plan-price">Free <span>/ forever</span></div>
          <button class="btn-plan" onclick="closeBuy();openAuth()">Get started →</button>
        </div>
        <div class="buy-plan featured">
          <div class="plan-icon">🔍</div>
          <div class="plan-name">Finder Niche</div>
          <div class="plan-desc">Find the most profitable Etsy niches, compare with AliExpress and identify the best opportunities.</div>
          <div class="plan-price">$9.99 <span>/ mois</span></div>
          <button class="btn-plan" onclick="closeBuy()">Buy →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- AUTH MODAL -->
  <div id="auth-overlay" onclick="if(event.target===this)closeAuth()">
    <div id="auth-modal">
      <button class="modal-close" onclick="closeAuth()">✕</button>
      <div class="modal-tabs">
        <button class="modal-tab active" id="tab-login"    onclick="switchTab('login')">Login</button>
        <button class="modal-tab"        id="tab-register" onclick="switchTab('register')">Register</button>
      </div>
      <div id="form-login">
        <input class="auth-field" id="login-email" type="email"    placeholder="Email" />
        <input class="auth-field" id="login-pw"    type="password" placeholder="Password" />
        <button class="btn-auth" onclick="doLogin()">Login</button>
      </div>
      <div id="form-register" style="display:none">
        <input class="auth-field" id="reg-email" type="email"    placeholder="Email" />
        <input class="auth-field" id="reg-pw"    type="password" placeholder="Password (6+ chars)" />
        <button class="btn-auth" onclick="doRegister()">Create account</button>
      </div>
      <div class="auth-msg" id="auth-msg"></div>
    </div>
  </div>

  </div>
  <script>
    // ── INTRO ──
    (function() {
      try {
        if (sessionStorage.getItem('skipIntro') === '1') {
          sessionStorage.removeItem('skipIntro');
          var intro = document.getElementById('intro');
          if (intro) intro.style.display = 'none';
          var content = document.getElementById('landing-content');
          if (content) content.style.opacity = '1';
          return;
        }
        setTimeout(function() {
          try {
            document.querySelectorAll('#intro-text span').forEach(function(el) {
              var a = Math.random() * Math.PI * 2;
              var d = 150 + Math.random() * 350;
              el.style.setProperty('--tx', Math.cos(a)*d + 'px');
              el.style.setProperty('--ty', Math.sin(a)*d + 'px');
              el.style.setProperty('--tr', (Math.random()*600-300) + 'deg');
              el.classList.add('blast');
            });
          } catch(e) {}
          setTimeout(function() {
            try {
              var intro = document.getElementById('intro');
              if (intro) intro.style.display = 'none';
              var content = document.getElementById('landing-content');
              if (content) { content.style.transition = 'opacity 0.7s ease'; content.style.opacity = '1'; }
            } catch(e) {}
          }, 650);
        }, 2000);
      } catch(e) {}
    })();
  </script>

  <script>

    // ── MODALS ──
    function openAuth() { document.getElementById('auth-overlay').style.display='flex'; }
    function closeAuth(){ document.getElementById('auth-overlay').style.display='none'; }

    function switchTab(tab) {
      document.getElementById('form-login').style.display    = tab==='login'    ? 'block' : 'none';
      document.getElementById('form-register').style.display = tab==='register' ? 'block' : 'none';
      document.getElementById('tab-login').classList.toggle('active',    tab==='login');
      document.getElementById('tab-register').classList.toggle('active', tab==='register');
      document.getElementById('auth-msg').textContent = '';
    }

    function setMsg(msg, ok) {
      const el = document.getElementById('auth-msg');
      el.textContent = msg;
      el.className = 'auth-msg' + (ok ? ' ok' : '');
    }

    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const pw    = document.getElementById('login-pw').value;
      if (!email||!pw) { setMsg('Please fill in all fields'); return; }
      try {
        const r = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password:pw}) });
        const d = await r.json();
        if (r.ok) {
          localStorage.setItem('scout_token', d.token);
          setMsg('Welcome! Redirecting…', true);
          setTimeout(() => { window.location.href='/dashboard'; }, 800);
        } else { setMsg(d.error || 'Login failed'); }
      } catch(e) { setMsg('Network error'); }
    }

    async function doRegister() {
      const email = document.getElementById('reg-email').value.trim();
      const pw    = document.getElementById('reg-pw').value;
      if (!email||!pw) { setMsg('Please fill in all fields'); return; }
      if (pw.length<6) { setMsg('Password too short (6+ chars)'); return; }
      try {
        const r = await fetch('/api/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password:pw}) });
        const d = await r.json();
        if (r.ok) {
          localStorage.setItem('scout_token', d.token);
          setMsg('Account created! ✅', true);
          setTimeout(() => { closeAuth(); }, 1200);
        } else { setMsg(d.error || 'Registration failed'); }
      } catch(e) { setMsg('Network error'); }
    }

    // Already logged in → show name in nav instead
    (async () => {
      const token = localStorage.getItem('scout_token');
      if (!token) return;
      try {
        const r = await fetch('/api/auth/me', { headers:{'Authorization':'Bearer '+token} });
        if (r.ok) {
          const d = await r.json();
          const btn = document.querySelector('.btn-login');
          btn.innerHTML = '👤';
          btn.style.fontSize = '1.1rem';
          btn.style.padding = '6px 10px';
          btn.title = d.email;
          btn.onclick = () => { window.location.href='/dashboard'; };
        }
      } catch(e) {}
    })();
  </script>
  <script>
    // ── MILKY WAY ──
    (function() {
      const canvas = document.getElementById('milkyway-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let W, H, stars = [];
      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        stars = Array.from({length: 220}, () => ({
          x: Math.random()*W, y: Math.random()*H,
          r: Math.random()*1.4+0.2,
          a: Math.random()*0.7+0.15,
          speed: Math.random()*0.003+0.001,
          phase: Math.random()*Math.PI*2
        }));
      }
      function draw(t) {
        ctx.clearRect(0,0,W,H);
        stars.forEach(s => {
          const alpha = s.a*(0.6+0.4*Math.sin(t*s.speed+s.phase));
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
          ctx.fillStyle = `rgba(255,255,255,${alpha})`;
          ctx.fill();
        });
        requestAnimationFrame(draw);
      }
      resize();
      window.addEventListener('resize', resize);
      requestAnimationFrame(draw);
    })();

    // ── SHOOTING STARS ──
    (function() {
      const canvas = document.getElementById('shooting-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let W, H, shots = [];
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      function newShot() {
        return { x: Math.random()*W*0.7, y: Math.random()*H*0.4,
          len: 80+Math.random()*120, speed: 6+Math.random()*8,
          angle: Math.PI/4+Math.random()*0.3,
          alpha: 0.8+Math.random()*0.2, life: 1 };
      }
      function draw() {
        ctx.clearRect(0,0,W,H);
        if (Math.random()<0.012) shots.push(newShot());
        shots = shots.filter(s=>s.life>0);
        shots.forEach(s => {
          s.x += Math.cos(s.angle)*s.speed;
          s.y += Math.sin(s.angle)*s.speed;
          s.life -= 0.022;
          const grd = ctx.createLinearGradient(s.x,s.y, s.x-Math.cos(s.angle)*s.len, s.y-Math.sin(s.angle)*s.len);
          grd.addColorStop(0, `rgba(255,255,255,${s.alpha*s.life})`);
          grd.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.beginPath();
          ctx.moveTo(s.x,s.y);
          ctx.lineTo(s.x-Math.cos(s.angle)*s.len, s.y-Math.sin(s.angle)*s.len);
          ctx.strokeStyle = grd; ctx.lineWidth = 1.5; ctx.stroke();
        });
        requestAnimationFrame(draw);
      }
      resize();
      window.addEventListener('resize', resize);
      requestAnimationFrame(draw);
    })();
  </script>
</body>
</html>
