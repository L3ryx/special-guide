<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scout</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #22c55e;
      --glass: rgba(0,0,0,0.55);
      --glass-border: rgba(255,255,255,0.12);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.55);
    }

    html, body { height: 100%; font-family: 'Inter', sans-serif; color: var(--text); overflow: hidden; }
    body.has-results { overflow-y: auto; overflow-x: hidden; }

    #bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background: #000;
    }

    /* ── MAIN ── */
    #main-view {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 20px; gap: 20px;
    }

    .search-card {
      width: 100%; max-width: 520px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }

    /* keyword */
    .input-wrap { width: 100%; }
    .input-wrap input {
      width: 100%; padding: 16px 20px;
      background: var(--glass); border: 1px solid var(--glass-border); border-radius: 14px;
      color: var(--text); font-family: 'Inter', sans-serif; font-size: 1rem;
      outline: none; backdrop-filter: blur(16px);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrap input::placeholder { color: var(--muted); }
    .input-wrap input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(34,197,94,0.15); }

    /* selects */
    .selects-row { display: flex; gap: 10px; width: 100%; }
    .select-wrap { flex: 1; position: relative; }
    .select-wrap select {
      width: 100%; padding: 13px 36px 13px 16px;
      background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px;
      color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.88rem;
      outline: none; appearance: none; backdrop-filter: blur(16px); cursor: pointer;
      transition: border-color 0.2s;
    }
    .select-wrap select:focus { border-color: var(--green); }
    .select-wrap option { background: #1a1a1a; color: #fff; }
    .select-wrap::after {
      content: '▾'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none; font-size: 0.8rem;
    }

    /* START button */
    #start-btn {
      width: 100%; padding: 18px;
      background: var(--green); border: none; border-radius: 14px;
      color: #fff; font-family: 'Inter', sans-serif; font-weight: 700;
      font-size: 1.1rem; letter-spacing: 0.1em; cursor: pointer;
      transition: all 0.25s ease; position: relative; overflow: hidden;
      box-shadow: 0 4px 24px rgba(34,197,94,0.4);
    }
    #start-btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
      transform: translateX(-100%); transition: transform 0.6s ease;
    }
    #start-btn:hover::before { transform: translateX(100%); }
    #start-btn:hover { background: #16a34a; transform: translateY(-1px); box-shadow: 0 6px 32px rgba(34,197,94,0.45); }
    #start-btn:active { transform: translateY(0); }
    #start-btn:disabled { cursor: not-allowed; transform: none; }
    #start-btn.loading { animation: btnBlink 0.7s ease-in-out infinite; }
    @keyframes btnBlink {
      0%,100% { background: var(--green); box-shadow: 0 4px 24px rgba(34,197,94,0.4); }
      50% { background: #86efac; box-shadow: 0 0 40px rgba(34,197,94,0.9); }
    }

    /* ── PROGRESS ── */
    #progress-wrap {
      width: 100%; max-width: 520px;
      display: none; flex-direction: column; gap: 12px;
    }

    .progress-steps { display: flex; justify-content: space-between; gap: 4px; }

    .step-dot {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px;
      opacity: 0.3; transition: opacity 0.3s;
    }
    .step-dot.active { opacity: 1; }
    .step-dot.done { opacity: 0.6; }

    .step-dot .dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--muted);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .step-dot.active .dot { background: #f97316; box-shadow: 0 0 8px #f97316; animation: blink 0.8s infinite; }
    .step-dot.done .dot { background: var(--green); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .step-dot .step-label { font-size: 0.6rem; color: var(--muted); text-align: center; white-space: nowrap; }

    /* FLAME progress bar */
    .progress-track {
      width: 100%; height: 10px;
      background: rgba(255,255,255,0.07); border-radius: 10px;
      overflow: visible; position: relative;
    }

    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #7c2d12, #dc2626, #f97316, #fbbf24, #fef08a);
      border-radius: 10px; position: relative;
      transition: width 0.5s ease;
      box-shadow: 0 0 6px #f97316, 0 0 20px #dc2626, 0 0 40px rgba(220,38,38,0.4);
    }

    .progress-fill::after {
      content: "🔥";
      position: absolute; right: -14px; top: 50%; transform: translateY(-55%);
      font-size: 1.3rem; filter: drop-shadow(0 0 6px #f97316);
      animation: flicker 0.3s infinite alternate;
      display: none;
    }
    .progress-fill.burning::after { display: block; }

    @keyframes flicker {
      0%   { transform: translateY(-55%) scale(1) rotate(-3deg); }
      100% { transform: translateY(-60%) scale(1.08) rotate(3deg); }
    }

    .progress-msg { text-align: center; font-size: 0.78rem; color: var(--muted); min-height: 1.2em; }

    /* ── RESULTS ── */
    #results-section { position: relative; z-index: 10; padding: 0 20px 80px; display: none; }

    .results-grid { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

    .results-count-bar { text-align: center; font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; }

    .match-card {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 18px; overflow: hidden; backdrop-filter: blur(20px);
      animation: slideUp 0.4s ease;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

    .match-body { display: grid; grid-template-columns: 1fr 1px 1fr; }
    .divider-line { background: var(--glass-border); align-self: stretch; }

    .product-panel { display: flex; flex-direction: column; align-items: center; padding: 24px 20px 20px; gap: 14px; }

    /* ── IMAGE BOX WITH ELECTRIC BORDER ── */
    .img-wrap {
      position: relative;
      width: 100%; max-width: 320px;
      padding: 3px;
      border-radius: 14px;
    }

    /* Rotating conic gradient — the electric glow layer */
    .img-wrap::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 15px;
      background: conic-gradient(
        from var(--angle, 0deg),
        #00f0ff 0%,
        #0066ff 10%,
        transparent 20%,
        transparent 45%,
        #a855f7 50%,
        #00f0ff 60%,
        transparent 70%,
        transparent 90%,
        #0066ff 95%,
        #00f0ff 100%
      );
      animation: electric-spin 1.8s linear infinite;
      z-index: 0;
    }

    /* Blur glow behind */
    .img-wrap::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 16px;
      background: conic-gradient(
        from var(--angle, 0deg),
        #00f0ff 0%,
        #0066ff 10%,
        transparent 20%,
        transparent 45%,
        #a855f7 50%,
        #00f0ff 60%,
        transparent 70%,
        transparent 90%,
        #0066ff 95%,
        #00f0ff 100%
      );
      animation: electric-spin 1.8s linear infinite;
      filter: blur(8px);
      opacity: 0.6;
      z-index: 0;
    }

    @property --angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    @keyframes electric-spin {
      0%   { --angle: 0deg; }
      100% { --angle: 360deg; }
    }

    .img-box {
      position: relative;
      z-index: 1;
      width: 100%; aspect-ratio: 1/1;
      border-radius: 11px; overflow: hidden;
      background: rgba(10,10,10,0.9);
    }
    .img-box img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; display: block; }
    .img-box:hover img { transform: scale(1.04); }

    .prod-link {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; max-width: 320px; padding: 11px 16px; border-radius: 10px;
      font-size: 0.82rem; font-weight: 600; text-decoration: none; letter-spacing: 0.03em;
      transition: all 0.2s;
    }
    .prod-link.etsy-link { background: rgba(241,100,30,0.15); border: 1px solid rgba(241,100,30,0.3); color: #fb923c; }
    .prod-link.etsy-link:hover { background: rgba(241,100,30,0.25); border-color: rgba(241,100,30,0.6); }
    .prod-link.ali-link { background: rgba(227,24,55,0.15); border: 1px solid rgba(227,24,55,0.3); color: #f87171; }
    .prod-link.ali-link:hover { background: rgba(227,24,55,0.25); border-color: rgba(227,24,55,0.6); }

    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      #main-view { padding: 24px 14px; }
      .search-card { gap: 10px; }
      .input-wrap input { padding: 13px 16px; font-size: 0.95rem; }
      .select-wrap select { padding: 11px 30px 11px 13px; font-size: 0.82rem; }
      #start-btn { padding: 15px; font-size: 1rem; }

      /* Keep side-by-side on mobile, just smaller */
      .match-body { grid-template-columns: 1fr 1px 1fr; }
      .product-panel { padding: 12px 8px 12px; gap: 8px; }
      .img-wrap { max-width: 100%; }
      .img-box { border-radius: 8px; }
      .prod-link { font-size: 0.72rem; padding: 8px 8px; border-radius: 8px; }
    }

    @media (max-width: 380px) {
      .prod-link { font-size: 0.65rem; padding: 7px 5px; gap: 3px; }
    }

    /* ── SHOOTING STARS ── */
    #space-canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* ── SPINNER on button ── */

    /* ── NICHE FINDER 3D WAVE TITLE ── */
    #niche-title {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 36px 20px 8px;
      user-select: none;
    }

    #niche-title span {
      display: inline-block;
      font-size: clamp(2.4rem, 7vw, 5rem);
      font-weight: 900;
      letter-spacing: 0.04em;
      color: #fff;
      text-shadow:
        0 1px 0 #ccc,
        0 2px 0 #c9c9c9,
        0 3px 0 #bbb,
        0 4px 0 #b9b9b9,
        0 5px 0 #aaa,
        0 6px 1px rgba(0,0,0,.1),
        0 0 5px rgba(0,0,0,.1),
        0 1px 3px rgba(0,0,0,.3),
        0 3px 5px rgba(0,0,0,.2),
        0 5px 10px rgba(0,0,0,.25),
        0 10px 10px rgba(0,0,0,.2),
        0 20px 20px rgba(0,0,0,.15);
      animation: wave3d 2.2s ease-in-out infinite;
    }

    /* Stagger each letter */
    #niche-title span:nth-child(1)  { animation-delay: 0.00s; }
    #niche-title span:nth-child(2)  { animation-delay: 0.07s; }
    #niche-title span:nth-child(3)  { animation-delay: 0.14s; }
    #niche-title span:nth-child(4)  { animation-delay: 0.21s; }
    #niche-title span:nth-child(5)  { animation-delay: 0.28s; }
    #niche-title span:nth-child(6)  { animation-delay: 0.35s; }
    #niche-title span:nth-child(7)  { animation-delay: 0.42s; }
    #niche-title span:nth-child(8)  { animation-delay: 0.49s; }
    #niche-title span:nth-child(9)  { animation-delay: 0.56s; }
    #niche-title span:nth-child(10) { animation-delay: 0.63s; }
    #niche-title span:nth-child(11) { animation-delay: 0.70s; }

    .title-space { display: inline-block; width: 0.35em; }

    @keyframes wave3d {
      0%, 100% {
        transform: translateY(0) rotateX(0deg) scale(1);
        text-shadow:
          0 1px 0 #ccc, 0 2px 0 #c9c9c9, 0 3px 0 #bbb,
          0 4px 0 #b9b9b9, 0 5px 0 #aaa,
          0 6px 1px rgba(0,0,0,.1), 0 0 5px rgba(0,0,0,.1),
          0 1px 3px rgba(0,0,0,.3), 0 3px 5px rgba(0,0,0,.2),
          0 5px 10px rgba(0,0,0,.25), 0 10px 10px rgba(0,0,0,.2),
          0 20px 20px rgba(0,0,0,.15);
      }
      25% {
        transform: translateY(-18px) rotateX(20deg) scale(1.08);
        text-shadow:
          0 1px 0 #ccc, 0 2px 0 #c9c9c9, 0 3px 0 #bbb,
          0 4px 0 #b9b9b9, 0 5px 0 #aaa, 0 6px 0 #999,
          0 7px 0 #888, 0 8px 0 #777, 0 9px 0 #666, 0 10px 0 #555,
          0 11px 1px rgba(0,0,0,.1), 0 0 8px rgba(0,0,0,.15),
          0 1px 4px rgba(0,0,0,.35), 0 4px 8px rgba(0,0,0,.3),
          0 8px 16px rgba(0,0,0,.25), 0 16px 22px rgba(0,0,0,.2),
          0 28px 30px rgba(0,0,0,.18);
      }
      50% {
        transform: translateY(0) rotateX(0deg) scale(1);
      }
    }

  </style>
</head>
<body>

  <div id="bg-layer"></div>
  <canvas id="space-canvas"></canvas>


  <div id="niche-title">
    <span>N</span><span>i</span><span>c</span><span>h</span><span>e</span><span class="title-space"></span><span>F</span><span>i</span><span>n</span><span>d</span><span>e</span><span>r</span>
  </div>

  <div id="main-view">
    <div class="search-card">
      <div class="input-wrap">
        <input type="text" id="keyword-input" placeholder="Keyword (e.g. custom neon sign...)" />
      </div>
      <div class="selects-row">
        <div class="select-wrap" id="count-wrap"></div>
      </div>
      <button id="start-btn" onclick="startSearch()">START</button>
    </div>

    <div id="progress-wrap">
      <div class="progress-steps" id="progress-steps"></div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-msg" id="progress-msg"></div>
    </div>
  </div>

  <section id="results-section">
    <div class="results-grid">
      <div class="results-count-bar" id="results-count"></div>
      <div id="results-container"></div>
    </div>
  </section>

  <script>
    // ── Build selects ──
    (function() {
      // Nombre d'images : 1–100
      const countSel = document.createElement('select');
      countSel.id = 'count-select';
      for (let i = 1; i <= 100; i++) {
        const o = document.createElement('option');
        o.value = i;
        o.textContent = i + ' image' + (i > 1 ? 's' : '');
        if (i === 10) o.selected = true;
        countSel.appendChild(o);
      }
      document.getElementById('count-wrap').appendChild(countSel);
    })();

    // ── Pipeline steps ──
    const STEPS = [
      { key: 'scraping_etsy',    label: 'Etsy' },
      { key: 'reverse_search',   label: 'Reverse' },
      { key: 'aliexpress_found', label: 'AliExpress' },
      { key: 'comparing',        label: 'IA' },
      { key: 'finalizing',       label: 'Résultats' },
    ];

    function initProgress() {
      const container = document.getElementById('progress-steps');
      container.innerHTML = '';
      STEPS.forEach(s => {
        const div = document.createElement('div');
        div.className = 'step-dot';
        div.id = 'step-' + s.key;
        div.innerHTML = `<div class="dot"></div><span class="step-label">${s.label}</span>`;
        container.appendChild(div);
      });
      setProgress(0);
      document.getElementById('progress-msg').textContent = '';
    }

    function setProgress(pct) {
      const el = document.getElementById('progress-fill');
      el.style.width = pct + '%';
      if (pct > 0 && pct < 100) el.classList.add('burning');
      else el.classList.remove('burning');
    }

    function advanceStep(stepKey, message) {
      const idx = STEPS.findIndex(s => s.key === stepKey);
      if (idx === -1) return;
      STEPS.forEach((s, i) => {
        const el = document.getElementById('step-' + s.key);
        if (!el) return;
        if (i < idx) el.className = 'step-dot done';
        else if (i === idx) el.className = 'step-dot active';
        else el.className = 'step-dot';
      });
      setProgress(Math.round(((idx + 1) / STEPS.length) * 100));
      document.getElementById('progress-msg').textContent = message || '';
    }

    function completeAllSteps() {
      STEPS.forEach(s => {
        const el = document.getElementById('step-' + s.key);
        if (el) el.className = 'step-dot done';
      });
      setProgress(100);
    }

    // ── Search ──
    async function startSearch() {
      const keyword = document.getElementById('keyword-input').value.trim();
      const maxCount = parseInt(document.getElementById('count-select').value) || 10;
      const threshold = 40;

      if (!keyword) { document.getElementById('keyword-input').focus(); return; }

      const btn = document.getElementById('start-btn');
      btn.disabled = true;
      btn.textContent = 'START';
      btn.classList.add('loading');

      document.getElementById('progress-wrap').style.display = 'flex';
      initProgress();
      document.getElementById('results-section').style.display = 'none';
      document.body.classList.remove('has-results');
      document.getElementById('results-container').innerHTML = '';
      document.getElementById('results-count').textContent = '';

      try {
        const response = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ keyword, similarityThreshold: threshold, maxCount })
        });

        const ct = response.headers.get('content-type') || '';

        if (ct.includes('text/event-stream')) {
          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buf = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const lines = buf.split('\n');
            buf = lines.pop();

            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              try {
                const ev = JSON.parse(line.slice(6));
                if (ev.step === 'complete') {
                  completeAllSteps();
                  document.getElementById('progress-msg').textContent = '✅ ' + (ev.results?.length || 0) + ' correspondance(s)';
                  (ev.results || []).forEach(renderMatch);
                  finalize(ev.results?.length || 0);
                } else if (ev.step === 'error') {
                  document.getElementById('progress-msg').textContent = '❌ ' + ev.message;
                  finalize(-1);
                } else {
                  advanceStep(ev.step, ev.message);
                }
              } catch {}
            }
          }
        } else {
          const data = await response.json();
          document.getElementById('progress-msg').textContent = '❌ ' + (data.error || 'Erreur');
          finalize(-1);
        }
      } catch (err) {
        document.getElementById('progress-msg').textContent = '❌ ' + err.message;
        finalize(-1);
      }

      function finalize(count) {
        btn.disabled = false;
        btn.classList.remove('loading');
        btn.textContent = 'START';
        const rs = document.getElementById('results-section');
        rs.style.display = 'block';
        document.body.classList.add('has-results');
        if (count > 0) {
          document.getElementById('results-count').textContent = count + ' correspondance(s) trouvée(s)';
          rs.scrollIntoView({ behavior: 'smooth' });
        } else if (count === 0) {
          document.getElementById('results-container').innerHTML = '<div class="empty">Aucune correspondance. Essayez un autre mot-clé ou baissez le seuil.</div>';
        }
      }
    }

    // ── Render match ──
    function renderMatch(m) {
      const { etsy, aliexpress } = m;
      const etsySrc = etsy.hostedImageUrl || etsy.image || '';
      const aliSrc  = aliexpress.image || '';
      const card = document.createElement('div');
      card.className = 'match-card';
      card.innerHTML = `
        <div class="match-body">
          <div class="product-panel">
            <div class="img-wrap">
              <div class="img-box">
                ${etsySrc ? `<img src="${etsySrc}" loading="lazy" onerror="this.style.display='none'" />` : ''}
              </div>
            </div>
            <a class="prod-link etsy-link" href="${etsy.link}" target="_blank" rel="noopener">🛍 Etsy ↗</a>
          </div>
          <div class="divider-line"></div>
          <div class="product-panel">
            <div class="img-wrap">
              <div class="img-box">
                ${aliSrc ? `<img src="${aliSrc}" loading="lazy" onerror="this.style.display='none'" />` : ''}
              </div>
            </div>
            <a class="prod-link ali-link" href="${aliexpress.link}" target="_blank" rel="noopener">🛒 AliExpress ↗</a>
          </div>
        </div>`;
      document.getElementById('results-container').appendChild(card);
    }


    // ── SPACE SCENE ──
    (function() {
      const canvas = document.getElementById('space-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let W, H, earthX, earthY, earthR, t = 0;

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        earthX = W / 2; earthY = H / 2;
        earthR = Math.min(W, H) * 0.13;
      }
      window.addEventListener('resize', resize);
      resize();

      const rand = (a, b) => Math.random() * (b - a) + a;

      // Static star field
      const starField = Array.from({ length: 220 }, () => ({
        x: Math.random(), y: Math.random(),
        r: rand(0.3, 1.5), alpha: rand(0.4, 1),
        phase: rand(0, Math.PI * 2), speed: rand(0.3, 1.2)
      }));

      // Planets
      const planets = [
        { orbitR: 0.26, speed: 0.00045, angle: 0.0,  r: 0.020, color: '#d4c5a0', rings: false },
        { orbitR: 0.37, speed: 0.00022, angle: 1.8,  r: 0.030, color: '#c1440e', rings: false },
        { orbitR: 0.50, speed: 0.00010, angle: 3.5,  r: 0.050, color: '#c8a96e', rings: true  },
        { orbitR: 0.62, speed: 0.00006, angle: 5.2,  r: 0.035, color: '#7faaff', rings: false },
      ];

      // Shooting stars
      let shooting = [];
      function spawnShoot() {
        const a = rand(22, 55) * Math.PI / 180;
        const sp = rand(9, 20);
        shooting.push({ x: rand(-100, W), y: rand(-60, H * 0.55),
          vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
          alpha: rand(0.7, 1), w: rand(1, 2.5), decay: rand(0.989, 0.997) });
      }
      for (let i = 0; i < 4; i++) spawnShoot();

      function hexTo(hex, offset) {
        const r = Math.min(255, Math.max(0, parseInt(hex.slice(1,3),16) + offset));
        const g = Math.min(255, Math.max(0, parseInt(hex.slice(3,5),16) + offset));
        const b = Math.min(255, Math.max(0, parseInt(hex.slice(5,7),16) + offset));
        return `rgb(${r},${g},${b})`;
      }
      function hexA(hex, a) {
        return `rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},${a})`;
      }

      function drawEarth(x, y, r, rot) {
        // Atmosphere
        const atmo = ctx.createRadialGradient(x, y, r * 0.88, x, y, r * 1.35);
        atmo.addColorStop(0, 'rgba(60,130,255,0.22)');
        atmo.addColorStop(1, 'rgba(60,130,255,0)');
        ctx.beginPath(); ctx.arc(x, y, r * 1.35, 0, Math.PI*2);
        ctx.fillStyle = atmo; ctx.fill();

        ctx.save();
        ctx.translate(x, y);

        // Ocean
        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2);
        const oc = ctx.createRadialGradient(-r*.3,-r*.3,0, 0,0,r);
        oc.addColorStop(0,'#5ba3e8'); oc.addColorStop(.5,'#1a6bbf'); oc.addColorStop(1,'#082e6e');
        ctx.fillStyle = oc; ctx.fill();

        // Clip to circle for continents
        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.clip();
        ctx.rotate(rot);

        // Continents
        const continents = [
          [0.15,-0.22,0.38,0.28], [0.10,0.30,0.22,0.30],
          [-0.56,-0.06,0.26,0.40], [0.48,0.44,0.20,0.17], [0.0,0.80,0.38,0.12]
        ];
        ctx.fillStyle = '#3a9e4a';
        for (const [cx,cy,rx,ry] of continents) {
          ctx.beginPath(); ctx.ellipse(cx*r,cy*r,rx*r,ry*r,0,0,Math.PI*2); ctx.fill();
        }
        // Second land detail
        ctx.fillStyle = '#2e8a3a';
        ctx.beginPath(); ctx.ellipse(0.2*r,-0.1*r,0.12*r,0.22*r,0.3,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(-0.38*r,0.22*r,0.10*r,0.18*r,-0.4,0,Math.PI*2); ctx.fill();

        // Clouds
        ctx.rotate(-rot * 0.55);
        ctx.fillStyle = 'rgba(255,255,255,0.16)';
        const clouds = [[-.2,-.5,.52,.09],[.3,.1,.42,.07],[-.5,.38,.36,.06],[.1,-.15,.58,.08]];
        for (const [cx,cy,rx,ry] of clouds) {
          ctx.beginPath(); ctx.ellipse(cx*r,cy*r,rx*r,ry*r,0,0,Math.PI*2); ctx.fill();
        }

        // Specular
        const spec = ctx.createRadialGradient(-r*.38,-r*.38,0,-r*.3,-r*.3,r*.75);
        spec.addColorStop(0,'rgba(255,255,255,0.17)'); spec.addColorStop(1,'rgba(255,255,255,0)');
        ctx.fillStyle=spec; ctx.fillRect(-r,-r,r*2,r*2);

        // Night shadow
        const sh = ctx.createRadialGradient(r*.45,0,0,r*.25,0,r*1.25);
        sh.addColorStop(0,'rgba(0,0,0,0)'); sh.addColorStop(.55,'rgba(0,0,20,.5)'); sh.addColorStop(1,'rgba(0,0,20,.9)');
        ctx.fillStyle=sh; ctx.fillRect(-r,-r,r*2,r*2);

        ctx.restore();
      }

      function drawPlanet(p) {
        const sc = Math.min(W,H);
        const ox = p.orbitR * sc * 0.78;
        const oy = ox * 0.36;
        const px = earthX + Math.cos(p.angle) * ox;
        const py = earthY + Math.sin(p.angle) * oy;
        const r  = p.r * sc * 0.48;

        // Orbit ellipse
        ctx.beginPath();
        ctx.ellipse(earthX, earthY, ox, oy, 0, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(255,255,255,0.055)';
        ctx.lineWidth = 1; ctx.stroke();

        ctx.save(); ctx.translate(px, py);

        if (p.rings) {
          ctx.save(); ctx.scale(1, 0.32);
          const rg = ctx.createRadialGradient(0,0,r*1.1,0,0,r*2.3);
          rg.addColorStop(0,'rgba(210,180,100,0.55)');
          rg.addColorStop(.6,'rgba(210,180,100,0.22)');
          rg.addColorStop(1,'rgba(210,180,100,0)');
          ctx.beginPath(); ctx.arc(0,0,r*2.3,0,Math.PI*2);
          ctx.fillStyle=rg; ctx.fill(); ctx.restore();
        }

        // Sphere
        const sg = ctx.createRadialGradient(-r*.32,-r*.32,0,0,0,r);
        sg.addColorStop(0, hexTo(p.color, 55));
        sg.addColorStop(.5, p.color);
        sg.addColorStop(1, hexTo(p.color, -55));
        ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
        ctx.fillStyle=sg; ctx.fill();

        // Glow
        const gl = ctx.createRadialGradient(0,0,r*.8,0,0,r*1.7);
        gl.addColorStop(0, hexA(p.color,.14)); gl.addColorStop(1, hexA(p.color,0));
        ctx.beginPath(); ctx.arc(0,0,r*1.7,0,Math.PI*2);
        ctx.fillStyle=gl; ctx.fill();

        // Night side
        const ns = ctx.createRadialGradient(r*.4,0,0,r*.2,0,r*1.1);
        ns.addColorStop(0,'rgba(0,0,0,0)'); ns.addColorStop(.5,'rgba(0,0,0,0.4)'); ns.addColorStop(1,'rgba(0,0,0,0.75)');
        ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.clip();
        ctx.fillStyle=ns; ctx.fillRect(-r,-r,r*2,r*2);

        ctx.restore();
      }

      function frame() {
        t += 0.016;
        ctx.clearRect(0, 0, W, H);

        // Stars
        for (const s of starField) {
          const a = s.alpha * (0.55 + 0.45 * Math.sin(t * s.speed + s.phase));
          ctx.beginPath(); ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
          ctx.fillStyle = `rgba(255,255,255,${a})`; ctx.fill();
        }

        // Advance planet angles
        for (const p of planets) p.angle += p.speed;

        // Planets behind earth (lower on screen = further z = behind)
        for (const p of planets) {
          const oy = p.orbitR * Math.min(W,H) * 0.78 * 0.36;
          if (Math.sin(p.angle) * oy + earthY > earthY) drawPlanet(p);
        }

        // Earth
        drawEarth(earthX, earthY, earthR, t * 0.07);

        // Planets in front
        for (const p of planets) {
          const oy = p.orbitR * Math.min(W,H) * 0.78 * 0.36;
          if (Math.sin(p.angle) * oy + earthY <= earthY) drawPlanet(p);
        }

        // Shooting stars
        if (Math.random() < 0.013 && shooting.length < 10) spawnShoot();
        shooting = shooting.filter(s => {
          const tail = 13;
          const gd = ctx.createLinearGradient(s.x,s.y,s.x-s.vx*tail,s.y-s.vy*tail);
          gd.addColorStop(0,`rgba(255,255,255,${s.alpha})`);
          gd.addColorStop(1,'rgba(255,255,255,0)');
          ctx.beginPath(); ctx.strokeStyle=gd; ctx.lineWidth=s.w;
          ctx.moveTo(s.x,s.y); ctx.lineTo(s.x-s.vx*tail,s.y-s.vy*tail); ctx.stroke();
          const g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.w*3);
          g.addColorStop(0,`rgba(255,255,255,${s.alpha})`); g.addColorStop(1,'rgba(255,255,255,0)');
          ctx.beginPath(); ctx.fillStyle=g; ctx.arc(s.x,s.y,s.w*3,0,Math.PI*2); ctx.fill();
          s.x+=s.vx; s.y+=s.vy; s.alpha*=s.decay;
          return s.x<W+300 && s.y<H+200 && s.alpha>0.04;
        });

        requestAnimationFrame(frame);
      }
      frame();
    })();

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('keyword-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') startSearch();
      });
    });
  </script>
</body>
</html>
