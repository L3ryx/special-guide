<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finder Niche - Starting</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Croissant+One&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: 'Inter', sans-serif;
    color: #fff;
    gap: 32px;
  }
  #logo {
    font-family: 'Croissant One', cursive;
    font-size: clamp(2rem, 8vw, 3.5rem);
    letter-spacing: 0.05em;
    color: #fff;
    text-shadow: 0 0 40px rgba(255,255,255,0.2);
  }
  #start-text {
    font-size: 1rem;
    font-weight: 600;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.05em;
  }
  .loader {
    border: 5px solid rgba(255,255,255,0.1);
    border-top: 5px solid #22c55e;
    border-radius: 50%;
    width: 52px;
    height: 52px;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
  #status {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.25);
    min-height: 1.2em;
  }
</style>
</head>
<body>
  <div id="logo">Finder Niche</div>
  <div class="loader"></div>
  <div id="start-text">Server is starting...</div>
  <div id="status"></div>

  <script>
    // ⚠️ Remplace par l'URL de ton serveur Render
    const SERVER_URL = 'https://finder-niche.com';

    let attempts = 0;

    async function checkServer() {
      attempts++;
      document.getElementById('status').textContent = 'Attempt ' + attempts + '...';
      try {
        const timeout = new Promise(function(_, reject) {
          setTimeout(function() { reject(new Error('timeout')); }, 5000);
        });
        const r = await Promise.race([
          fetch(SERVER_URL + '/api/health', { cache: 'no-store', mode: 'cors' }),
          timeout
        ]);
        if (r.ok) {
          document.getElementById('start-text').textContent = 'Ready! Redirecting...';
          document.getElementById('status').textContent = '';
          setTimeout(function() { window.location.href = SERVER_URL; }, 500);
          return;
        }
      } catch(e) {}
      setTimeout(checkServer, 4000);
    }

    checkServer();
  </script>
</body>
</html>
